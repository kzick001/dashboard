<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad V2.2.2</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23000000'/><text x='50' y='55' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='65' font-weight='200' fill='%23ffffff'>K</text></svg>">
    
    <!-- CDN Imports: Zero build steps. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        // Tailwind Configuration & Spring Physics Engine
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 400: 'var(--brand-400)', 500: 'var(--brand-500)', 800: 'var(--brand-800)', 900: 'var(--brand-900)' }
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)'
                    }
                }
            }
        };
    </script>
    
    <style>
        /* Core System Variables & The Matrix Override */
        :root {
            --glow-color: 6, 182, 212; /* Cyan Default */
            --bg-color: #000000;
        }

        .matrix-mode {
            --glow-color: 0, 255, 0; /* Phosphor Green Override */
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            overflow-x: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Smart Glass UI Engine */
        .smart-glass {
            background-color: rgba(255, 255, 255, 0.12); /* +10% contrast */
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 0 10px rgba(var(--glow-color), 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            position: relative;
        }

        .smart-glass:hover {
            box-shadow: 0 0 40px rgba(var(--glow-color), 0.5); /* 50% cyan bloom on hover */
            transform: translateY(-2px) scale(1.01);
            z-index: 10;
        }

        /* Dynamic Mouse Tracking Shine */
        .smart-glass::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y),
                rgba(var(--glow-color), 0.15),
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: -1;
        }

        .smart-glass:hover::before {
            opacity: 1;
        }

        /* Weather Drawer GPU Acceleration */
        #weather-drawer {
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        
        #weather-drawer.expanded {
            grid-template-rows: 1fr;
        }

        /* Clean Hide for Scrollbars */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="min-h-screen selection:bg-cyan-500/30">

    <!-- The Matrix Canvas Engine -->
    <canvas id="matrix-canvas" class="fixed inset-0 z-0 opacity-0 transition-opacity duration-1000 pointer-events-none"></canvas>

    <!-- Main OS Interface -->
    <main class="h-screen w-full p-4 md:p-8 flex flex-col gap-6 relative z-10 transition-opacity duration-700 ease-spring" id="main-ui">
        
        <!-- Top Nav -->
        <nav class="flex justify-between items-center px-2">
            <div class="text-xl font-light tracking-widest text-white/90 drop-shadow-md">KZICK<span class="font-bold">OS</span></div>
            <button id="override-btn" class="text-[0.65rem] tracking-[0.3em] font-bold text-white/40 hover:text-white transition-colors duration-300 border border-white/10 px-4 py-2 rounded-full hover:bg-white/5 uppercase">
                Override
            </button>
        </nav>

        <!-- Sortable Application Grid -->
        <div id="app-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 w-full max-w-7xl mx-auto flex-1 content-start">
            
            <!-- Standard Tile: Comms -->
            <a href="#" class="tile smart-glass rounded-[2rem] border border-white/5 p-6 flex flex-col justify-between group cursor-pointer aspect-square" data-id="comms">
                <div class="text-white/60 group-hover:text-white transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-10 h-10 md:w-12 md:h-12">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                    </svg>
                </div>
                <div class="text-sm font-medium tracking-wide">Comms</div>
            </a>

            <!-- Standard Tile: Media -->
            <a href="#" class="tile smart-glass rounded-[2rem] border border-white/5 p-6 flex flex-col justify-between group cursor-pointer aspect-square" data-id="media">
                <div class="text-white/60 group-hover:text-white transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-10 h-10 md:w-12 md:h-12">
                        <polygon points="5 3 19 12 5 21 5 3" stroke-linejoin="round" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="text-sm font-medium tracking-wide">Media</div>
            </a>

            <!-- Standard Tile: Gems (Formerly Multiplexer) -->
            <a href="#" class="tile smart-glass rounded-[2rem] border border-white/5 p-6 flex flex-col justify-between group cursor-pointer aspect-square" data-id="gems">
                <div class="text-white/60 group-hover:text-white transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" class="w-10 h-10 md:w-12 md:h-12">
                        <path d="M6 2L2 8l10 14L22 8l-4-6H6z"/>
                        <path d="M2 8h20M12 22V8M6 2l6 6M18 2l-6 6"/>
                    </svg>
                </div>
                <div class="text-sm font-medium tracking-wide">Gems</div>
            </a>

            <!-- Standard Tile: Sports (Formerly Athletics) -->
            <a href="#" class="tile smart-glass rounded-[2rem] border border-white/5 p-6 flex flex-col justify-between group cursor-pointer aspect-square" data-id="sports">
                <div class="text-white/60 group-hover:text-white transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-10 h-10 md:w-12 md:h-12">
                        <ellipse cx="12" cy="12" rx="10" ry="6" transform="rotate(-45 12 12)" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 15l6-6M10 12l2-2M12 14l2-2M11 13l2-2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="text-sm font-medium tracking-wide">Sports</div>
            </a>
            
            <!-- Standard Tile: Forge -->
            <a href="#" class="tile smart-glass rounded-[2rem] border border-white/5 p-6 flex flex-col justify-between group cursor-pointer aspect-square" data-id="forge">
                <div class="text-white/60 group-hover:text-white transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-10 h-10 md:w-12 md:h-12">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </div>
                <div class="text-sm font-medium tracking-wide">Sonic Forge</div>
            </a>
        </div>

        <!-- Static Anchor Grid (Isolates Weather from Drag Physics) -->
        <div id="anchor-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 w-full max-w-7xl mx-auto pb-24 md:pb-0">
            
            <!-- Panoramic Weather Module (Col-Span-4) -->
            <div id="weather-module" class="col-span-2 md:col-span-4 row-span-1 smart-glass rounded-[2rem] border border-white/5 p-6 md:p-8 flex flex-col gap-6 cursor-default">
                
                <!-- Header / Drawer Toggle -->
                <div id="weather-toggle" class="flex justify-between items-end cursor-pointer group" title="Click to expand telemetry">
                    <div>
                        <div class="text-xs tracking-widest text-white/50 mb-1 group-hover:text-white/80 transition-colors uppercase">Atmospherics</div>
                        <div class="flex items-baseline gap-3">
                            <div id="weather-temp" class="text-5xl md:text-6xl font-light tracking-tighter">--&deg;</div>
                            <div id="weather-desc" class="text-sm md:text-base font-medium text-white/70">Connecting...</div>
                        </div>
                    </div>
                    <div class="text-white/30 group-hover:text-white/80 transition-colors">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                </div>

                <!-- 5-Day Forecast Row -->
                <div id="weather-forecast-container" class="grid grid-cols-5 gap-2 md:gap-4 border-t border-white/5 pt-6">
                    <!-- Javascript Injected -->
                </div>

                <!-- GPU Accelerated Accordion Drawer -->
                <div id="weather-drawer" class="grid">
                    <div class="min-h-0 overflow-hidden">
                        <div class="pt-6 border-t border-white/5 mt-2">
                            <div class="grid grid-cols-4 gap-4 text-xs">
                                <div><span class="text-white/40 block mb-1">LOW</span><span id="dt-low" class="font-medium text-white/90">--</span></div>
                                <div><span class="text-white/40 block mb-1">DEW POINT</span><span id="dt-dew" class="font-medium text-white/90">--</span></div>
                                <div><span class="text-white/40 block mb-1">HUMIDITY</span><span id="dt-rh" class="font-medium text-white/90">--</span></div>
                                <div><span class="text-white/40 block mb-1">PRECIP</span><span id="dt-precip" class="font-medium text-white/90">--</span></div>
                                
                                <div><span class="text-white/40 block mb-1">WIND</span><span id="dt-wind" class="font-medium text-white/90">--</span></div>
                                <div><span class="text-white/40 block mb-1">GUST</span><span id="dt-gust" class="font-medium text-white/90">--</span></div>
                                <div><span class="text-white/40 block mb-1">DIRECTION</span><span id="dt-dir" class="font-medium text-white/90">--</span></div>
                                <div><span class="text-white/40 block mb-1">AQI</span><span id="dt-aqi" class="font-medium text-white/90">--</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Complication Pill (Heavily Shielded Bottom Right) -->
    <div id="complication-pill" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 flex items-center gap-4 p-4 md:px-6 md:py-4 rounded-[2rem] border border-white/10 bg-black/60 backdrop-blur-3xl shadow-[0_0_40px_rgba(0,0,0,0.8)] z-50 transition-all duration-500 ease-spring">
        <div id="comp-icon" class="text-xl md:text-2xl text-cyan-400 drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]">
            <!-- SVG Clock / Time Icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-6 h-6">
                <circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 6v6l4 2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="flex flex-col border-l border-white/10 pl-4">
            <div id="comp-time" class="text-lg md:text-xl font-medium tracking-wider whitespace-nowrap text-white/90 leading-tight">--:--:--</div>
            <div id="comp-date" class="text-[0.65rem] text-white/50 tracking-widest mt-0.5 text-center uppercase leading-tight">--</div>
        </div>
    </div>

    <!-- PIPELINE LOGIC & SYSTEM PHYSICS -->
    <script>
        /**
         * SECTION 1: ANTI-FOUC & SYSTEM HYDRATION
         * Synchronous execution prior to DOM interactive state.
         */
        const applySavedGridOrder = () => {
            const savedOrder = localStorage.getItem('kzick-grid-order');
            if (savedOrder) {
                const grid = document.getElementById('app-grid');
                const orderArr = JSON.parse(savedOrder);
                const nodes = Array.from(grid.children);
                
                // Reconstruct DOM order safely
                orderArr.forEach(id => {
                    const el = nodes.find(n => n.dataset.id === id);
                    if (el) grid.appendChild(el);
                });
            }
        };
        applySavedGridOrder();

        /**
         * SECTION 2: CHRONOMETER ENGINE
         */
        const updateTime = () => {
            const now = new Date();
            document.getElementById('comp-time').textContent = now.toLocaleTimeString('en-US', {
                hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            document.getElementById('comp-date').textContent = new Intl.DateTimeFormat('en-US', {
                month: 'short', day: '2-digit', year: 'numeric'
            }).format(now);
        };
        updateTime(); // Sync execute anti-FOUC
        setInterval(updateTime, 1000);

        /**
         * SECTION 3: MOUSE TRACKING (SMART GLASS PHYSICS)
         */
        document.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.smart-glass').forEach(tile => {
                const rect = tile.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                tile.style.setProperty('--mouse-x', `${x}px`);
                tile.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        /**
         * SECTION 4: SORTABLE JS (DRAG & DROP RECONCILIATION)
         */
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('app-grid');
            Sortable.create(grid, {
                animation: 350,
                easing: "cubic-bezier(0.175, 0.885, 0.32, 1.1)",
                ghostClass: 'opacity-0', // Custom invisible ghost, relies on underlying movement
                dragClass: 'scale-105',
                onEnd: () => {
                    const newOrder = Array.from(grid.children).map(c => c.dataset.id);
                    localStorage.setItem('kzick-grid-order', JSON.stringify(newOrder));
                }
            });
        });

        /**
         * SECTION 5: WEATHER PIPELINE (TOMORROW.IO PARSER)
         */
        const initWeather = async () => {
            const container = document.getElementById('weather-forecast-container');
            const CACHE_KEY = 'kzick-weather-cache';
            const TTL = 300000; // 5 mins strict rate limit protection

            // Weather Code Lexicon
            const getIcon = (code) => {
                const c = parseInt(code);
                if (c >= 5000) return `<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18m9-9H3m15.36-6.36l-12.72 12.72M6.64 6.64l12.72 12.72"/>`; // Snow
                if (c >= 4000) return `<path stroke-linecap="round" stroke-linejoin="round" d="M19 16.9A5 5 0 0018 7h-1.26a8 8 0 10-11.62 9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 12v9m-4-6v6m8-8v8"/>`; // Rain
                if (c >= 2000) return `<path stroke-linecap="round" stroke-linejoin="round" d="M4 12h16M4 8h16M4 16h16"/>`; // Fog
                if (c > 1000) return `<path stroke-linecap="round" stroke-linejoin="round" d="M3 15h12a3 3 0 000-6h-.5A5.5 5.5 0 004 8.5 3.5 3.5 0 003 15z"/><path stroke-linecap="round" stroke-linejoin="round" d="M17 18h.5a3.5 3.5 0 000-7h-.5a5.5 5.5 0 00-10.5-2"/>`; // Cloud
                return `<circle cx="12" cy="12" r="4"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v2m0 16v2m8.485-18.485l-1.414 1.414M4.929 19.071l-1.414 1.414M22 12h-2M4 12H2m15.071 7.071l-1.414-1.414M4.929 4.929L3.515 3.515"/>`; // Clear
            };

            const formatDay = (iso) => new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(new Date(iso)).toUpperCase();

            const renderData = (data) => {
                try {
                    // Extract Today's Realtime/Predicted
                    const current = data.timelines.hourly[0]?.values || data.timelines.daily[0]?.values;
                    const temp = Math.round(current.temperature);
                    const code = current.weatherCode || 1000;
                    
                    document.getElementById('weather-temp').innerHTML = `${temp}&deg;`;
                    document.getElementById('weather-desc').textContent = code > 4000 ? 'Precipitation' : (code > 1000 ? 'Cloud Cover' : 'Clear Skies');

                    // Extract 5-Day Array
                    const daily = data.timelines.daily.slice(0, 5);
                    container.innerHTML = daily.map((day, index) => {
                        const vals = day.values;
                        const label = index === 0 ? 'TODAY' : formatDay(day.time);
                        const isToday = index === 0 ? 'text-cyan-400 font-bold' : 'text-white/60';
                        return `
                            <div class="flex flex-col items-center justify-between gap-3 p-2 rounded-xl bg-white/0 hover:bg-white/5 transition-colors">
                                <div class="text-[0.65rem] tracking-widest ${isToday}">${label}</div>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="w-8 h-8 text-white/80">
                                    ${getIcon(vals.weatherCodeMax || vals.weatherCodeMin)}
                                </svg>
                                <div class="flex items-center gap-2 text-sm font-medium">
                                    <span class="text-white/90">${Math.round(vals.temperatureMax)}&deg;</span>
                                    <span class="text-white/40">${Math.round(vals.temperatureMin)}&deg;</span>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Populate Drawer with Today's deeply nested telemetry
                    const tVals = daily[0].values;
                    document.getElementById('dt-low').textContent = `${Math.round(tVals.temperatureMin)}°`;
                    document.getElementById('dt-dew').textContent = `${Math.round(tVals.dewPointAvg)}°`;
                    document.getElementById('dt-rh').textContent = `${Math.round(tVals.humidityAvg)}%`;
                    document.getElementById('dt-precip').textContent = `${Math.round(tVals.precipitationProbabilityAvg)}%`;
                    document.getElementById('dt-wind').textContent = `${Math.round(tVals.windSpeedAvg)} mph`;
                    document.getElementById('dt-gust').textContent = `${Math.round(tVals.windGustMax)} mph`;
                    document.getElementById('dt-dir').textContent = `${Math.round(tVals.windDirectionAvg)}°`;
                    document.getElementById('dt-aqi').textContent = tVals.epaPrimaryAQI || tVals.epaIndex || '--';

                } catch (err) {
                    console.error("Pipeline parse error", err);
                    document.getElementById('weather-desc').textContent = 'DATA CORRUPT';
                }
            };

            // Hardware Accelerated Drawer Toggle
            document.getElementById('weather-toggle').addEventListener('click', (e) => {
                e.stopPropagation();
                const drawer = document.getElementById('weather-drawer');
                drawer.classList.toggle('expanded');
            });

            // Fetch & Cache Logic
            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) {
                const { timestamp, data } = JSON.parse(cached);
                if (Date.now() - timestamp < TTL) {
                    return renderData(data);
                }
            }

            try {
                // Production proxy injected
                const res = await fetch(`https://kzick-weather.askozicki.workers.dev?lat=44.95&lon=-93.38`);
                if (!res.ok) throw new Error(`Proxy Auth Failed`);
                const data = await res.json();
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data }));
                renderData(data);
            } catch (err) {
                console.warn("Proxy down", err);
                document.getElementById('weather-desc').textContent = 'OFFLINE';
            }
        };
        initWeather();

        /**
         * SECTION 6: GHOST PROTOCOL & MATRIX OVERRIDE
         * Tab visibility aware. Strict FPS throttling.
         */
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const mainUI = document.getElementById('main-ui');
        
        let isMatrixMode = false;
        let isGhostMode = false;
        let isTabActive = true;
        let matrixRAF = null;
        let lastFrameTime = 0;
        let ghostTimer = null;
        let fpsTarget = 30;

        // Matrix Engine State Setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*'.split('');

        // Resize observer
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const drawMatrix = (timestamp) => {
            if (!isTabActive || (!isMatrixMode && !isGhostMode)) return;

            // Throttle FPS
            const elapsed = timestamp - lastFrameTime;
            const fpsInterval = 1000 / fpsTarget;

            if (elapsed > fpsInterval) {
                lastFrameTime = timestamp - (elapsed % fpsInterval);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // Deep trail
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Fetch dynamic color
                ctx.fillStyle = isMatrixMode ? 'rgba(0, 255, 0, 1)' : 'rgba(6, 182, 212, 1)';
                ctx.font = `${fontSize}px monospace`;

                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            matrixRAF = requestAnimationFrame(drawMatrix);
        };

        const configureMatrixEngine = () => {
            cancelAnimationFrame(matrixRAF);
            if (isMatrixMode) {
                // Full manual override
                canvas.style.opacity = '1';
                fpsTarget = 30;
                matrixRAF = requestAnimationFrame(drawMatrix);
            } else if (isGhostMode) {
                // Ghost easter egg
                canvas.style.opacity = '0.5';
                fpsTarget = 15; // Save CPU
                matrixRAF = requestAnimationFrame(drawMatrix);
            } else {
                // System normal
                canvas.style.opacity = '0';
            }
        };

        // Manual Override Switch
        document.getElementById('override-btn').addEventListener('click', () => {
            isMatrixMode = !isMatrixMode;
            document.documentElement.classList.toggle('matrix-mode', isMatrixMode);
            configureMatrixEngine();
        });

        // Ghost Protocol Core
        const activateGhostProtocol = () => {
            if (!isTabActive) return; // Prevent background trigger
            isGhostMode = true;
            mainUI.style.opacity = '0.3';
            configureMatrixEngine();
        };

        const deactivateGhostProtocol = () => {
            if (!isGhostMode) return;
            isGhostMode = false;
            mainUI.style.opacity = '1';
            configureMatrixEngine();
        };

        const resetIdleTimer = () => {
            clearTimeout(ghostTimer);
            deactivateGhostProtocol();
            ghostTimer = setTimeout(activateGhostProtocol, 300000); // 5 Minutes
        };

        // Input Observers
        ['mousemove', 'keydown', 'touchstart', 'scroll'].forEach(evt => 
            document.addEventListener(evt, resetIdleTimer, { passive: true })
        );
        resetIdleTimer(); // Init

        // Visibility Observer (Kill CPU leak)
        document.addEventListener('visibilitychange', () => {
            isTabActive = !document.hidden;
            if (isTabActive) {
                resetIdleTimer();
                configureMatrixEngine();
            } else {
                cancelAnimationFrame(matrixRAF);
            }
        });

    </script>
</body>
</html>
