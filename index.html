<!DOCTYPE html>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23000000'/><text x='50' y='55' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='65' font-weight='200' fill='%23ffffff'>K</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: { 400: 'var(--brand-400)', 500: 'var(--brand-500)', 800: 'var(--brand-800)', 900: 'var(--brand-900)' }
                    },
                    transitionTimingFunction: { 'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)' }
                }
            }
        }
    </script>
    
    <style>
        /* BASE CUPERTINO THEME - CYAN UPGRADED */
        :root {
            --brand-400: #22d3ee; 
            --brand-500: #06b6d4; 
            --brand-800: #155e75; 
            --brand-900: #164e63; 
            --glow-color: 6, 182, 212; 
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: #000000; 
            transition: filter 0.5s ease-in-out, background-color 0.5s ease; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* Spatial Radial Background */
        .radial-bg {
            background: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 50%),
                #0f172a;
        }

        /* Smart Glass Engine */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.4);
        }

        .app-tile {
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1), border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* Dynamic Mouse Shine */
        .app-tile::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(var(--glow-color), 0.15), transparent 40%);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 1; border-radius: inherit;
        }

        .app-tile:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(var(--glow-color), 0.3);
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8), 0 0 40px rgba(var(--glow-color), 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 20;
        }
        
        .app-tile:hover::before { opacity: 1; }

        /* THE MATRIX OVERRIDE HIJACK */
        body.matrix-mode {
            --brand-400: #00ff00; --brand-500: #00dd00; --brand-800: #005500; --brand-900: #002200; --glow-color: 0, 255, 0; 
            background: #000000 !important;
        }
        body.matrix-mode .radial-bg { background: #000000; }

        body.matrix-mode .glass-panel {
            background: #000000 !important;
            backdrop-filter: none !important;
            border-color: #00ff0044 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1) !important;
        }

        body.matrix-mode .app-tile:hover {
            border-color: #00ff00 !important;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4) !important;
        }

        body.matrix-mode .glass-panel *, body.matrix-mode header * {
            color: #00ff00 !important; text-shadow: 0 0 8px rgba(0, 255, 0, 0.5) !important;
        }

        /* OVERRIDE TOGGLE UI */
        .toggle-checkbox { left: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .toggle-checkbox:checked { left: 16px; border-color: #00ff00; } 
        .toggle-checkbox:checked + .toggle-label { background-color: #00ff00; box-shadow: 0 0 12px rgba(0, 255, 0, 0.5); }

        /* WEATHER DRAWER ACCELERATION */
        #weather-drawer-inner { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        #weather-drawer-inner.expanded { grid-template-rows: 1fr; }
        .drawer-content { min-height: 0; overflow: hidden; }

        /* Haptic Interaction Cues */
        .haptic-trigger:active { transform: scale(0.95); transition: transform 0.1s; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>

    <script>
        // Haptic Engine
        const triggerHaptic = (type = 'light') => {
            if (!navigator.vibrate) return;
            if (type === 'light') navigator.vibrate([30]);
            if (type === 'heavy') navigator.vibrate([60]);
        };

        // --- 0. HYDRATE LAYOUT ---
        (function() {
            const savedLayout = localStorage.getItem('kzick_layout_v2.3');
            if (savedLayout) {
                try {
                    const order = JSON.parse(savedLayout);
                    const board = document.getElementById('springboard');
                    if(board) {
                        const tiles = Array.from(board.children);
                        const tileMap = {};
                        tiles.forEach(t => tileMap[t.getAttribute('data-id')] = t);
                        
                        order.forEach(id => {
                            if (tileMap[id]) board.appendChild(tileMap[id]);
                        });
                        tiles.forEach(t => {
                            if (!order.includes(t.getAttribute('data-id'))) {
                                board.appendChild(t);
                            }
                        });
                    }
                } catch(e) { console.error("Grid Restore Failed", e); }
            }
        })();

        // --- 1. LOCAL CHRONOMETER & DATE ---
        const dateFormatter = new Intl.DateTimeFormat('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
        
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12; h = h ? h : 12;
            document.getElementById('localTime').textContent = `${h}:${m} ${ampm}`;
            document.getElementById('localDate').textContent = dateFormatter.format(now);
        }
        updateClock(); 
        setInterval(updateClock, 1000);

        // --- 2. SMART GLASS TRACKING ---
        document.addEventListener('mousemove', e => {
            document.querySelectorAll('.app-tile').forEach(tile => {
                const rect = tile.getBoundingClientRect();
                tile.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                tile.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });

        // --- 3. MATRIX OVERRIDE & GHOST PROTOCOL ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'.split('');
        let matrixWidth, matrixHeight, columns;
        let drops = [];
        let matrixActive = false, ghostActive = false;
        let lastDrawTime = 0, fpsInterval = 1000 / 30; 
        let ghostTimer;

        function initMatrix() {
            const dpr = window.devicePixelRatio || 1;
            matrixWidth = window.innerWidth; matrixHeight = window.innerHeight;
            canvas.width = matrixWidth * dpr; canvas.height = matrixHeight * dpr;
            ctx.scale(dpr, dpr);
            columns = Math.floor(matrixWidth / 20);
            drops = [];
            for(let i = 0; i < columns; i++) drops[i] = Math.random() * -100;
        }

        function drawMatrix(timestamp) {
            if (!matrixActive && !ghostActive) return;
            requestAnimationFrame(drawMatrix);
            const delta = timestamp - lastDrawTime;
            if (delta > fpsInterval) {
                lastDrawTime = timestamp - (delta % fpsInterval);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
                ctx.fillRect(0, 0, matrixWidth, matrixHeight);
                ctx.fillStyle = matrixActive ? '#00ff00' : 'rgba(6, 182, 212, 1)'; 
                ctx.font = '15pt monospace';
                for(let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * 20, drops[i] * 20);
                    if(drops[i] * 20 > matrixHeight && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { 
            if(matrixActive || ghostActive) {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(initMatrix, 200); 
            }
        });

        const overrideToggle = document.getElementById('overrideToggle');
        overrideToggle.checked = false; 
        overrideToggle.addEventListener('change', (e) => {
            triggerHaptic('heavy');
            if(e.target.checked) {
                document.body.classList.add('matrix-mode');
                canvas.style.opacity = '1'; matrixActive = true; fpsInterval = 1000 / 30; 
                initMatrix(); requestAnimationFrame(drawMatrix);
            } else {
                document.body.classList.remove('matrix-mode');
                if (!ghostActive) {
                    canvas.style.opacity = '0'; matrixActive = false;
                    setTimeout(() => { ctx.clearRect(0, 0, matrixWidth, matrixHeight); }, 700);
                } else {
                    matrixActive = false; canvas.style.opacity = '0.5'; 
                }
            }
        });

        function triggerGhostProtocol() {
            if (document.hidden) return; 
            ghostActive = true; document.getElementById('mainUI').style.opacity = '0.3';
            if (!matrixActive) {
                canvas.style.opacity = '0.5'; fpsInterval = 1000 / 15; 
                initMatrix(); requestAnimationFrame(drawMatrix);
            }
        }

        function resetGhostTimer() {
            if (ghostActive) {
                ghostActive = false; document.getElementById('mainUI').style.opacity = '1';
                if (!matrixActive) {
                    canvas.style.opacity = '0';
                    setTimeout(() => { if(!matrixActive && !ghostActive) ctx.clearRect(0, 0, matrixWidth, matrixHeight); }, 700);
                } else { canvas.style.opacity = '1'; fpsInterval = 1000 / 30; }
            }
            clearTimeout(ghostTimer); ghostTimer = setTimeout(triggerGhostProtocol, 300000); 
        }

        ['mousemove', 'keydown', 'touchstart'].forEach(evt => document.addEventListener(evt, resetGhostTimer, { passive: true }));
        resetGhostTimer();
        document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(ghostTimer); else resetGhostTimer(); });

        // --- 4. MODAL UI ---
        const folderData = {
            'multiplexer': {
                title: 'LINKS', 
                links: [
                    { name: 'DM Asst DCW', url: 'https://gemini.google.com/gem/d7aa441f9adf' },
                    { name: 'D&D Room Descriptions', url: 'https://docs.google.com/document/d/1Cb9z_aPEQ9kYAEfObuDkGV7Sh7OQAHQ7hjKdu6-lld0/edit?usp=sharing' },
                    { name: 'Loot Tables', url: 'https://docs.google.com/document/d/1a3jOUm6RPf9ZlQhw_t5uBR_qJrjpnrN7JGj_G_UcKdw/edit?usp=sharing' },
                    { name: 'Roll20-DCW', url: 'https://app.roll20.net/campaigns/details/18992588/dungeon-crawler-world-earth' },
                    { name: 'Image Gen V2', url: 'https://gemini.google.com/gem/a70141b1339a' },
                ]
            }
        };

        const modal = document.getElementById('folderModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalLinks = document.getElementById('modalLinks');
        
        function openModal(folderId) {
            triggerHaptic('light');
            const data = folderData[folderId];
            if (!data) return;
            
            modalTitle.textContent = data.title;
            modalLinks.innerHTML = data.links.map(link => `
                <a href="${link.url}" target="_blank" class="px-4 py-3 rounded-xl text-base font-medium text-slate-300 bg-white/5 hover:bg-white/10 hover:text-white transition-all flex items-center justify-between border border-white/5 hover:border-white/20 haptic-trigger">
                    ${link.name} <span class="text-slate-500 text-xs">↗</span>
                </a>
            `).join('');
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                });
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => { triggerHaptic(); closeModal(); });
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);

        // --- 5. NATIVE DRAG & DROP PERSISTENCE ---
        const board = document.getElementById('springboard');
        let draggedItem = null;
        let isDragging = false;

        board.addEventListener('dragstart', e => {
            const tile = e.target.closest('.app-tile');
            if(!tile) return;
            triggerHaptic('light');
            isDragging = true;
            draggedItem = tile;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', tile.getAttribute('data-id') || 'tile'); 
            setTimeout(() => draggedItem.style.opacity = '0.4', 0);
        });

        board.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });

        board.addEventListener('drop', e => {
            e.preventDefault();
            const targetItem = e.target.closest('.app-tile');
            if (targetItem && draggedItem && targetItem !== draggedItem) {
                const nodes = Array.from(board.children);
                const draggedIdx = nodes.indexOf(draggedItem);
                const targetIdx = nodes.indexOf(targetItem);
                
                if (draggedIdx < targetIdx) targetItem.after(draggedItem);
                else targetItem.before(draggedItem);
                
                const newOrder = Array.from(board.children).map(t => t.getAttribute('data-id'));
                localStorage.setItem('kzick_layout_v2.3', JSON.stringify(newOrder));
            }
            if(draggedItem) draggedItem.style.opacity = '1';
            triggerHaptic('heavy');
        });

        board.addEventListener('dragend', () => {
            if(draggedItem) draggedItem.style.opacity = '1';
            draggedItem = null;
            setTimeout(() => { isDragging = false; }, 100);
        });

        board.addEventListener('click', e => {
            if (isDragging) return; 
            const folderTile = e.target.closest('[data-folder]');
            if (folderTile) openModal(folderTile.getAttribute('data-folder'));
        });

       // --- 5.5 DYNAMIC VAULT ENGINE ---
        (function initDynamicVault() {
            if (!window.KzickVaultManifest) return;
            const vaultTile = document.querySelector('[data-id="vault"]');
            if (!vaultTile) return;

            let payload = `
            <div id="vault-dropdown" class="absolute top-[105%] left-0 w-64 sm:w-72 z-50 grid transition-all duration-500 origin-top" style="grid-template-rows: 0fr; opacity: 0; pointer-events: none; transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.1);">
                <div class="glass-panel overflow-hidden min-h-0 rounded-2xl flex flex-col text-left">
                    <div class="p-3">`;

            window.KzickVaultManifest.forEach(group => {
                payload += `
                    <div class="mb-3 last:mb-0">
                        <span class="block px-3 py-1 text-[10px] font-mono text-cyan-400/80 uppercase tracking-widest">${group.category}</span>
                        <div class="flex flex-col gap-1 mt-1">
                            ${group.links.map(link => `
                                <a href="${link.url}" target="_blank" class="haptic-trigger px-3 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/10 rounded-lg transition-colors flex justify-between items-center group/link">
                                    ${link.text}
                                    <span class="text-slate-600 group-hover/link:text-cyan-400 transition-colors text-xs">↗</span>
                                </a>
                            `).join('')}
                        </div>
                    </div>`;
            });

            payload += `</div></div></div>`;
            vaultTile.insertAdjacentHTML('beforeend', payload);

            const dropdown = document.getElementById('vault-dropdown');
            let isVaultOpen = false;

            vaultTile.addEventListener('click', (e) => {
                if (typeof isDragging !== 'undefined' && isDragging) return; 
                if (e.target.closest('a')) return; 

                triggerHaptic('light');
                isVaultOpen = !isVaultOpen;
                if (isVaultOpen) {
                    dropdown.style.gridTemplateRows = '1fr';
                    dropdown.style.opacity = '1';
                    dropdown.style.pointerEvents = 'auto';
                    vaultTile.style.borderColor = 'rgba(6, 182, 212, 0.5)'; 
                } else {
                    dropdown.style.gridTemplateRows = '0fr';
                    dropdown.style.opacity = '0';
                    dropdown.style.pointerEvents = 'none';
                    vaultTile.style.borderColor = ''; 
                }
            });

            document.addEventListener('click', (e) => {
                if (isVaultOpen && !vaultTile.contains(e.target)) {
                    isVaultOpen = false;
                    dropdown.style.gridTemplateRows = '0fr';
                    dropdown.style.opacity = '0';
                    dropdown.style.pointerEvents = 'none';
                    vaultTile.style.borderColor = '';
                }
            });
        })();

        // --- 6. SECURE ATMOS PROTOCOL PIPELINE ---
        (async function initWeatherPipeline() {
            const CACHE_KEY = 'atmos_weather_v2.3';
            const TTL = 5 * 60 * 1000; 
            const weatherContainer = document.getElementById('weatherContainer');
            
            const codeMap = {
                1000: '☀️', 1100: '🌤', 1101: '⛅', 1102: '☁️', 1001: '☁️',
                2000: '🌫️', 2100: '🌫️', 4000: '🌧', 4200: '🌧', 4001: '🌧', 
                4201: '🌧', 5000: '❄️', 5001: '❄️', 5100: '❄️', 8000: '⛈'
            };

            const safeVal = (val) => val != null ? Math.round(val) : '--';

            document.getElementById('weatherToggleBtn').addEventListener('click', () => {
                triggerHaptic('light');
                document.getElementById('weather-drawer-inner').classList.toggle('expanded');
            });

            function renderWeather(payload) {
                try {
                    const data = payload.data || payload.telemetry || payload; 
                    const timelines = data?.timelines;
                    if (!timelines || !Array.isArray(timelines)) throw new Error("Invalid schema");
                    
                    const dailyData = timelines.find(t => t.timestep === '1d')?.intervals;
                    const currentData = timelines.find(t => t.timestep === 'current')?.intervals[0]?.values;
                    if (!dailyData || !dailyData.length) throw new Error("No daily data available");

                    // Complication Pill
                    const currentTemp = safeVal(currentData?.temperature || dailyData[0]?.values?.temperatureMax);
                    const compTempEl = document.getElementById('comp-temp');
                    if (compTempEl) compTempEl.innerHTML = `${currentTemp}°`;

                    // UI Expansion - 6 Days Panoramic
                    let html = '<div class="flex gap-4 sm:gap-8 w-full justify-between items-center px-2">';
                    
                    for (let i = 0; i < 6 && i < dailyData.length; i++) {
                        const vals = dailyData[i].values;
                        const dCode = vals.weatherCodeMax || vals.weatherCodeMin || vals.weatherCode || 1100;
                        const icon = codeMap[dCode] || '🌤';
                        
                        let dayLabel = i === 0 ? 'TODAY' : 'UNK';
                        if (i !== 0) {
                            const date = new Date(dailyData[i].startTime);
                            if (!isNaN(date.getTime())) {
                                dayLabel = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                            }
                        }

                        // Robust fallback to prevent NaN injections
                        const maxT = safeVal(vals.temperatureMax ?? vals.temperature);
                        const minT = safeVal(vals.temperatureMin ?? (vals.temperature ? vals.temperature - 10 : null));
                        const isToday = i === 0 ? 'text-cyan-400 font-bold' : 'text-slate-500 font-medium';

                        html += `
                            <div class="flex flex-col items-center flex-1">
                                <span class="text-[10px] sm:text-xs uppercase tracking-widest mb-3 ${isToday}">${dayLabel}</span>
                                <span class="text-4xl sm:text-5xl mb-3 filter drop-shadow-lg">${icon}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-base sm:text-lg text-slate-200 font-bold">${maxT}°</span>
                                    <span class="text-xs sm:text-sm text-slate-500">${minT}°</span>
                                </div>
                            </div>`;
                    }
                    weatherContainer.innerHTML = html + '</div>';

                    // Populate Drawer (Today's Telemetry)
                    const tVals = dailyData[0].values;
                    document.getElementById('dt-low').textContent = `${safeVal(tVals.temperatureMin)}°`;
                    document.getElementById('dt-dew').textContent = `${safeVal(currentData?.dewPoint ?? tVals.dewPointAvg)}°`;
                    document.getElementById('dt-rh').textContent = `${safeVal(currentData?.humidity ?? tVals.humidityAvg)}%`;
                    document.getElementById('dt-precip').textContent = `${safeVal(tVals.precipitationProbabilityAvg)}%`;
                    
                    document.getElementById('dt-wind').textContent = `${safeVal(currentData?.windSpeed ?? tVals.windSpeedAvg)} mph`;
                    document.getElementById('dt-gust').textContent = `${safeVal(currentData?.windGust ?? tVals.windGustMax)} mph`;
                    document.getElementById('dt-dir').textContent = `${safeVal(currentData?.windDirection ?? tVals.windDirectionAvg)}°`;
                    
                    const aqi = payload.airnow?.primaryAQI ?? tVals.epaPrimaryAQI ?? '--';
                    document.getElementById('dt-aqi').textContent = aqi;

                } catch(e) {
                    console.error("Parse Error", e);
                    weatherContainer.innerHTML = `<div class="text-red-400 tracking-widest text-xs py-4">PIPELINE PARSE FAILURE</div>`;
                }
            }

            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) {
                const { timestamp, data } = JSON.parse(cached);
                if (Date.now() - timestamp < TTL) {
                    return renderWeather(data);
                }
            }

            try {
                const proxyUrl = `https://kzick-weather.askozicki.workers.dev?lat=44.95&lon=-93.38`;
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error(`Proxy Auth/Response Failed: ${res.status}`);
                
                const data = await res.json();
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data }));
                renderWeather(data);

            } catch (error) {
                console.warn("Proxy connection failed", error);
                weatherContainer.innerHTML = `<div class="text-red-400 tracking-widest text-xs py-4">PROXY UNREACHABLE</div>`;
            }
        })();
    </script>
