<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23000000'/><text x='50' y='55' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='65' font-weight='200' fill='%23ffffff'>K</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: 'var(--brand-400)',
                            500: 'var(--brand-500)',
                            800: 'var(--brand-800)',
                            900: 'var(--brand-900)',
                        }
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)',
                    },
                    animation: {
                        'drift': 'drift 30s ease infinite',
                        'breathe': 'breathe 4s ease-in-out infinite',
                    },
                    keyframes: {
                        drift: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        },
                        breathe: {
                            '0%, 100%': { opacity: '0.3', transform: 'scale(0.95)' },
                            '50%': { opacity: '1', transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* BASE CUPERTINO THEME */
        :root {
            --brand-400: #22d3ee; 
            --brand-500: #06b6d4; 
            --brand-800: #155e75; 
            --brand-900: #164e63; 
            --glass-shine: rgba(255, 255, 255, 0.06);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: #000000; 
            transition: filter 0.5s ease-in-out, background-color 0.5s ease; 
        }

        /* SMART GLASS TILE ENGINE */
        .app-tile {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1), border-color 0.3s ease, background 0.3s ease, opacity 0.2s ease;
            cursor: pointer;
        }

        /* FLASHLIGHT EFFECT */
        .app-tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                var(--glass-shine), 
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        .app-tile:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            z-index: 20;
        }
        
        .app-tile:hover::before { opacity: 1; }

        /* THE MATRIX OVERRIDE HIJACK */
        body.matrix-mode {
            --brand-400: #00ff00;
            --brand-500: #00dd00;
            --brand-800: #005500;
            --brand-900: #002200;
            --glass-shine: rgba(0, 255, 0, 0.15);
            background: #000000 !important;
        }

        body.matrix-mode .app-tile, 
        body.matrix-mode #modalContent,
        body.matrix-mode #complicationPill {
            background: #000000 !important;
            backdrop-filter: none !important;
            border-color: #00ff0044 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1) !important;
        }

        body.matrix-mode .app-tile:hover {
            border-color: #00ff00 !important;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4) !important;
        }

        /* Force all text/SVG in Matrix mode to phosphor green */
        body.matrix-mode .app-tile *, 
        body.matrix-mode #modalContent *,
        body.matrix-mode header *,
        body.matrix-mode #comp-low,
        body.matrix-mode #comp-high,
        body.matrix-mode #comp-current {
            color: #00ff00 !important;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5) !important;
        }

        /* OVERRIDE TOGGLE UI */
        .toggle-checkbox { left: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .toggle-checkbox:checked { left: 16px; border-color: #00ff00; } 
        .toggle-checkbox:checked + .toggle-label { background-color: #00ff00; box-shadow: 0 0 12px rgba(0, 255, 0, 0.5); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>

    <script>
        (function() {
            const savedLayout = localStorage.getItem('kzick_layout_v2.2.1');
            if (savedLayout) {
                try {
                    const order = JSON.parse(savedLayout);
                    const board = document.getElementById('springboard');
                    if(board) {
                        const tiles = Array.from(board.children);
                        const tileMap = {};
                        tiles.forEach(t => tileMap[t.getAttribute('data-id')] = t);
                        
                        // Reconcile and append sorted layout
                        order.forEach(id => {
                            if (tileMap[id]) board.appendChild(tileMap[id]);
                        });
                        // Append any NEW tiles not found in localStorage
                        tiles.forEach(t => {
                            if (!order.includes(t.getAttribute('data-id'))) {
                                board.appendChild(t);
                            }
                        });
                    }
                } catch(e) { console.error("Grid Restore Failed", e); }
            }
        })();
    </script>

    <script>
        // --- 1. LOCAL CHRONOMETER ---
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12;
            h = h ? h : 12;
            document.getElementById('localTime').textContent = `${h}:${m} ${ampm}`;
        }
        updateClock(); 
        setInterval(updateClock, 1000);

        // --- 2. SMART GLASS TRACKING ---
        document.querySelectorAll('.app-tile').forEach(tile => {
            tile.addEventListener('mousemove', e => {
                const rect = tile.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                tile.style.setProperty('--mouse-x', `${x}px`);
                tile.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // --- 3. MATRIX CANVAS OVERRIDE ENGINE ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'.split('');
        let matrixWidth, matrixHeight, columns;
        let drops = [];
        let matrixActive = false;
        let lastDrawTime = 0;
        const fpsInterval = 1000 / 30;

        function initMatrix() {
            const dpr = window.devicePixelRatio || 1;
            matrixWidth = window.innerWidth;
            matrixHeight = window.innerHeight;
            canvas.width = matrixWidth * dpr;
            canvas.height = matrixHeight * dpr;
            ctx.scale(dpr, dpr);
            
            columns = Math.floor(matrixWidth / 20);
            drops = [];
            for(let i = 0; i < columns; i++) drops[i] = Math.random() * -100;
        }

        function drawMatrix(timestamp) {
            if (!matrixActive) return;
            requestAnimationFrame(drawMatrix);
            
            const delta = timestamp - lastDrawTime;
            if (delta > fpsInterval) {
                lastDrawTime = timestamp - (delta % fpsInterval);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
                ctx.fillRect(0, 0, matrixWidth, matrixHeight);
                ctx.fillStyle = '#0f0';
                ctx.font = '15pt monospace';
                
                for(let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * 20, drops[i] * 20);
                    if(drops[i] * 20 > matrixHeight && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
        }

        window.addEventListener('resize', () => { 
            if(matrixActive) initMatrix(); 
        });

        const overrideToggle = document.getElementById('overrideToggle');
        overrideToggle.checked = false; 
        overrideToggle.addEventListener('change', (e) => {
            if(e.target.checked) {
                document.body.classList.add('matrix-mode');
                canvas.classList.remove('opacity-0');
                matrixActive = true;
                initMatrix();
                requestAnimationFrame(drawMatrix);
            } else {
                document.body.classList.remove('matrix-mode');
                canvas.classList.add('opacity-0');
                matrixActive = false;
                setTimeout(() => { ctx.clearRect(0, 0, matrixWidth, matrixHeight); }, 700);
            }
        });

                    { name: 'Canna Lab', url: 'https://gemini.google.com/gem/ff2688525ab1' }

        };

        const modal = document.getElementById('folderModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalLinks = document.getElementById('modalLinks');
        
        function openModal(folderId) {
            const data = folderData[folderId];
            if (!data) return;
            
            modalTitle.textContent = data.title;
            modalLinks.innerHTML = data.links.map(link => `
                <a href="${link.url}" target="_blank" class="px-4 py-3 rounded-xl text-base font-medium text-slate-300 bg-white/5 hover:bg-white/10 hover:text-white transition-all flex items-center justify-between border border-white/5 hover:border-white/20">
                    ${link.name} <span class="text-slate-500 text-xs">↗</span>
                </a>
            `).join('');
            
            modal.classList.remove('hidden');
            // Request frame to allow display block to apply before animating opacity/transform
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                });
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);

        // --- 5. NATIVE DRAG & DROP PERSISTENCE ---
        const board = document.getElementById('springboard');
        let draggedItem = null;
        let isDragging = false;

        board.addEventListener('dragstart', e => {
            const tile = e.target.closest('.app-tile');
            if(!tile) return;
            isDragging = true;
            draggedItem = tile;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', tile.getAttribute('data-id') || 'tile'); 
            setTimeout(() => draggedItem.style.opacity = '0.4', 0);
        });

        board.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });

        board.addEventListener('drop', e => {
            e.preventDefault();
            const targetItem = e.target.closest('.app-tile');
            if (targetItem && draggedItem && targetItem !== draggedItem) {
                const nodes = Array.from(board.children);
                const draggedIdx = nodes.indexOf(draggedItem);
                const targetIdx = nodes.indexOf(targetItem);
                
                if (draggedIdx < targetIdx) targetItem.after(draggedItem);
                else targetItem.before(draggedItem);
                
                const newOrder = Array.from(board.children).map(t => t.getAttribute('data-id'));
                localStorage.setItem('kzick_layout_v2.2.1', JSON.stringify(newOrder));
            }
            if(draggedItem) draggedItem.style.opacity = '1';
        });

        board.addEventListener('dragend', () => {
            if(draggedItem) draggedItem.style.opacity = '1';
            draggedItem = null;
            // Delay resetting drag state so click events don't fire instantly after drop
            setTimeout(() => { isDragging = false; }, 100);
        });

        window.addEventListener('dragend', () => {
            if(draggedItem) draggedItem.style.opacity = '1';
            draggedItem = null;
            setTimeout(() => { isDragging = false; }, 100);
        });

        // Tile Click Handler (Differentiates between drag and click)
        board.addEventListener('click', e => {
            if (isDragging) return; // Prevent click if we were just dragging
            const folderTile = e.target.closest('[data-folder]');
            if (folderTile) openModal(folderTile.getAttribute('data-folder'));
        });


        // --- 6. NETWORK SUBSYSTEM & KERNEL UPTIME ---
        const sysStatusText = document.getElementById('sysStatusText');
        const pulseDot = document.getElementById('statusPulse');
        
        function updateNetworkState() {
            if (navigator.onLine) {
                sysStatusText.textContent = "SYS.ONLINE";
                sysStatusText.className = "text-slate-400 font-medium transition-colors";
                pulseDot.className = "w-1.5 h-1.5 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-breathe";
            } else {
                sysStatusText.textContent = "NO SIGNAL";
                sysStatusText.className = "text-red-400 font-bold transition-colors";
                pulseDot.className = "w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.8)] animate-pulse";
            }
        }
        window.addEventListener('online', updateNetworkState);
        window.addEventListener('offline', updateNetworkState);
        updateNetworkState();

        const startTime = Date.now();
        const uptimeDisplay = document.getElementById('sysUptime');
        setInterval(() => {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let h = String(Math.floor(diff / 3600)).padStart(2, '0');
            let m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            let s = String(diff % 60).padStart(2, '0');
            uptimeDisplay.textContent = `UP: ${h}:${m}:${s}`;
        }, 1000);

        // --- 7. SECURE TOMORROW.IO PROTOCOL PIPELINE ---
        (async function initWeatherPipeline() {
            const CACHE_KEY = 'kzick_weather_v2.2.1';
            const TTL = 5 * 60 * 1000; 
            const weatherContainer = document.getElementById('weatherContainer');
            
            const codeMap = {
                1000: '☀️', 1100: '🌤', 1101: '⛅', 1102: '☁️', 1001: '☁️',
                2000: '🌫️', 2100: '🌫️', 4000: '🌧', 4200: '🌧', 4001: '🌧', 
                4201: '🌧', 5000: '❄️', 5001: '❄️', 5100: '❄️', 8000: '⛈'
            };

            function renderWeather(data) {
                try {
                    const timelines = data?.data?.timelines || data?.timelines;
                    if (!timelines) throw new Error("Invalid schema");
                    
                    const minutely = timelines.minutely || (Array.isArray(timelines) ? timelines[0].intervals : []);
                    if (!minutely.length) throw new Error("No current data");
                    const currentVals = minutely[0].values;
                    
                    const daily = timelines.daily || (Array.isArray(timelines) ? (timelines.find(t => t.timestep === '1d')?.intervals || timelines[0].intervals) : []);
                    
                    const compIcon = document.getElementById('comp-icon');
                    const compCurrent = document.getElementById('comp-current');
                    const compLow = document.getElementById('comp-low');
                    const compHigh = document.getElementById('comp-high');
                    const pill = document.getElementById('complicationPill');
                    
                    const hour = new Date().getHours();
                    const isNight = hour >= 19 || hour <= 5;
                    let cIcon = codeMap[currentVals.weatherCode] || '🌤';
                    if (isNight && (currentVals.weatherCode === 1000 || currentVals.weatherCode === 1100)) cIcon = '🌙';
                    
                    compIcon.textContent = cIcon;
                    compCurrent.textContent = Math.round(currentVals.temperature) + '°';
                    
                    if (daily.length) {
                        const todayVals = daily[0].values;
                        const maxTemp = todayVals.weatherCodeMax ? todayVals.temperatureMax : (todayVals.temperatureMax || todayVals.temperature);
                        const minTemp = todayVals.weatherCodeMin ? todayVals.temperatureMin : (todayVals.temperatureMin || todayVals.temperature - 10);
                        
                        compHigh.textContent = Math.round(maxTemp) + '°';
                        compLow.textContent = Math.round(minTemp) + '°';
                    }

                    const temp = currentVals.temperature || 0;
                    const dew = currentVals.dewPoint || 0;
                    if (temp <= 36 && Math.abs(temp - dew) <= 3) {
                        pill.style.borderColor = '#93c5fd';
                        pill.style.boxShadow = '0 0 20px rgba(147, 197, 253, 0.3)';
                    }

                    let html = '<div class="flex gap-4 w-full justify-between items-center">';
                    for (let i = 0; i < 4 && i < daily.length; i++) {
                        // ROBUST DATE FALLBACK PIPELINE
                        const rawTime = daily[i].startTime || daily[i].time;
                        const date = rawTime ? new Date(rawTime) : new Date(Date.now() + (i * 86400000));
                        
                        let day = 'UNK';
                        if (!isNaN(date.getTime())) {
                            day = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                        } else {
                            const fallbackDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                            day = fallbackDays[(new Date().getDay() + i) % 7];
                        }

                        const vals = daily[i].values;
                        const dCode = vals.weatherCodeMax || vals.weatherCodeMin || vals.weatherCode || 1100;
                        const icon = codeMap[dCode] || '🌤';
                        
                        html += `
                            <div class="flex flex-col items-center flex-1">
                                <span class="text-xs text-slate-500 uppercase tracking-widest mb-2">${day}</span>
                                <span class="text-3xl mb-2">${icon}</span>
                                <span class="text-lg text-slate-300 font-medium">${Math.round(vals.temperatureMax || vals.temperature)}°</span>
                            </div>`;
                    }
                    weatherContainer.innerHTML = html + '</div>';
                } catch(e) {
                    console.error("Parse Error", e);
                    weatherContainer.innerHTML = `<div class="text-red-400 tracking-widest text-xs">PARSE FAILURE</div>`;
                }
            }

            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) {
                const { timestamp, data } = JSON.parse(cached);
                if (Date.now() - timestamp < TTL) {
                    return renderWeather(data);
                }
            }

            try {
                const proxyUrl = `https://kzick-weather.askozicki.workers.dev?lat=44.95&lon=-93.38`;
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error(`Proxy Auth/Response Failed: ${res.status}`);
                
                const data = await res.json();
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data }));
                renderWeather(data);

            } catch (error) {
                console.warn("Proxy connection failed", error);
                weatherContainer.innerHTML = `<div class="text-red-400 tracking-widest text-xs">PROXY UNREACHABLE</div>`;
                document.getElementById('comp-icon').textContent = '⚠️';
                document.getElementById('comp-current').textContent = 'ERR';
                document.getElementById('comp-low').textContent = '--';
                document.getElementById('comp-high').textContent = '--';
            }
        })();
    </script>
</body>
</html>
