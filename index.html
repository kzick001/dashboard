<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad V2.2.3</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23000000'/><text x='50' y='55' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='65' font-weight='200' fill='%23ffffff'>K</text></svg>">
    
   <script src="vault-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: 'var(--brand-400)',
                            500: 'var(--brand-500)',
                            800: 'var(--brand-800)',
                            900: 'var(--brand-900)',
                        }
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)',
                    }
                }
            }
        }
    </script>
    
    <style>
        /* BASE CUPERTINO THEME - CYAN UPGRADED */
        :root {
            --brand-400: #22d3ee; 
            --brand-500: #06b6d4; 
            --brand-800: #155e75; 
            --brand-900: #164e63; 
            --glow-color: 6, 182, 212; /* Cyan Core */
            --glass-bg: rgba(255, 255, 255, 0.04); /* +10% Contrast */
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: #000000; 
            transition: filter 0.5s ease-in-out, background-color 0.5s ease; 
            overflow-x: hidden;
        }

        /* SMART GLASS TILE ENGINE */
        .app-tile {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* 10% Cyan ambient glow */
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(var(--glow-color), 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1), border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* DYNAMIC MOUSE SHINE */
        .app-tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                rgba(var(--glow-color), 0.15), 
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 1;
            border-radius: inherit;
        }

        .app-tile:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(var(--glow-color), 0.3);
            background: rgba(255, 255, 255, 0.06);
            /* 50% Cyan Bloom */
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8), 0 0 40px rgba(var(--glow-color), 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 20;
        }
        
        .app-tile:hover::before { opacity: 1; }

        /* THE MATRIX OVERRIDE HIJACK */
        body.matrix-mode {
            --brand-400: #00ff00;
            --brand-500: #00dd00;
            --brand-800: #005500;
            --brand-900: #002200;
            --glow-color: 0, 255, 0; /* Phosphor Green Hijack */
            background: #000000 !important;
        }

        body.matrix-mode .app-tile, 
        body.matrix-mode #modalContent,
        body.matrix-mode #weather-anchor {
            background: #000000 !important;
            backdrop-filter: none !important;
            border-color: #00ff0044 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1) !important;
        }

        body.matrix-mode .app-tile:hover, body.matrix-mode #weather-anchor:hover {
            border-color: #00ff00 !important;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4) !important;
        }

        body.matrix-mode .app-tile *, 
        body.matrix-mode #modalContent *,
        body.matrix-mode header *,
        body.matrix-mode #weather-anchor *,
        body.matrix-mode #complicationPill * {
            color: #00ff00 !important;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5) !important;
        }

        /* OVERRIDE TOGGLE UI */
        .toggle-checkbox { left: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .toggle-checkbox:checked { left: 16px; border-color: #00ff00; } 
        .toggle-checkbox:checked + .toggle-label { background-color: #00ff00; box-shadow: 0 0 12px rgba(0, 255, 0, 0.5); }

        /* WEATHER DRAWER ACCELERATION */
        #weather-drawer-inner {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        #weather-drawer-inner.expanded { grid-template-rows: 1fr; }
        .drawer-content { min-height: 0; overflow: hidden; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>

    <script>
        // --- 0. HYDRATE LAYOUT ---
        (function() {
            const savedLayout = localStorage.getItem('kzick_layout_v2.2.2');
            if (savedLayout) {
                try {
                    const order = JSON.parse(savedLayout);
                    const board = document.getElementById('springboard');
                    if(board) {
                        const tiles = Array.from(board.children);
                        const tileMap = {};
                        tiles.forEach(t => tileMap[t.getAttribute('data-id')] = t);
                        
                        order.forEach(id => {
                            if (tileMap[id]) board.appendChild(tileMap[id]);
                        });
                        tiles.forEach(t => {
                            if (!order.includes(t.getAttribute('data-id'))) {
                                board.appendChild(t);
                            }
                        });
                    }
                } catch(e) { console.error("Grid Restore Failed", e); }
            }
        })();

        // --- 1. LOCAL CHRONOMETER & DATE ---
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12;
            h = h ? h : 12;
            document.getElementById('localTime').textContent = `${h}:${m} ${ampm}`;
            
            document.getElementById('localDate').textContent = new Intl.DateTimeFormat('en-US', {
                month: 'short', day: '2-digit', year: 'numeric'
            }).format(now);
        }
        updateClock(); 
        setInterval(updateClock, 1000);

        // --- 2. SMART GLASS TRACKING ---
        document.addEventListener('mousemove', e => {
            document.querySelectorAll('.app-tile').forEach(tile => {
                const rect = tile.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                tile.style.setProperty('--mouse-x', `${x}px`);
                tile.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // --- 3. MATRIX OVERRIDE & GHOST PROTOCOL ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'.split('');
        let matrixWidth, matrixHeight, columns;
        let drops = [];
        let matrixActive = false;
        let ghostActive = false;
        let lastDrawTime = 0;
        let fpsInterval = 1000 / 30; 
        let ghostTimer;

        function initMatrix() {
            const dpr = window.devicePixelRatio || 1;
            matrixWidth = window.innerWidth;
            matrixHeight = window.innerHeight;
            canvas.width = matrixWidth * dpr;
            canvas.height = matrixHeight * dpr;
            ctx.scale(dpr, dpr);
            
            columns = Math.floor(matrixWidth / 20);
            drops = [];
            for(let i = 0; i < columns; i++) drops[i] = Math.random() * -100;
        }

        function drawMatrix(timestamp) {
            if (!matrixActive && !ghostActive) return;
            requestAnimationFrame(drawMatrix);
            
            const delta = timestamp - lastDrawTime;
            if (delta > fpsInterval) {
                lastDrawTime = timestamp - (delta % fpsInterval);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
                ctx.fillRect(0, 0, matrixWidth, matrixHeight);
                
                ctx.fillStyle = matrixActive ? '#00ff00' : 'rgba(6, 182, 212, 1)'; 
                ctx.font = '15pt monospace';
                
                for(let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * 20, drops[i] * 20);
                    if(drops[i] * 20 > matrixHeight && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
        }

        window.addEventListener('resize', () => { 
            if(matrixActive || ghostActive) initMatrix(); 
        });

        const overrideToggle = document.getElementById('overrideToggle');
        overrideToggle.checked = false; 
        overrideToggle.addEventListener('change', (e) => {
            if(e.target.checked) {
                document.body.classList.add('matrix-mode');
                canvas.style.opacity = '1';
                matrixActive = true;
                fpsInterval = 1000 / 30; 
                initMatrix();
                requestAnimationFrame(drawMatrix);
            } else {
                document.body.classList.remove('matrix-mode');
                if (!ghostActive) {
                    canvas.style.opacity = '0';
                    matrixActive = false;
                    setTimeout(() => { ctx.clearRect(0, 0, matrixWidth, matrixHeight); }, 700);
                } else {
                    matrixActive = false;
                    canvas.style.opacity = '0.5'; 
                }
            }
        });

        function triggerGhostProtocol() {
            if (document.hidden) return; 
            ghostActive = true;
            document.getElementById('mainUI').style.opacity = '0.3';
            
            if (!matrixActive) {
                canvas.style.opacity = '0.5';
                fpsInterval = 1000 / 15; 
                initMatrix();
                requestAnimationFrame(drawMatrix);
            }
        }

        function resetGhostTimer() {
            if (ghostActive) {
                ghostActive = false;
                document.getElementById('mainUI').style.opacity = '1';
                if (!matrixActive) {
                    canvas.style.opacity = '0';
                    setTimeout(() => { if(!matrixActive && !ghostActive) ctx.clearRect(0, 0, matrixWidth, matrixHeight); }, 700);
                } else {
                    canvas.style.opacity = '1';
                    fpsInterval = 1000 / 30;
                }
            }
            clearTimeout(ghostTimer);
            ghostTimer = setTimeout(triggerGhostProtocol, 300000); 
        }

        ['mousemove', 'keydown', 'touchstart'].forEach(evt => 
            document.addEventListener(evt, resetGhostTimer, { passive: true })
        );
        resetGhostTimer();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimeout(ghostTimer);
            } else {
                resetGhostTimer();
            }
        });


        // --- 4. MODAL UI ---
        const folderData = {
            'vault': {

                ]
            },
            'multiplexer': {
                title: 'Gems Array', 
                links: [
                    { name: 'SSP Apps', url: 'https://gemini.google.com/gem/1ee3cdd8bdff' },
                    { name: 'DM Asst DCW', url: 'https://gemini.google.com/gem/d7aa441f9adf' },

                ]
            }
        };

        const modal = document.getElementById('folderModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalLinks = document.getElementById('modalLinks');
        
        function openModal(folderId) {
            const data = folderData[folderId];
            if (!data) return;
            
            modalTitle.textContent = data.title;
            modalLinks.innerHTML = data.links.map(link => `
                <a href="${link.url}" target="_blank" class="px-4 py-3 rounded-xl text-base font-medium text-slate-300 bg-white/5 hover:bg-white/10 hover:text-white transition-all flex items-center justify-between border border-white/5 hover:border-white/20">
                    ${link.name} <span class="text-slate-500 text-xs">↗</span>
                </a>
            `).join('');
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                });
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);

        // --- 5. NATIVE DRAG & DROP PERSISTENCE ---
        const board = document.getElementById('springboard');
        let draggedItem = null;
        let isDragging = false;

        board.addEventListener('dragstart', e => {
            const tile = e.target.closest('.app-tile');
            if(!tile) return;
            isDragging = true;
            draggedItem = tile;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', tile.getAttribute('data-id') || 'tile'); 
            setTimeout(() => draggedItem.style.opacity = '0.4', 0);
        });

        board.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });

        board.addEventListener('drop', e => {
            e.preventDefault();
            const targetItem = e.target.closest('.app-tile');
            if (targetItem && draggedItem && targetItem !== draggedItem) {
                const nodes = Array.from(board.children);
                const draggedIdx = nodes.indexOf(draggedItem);
                const targetIdx = nodes.indexOf(targetItem);
                
                if (draggedIdx < targetIdx) targetItem.after(draggedItem);
                else targetItem.before(draggedItem);
                
                const newOrder = Array.from(board.children).map(t => t.getAttribute('data-id'));
                localStorage.setItem('kzick_layout_v2.2.2', JSON.stringify(newOrder));
            }
            if(draggedItem) draggedItem.style.opacity = '1';
        });

        board.addEventListener('dragend', () => {
            if(draggedItem) draggedItem.style.opacity = '1';
            draggedItem = null;
            setTimeout(() => { isDragging = false; }, 100);
        });

        board.addEventListener('click', e => {
            if (isDragging) return; 
            const folderTile = e.target.closest('[data-folder]');
            if (folderTile) openModal(folderTile.getAttribute('data-folder'));
        });


       // --- 5.5 DYNAMIC VAULT ENGINE (SURGICAL OVERRIDE) ---
        (function initDynamicVault() {
            if (!window.KzickVaultManifest) return;

            const vaultTile = document.querySelector('[data-id="vault"]');
            if (!vaultTile) return;

            // 1. Hijack existing tile parameters (Remove old modal tie-in, fix overflow clipping)
            vaultTile.removeAttribute('data-folder');
            vaultTile.classList.remove('overflow-hidden'); 
            vaultTile.style.overflow = 'visible'; 

            // 2. Machine the UI Payload (0fr to 1fr hack)
            let payload = `
            <div id="vault-dropdown" class="absolute top-[105%] left-0 w-64 sm:w-72 z-50 grid transition-all duration-500 origin-top" style="grid-template-rows: 0fr; opacity: 0; pointer-events: none; transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.1);">
                <div class="overflow-hidden min-h-0 bg-[#0a0a0a]/95 backdrop-blur-3xl border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] flex flex-col text-left">
                    <div class="p-3">`;

            window.KzickVaultManifest.forEach(group => {
                payload += `
                    <div class="mb-3 last:mb-0">
                        <span class="block px-3 py-1 text-[10px] font-mono text-cyan-400/80 uppercase tracking-widest">${group.category}</span>
                        <div class="flex flex-col gap-1 mt-1">
                            ${group.links.map(link => `
                                <a href="${link.url}" target="_blank" class="px-3 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/10 rounded-lg transition-colors flex justify-between items-center group/link">
                                    ${link.text}
                                    <span class="text-slate-600 group-hover/link:text-cyan-400 transition-colors text-xs">↗</span>
                                </a>
                            `).join('')}
                        </div>
                    </div>`;
            });

            payload += `</div></div></div>`;

            // 3. Synchronous Injection
            vaultTile.insertAdjacentHTML('beforeend', payload);

            // 4. Mount Event Delegation & Spring Physics
            const dropdown = document.getElementById('vault-dropdown');
            let isVaultOpen = false;

            vaultTile.addEventListener('click', (e) => {
                if (typeof isDragging !== 'undefined' && isDragging) return; // Respect global drag constraints
                if (e.target.closest('a')) return; // Let actual links route normally

                isVaultOpen = !isVaultOpen;
                if (isVaultOpen) {
                    dropdown.style.gridTemplateRows = '1fr';
                    dropdown.style.opacity = '1';
                    dropdown.style.pointerEvents = 'auto';
                    vaultTile.style.borderColor = 'rgba(6, 182, 212, 0.5)'; // Apply cyan active glow
                } else {
                    dropdown.style.gridTemplateRows = '0fr';
                    dropdown.style.opacity = '0';
                    dropdown.style.pointerEvents = 'none';
                    vaultTile.style.borderColor = ''; 
                }
            });

            // 5. Environmental Cleanup (Click outside to close)
            document.addEventListener('click', (e) => {
                if (isVaultOpen && !vaultTile.contains(e.target)) {
                    isVaultOpen = false;
                    dropdown.style.gridTemplateRows = '0fr';
                    dropdown.style.opacity = '0';
                    dropdown.style.pointerEvents = 'none';
                    vaultTile.style.borderColor = '';
                }
            });
        })();

        // --- 6. SECURE TOMORROW.IO PROTOCOL PIPELINE ---
        (async function initWeatherPipeline() {
            const CACHE_KEY = 'kzick_weather_v2.2.2';
            const TTL = 5 * 60 * 1000; 
            const weatherContainer = document.getElementById('weatherContainer');
            
            const codeMap = {
                1000: '☀️', 1100: '🌤', 1101: '⛅', 1102: '☁️', 1001: '☁️',
                2000: '🌫️', 2100: '🌫️', 4000: '🌧', 4200: '🌧', 4001: '🌧', 
                4201: '🌧', 5000: '❄️', 5001: '❄️', 5100: '❄️', 8000: '⛈'
            };

            document.getElementById('weatherToggleBtn').addEventListener('click', () => {
                document.getElementById('weather-drawer-inner').classList.toggle('expanded');
            });

            function renderWeather(data) {
                try {
                    const timelines = data?.data?.timelines || data?.timelines;
                    if (!timelines) throw new Error("Invalid schema");
                    
                    const daily = timelines.daily || [];
                    if (!daily.length) throw new Error("No daily data available");

                    // Inject current temperature into complication pill
                    const minutely = timelines.minutely || [];
                    const hourly = timelines.hourly || [];
                    const currentVals = minutely[0]?.values || hourly[0]?.values || daily[0]?.values || {};
                    const currentTemp = Math.round(currentVals.temperature || daily[0]?.values?.temperatureMax || 0);
                    const compTempEl = document.getElementById('comp-temp');
                    if (compTempEl) compTempEl.innerHTML = `${currentTemp}&deg;`;

                    // UI Expansion - 6 Days Panoramic
                    let html = '<div class="flex gap-4 sm:gap-8 w-full justify-between items-center px-2">';
                    
                    for (let i = 0; i < 6 && i < daily.length; i++) {
                        const vals = daily[i].values;
                        const dCode = vals.weatherCodeMax || vals.weatherCodeMin || vals.weatherCode || 1100;
                        const icon = codeMap[dCode] || '🌤';
                        
                        let dayLabel = 'UNK';
                        if (i === 0) {
                            dayLabel = 'TODAY';
                        } else {
                            const rawTime = daily[i].startTime || daily[i].time;
                            const date = rawTime ? new Date(rawTime) : new Date(Date.now() + (i * 86400000));
                            if (!isNaN(date.getTime())) {
                                dayLabel = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                            }
                        }

                        const maxT = Math.round(vals.temperatureMax || vals.temperature);
                        const minT = Math.round(vals.temperatureMin || vals.temperature - 10);
                        const isToday = i === 0 ? 'text-cyan-400 font-bold' : 'text-slate-500 font-medium';

                        html += `
                            <div class="flex flex-col items-center flex-1">
                                <span class="text-[10px] sm:text-xs uppercase tracking-widest mb-3 ${isToday}">${dayLabel}</span>
                                <span class="text-4xl sm:text-5xl mb-3 filter drop-shadow-lg">${icon}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-base sm:text-lg text-slate-200 font-bold">${maxT}°</span>
                                    <span class="text-xs sm:text-sm text-slate-500">${minT}°</span>
                                </div>
                            </div>`;
                    }
                    weatherContainer.innerHTML = html + '</div>';

                    // Populate Drawer (Today's Telemetry)
                    const tVals = daily[0].values;
                    document.getElementById('dt-low').textContent = `${Math.round(tVals.temperatureMin || 0)}°`;
                    document.getElementById('dt-dew').textContent = `${Math.round(tVals.dewPointAvg || 0)}°`;
                    document.getElementById('dt-rh').textContent = `${Math.round(tVals.humidityAvg || 0)}%`;
                    document.getElementById('dt-precip').textContent = `${Math.round(tVals.precipitationProbabilityAvg || 0)}%`;
                    document.getElementById('dt-wind').textContent = `${Math.round(tVals.windSpeedAvg || 0)} mph`;
                    document.getElementById('dt-gust').textContent = `${Math.round(tVals.windGustMax || 0)} mph`;
                    document.getElementById('dt-dir').textContent = `${Math.round(tVals.windDirectionAvg || 0)}°`;
                    
                    const aqi = tVals.epaPrimaryAQI ?? tVals.epaIndex ?? '--';
                    document.getElementById('dt-aqi').textContent = aqi;

                } catch(e) {
                    console.error("Parse Error", e);
                    weatherContainer.innerHTML = `<div class="text-red-400 tracking-widest text-xs py-4">PIPELINE PARSE FAILURE</div>`;
                }
            }

            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) {
                const { timestamp, data } = JSON.parse(cached);
                if (Date.now() - timestamp < TTL) {
                    return renderWeather(data);
                }
            }

            try {
                const proxyUrl = `https://kzick-weather.askozicki.workers.dev?lat=44.95&lon=-93.38`;
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error(`Proxy Auth/Response Failed: ${res.status}`);
                
                const data = await res.json();
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data }));
                renderWeather(data);

            } catch (error) {
                console.warn("Proxy connection failed", error);
                weatherContainer.innerHTML = `<div class="text-red-400 tracking-widest text-xs py-4">PROXY UNREACHABLE</div>`;
            }
        })();
    </script>
