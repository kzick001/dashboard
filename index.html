<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%2306b6d4'/><text x='50' y='55' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-size='65' font-weight='800' fill='%23020617'>K</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'drift': 'drift 20s ease infinite',
                        'electric-pulse': 'electric-pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                    },
                    keyframes: {
                        drift: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        },
                        'electric-pulse': {
                            '0%, 100%': { opacity: '1', filter: 'brightness(1) drop-shadow(0 0 2px rgba(6, 182, 212, 0.4))' },
                            '50%': { opacity: '0.8', filter: 'brightness(1.5) drop-shadow(0 0 10px rgba(6, 182, 212, 0.9))' },
                        },
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        }
                    }
                }
            }
        }
    </script>
    <script>
        document.documentElement.classList.add('dark'); 
    </script>
    
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        .hover-scale { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out, border-color 0.2s ease-in-out; }
        .hover-scale:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(6, 182, 212, 0.3); border-color: rgba(6, 182, 212, 0.6); }
        
        .toggle-checkbox:checked { right: 0; border-color: #06b6d4; }
        .toggle-checkbox:checked + .toggle-label { background-color: #06b6d4; box-shadow: 0 0 10px #06b6d4; }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
    </style>
</head>
<body class="bg-slate-950 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black bg-[length:200%_200%] animate-drift min-h-screen flex flex-col font-sans text-slate-200 transition-colors duration-300">

    <!-- TOP NAVIGATION & STATUS -->
    <div class="w-full p-4 flex justify-between items-center relative z-20 border-b border-cyan-900/30 bg-slate-950/50 backdrop-blur-md">
        <div class="flex items-center gap-2 text-cyan-500 font-mono text-xs tracking-widest">
            <span class="animate-pulse">●</span> SYSTEM ONLINE
        </div>
        
        <div class="flex items-center gap-6">
            <div id="miniWeather" class="hidden flex items-center text-cyan-300 font-medium bg-slate-900/80 px-4 py-1.5 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.1)] border border-cyan-800">
                <span id="miniWeatherIcon" class="text-lg mr-2"></span>
                <span id="miniWeatherTemp" class="text-sm font-mono"></span>
            </div>

            <div class="flex items-center">
                <span class="mr-3 text-xs font-mono text-slate-500 uppercase">Override</span>
                <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="darkModeToggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-slate-900 border-4 border-cyan-800 appearance-none cursor-pointer transition-transform duration-300 z-10 top-0 bottom-0 m-auto right-0"/>
                    <label for="darkModeToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-cyan-500 shadow-[0_0_10px_#06b6d4] cursor-pointer transition-colors duration-300"></label>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-4 w-full pt-8 relative z-10">
        
        <header class="mb-12 text-center w-full max-w-6xl">
            <h1 class="text-5xl font-black tracking-tighter mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-fuchsia-500 filter drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]">LAUNCHPAD</h1>
            <p class="text-cyan-600 font-mono text-sm tracking-widest uppercase">Personal Launchpad // V2.0</p>
        </header>

        <main class="w-full max-w-6xl flex flex-col gap-8">
            
            <!-- WEATHER MODULE -->
            <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-cyan-500/20 p-6 hover-scale overflow-hidden group">
                <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-cyan-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
                
                <div class="flex items-center mb-6 mt-4 relative z-10">
                    <div class="bg-cyan-950/60 p-3 rounded-lg mr-4 border border-cyan-500/30 animate-electric-pulse flex-shrink-0">
                        <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold truncate text-slate-100">Weather</h2>
                        <p class="text-cyan-600 font-mono text-xs uppercase tracking-widest mt-1">St. Louis Park // 5-Day</p>
                    </div>
                </div>
                
                <div id="weatherContainer" class="w-full min-h-[100px] flex items-center justify-center relative z-10">
                    <div class="animate-pulse flex space-x-4 w-full">
                        <div class="flex-1 h-24 bg-cyan-950/40 border border-cyan-800/50 rounded"></div>
                        <div class="flex-1 h-24 bg-cyan-950/40 border border-cyan-800/50 rounded hidden sm:block"></div>
                        <div class="flex-1 h-24 bg-cyan-950/40 border border-cyan-800/50 rounded hidden sm:block"></div>
                        <div class="flex-1 h-24 bg-cyan-950/40 border border-cyan-800/50 rounded hidden sm:block"></div>
                        <div class="flex-1 h-24 bg-cyan-950/40 border border-cyan-800/50 rounded hidden sm:block"></div>
                    </div>
                </div>
            </div>

            <!-- GRID -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                
                <!-- EMAILS MODULE -->
                <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-fuchsia-500/20 p-6 hover-scale overflow-hidden group">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-fuchsia-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
                    
                    <div class="flex items-center mb-6 mt-4 relative z-10">
                        <div class="bg-fuchsia-950/60 p-3 rounded-lg mr-4 border border-fuchsia-500/30 animate-electric-pulse flex-shrink-0">
                            <svg class="w-6 h-6 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold truncate text-slate-100">Email</h2>
                    </div>
                    <div id="emailList" class="space-y-3 relative z-10 flex flex-col">
                        <span class="text-fuchsia-500/70 font-mono text-sm animate-pulse">> Loading emails...</span>
                    </div>
                </div>

                <!-- EVENTS MODULE -->
                <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-emerald-500/20 p-6 hover-scale overflow-hidden group">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-emerald-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
                    
                    <div class="flex items-center mb-6 mt-4 relative z-10">
                        <div class="bg-emerald-950/60 p-3 rounded-lg mr-4 border border-emerald-500/30 animate-electric-pulse flex-shrink-0">
                            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold truncate text-slate-100">Calendar</h2>
                    </div>
                    <div id="calendarList" class="space-y-3 relative z-10 flex flex-col">
                        <span class="text-emerald-500/70 font-mono text-sm animate-pulse">> Loading events...</span>
                    </div>
                </div>

                <!-- LIVEFORGE MODULE -->
                <a href="live-forge/index.html" class="block relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-orange-500/20 p-6 hover-scale overflow-hidden group cursor-pointer">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-orange-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
                    
                    <div class="flex items-center mb-4 mt-4 relative z-10">
                        <div class="bg-orange-950/60 p-3 rounded-lg mr-4 border border-orange-500/30 animate-electric-pulse flex-shrink-0">
                            <svg class="w-6 h-6 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold truncate text-slate-100">LiveForge</h2>
                    </div>
                    <p class="text-orange-600/70 font-mono text-xs uppercase relative z-10 mb-2">HTML Rendering Sandbox</p>
                </a>

                <!-- SPORTS MODULE LINK -->
                <a href="sports.html" class="block relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-blue-500/20 p-6 hover-scale overflow-hidden group cursor-pointer">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-blue-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
                    
                    <div class="flex items-center mb-4 mt-4 relative z-10">
                        <div class="bg-blue-950/60 p-3 rounded-lg mr-4 border border-blue-500/30 animate-electric-pulse flex-shrink-0">
                            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M19 3v4M5 8.24A10.05 10.05 0 0012 19c3.86 0 7.2-2.18 8.76-5.44M12 19v3m-3 0h6m-9-6a5 5 0 01-5-5V5h18v2.24a5 5 0 01-5 5"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold truncate text-slate-100">Sports</h2>
                    </div>
                    <p class="text-blue-600/70 font-mono text-xs uppercase relative z-10 mb-2">Pro, College & NCAA</p>
                </a>

            </div>

        </main>

    </div>

    <footer class="mt-12 text-slate-600 font-mono text-[10px] tracking-widest text-center pb-6 w-full relative z-10 border-t border-cyan-900/30 pt-4">
        <p>&copy; <span id="currentYear"></span> KOZICKI_DASHBOARD</p>
    </footer>

    <!-- THE ENGINE ROOM -->
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Ensure Dark Mode is forced
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.checked = true;

        // --- Weather & Google Pipelines ---
        async function fetchWeather() {
            const weatherContainer = document.getElementById('weatherContainer');
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.95&longitude=-93.38&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=America%2FChicago&temperature_unit=fahrenheit');
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                
                const currentCode = data.current.weathercode;
                let currentIcon = '☀️';
                if (currentCode >= 1 && currentCode <= 3) currentIcon = '⛅';
                if (currentCode >= 45 && currentCode <= 48) currentIcon = '🌫️';
                if (currentCode >= 51 && currentCode <= 67) currentIcon = '🌧️';
                if (currentCode >= 71 && currentCode <= 77) currentIcon = '❄️';
                if (currentCode >= 80 && currentCode <= 82) currentIcon = '🌦️';
                if (currentCode >= 95 && currentCode <= 99) currentIcon = '⛈️';

                document.getElementById('miniWeatherIcon').textContent = currentIcon;
                document.getElementById('miniWeatherTemp').textContent = Math.round(data.current.temperature_2m) + '°F';
                document.getElementById('miniWeather').classList.remove('hidden');

                let weatherHTML = '<div class="flex flex-col sm:flex-row justify-between gap-3 w-full">';
                for (let i = 0; i < 5; i++) {
                    const date = new Date(data.daily.time[i] + 'T00:00:00');
                    const dayName = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                    const formattedDate = new Intl.DateTimeFormat('en-US', { month: '2-digit', day: '2-digit' }).format(date);
                    
                    const code = data.daily.weathercode[i];
                    let icon = '☀️';
                    if (code >= 1 && code <= 3) icon = '⛅';
                    if (code >= 45 && code <= 48) icon = '🌫️';
                    if (code >= 51 && code <= 67) icon = '🌧️';
                    if (code >= 71 && code <= 77) icon = '❄️';
                    if (code >= 80 && code <= 82) icon = '🌦️';
                    if (code >= 95 && code <= 99) icon = '⛈️';

                    const precip = data.daily.precipitation_probability_max[i];
                    const precipDisplay = precip > 20 
                        ? `<div class="text-[10px] text-cyan-400 font-mono flex items-center mt-1"><svg class="w-3 h-3 mr-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.5c-3.033 0-5.5-2.467-5.5-5.5 0-2.333 1.583-4.833 5.5-9.833 3.917 5 5.5 7.5 5.5 9.833 0 3.033-2.467 5.5-5.5 5.5z"/></svg>${precip}%</div>`
                        : `<div class="text-[10px] opacity-0 mt-1">0%</div>`;

                    weatherHTML += `
                        <div class="flex flex-col items-center justify-center p-3 rounded-lg bg-slate-900/50 flex-1 border border-cyan-500/20 hover:border-cyan-400/60 transition-colors shadow-inner">
                            <span class="font-mono font-bold text-xs text-cyan-500 uppercase tracking-widest">${dayName}</span>
                            <span class="text-2xl my-2 filter drop-shadow-md">${icon}</span>
                            <div class="text-sm font-semibold font-mono flex gap-2">
                                <span class="text-slate-100">${Math.round(data.daily.temperature_2m_max[i])}°</span>
                                <span class="text-slate-600">|</span>
                                <span class="text-slate-400">${Math.round(data.daily.temperature_2m_min[i])}°</span>
                            </div>
                            ${precipDisplay}
                            <div class="text-[10px] text-slate-500 font-mono mt-1">${formattedDate}</div>
                        </div>
                    `;
                }
                weatherContainer.innerHTML = weatherHTML + '</div>';
            } catch (error) {
                weatherContainer.innerHTML = `<div class="p-4 bg-red-950/30 border border-red-500/50 rounded flex items-center gap-3 w-full justify-center"><span class="text-red-500 animate-ping">●</span><span class="text-xs font-mono text-red-400 uppercase">Weather unavailable</span></div>`;
            }
        }

        async function fetchGoogleData() {
            const url = 'https://script.google.com/macros/s/AKfycbQbf7ex5rJcVgavVsaFs7BfhOWi6ioy3HD7TA1Oo9lAaUFitR6seFZrvMiU8_J8uLRPw/exec'; 
            const emailList = document.getElementById('emailList');
            const calList = document.getElementById('calendarList');

            try {
                const res = await fetch(url, { method: 'GET', redirect: 'follow' });
                
                if (!res.ok) throw new Error(`HTTP_ERR_${res.status}`);

                // Apps Script loves returning an HTML login page if auth expires or permissions are wrong.
                const contentType = res.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") === -1) {
                    throw new Error('AUTH_OR_CORS_BLOCK');
                }

                const data = await res.json();
                
                emailList.innerHTML = data.emails && data.emails.length > 0 
                    ? data.emails.map(subject => `<a href="https://mail.google.com/" target="_blank" class="block text-sm font-mono border-b border-fuchsia-900/30 pb-2 text-slate-300 hover:text-fuchsia-400 hover:pl-2 transition-all cursor-pointer">> ${subject}</a>`).join('')
                    : '<span class="text-sm font-mono text-slate-500">> INBOX EMPTY</span>';

                calList.innerHTML = data.calendar && data.calendar.length > 0
                    ? data.calendar.map(item => `<a href="https://calendar.google.com/" target="_blank" class="block text-sm border-b border-emerald-900/30 pb-2 text-slate-300 hover:text-emerald-400 hover:pl-2 transition-all cursor-pointer"><strong class="text-emerald-300 font-mono text-xs mr-2">[${item.date}]</strong>${item.title}</a>`).join('')
                    : '<span class="text-sm font-mono text-slate-500">> NO EVENTS</span>';
            } catch (error) {
                let errCode = '> ERROR';
                // Catching specific browser network/CORS rejections
                if (error.message.includes('Failed to fetch') || error.name === 'TypeError') errCode = '> NETWORK ERROR';
                else if (error.message.includes('AUTH_OR_CORS_BLOCK')) errCode = '> AUTH REQUIRED';
                else errCode = `> ${error.message}`;

                emailList.innerHTML = `<span class="text-[10px] font-mono text-red-500">${errCode}</span>`;
                calList.innerHTML = `<span class="text-[10px] font-mono text-red-500">${errCode}</span>`;
            }
        }

        // --- Initialization ---
        async function initializeDashboard() {
            fetchWeather();
            fetchGoogleData();
        }

        document.addEventListener("DOMContentLoaded", initializeDashboard);
    </script>
</body>
</html>
