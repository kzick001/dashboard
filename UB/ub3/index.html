<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undead Barrage</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.0/dist/phaser.min.js"></script>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #15171c;
    --panel-edge: #2a2e36;
    --ink: #d6d9de;
    --ink-dim: #8a8f99;
    --blood: #c0392b;
    --bile: #9acd32;
    --gold: #e0b341;
    --acid: #7a5fc9;
    --mono: 'Courier New', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--mono);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    overflow: hidden;
  }
  #wrap { position: relative; width: 960px; height: 640px; }
  #game-container { width: 100%; height: 100%; }
  canvas { display: block; image-rendering: pixelated; }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute; inset: 0; pointer-events: none;
    font-size: 13px; letter-spacing: 0.05em; display: none;
  }
  .hud-tl { position: absolute; top: 10px; left: 12px; width: 250px; }
  .hud-tr { position: absolute; top: 10px; right: 12px; text-align: right; }
  .hud-bl { position: absolute; bottom: 10px; left: 12px; }
  .hud-bc { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); text-align: center; }
  .bar { height: 12px; background: #000a; border: 1px solid var(--panel-edge); margin: 3px 0; }
  .bar > div { height: 100%; transition: width 0.12s; }
  #hp-fill { background: linear-gradient(90deg, #7e2a20, var(--blood)); }
  #ammo-fill { background: linear-gradient(90deg, #5a5f30, var(--bile)); }
  #heat-fill { background: linear-gradient(90deg, #b06a20, #e05030); }
  .label { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; }
  .big { font-size: 20px; font-weight: bold; }
  #gold-val { color: var(--gold); }
  #wave-val { color: var(--ink); }
  #weapon-name { color: var(--bile); font-weight: bold; }
  #weapon-sub { color: var(--ink-dim); font-size: 11px; min-height: 14px; }
  #mut-tray { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; max-width: 250px; }
  .mut-chip {
    width: 22px; height: 22px; border: 1px solid var(--panel-edge);
    background: #1a141f; display: flex; align-items: center; justify-content: center;
  }
  .mut-chip svg { width: 14px; height: 14px; }
  #qm-line {
    position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
    max-width: 560px; text-align: center; color: var(--ink-dim); font-size: 12px;
    font-style: italic; text-shadow: 0 1px 2px #000; opacity: 0; transition: opacity 0.4s;
  }
  #stat-row { color: var(--ink-dim); font-size: 11px; margin-top: 4px; }

  /* ---------- Overlays ---------- */
  .overlay {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #000c 0%, #000e 100%);
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .panel {
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-top: 3px solid var(--blood);
    padding: 26px 32px; max-width: 720px; max-height: 580px; overflow-y: auto;
    box-shadow: 0 0 60px #000;
  }
  .panel h1 { font-size: 30px; letter-spacing: 0.12em; color: var(--blood); }
  .panel h2 { font-size: 20px; letter-spacing: 0.1em; margin-bottom: 8px; }
  .panel .sub { color: var(--ink-dim); margin: 8px 0 16px; line-height: 1.5; }
  .panel .body-text { line-height: 1.65; margin: 12px 0; color: var(--ink); }
  .qm-react { color: var(--ink-dim); font-style: italic; font-size: 13px; margin: 14px 0; line-height: 1.5; border-left: 2px solid var(--panel-edge); padding-left: 12px; }

  button {
    font-family: var(--mono); font-size: 14px; letter-spacing: 0.06em;
    background: #1d2026; color: var(--ink); border: 1px solid var(--panel-edge);
    padding: 9px 20px; cursor: pointer; text-transform: uppercase;
  }
  button:hover:not(:disabled) { background: #262a32; border-color: var(--bile); color: var(--bile); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { border-color: var(--blood); color: #e8a399; }
  button.primary:hover { background: #2a1a18; color: #ffb3a7; border-color: var(--blood); }

  /* ---------- Mutation cards ---------- */
  #mut-cards { display: flex; gap: 14px; margin: 18px 0 8px; }
  .mut-card {
    flex: 1; background: #111317; border: 1px solid var(--panel-edge);
    padding: 16px 14px; cursor: pointer; transition: border-color 0.15s, transform 0.15s;
    display: flex; flex-direction: column; gap: 8px; min-width: 0;
  }
  .mut-card:hover { border-color: var(--acid); transform: translateY(-3px); }
  .mut-card.cash:hover { border-color: var(--gold); }
  .mut-card .tier { font-size: 10px; color: var(--acid); letter-spacing: 0.15em; }
  .mut-card.cash .tier { color: var(--gold); }
  .mut-card .mname { font-size: 15px; font-weight: bold; }
  .mut-card .mdesc { font-size: 12px; color: var(--bile); line-height: 1.4; }
  .mut-card .mflavor { font-size: 11px; color: var(--ink-dim); font-style: italic; line-height: 1.5; margin-top: auto; }
  .mut-card svg { width: 26px; height: 26px; }

  /* ---------- Shop ---------- */
  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .shop-item {
    background: #111317; border: 1px solid var(--panel-edge); padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px; font-size: 12px;
  }
  .shop-item .si-head { display: flex; justify-content: space-between; align-items: center; }
  .shop-item .si-name { font-weight: bold; color: var(--ink); }
  .shop-item .si-desc { color: var(--ink-dim); font-size: 11px; line-height: 1.4; }
  .shop-item button { padding: 5px 12px; font-size: 12px; }
  .cost { color: var(--gold); }
  .lv-pips { color: var(--bile); letter-spacing: 2px; font-size: 10px; }
  .weapon-block { border: 1px solid var(--panel-edge); padding: 12px; margin: 10px 0; background: #101216; }
  .weapon-block h3 { font-size: 14px; color: var(--bile); margin-bottom: 8px; }
  .track-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; gap: 8px; }
  .track-row .t-name { width: 90px; }
  .shop-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  #shop-gold { font-size: 16px; }

  /* ---------- Banner ---------- */
  #banner {
    position: absolute; top: 38%; left: 0; right: 0; text-align: center;
    font-size: 42px; font-weight: bold; letter-spacing: 0.25em; color: var(--ink);
    text-shadow: 0 0 24px #000, 0 2px 0 #000; opacity: 0; pointer-events: none;
    transition: opacity 0.3s; z-index: 5;
  }
  #banner.boss { color: var(--blood); }

  .keyrow { color: var(--ink-dim); font-size: 12px; line-height: 1.9; margin: 14px 0; }
  .stat-table { margin: 14px 0; font-size: 14px; line-height: 2; }
  .stat-table span { color: var(--bile); float: right; margin-left: 40px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="game-container"></div>

  <div id="hud">
    <div class="hud-tl">
      <div class="label" id="hp-label">HP</div>
      <div class="bar"><div id="hp-fill" style="width:100%"></div></div>
      <div id="stat-row"><span id="armor-stat"></span> <span id="grenade-stat"></span></div>
      <div id="mut-tray"></div>
    </div>
    <div class="hud-tr">
      <div><span class="label" id="wave-label">WAVE</span> <span class="big" id="wave-val">1</span></div>
      <div><span class="label" id="gold-label">GOLD</span> <span class="big" id="gold-val">0</span></div>
      <div><span class="label" id="kills-label">KILLS</span> <span id="kills-val">0</span></div>
    </div>
    <div class="hud-bl">
      <div id="weapon-name"></div>
      <div class="bar" style="width:160px"><div id="ammo-fill" style="width:100%"></div></div>
      <div class="bar" style="width:160px; display:none" id="heat-bar"><div id="heat-fill" style="width:0%"></div></div>
      <div id="weapon-sub"></div>
    </div>
    <div id="qm-line"></div>
  </div>

  <div id="banner"></div>

  <div class="overlay show" id="ov-start">
    <div class="panel" style="text-align:center; border-top-color: var(--bile);">
      <h1 id="start-title"></h1>
      <div class="sub" id="start-sub"></div>
      <div class="keyrow" id="start-controls"></div>
      <button class="primary" id="btn-start"></button>
    </div>
  </div>

  <div class="overlay" id="ov-boss">
    <div class="panel">
      <h2 id="boss-title" style="color:var(--blood)"></h2>
      <div class="body-text" id="boss-body"></div>
      <div class="qm-react" id="boss-qm"></div>
      <div style="text-align:center; margin-top:10px">
        <button class="primary" id="btn-boss-continue"></button>
      </div>
    </div>
  </div>

  <div class="overlay" id="ov-mutate">
    <div class="panel" style="max-width: 780px;">
      <h2 id="mutate-title" style="color:var(--acid)"></h2>
      <div id="mut-cards"></div>
    </div>
  </div>

  <div class="overlay" id="ov-shop">
    <div class="panel" style="max-width: 760px; width: 760px;">
      <h2 id="shop-title"></h2>
      <div class="qm-react" id="shop-qm"></div>
      <div id="shop-weapons"></div>
      <div class="shop-grid" id="shop-items"></div>
      <div class="shop-foot">
        <div id="shop-gold"></div>
        <button class="primary" id="btn-next-wave"></button>
      </div>
    </div>
  </div>

  <div class="overlay" id="ov-pause">
    <div class="panel" style="text-align:center">
      <h2 id="pause-title"></h2>
      <div class="sub" id="pause-body"></div>
      <button id="btn-resume"></button>
    </div>
  </div>

  <div class="overlay" id="ov-gameover">
    <div class="panel" style="text-align:center">
      <h1 id="go-title"></h1>
      <div class="stat-table" id="go-stats"></div>
      <div class="sub" id="go-epitaph"></div>
      <button class="primary" id="btn-restart"></button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="flavor.js"></script>
<script src="game.js"></script>
</body>
</html>
