<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="concrete-1000px" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" result="noise" />
            <feColorMatrix type="matrix" values="
                0.25 0.25 0.25 0 0  
                0.25 0.25 0.25 0 0  
                0.25 0.25 0.25 0 0  
                0 0 0 0.18 0" 
            in="noise" result="grayNoise" />
            <feComposite operator="over" in="grayNoise" in2="SourceGraphic" />
        </filter>

        <g id="v-joint">
            <rect x="-4" y="0" width="2" height="1000" fill="#1e293b" opacity="0.6"/>
            <rect x="-2" y="0" width="4" height="1000" fill="#020617" opacity="0.9"/>
            <rect x="2" y="0" width="2" height="1000" fill="#cbd5e1" opacity="0.7"/>
        </g>

        <g id="h-joint">
            <rect x="0" y="-4" width="1000" height="2" fill="#1e293b" opacity="0.6"/>
            <rect x="0" y="-2" width="1000" height="4" fill="#020617" opacity="0.9"/>
            <rect x="0" y="2" width="1000" height="2" fill="#cbd5e1" opacity="0.7"/>
        </g>
    </defs>

    <rect x="0" y="0" width="1000" height="1000" fill="#525f75" filter="url(#concrete-1000px)"/>

    <ellipse cx="200" cy="300" rx="150" ry="80" fill="#0f172a" opacity="0.08" transform="rotate(-15 200 300)"/>
    <ellipse cx="800" cy="750" rx="120" ry="200" fill="#0f172a" opacity="0.05" transform="rotate(25 800 750)"/>
    <ellipse cx="500" cy="900" rx="250" ry="60" fill="#0f172a" opacity="0.06"/>

    <path d="M 250 150 Q 280 180 230 220 T 260 280" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.6"/>
    <path d="M 750 600 Q 710 620 730 680 T 690 750" fill="none" stroke="#1e293b" stroke-width="2" opacity="0.5"/>
    <path d="M 500 400 L 540 430 L 520 460 L 570 480" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

    <use href="#v-joint" x="250" y="0"/>
    <use href="#v-joint" x="500" y="0"/>
    <use href="#v-joint" x="750" y="0"/>

    <use href="#h-joint" x="0" y="250"/>
    <use href="#h-joint" x="0" y="500"/>
    <use href="#h-joint" x="0" y="750"/>

    <rect x="0" y="0" width="1000" height="2" fill="#020617" opacity="0.9"/>
    <rect x="0" y="2" width="1000" height="2" fill="#cbd5e1" opacity="0.7"/>
    
    <rect x="0" y="996" width="1000" height="2" fill="#1e293b" opacity="0.6"/>
    <rect x="0" y="998" width="1000" height="2" fill="#020617" opacity="0.9"/>
</svg>
