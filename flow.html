<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Multiplexer v1.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'scanline': 'scanline 6s linear infinite',
                        'electric-pulse': 'electric-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(1000%)' }
                        },
                        'electric-pulse': {
                            '0%, 100%': { opacity: 1, borderColor: 'rgba(245, 158, 11, 0.6)', boxShadow: '0 0 10px rgba(245, 158, 11, 0.3)' },
                            '50%': { opacity: .6, borderColor: 'rgba(245, 158, 11, 0.2)', boxShadow: 'none' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* The drifting slate mesh */
            background: radial-gradient(circle at 50% 50%, #020617 0%, #0f172a 100%);
        }
        /* Hide scrollbar for clean aesthetic */
        ::-webkit-scrollbar { display: none; }
        
        /* Custom hardware toggles */
        .hardware-toggle:checked + div { background-color: currentColor; }
        .hardware-toggle:checked + div > div { transform: translateX(100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-300">

    <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-amber-500/20 p-6 overflow-hidden group w-full max-w-3xl">
        
        <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-amber-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
        
        <a href="https://kzick001.github.io/dashboard/" class="absolute top-4 left-4 text-[10px] font-black text-amber-800 hover:text-amber-400 transition-colors tracking-tighter z-20">&larr; DASHBOARD</a>

        <div class="flex items-center space-x-3 mb-6 z-10 relative mt-4">
            <div class="w-8 h-8 flex items-center justify-center rounded bg-amber-950/60 border border-amber-500/30 group-hover:animate-electric-pulse transition-all">
                <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0v-5m0 0a3 3 0 110-6 3 3 0 010 6z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold truncate text-slate-100 font-sans tracking-tight">Saturn Multiplexer v1.6</h2>
        </div>

        <div id="loading-state" class="font-mono text-sm text-red-500 animate-pulse mb-4 z-10 relative">
            > Syncing secure pipeline... 
            <br>> Establishing isolated canvas context...
        </div>

        <div id="app-core" class="hidden z-10 relative flex flex-col gap-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 font-mono text-xs p-4 bg-slate-950/50 rounded-lg border border-slate-800/50">
                
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <div class="relative text-yellow-500">
                        <input type="checkbox" id="switch-yellow" class="hardware-toggle sr-only">
                        <div class="block w-10 h-6 bg-slate-800 rounded-full border border-slate-700 transition-colors duration-200">
                            <div class="dot absolute left-1 top-1 bg-slate-300 w-4 h-4 rounded-full transition-transform duration-200"></div>
                        </div>
                    </div>
                    <span class="text-slate-400 group-hover:text-yellow-500 transition-colors">YIELD: SINGULARITY</span>
                </label>

                <label class="flex items-center space-x-3 cursor-pointer group">
                    <div class="relative text-red-600">
                        <input type="checkbox" id="switch-red" class="hardware-toggle sr-only">
                        <div class="block w-10 h-6 bg-slate-800 rounded-full border border-slate-700 transition-colors duration-200">
                            <div class="dot absolute left-1 top-1 bg-slate-300 w-4 h-4 rounded-full transition-transform duration-200"></div>
                        </div>
                    </div>
                    <span class="text-slate-400 group-hover:text-red-500 transition-colors">CRITICAL: KINETIC EJECTION</span>
                </label>

                <div class="flex items-center space-x-3">
                    <span class="text-slate-400">CHROMA_SAT:</span>
                    <input type="range" id="slider-sat" min="0" max="100" value="70" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-amber-500">
                    <span id="sat-val" class="w-8 text-right text-amber-500 font-bold">70</span>
                </div>
            </div>

            <div class="flex justify-between text-[10px] text-slate-500 font-mono px-2">
                <span>SYS_VELOCITY: <span id="telemetry-vel" class="text-amber-400">0.10</span></span>
                <span>PEAK_DISTORTION: <span id="telemetry-dist" class="text-amber-400">0.00</span></span>
                <span>STATE: <span id="telemetry-state" class="text-emerald-400">NOMINAL</span></span>
            </div>

            <div class="relative w-full aspect-video bg-slate-950 rounded border border-slate-800 overflow-hidden shadow-inner">
                <canvas id="saturn-canvas" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            document.addEventListener('DOMContentLoaded', () => {
                const loading = document.getElementById('loading-state');
                const core = document.getElementById('app-core');
                
                // Pragmatic faked load time because instant rendering feels cheap.
                setTimeout(() => {
                    loading.style.display = 'none';
                    core.classList.remove('hidden');
                    initEngine();
                }, 1200);
            });

            function initEngine() {
                const canvas = document.getElementById('saturn-canvas');
                const ctx = canvas.getContext('2d');
                const yellowSwitch = document.getElementById('switch-yellow');
                const redSwitch = document.getElementById('switch-red');
                const satSlider = document.getElementById('slider-sat');
                const satValText = document.getElementById('sat-val');
                
                const tVel = document.getElementById('telemetry-vel');
                const tDist = document.getElementById('telemetry-dist');
                const tState = document.getElementById('telemetry-state');

                let width = canvas.width = canvas.offsetWidth;
                let height = canvas.height = canvas.offsetHeight;
                
                window.addEventListener('resize', () => {
                    width = canvas.width = canvas.offsetWidth;
                    height = canvas.height = canvas.offsetHeight;
                });

                // Update slider text
                satSlider.addEventListener('input', (e) => {
                    satValText.innerText = e.target.value;
                });

                // The Ring Buffer
                const rings = [];
                const ringCount = 16;
                for(let i = 0; i < ringCount; i++) {
                    rings.push({ baseRadius: 40 + (i * 12), phase: Math.random() * Math.PI * 2 });
                }

                let time = 0;

                function render() {
                    time += 0.016; // Approx 60fps delta
                    
                    // 1 & 2. State Management & Conflict Resolution
                    const isYellow = yellowSwitch.checked;
                    const isRed = redSwitch.checked;
                    
                    let config = {
                        wireframe: false,
                        scale: 1.0,
                        mass: 1,
                        velocity: 0.1, // Clamped default (0.1 - 0.3 conceptually)
                        particleDensity: 30,
                        audioSensitivity: 1,
                        distortionMulti: 1
                    };

                    if (isRed) {
                        config = { wireframe: true, scale: 1.8, mass: 3, velocity: 1.7, particleDensity: 100, audioSensitivity: 3, distortionMulti: 4 };
                        tState.innerText = "CATASTROPHIC";
                        tState.className = "text-red-500 animate-pulse";
                    } else if (isYellow) {
                        config = { wireframe: true, scale: 1.8, mass: 3, velocity: 0.2, particleDensity: 100, audioSensitivity: 3, distortionMulti: 4 };
                        tState.innerText = "SINGULARITY";
                        tState.className = "text-yellow-500";
                    } else {
                        tState.innerText = "NOMINAL";
                        tState.className = "text-emerald-400";
                    }

                    // 4. "Through" Direction processing
                    time += config.velocity * 0.1;
                    tVel.innerText = config.velocity.toFixed(2);

                    // 6. Mocking the Audio Pipeline
                    // Simulating a frequency data array where lower rings get low freqs, outer rings get high freqs
                    const audioData = rings.map((_, i) => {
                        const freqSim = Math.sin(time * 5 + i * 0.5) * 0.5 + 0.5; // 0 to 1
                        const noise = Math.random() * 0.2;
                        return (freqSim + noise) * config.audioSensitivity;
                    });

                    // Global Peak Amplitude for Geometric Distortion
                    const peakAmp = Math.max(...audioData);
                    tDist.innerText = (peakAmp * config.distortionMulti).toFixed(2);

                    // 3. Dialing in Saturation
                    const saturation = satSlider.value; // 0-100

                    // --- DRAW CYCLE ---
                    // Clear with pragmatic trail effect instead of complex frame buffering
                    ctx.fillStyle = `rgba(2, 6, 23, ${config.wireframe ? 1 : 0.3})`;
                    ctx.fillRect(0, 0, width, height);

                    ctx.save();
                    ctx.translate(width / 2, height / 2);
                    
                    // Tilt the system
                    ctx.scale(1, 0.4); 
                    ctx.rotate(time * 0.2);

                    // Draw Multiplexer Rings
                    rings.forEach((ring, i) => {
                        // Ring size dictated by local freq bin
                        const currentRadius = (ring.baseRadius + (audioData[i] * 15)) * config.scale;
                        
                        // Shape distortion dictated by global peak
                        const distortion = peakAmp * config.distortionMulti * 10;
                        
                        ctx.beginPath();
                        
                        // Calculate color with dynamic saturation
                        const hue = (i * (360 / ringCount) + (time * 50)) % 360;
                        // Use HSL for cheap native browser saturation control
                        ctx.strokeStyle = `hsla(${hue}, ${saturation}%, 60%, ${config.wireframe ? 0.8 : 0.4})`;
                        ctx.lineWidth = config.wireframe ? 1 : 2 + (audioData[i] * 2);

                        // Draw deformed circle based on global peak amplitude
                        const segments = config.wireframe ? config.particleDensity : 40;
                        for(let s = 0; s <= segments; s++) {
                            const angle = (s / segments) * Math.PI * 2;
                            // Add noise based on distortion
                            const noiseOffset = Math.sin(angle * 8 + time * 10) * distortion;
                            const r = currentRadius + noiseOffset;
                            
                            const x = Math.cos(angle) * r;
                            const y = Math.sin(angle) * r;
                            
                            if(s === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        
                        ctx.closePath();
                        ctx.stroke();
                    });

                    ctx.restore();

                    // Draw Central Planet (Entity)
                    ctx.save();
                    ctx.translate(width / 2, height / 2);
                    const planetRadius = 25 * config.scale * config.mass;
                    
                    if (config.wireframe) {
                        ctx.strokeStyle = '#f8fafc';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(0, 0, planetRadius, 0, Math.PI * 2);
                        ctx.stroke();
                        // Crosshairs for wireframe aesthetic
                        ctx.beginPath();
                        ctx.moveTo(-planetRadius - 10, 0); ctx.lineTo(planetRadius + 10, 0);
                        ctx.moveTo(0, -planetRadius - 10); ctx.lineTo(0, planetRadius + 10);
                        ctx.stroke();
                    } else {
                        const gradient = ctx.createRadialGradient(
                            -planetRadius * 0.3, -planetRadius * 0.3, 0, 
                            0, 0, planetRadius
                        );
                        gradient.addColorStop(0, '#334155');
                        gradient.addColorStop(1, '#020617');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(0, 0, planetRadius, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Inner glow
                        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.restore();

                    requestAnimationFrame(render);
                }

                render(); // Ignite the engine
            }
        })();
    </script>
</body>
</html>
