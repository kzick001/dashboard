<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow V1.5</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='25' fill='%23020617' stroke='%2306b6d4' stroke-width='4'/%3E%3Cellipse cx='50' cy='50' rx='45' ry='15' fill='none' stroke='%2306b6d4' stroke-width='4' transform='rotate(-20 50 50)'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #020617; overflow: hidden; margin: 0; padding: 0; }
        .ghost-fade { transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .panel-slide { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #334155; border-radius: 1px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #94a3b8; margin-top: -5px; cursor: pointer; transition: background 0.2s; }
        input[type=range]:hover::-webkit-slider-thumb { background: #cbd5e1; }
        
        .cyber-toggle:checked { right: 0; border-color: #94a3b8; }
        .cyber-toggle:checked + .toggle-label { background-color: #475569; }

        .dir-btn.active { border-color: #06b6d4; color: #06b6d4; background-color: rgba(6, 182, 212, 0.1); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="w-screen h-screen text-slate-100 font-sans select-none">

    <canvas id="coreCanvas" class="fixed inset-0 w-full h-full z-0"></canvas>

    <div class="fixed bottom-6 right-8 text-right z-10 drop-shadow-lg pointer-events-none">
        <div id="hudTime" class="text-4xl font-light text-slate-200 tracking-widest">--:--</div>
        <div class="flex items-center justify-end gap-2 mt-1 text-slate-400 font-mono text-xs uppercase tracking-wider">
            <div id="miniWeatherIcon" class="text-slate-500 animate-pulse">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="16 16"/></svg>
            </div>
            <span id="hudWeatherTemp">SYNCING...</span>
        </div>
    </div>

    <div id="ghostLayer" class="fixed inset-0 z-20 pointer-events-none ghost-fade">
        <button id="menuToggle" class="absolute top-6 left-6 w-12 h-12 rounded-full bg-slate-900/50 backdrop-blur-md border border-slate-700/50 flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800/80 transition-all pointer-events-auto shadow-lg hover:shadow-cyan-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
            </svg>
        </button>

        <div id="commandDeck" class="absolute top-24 left-6 w-80 max-h-[80vh] overflow-y-auto overflow-x-hidden bg-slate-950/80 backdrop-blur-xl border border-slate-800/60 rounded-xl p-6 pointer-events-auto panel-slide -translate-x-[120%] shadow-2xl">
            <div class="mb-5 pb-3 border-b border-slate-800">
                <h2 class="text-lg font-semibold tracking-wide text-slate-200">Flow Parameters</h2>
                <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest mt-1">Zen Engine V1.5</p>
            </div>

            <div class="space-y-5">
                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-mono text-slate-500 mb-1.5 uppercase">Visual Matrix</label>
                        <select id="themeSelect" class="w-full bg-slate-900/50 border border-slate-700 rounded p-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-slate-500 transition-colors">
                            <option value="saturn">Saturn Multiplexer</option>
                            <option value="galaxy">Void Galaxy (Reactive)</option>
                            <option value="neural">Organic Synapse</option>
                            <option value="zen">Zen Garden</option>
                            <option value="orbs">Bioluminescent Orbs</option>
                        </select>
                    </div>

                    <div id="saturnCoreWrapper" class="transition-all">
                        <label class="block text-[10px] font-mono text-cyan-500 mb-1.5 uppercase">Saturn Core Type</label>
                        <select id="saturnCoreSelect" class="w-full bg-cyan-950/30 border border-cyan-800/50 rounded p-2 text-xs font-mono text-cyan-300 focus:outline-none focus:border-cyan-500 transition-colors">
                            <option value="pulsar">Pulsar (Total Energy)</option>
                            <option value="storm">Gas Giant (Storm Bands)</option>
                            <option value="wireframe">Singularity (Wireframe)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-mono text-slate-500 mb-1.5 uppercase">Color Palette</label>
                        <select id="paletteSelect" class="w-full bg-slate-900/50 border border-slate-700 rounded p-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-slate-500 transition-colors">
                            <option value="sunset">Sunset (Synthwave)</option>
                            <option value="nordic">Nordic Drift (Slate/Blue)</option>
                            <option value="matcha">Matcha (Sage/Forest)</option>
                            <option value="grayscale">Grayscale (Monochrome)</option>
                            <option value="neon">Neon Tokyo (Pink/Cyan)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-mono text-slate-500 mb-1.5 uppercase">Flow Direction</label>
                    <div class="flex gap-2">
                        <button class="dir-btn active flex-1 py-1.5 border border-slate-700 rounded text-[10px] bg-slate-900/50 text-slate-400 transition-colors hover:bg-slate-800" data-dir="float">Float</button>
                        <button class="dir-btn flex-1 py-1.5 border border-slate-700 rounded text-[10px] bg-slate-900/50 text-slate-400 transition-colors hover:bg-slate-800" data-dir="up">Up</button>
                        <button class="dir-btn flex-1 py-1.5 border border-slate-700 rounded text-[10px] bg-slate-900/50 text-slate-400 transition-colors hover:bg-slate-800" data-dir="down">Down</button>
                        <button class="dir-btn flex-1 py-1.5 border border-slate-700 rounded text-[10px] bg-slate-900/50 text-slate-400 transition-colors hover:bg-slate-800" data-dir="through">Through</button>
                    </div>
                </div>

                <div class="space-y-3 pt-2 border-t border-slate-800/50">
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Global Scale <span id="scaleVal" class="text-slate-300">1.0x</span>
                        </label>
                        <input type="range" id="scaleSlider" min="0.5" max="2.0" step="0.1" value="1.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase" title="Affects stars and particles only">
                            Entity Mass <span id="massVal" class="text-slate-300">1.0x</span>
                        </label>
                        <input type="range" id="massSlider" min="0.2" max="3.0" step="0.1" value="1.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Velocity <span id="velVal" class="text-slate-300">1.0x</span>
                        </label>
                        <input type="range" id="velocitySlider" min="0.1" max="2" step="0.1" value="1.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Particle Density <span id="denVal" class="text-slate-300">80</span>
                        </label>
                        <input type="range" id="densitySlider" min="20" max="200" step="10" value="80">
                    </div>
                </div>

                <div class="space-y-3 pt-2 border-t border-slate-800/50">
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Audio Sensitivity <span id="sensVal" class="text-slate-300">2.0x</span>
                        </label>
                        <input type="range" id="sensitivitySlider" min="1.0" max="3.0" step="0.5" value="2.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Peak Distortion <span id="distVal" class="text-slate-300">3.0x</span>
                        </label>
                        <input type="range" id="distortionSlider" min="2.0" max="4.0" step="0.1" value="3.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Groove Density <span id="grooveVal" class="text-slate-300">5</span>
                        </label>
                        <input type="range" id="groovesSlider" min="1" max="10" step="1" value="5">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Audio Dampening <span id="dampVal" class="text-slate-300">Snappy</span>
                        </label>
                        <input type="range" id="dampeningSlider" min="0.2" max="0.6" step="0.1" value="0.4">
                    </div>
                </div>

                <div class="pt-3 border-t border-slate-800 space-y-2.5">
                    <div class="flex justify-between items-center group">
                        <span class="text-[11px] font-mono text-slate-400 flex items-center gap-2">
                            <svg class="w-3 h-3 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                            SYSTEM AUDIO
                        </span>
                        <div class="relative inline-block w-8 align-middle">
                            <input type="checkbox" id="toggleAudio" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-300 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                            <label for="toggleAudio" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[11px] font-mono text-slate-400">GHOST TRAILS</span>
                        <div class="relative inline-block w-8 align-middle">
                            <input type="checkbox" id="togglePersistence" checked class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-300 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                            <label for="togglePersistence" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('coreCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, timeTick = 0;

            const palettes = {
                sunset: ['#fcd34d', '#f97316', '#ef4444', '#8b5cf6', '#2e1065'], 
                nordic: ['#94a3b8', '#64748b', '#38bdf8', '#818cf8', '#0f172a'],
                matcha: ['#d9f99d', '#a3e635', '#4d7c0f', '#ecfccb', '#052e16'],
                grayscale: ['#333333', '#666666', '#999999', '#cccccc', '#111111'],
                neon: ['#f43f5e', '#8b5cf6', '#06b6d4', '#fcd34d', '#2e1065']
            };

            const state = {
                theme: 'saturn',
                saturnCore: 'pulsar',
                colors: palettes.sunset,
                velocity: 1.0,
                density: 80,
                scale: 1.0,
                mass: 1.0,
                direction: 'float',
                audio: false,
                sensitivity: 2.0,
                distortion: 3.0,  
                grooves: 5,       
                dampening: 0.4,
                persistence: true,
                mouseX: -1000, mouseY: -1000,
                rawAudio: new Uint8Array(256).fill(0),
                smoothedAudio: new Float32Array(256).fill(0)
            };

            let audioCtx, analyser, mediaStream;
            function getAudioBand(startBin, endBin) {
                if (!state.audio) return 0;
                let sum = 0;
                for(let i=startBin; i<endBin; i++) sum += state.smoothedAudio[i];
                return sum / (endBin - startBin);
            }

            // Universal 3D Star Generator
            function createStar(isGalaxy = false) {
                return {
                    x: (Math.random() - 0.5) * width * 2, 
                    y: (Math.random() - 0.5) * height * 2,
                    z: Math.random() * 1000 + 1,
                    s: Math.random() * 1.5 + 0.5,
                    band: isGalaxy ? Math.floor(Math.random() * 4) : 0, // For Galaxy mapped frequencies
                    spd: Math.random() * 0.3 + 0.1
                };
            }

            function updateStar(s) {
                if (state.direction === 'through') {
                    s.z -= 15 * state.velocity;
                    if (s.z <= 1) {
                        s.z = 1000;
                        s.x = (Math.random() - 0.5) * width * 2;
                        s.y = (Math.random() - 0.5) * height * 2;
                    }
                } else {
                    let vx = 0; let vy = 0;
                    if (state.direction === 'float') vx = -0.1 * state.velocity;
                    if (state.direction === 'up') vy = -0.3 * state.velocity;
                    if (state.direction === 'down') vy = 0.3 * state.velocity;
                    s.x += vx; s.y += vy;
                    
                    if(s.x < -width) s.x = width; if(s.x > width) s.x = -width;
                    if(s.y < -height) s.y = height; if(s.y > height) s.y = -height;
                }
            }

            function drawStar(s, overrideSize, overrideColor, overrideAlpha) {
                let px = s.x, py = s.y, pSize = overrideSize || (s.s * state.mass);
                if (state.direction === 'through') {
                    let fov = 400;
                    px = (s.x / s.z) * fov;
                    py = (s.y / s.z) * fov;
                    pSize = pSize * (fov / s.z);
                }
                ctx.globalAlpha = overrideAlpha || 1;
                ctx.fillStyle = overrideColor || state.colors[1];
                ctx.beginPath(); ctx.arc(width/2 + px, height/2 + py, Math.max(0, pSize), 0, Math.PI*2); ctx.fill();
            }


            // --- ENGINE REGISTRY ---

            // 1. Saturn Multiplexer Engine V1.5
            class SaturnEngine {
                constructor() {}
                init() {
                    this.stars = [];
                    // V1.5: Density dictates star count dynamically
                    let starCount = state.density * 2;
                    for(let i=0; i<starCount; i++) this.stars.push(createStar(false));
                }
                update() {
                    this.stars.forEach(s => updateStar(s));
                }
                draw() {
                    this.stars.forEach(s => drawStar(s));

                    const cx = width / 2, cy = height / 2;
                    // V1.5: Planet ignores state.mass, follows scale only.
                    const rPlanet = Math.min(width, height) * 0.15 * state.scale;
                    const ringTilt = 0.35;
                    const bandSpacing = rPlanet * 0.3; 

                    const bands = [
                        { s: 60, e: 120, rBase: rPlanet * 1.3, color: state.colors[3], w: 1 },
                        { s: 20, e: 60, rBase: rPlanet * 1.6, color: state.colors[2], w: 1.5 },
                        { s: 6, e: 20, rBase: rPlanet * 1.9, color: state.colors[1], w: 2 },
                        { s: 0, e: 6, rBase: rPlanet * 2.2, color: state.colors[0], w: 2.5 }
                    ];

                    const drawRings = (startAngle, endAngle, isFront) => {
                        bands.forEach((band) => {
                            let numGrooves = state.grooves;
                            let maxSpread = bandSpacing * (numGrooves / 10); 
                            let step = numGrooves > 1 ? maxSpread / (numGrooves - 1) : 0;
                            
                            for(let track = 0; track < numGrooves; track++) {
                                ctx.beginPath();
                                ctx.strokeStyle = band.color;
                                let thicknessMod = numGrooves > 3 ? (3 / numGrooves) * 1.5 : 1;
                                ctx.lineWidth = (band.w / 2) * state.scale * thicknessMod;
                                let trackOffset = (track * step) - (maxSpread / 2);
                                
                                let first = true;
                                for(let i = startAngle; i <= endAngle + 0.05; i += 0.05) {
                                    let angle = Math.min(i, endAngle);
                                    let localBin = Math.floor((Math.abs(angle - Math.PI) / Math.PI) * (band.e - band.s)) + band.s;
                                    
                                    let rawAudio = state.audio ? state.smoothedAudio[localBin] : 0;
                                    let localMod = Math.pow(rawAudio, state.distortion); 
                                    let globalRaw = getAudioBand(band.s, band.e);
                                    let globalMod = Math.pow(globalRaw, state.distortion); 
                                    
                                    let baseRadius = band.rBase + trackOffset;
                                    let r = baseRadius + ((globalMod * 40) + (localMod * 30)) * state.sensitivity * state.scale;
                                    
                                    let x = cx + Math.cos(angle) * r;
                                    let y = cy + Math.sin(angle) * r * ringTilt;
                                    
                                    if (first) { ctx.moveTo(x, y); first = false; }
                                    else ctx.lineTo(x, y);
                                }
                                // V1.5 Volumetric Shadows using Sine wave
                                ctx.globalAlpha = isFront ? Math.max(0.2, 0.9 - Math.sin(startAngle === 0 ? Math.PI/2 : Math.PI*1.5)*0.7) : 0.3;
                                ctx.stroke();
                            }
                        });
                    };

                    // Back Rings
                    drawRings(Math.PI, Math.PI * 2, false);

                    // Planet Body
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(cx, cy, rPlanet, 0, Math.PI*2);
                    ctx.clip(); 

                    let grad = ctx.createLinearGradient(cx - rPlanet, cy - rPlanet, cx + rPlanet, cy + rPlanet);
                    grad.addColorStop(0, state.colors[4]);
                    grad.addColorStop(1, '#000000');
                    ctx.fillStyle = grad;
                    ctx.fillRect(cx - rPlanet, cy - rPlanet, rPlanet*2, rPlanet*2);

                    // --- V1.5 THE CORE SWITCHER ---
                    let globalAudio = getAudioBand(0, 120);
                    let mod = Math.pow(globalAudio, state.distortion) * state.sensitivity;

                    if (state.saturnCore === 'pulsar') {
                        for(let i=0; i<50; i++) {
                            let r = Math.random() * rPlanet * (0.5 + mod);
                            let offsetX = (Math.random() - 0.5) * rPlanet * mod * 1.5;
                            let offsetY = (Math.random() - 0.5) * rPlanet * mod * 1.5;
                            ctx.globalAlpha = Math.min(1, 0.1 + (mod * 0.4));
                            ctx.fillStyle = state.colors[i%4];
                            ctx.beginPath(); ctx.arc(cx + offsetX, cy + offsetY, r, 0, Math.PI*2); ctx.fill();
                        }
                    } else if (state.saturnCore === 'storm') {
                        ctx.lineWidth = 20 * state.scale;
                        ctx.globalAlpha = 0.5 + (mod*0.2);
                        for(let i=-2; i<=2; i++) {
                            let yOff = i * (rPlanet * 0.35);
                            let bandAudio = getAudioBand(40 + Math.abs(i)*10, 60 + Math.abs(i)*10);
                            let wave = Math.sin(timeTick * 0.05 + i) * (15 + Math.pow(bandAudio, state.distortion) * 40 * state.sensitivity);
                            ctx.strokeStyle = state.colors[Math.abs(i)];
                            ctx.beginPath();
                            ctx.moveTo(cx - rPlanet, cy + yOff + wave);
                            ctx.quadraticCurveTo(cx, cy + yOff - wave, cx + rPlanet, cy + yOff + wave);
                            ctx.stroke();
                        }
                    } else if (state.saturnCore === 'wireframe') {
                        ctx.strokeStyle = state.colors[1];
                        ctx.lineWidth = 1.5 * state.scale;
                        ctx.globalAlpha = 0.4 + (mod * 0.5);
                        let wireR = rPlanet * (0.8 + mod * 0.2);
                        let rot = timeTick * 0.02 * state.velocity;
                        
                        for(let i=0; i<Math.PI; i+=Math.PI/6) {
                            ctx.beginPath();
                            ctx.ellipse(cx, cy, Math.max(0.1, wireR * Math.abs(Math.cos(i + rot))), wireR, 0, 0, Math.PI*2);
                            ctx.stroke();
                        }
                        for(let i=-wireR*0.8; i<=wireR*0.8; i+=wireR*0.4) {
                            ctx.beginPath();
                            let w = Math.sqrt(wireR*wireR - i*i);
                            ctx.ellipse(cx, cy + i, w, Math.max(0.1, w * 0.2), 0, 0, Math.PI*2);
                            ctx.stroke();
                        }
                    }
                    
                    ctx.restore();
                    // Planet Outline
                    ctx.beginPath(); ctx.arc(cx, cy, rPlanet, 0, Math.PI*2); 
                    ctx.strokeStyle = state.colors[1]; ctx.lineWidth = 1; ctx.stroke();

                    // Front Rings
                    drawRings(0, Math.PI, true);
                }
            }

            // 2. Void Galaxy Engine (V1.5 Reactive Frequencies)
            class GalaxyEngine {
                constructor() {}
                init() {
                    this.stars = [];
                    let starCount = state.density * 5; // Galaxies need lots of stars
                    for(let i=0; i<starCount; i++) this.stars.push(createStar(true));
                }
                update() {
                    this.stars.forEach(s => updateStar(s));
                }
                draw() {
                    this.stars.forEach(s => {
                        // V1.5 Frequency Mapping
                        // bands: 0(Sub), 1(Bass), 2(Mid), 3(High)
                        let startBin = s.band * 20;
                        let endBin = (s.band + 1) * 20;
                        let bandAudio = getAudioBand(startBin, endBin);
                        let distAudio = Math.pow(bandAudio, state.distortion);
                        
                        let reactiveSize = s.s * state.mass * (1 + distAudio * state.sensitivity * 5);
                        let reactiveAlpha = Math.min(1, 0.3 + distAudio * state.sensitivity);
                        let color = state.colors[s.band];

                        drawStar(s, reactiveSize, color, reactiveAlpha);
                    });
                }
            }

            // 3. Particle Engine (Zen, Neural, Orbs)
            class ParticleEngine {
                constructor() {}
                init() {
                    this.particles = []; this.ripples = [];
                    for(let i=0; i<state.density; i++) {
                        this.particles.push({
                            x: Math.random()*width, y: Math.random()*height,
                            s: (state.theme === 'orbs') ? Math.random()*15+5 : Math.random()*2+1,
                            vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2,
                            c: state.colors[Math.floor(Math.random()*4)],
                            bin: Math.floor(Math.random() * 100) // Node mapped to audio bin
                        });
                    }
                }
                update() {
                    this.particles.forEach(p => {
                        let spd = state.velocity;
                        let dx = p.x - state.mouseX, dy = p.y - state.mouseY, dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 150) { p.x += (dx/dist)*2; p.y += (dy/dist)*2; }
                        
                        let vx = p.vx * spd; let vy = p.vy * spd;
                        if (state.direction === 'up') { vy -= 1.5 * spd; vx *= 0.5; }
                        if (state.direction === 'down') { vy += 1.5 * spd; vx *= 0.5; }

                        p.x += vx; p.y += vy;
                        
                        if(p.x < -50) p.x = width + 50; 
                        if(p.x > width + 50) p.x = -50;
                        if(p.y < -50) p.y = height + 50;
                        if(p.y > height + 50) p.y = -50;
                    });
                }
                
                // V1.5 Jagged Organic Lightning Algorithm
                drawLightning(x1, y1, x2, y2, intensity) {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    let segments = 4;
                    let jitter = 15 * intensity;
                    for(let k=1; k<=segments; k++) {
                        let t = k / segments;
                        let nx = x1 + (x2 - x1) * t;
                        let ny = y1 + (y2 - y1) * t;
                        if (k < segments) {
                            // Seed pseudo-random jitter based on coordinates to stop frantic static
                            let seed = Math.sin(nx * 0.01 + ny * 0.01 + timeTick*0.1); 
                            nx += seed * jitter;
                            ny += Math.cos(seed) * jitter;
                        }
                        ctx.lineTo(nx, ny);
                    }
                    ctx.stroke();
                }

                draw() {
                    if (state.theme === 'zen') {
                        if (Math.random() < 0.02 * state.velocity && this.ripples.length < 10) {
                            this.ripples.push({ x: Math.random()*width, y: Math.random()*height, r: 1, max: Math.random()*150+50, c: state.colors[Math.floor(Math.random()*4)] });
                        }
                        for (let i = this.ripples.length - 1; i >= 0; i--) {
                            let rip = this.ripples[i];
                            let rawAudio = state.audio ? state.smoothedAudio[10] : 0;
                            let distAudio = Math.pow(rawAudio, state.distortion);
                            let audioBoost = distAudio * 15 * state.sensitivity;
                            rip.r += (0.5 * state.velocity) + audioBoost;
                            ctx.beginPath(); ctx.strokeStyle = rip.c; ctx.globalAlpha = 0.5 * (1 - rip.r/rip.max);
                            ctx.lineWidth = 1.5 * state.scale * state.mass; 
                            ctx.arc(rip.x, rip.y, rip.r * state.scale * state.mass, 0, Math.PI*2); 
                            ctx.stroke();
                            if (rip.r >= rip.max) this.ripples.splice(i, 1);
                        }
                    } else {
                        // Draw Nodes
                        this.particles.forEach((p) => {
                            ctx.fillStyle = p.c; ctx.beginPath();
                            
                            let rawAudio = state.audio ? state.smoothedAudio[p.bin] : 0;
                            let distAudio = Math.pow(rawAudio, state.distortion);
                            
                            if(state.theme === 'orbs') {
                                ctx.globalAlpha = 0.4 + (distAudio * 0.5);
                                ctx.arc(p.x, p.y, p.s * state.scale * state.mass * (1 + distAudio*2*state.sensitivity), 0, Math.PI*2);
                            } else {
                                // Neural Nodes
                                ctx.globalAlpha = 0.6 + (distAudio * 0.4);
                                ctx.arc(p.x, p.y, p.s * state.scale * state.mass * (1 + distAudio*state.sensitivity), 0, Math.PI*2);
                            }
                            ctx.fill();
                        });

                        if (state.theme === 'neural') {
                            for(let i=0; i<this.particles.length; i++) {
                                for(let j=i+1; j<this.particles.length; j++) {
                                    let p1 = this.particles[i], p2 = this.particles[j];
                                    let dx = p1.x - p2.x, dy = p1.y - p2.y, dist = Math.sqrt(dx*dx + dy*dy);
                                    
                                    let rawAudio1 = state.smoothedAudio[p1.bin];
                                    let rawAudio2 = state.smoothedAudio[p2.bin];
                                    let avgAudio = (rawAudio1 + rawAudio2) / 2;
                                    let distAudio = Math.pow(avgAudio, state.distortion);
                                    
                                    let threshold = 100 + (distAudio * 150 * state.sensitivity);
                                    threshold *= state.scale * state.mass;
                                    
                                    if(dist < threshold) {
                                        ctx.strokeStyle = state.colors[2];
                                        ctx.globalAlpha = Math.min(1, ((1 - dist/threshold) * 0.5) + (distAudio * state.sensitivity));
                                        ctx.lineWidth = (1 + distAudio*2) * state.mass;
                                        
                                        // V1.5 Organic Lightning
                                        this.drawLightning(p1.x, p1.y, p2.x, p2.y, distAudio * state.sensitivity);
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // --- THE ENGINE REGISTRY ---
            const engines = {
                saturn: new SaturnEngine(), galaxy: new GalaxyEngine(),
                zen: new ParticleEngine(), neural: new ParticleEngine(), orbs: new ParticleEngine()
            };

            let currentEngine = engines[state.theme];

            // --- TRANSITION STATE ---
            let isTransitioning = false; let globalAlpha = 1.0; let nextEngineKey = null;

            function switchTheme(newTheme) {
                if (newTheme === state.theme) return;
                nextEngineKey = newTheme; isTransitioning = true;
                
                // Toggle Saturn Core UI wrapper
                document.getElementById('saturnCoreWrapper').style.display = newTheme === 'saturn' ? 'block' : 'none';
            }

            // --- UI BINDINGS ---
            let idleTimer;
            const ghostLayer = document.getElementById('ghostLayer');
            const cmdDeck = document.getElementById('commandDeck');
            let isMenuOpen = false;

            function resetIdleTimer() {
                ghostLayer.classList.remove('opacity-0'); clearTimeout(idleTimer);
                idleTimer = setTimeout(() => { if (!isMenuOpen) ghostLayer.classList.add('opacity-0'); }, 3000);
            }
            window.addEventListener('mousemove', resetIdleTimer); window.addEventListener('click', resetIdleTimer);
            resetIdleTimer();

            document.getElementById('menuToggle').addEventListener('click', () => {
                isMenuOpen = !isMenuOpen;
                if(isMenuOpen) cmdDeck.classList.remove('-translate-x-[120%]');
                else { cmdDeck.classList.add('-translate-x-[120%]'); resetIdleTimer(); }
            });

            function updateTime() { document.getElementById('hudTime').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }
            setInterval(updateTime, 1000); updateTime();
            
            async function fetchWeather() {
                try {
                    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.98&longitude=-93.26&current=temperature_2m,weathercode&temperature_unit=fahrenheit');
                    if(res.ok) {
                        const data = await res.json();
                        let temp = Math.round(data.current.temperature_2m);
                        let code = data.current.weathercode;
                        
                        let svg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>`;
                        if (code >= 1 && code <= 3) svg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>`;
                        if (code >= 51 && code <= 67) svg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18v-4m-4 4v-4m8 4v-4M4.041 11.041A5.001 5.001 0 0113 7.002 5.002 5.002 0 0121 12.001c0 2.21-1.43 4.072-3.414 4.708M3 15h14"></path></svg>`;
                        if (code >= 71 && code <= 77) svg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12h-2m-2 0a4 4 0 11-8 0 4 4 0 018 0zm-8 4v2m0-10V6m-4 2l1.414 1.414M16 16l-1.414-1.414M6 16l1.414-1.414M16 8l-1.414 1.414"></path></svg>`;
                        if (code >= 95) svg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;

                        document.getElementById('miniWeatherIcon').innerHTML = svg;
                        document.getElementById('miniWeatherIcon').classList.remove('animate-pulse', 'text-slate-500');
                        document.getElementById('hudWeatherTemp').textContent = `${temp}°F // MPLS`;
                    }
                } catch(e) { console.warn("Weather fetch failed."); }
            }
            fetchWeather(); setInterval(fetchWeather, 600000);

            // Controls Binding
            document.getElementById('themeSelect').addEventListener('change', e => switchTheme(e.target.value));
            document.getElementById('saturnCoreSelect').addEventListener('change', e => { state.saturnCore = e.target.value; });
            document.getElementById('paletteSelect').addEventListener('change', e => { state.colors = palettes[e.target.value]; currentEngine.init(); });
            
            document.querySelectorAll('.dir-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.direction = e.target.dataset.dir;
                });
            });

            document.getElementById('scaleSlider').addEventListener('input', e => { state.scale = parseFloat(e.target.value); document.getElementById('scaleVal').textContent = state.scale.toFixed(1) + 'x'; });
            document.getElementById('massSlider').addEventListener('input', e => { state.mass = parseFloat(e.target.value); document.getElementById('massVal').textContent = state.mass.toFixed(1) + 'x'; });
            document.getElementById('sensitivitySlider').addEventListener('input', e => { state.sensitivity = parseFloat(e.target.value); document.getElementById('sensVal').textContent = state.sensitivity.toFixed(1) + 'x'; });
            document.getElementById('distortionSlider').addEventListener('input', e => { state.distortion = parseFloat(e.target.value); document.getElementById('distVal').textContent = state.distortion.toFixed(1) + 'x'; });
            document.getElementById('groovesSlider').addEventListener('input', e => { state.grooves = parseInt(e.target.value); document.getElementById('grooveVal').textContent = state.grooves; });
            document.getElementById('velocitySlider').addEventListener('input', e => { state.velocity = parseFloat(e.target.value); document.getElementById('velVal').textContent = state.velocity.toFixed(1) + 'x'; });
            document.getElementById('densitySlider').addEventListener('input', e => { state.density = parseInt(e.target.value); currentEngine.init(); });
            
            const dampTextMap = { 0.2: "Raw", 0.3: "Fast", 0.4: "Snappy", 0.5: "Smooth", 0.6: "Liquid" };
            document.getElementById('dampeningSlider').addEventListener('input', e => { 
                state.dampening = parseFloat(e.target.value); 
                let closest = Object.keys(dampTextMap).reduce((a, b) => Math.abs(b - state.dampening) < Math.abs(a - state.dampening) ? b : a);
                document.getElementById('dampVal').textContent = dampTextMap[closest]; 
            });

            document.getElementById('togglePersistence').addEventListener('change', e => state.persistence = e.target.checked);

            document.getElementById('toggleAudio').addEventListener('change', async (e) => {
                if(e.target.checked) {
                    try {
                        mediaStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                        mediaStream.getVideoTracks().forEach(t => t.stop()); 
                        if (mediaStream.getAudioTracks().length === 0) throw new Error("NO_AUDIO");
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioCtx.createAnalyser();
                        audioCtx.createMediaStreamSource(mediaStream).connect(analyser);
                        analyser.fftSize = 256;
                        state.audio = true;
                        mediaStream.getAudioTracks()[0].onended = disableAudio;
                    } catch (err) { disableAudio(); }
                } else disableAudio();
            });

            function disableAudio() {
                if(audioCtx) audioCtx.suspend();
                if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                state.audio = false;
                state.smoothedAudio.fill(0);
                document.getElementById('toggleAudio').checked = false;
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                Object.values(engines).forEach(engine => engine.init());
            }
            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', e => { state.mouseX = e.clientX; state.mouseY = e.clientY; });
            window.addEventListener('mouseleave', () => { state.mouseX = -1000; state.mouseY = -1000; });

            // --- MAIN RENDER LOOP ---
            function animate() {
                timeTick++;
                
                if(state.audio && analyser) {
                    analyser.getByteFrequencyData(state.rawAudio);
                    for(let i=0; i<256; i++) {
                        let target = state.rawAudio[i] / 255;
                        state.smoothedAudio[i] += (target - state.smoothedAudio[i]) * state.dampening;
                    }
                } else {
                    for(let i=0; i<256; i++) state.smoothedAudio[i] += (0 - state.smoothedAudio[i]) * state.dampening;
                }

                if (isTransitioning) {
                    globalAlpha -= 0.05;
                    if (globalAlpha <= 0) {
                        globalAlpha = 0;
                        state.theme = nextEngineKey;
                        currentEngine = engines[state.theme];
                        currentEngine.init();
                        isTransitioning = false;
                    }
                } else if (globalAlpha < 1.0) {
                    globalAlpha = Math.min(1.0, globalAlpha + 0.05);
                }

                if(state.persistence && state.theme !== 'galaxy') {
                    ctx.fillStyle = `rgba(2, 6, 23, 0.15)`;
                    ctx.fillRect(0, 0, width, height);
                } else {
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, width, height);
                }

                ctx.globalAlpha = globalAlpha;

                currentEngine.update();
                currentEngine.draw();

                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            resize(); 
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
