<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atmos</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body class="p-4 md:p-6 min-h-screen flex flex-col items-center bg-slate-900 text-slate-50 antialiased">

  <canvas id="weather-canvas"></canvas>

  <main id="dashboard-grid" class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-6 relative z-10">
    
    <section data-id="module-alerts" id="module-alerts" class="col-span-1 lg:col-span-3 hidden cursor-pointer">
      <details class="glass-panel group transition-all w-full">
        <summary class="p-4 font-bold text-red-400 list-none flex justify-between items-center outline-none">
          <span id="alert-title" class="flex items-center gap-3">
            <svg class="w-6 h-6 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            Loading Alerts...
          </span>
          <span class="text-sm text-slate-400 group-open:rotate-180 transition-transform duration-300">▼</span>
        </summary>
        <div id="alert-description" class="p-4 pt-0 text-sm text-slate-300 border-t border-red-500/30 mt-2 leading-relaxed whitespace-pre-wrap break-words">
          </div>
      </details>
    </section>

    <section data-id="module-hero" id="module-hero" class="glass-panel p-6 flex flex-col justify-between col-span-1 min-h-[400px]">
      <header class="flex justify-between items-start">
        <div>
          <h1 class="text-xs font-bold text-slate-400 tracking-widest uppercase">St. Louis Park, MN</h1>
          <p id="weather-desc" class="text-xl font-medium text-blue-200 mt-1 capitalize">Initializing...</p>
        </div>
        <div id="hero-icon" class="w-16 h-16 text-slate-300">
          </div>
      </header>
      
      <div class="my-6">
        <div class="flex items-baseline gap-4">
          <div class="text-8xl font-bold tracking-tighter" id="current-temp">--&deg;</div>
          <div class="flex flex-col text-sm font-medium text-slate-400">
            <span id="temp-high" class="text-slate-200">H: --&deg;</span>
            <span id="temp-low">L: --&deg;</span>
          </div>
        </div>
        <p class="text-slate-400 mt-2 text-lg">Feels like <span id="current-feels" class="text-slate-200">--</span>&deg;</p>
      </div>

      <details class="group mt-auto pt-4 border-t border-slate-600/50 cursor-pointer">
        <summary class="text-xs font-bold text-slate-400 uppercase tracking-widest list-none flex justify-between items-center outline-none">
          Detailed Metrics
          <span class="text-slate-500 group-open:rotate-180 transition-transform duration-300">▼</span>
        </summary>
        <div class="grid grid-cols-2 gap-4 pt-4 mt-2">
          <div><p class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Wind</p><p class="font-semibold text-lg" id="current-wind">-- mph</p></div>
          <div><p class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Humidity</p><p class="font-semibold text-lg" id="current-humidity">--%</p></div>
          <div><p class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Dew Point</p><p class="font-semibold text-lg" id="current-dew">--&deg;</p></div>
          <div><p class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Pressure</p><p class="font-semibold text-lg" id="current-pressure">-- inHg</p></div>
        </div>
      </details>
    </section>

    <section data-id="module-radar" id="module-radar" class="glass-panel col-span-1 lg:col-span-2 relative overflow-hidden flex flex-col p-1 min-h-[400px]">
      
      <div class="radar-controls absolute bottom-4 left-4 z-[1000] bg-slate-900/80 backdrop-blur-md px-4 py-2 rounded-full border border-slate-700 flex items-center gap-4 shadow-lg shadow-black/50">
        <button id="radar-play-btn" class="text-slate-200 hover:text-white focus:outline-none flex items-center gap-2">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
          <span class="text-xs font-bold tracking-widest uppercase">Pause</span>
        </button>
        <div class="w-px h-4 bg-slate-600"></div>
        <button id="radar-speed-btn" class="text-xs font-bold tracking-widest uppercase text-slate-400 hover:text-white transition-colors focus:outline-none">
          1x Speed
        </button>
        <span id="radar-time-label" class="text-xs font-mono text-blue-300 ml-2">--:--</span>
      </div>

      <div id="radar-map" class="flex-grow rounded-[14px] bg-slate-800"></div>
    </section>

    <section data-id="module-hourly" id="module-hourly" class="glass-panel p-6 col-span-1 lg:col-span-3 min-h-[300px] flex flex-col">
      <h2 class="text-xs font-bold tracking-widest text-slate-400 mb-4 uppercase">Hourly Trends (Temp & Precip)</h2>
      <div class="relative flex-grow w-full h-full">
        <canvas id="hourly-chart"></canvas>
      </div>
    </section>

    <section data-id="module-extended" id="module-extended" class="glass-panel p-6 col-span-1 lg:col-span-3">
      <h2 class="text-xs font-bold tracking-widest text-slate-400 mb-6 uppercase">7-Day Extended Outlook</h2>
      <div id="extended-container" class="flex flex-col gap-2">
        </div>
    </section>

  </main>

  <script src="app.js" defer></script>
</body>
</html>
