<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIP-Limited Kanban</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-950 text-slate-200 min-h-screen p-8 font-sans antialiased selection:bg-indigo-500/30">

  <div class="max-w-5xl mx-auto mb-10 flex gap-4 items-center p-2 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl">
    <input type="text" id="taskInput" placeholder="Initialize new task..." class="flex-1 p-3 bg-transparent border-none rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder-slate-500 text-slate-100 transition-all text-lg">
    <button onclick="addTask()" class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-md border border-indigo-400/30 text-white px-6 py-3 rounded-xl shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-all font-medium tracking-wide">Execute</button>
    <span id="sync-status" class="text-sm text-indigo-300/80 w-24 text-center font-mono tracking-widest"></span>
  </div>

  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div class="bg-white/5 backdrop-blur-lg border border-white/10 p-5 rounded-3xl shadow-xl">
      <h2 class="font-semibold text-lg mb-5 pb-3 border-b border-white/10 text-slate-300 tracking-wide">Backlog</h2>
      <div id="col-todo" class="space-y-4"></div>
    </div>

    <div class="bg-white/5 backdrop-blur-lg border border-indigo-500/30 p-5 rounded-3xl shadow-[0_0_30px_rgba(99,102,241,0.1)] relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-70"></div>
      
      <h2 class="font-semibold text-lg mb-5 pb-3 border-b border-white/10 flex justify-between items-center text-indigo-100 tracking-wide">
        <span>Active</span>
        <span id="wip-counter" class="text-sm font-mono bg-black/30 px-2 py-1 rounded-md border border-white/5">0 / 2</span>
      </h2>
      <div id="col-doing" class="space-y-4"></div>
    </div>

    <div class="bg-white/5 backdrop-blur-lg border border-white/10 p-5 rounded-3xl shadow-xl opacity-80 hover:opacity-100 transition-opacity">
      <h2 class="font-semibold text-lg mb-5 pb-3 border-b border-white/10 text-slate-300 tracking-wide">Completed</h2>
      <div id="col-done" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://kanban.askozicki.workers.dev";
    
    let API_KEY = sessionStorage.getItem("kanban_key");
    if (!API_KEY) {
      API_KEY = prompt("Enter Authentication Token:");
      if (API_KEY) sessionStorage.setItem("kanban_key", API_KEY);
    }
    
    let tasks = [];

    const escapeHTML = str => str.replace(/[&<>'"]/g, 
      tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag)
    );

    async function loadTasks() {
      const syncUI = document.getElementById("sync-status");
      syncUI.innerText = "SYNCING";
      try {
        const res = await fetch(API_URL, { headers: { "x-api-key": API_KEY } });
        if (res.ok) {
          const data = await res.json();
          tasks = Array.isArray(data) ? data : []; 
          syncUI.innerText = "";
          render();
        } else {
          syncUI.innerText = "AUTH ERR";
        }
      } catch (e) {
        syncUI.innerText = "OFFLINE";
      }
    }

    async function saveTasks() {
      const syncUI = document.getElementById("sync-status");
      syncUI.innerText = "UPLOADING";
      const backup = JSON.parse(JSON.stringify(tasks)); 
      
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
          body: JSON.stringify(tasks)
        });
        
        if (!res.ok) throw new Error("Server rejected save");
        
        syncUI.innerText = "SECURED";
        setTimeout(() => { if (syncUI.innerText === "SECURED") syncUI.innerText = ""; }, 2000);
      } catch (e) {
        syncUI.innerText = "FAILED";
        tasks = backup; 
        render();       
        alert("Network error: Changes reverted to prevent data loss.");
      }
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ id: crypto.randomUUID(), text: text, status: "todo" });
      input.value = "";
      
      render();
      saveTasks();
    }

    function moveTask(id, newStatus) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.status = newStatus;
        render();
        saveTasks();
      }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
      saveTasks();
    }

    function render() {
      const todoCol = document.getElementById("col-todo");
      const doingCol = document.getElementById("col-doing");
      const doneCol = document.getElementById("col-done");
      const wipCounter = document.getElementById("wip-counter");

      todoCol.innerHTML = "";
      doingCol.innerHTML = "";
      doneCol.innerHTML = "";

      const doingCount = tasks.filter(t => t.status === "doing").length;
      const isWipFull = doingCount >= 2;
      wipCounter.innerText = `${doingCount} / 2`;
      wipCounter.className = `text-sm font-mono px-2 py-1 rounded-md border ${isWipFull ? 'bg-rose-500/20 text-rose-300 border-rose-500/30' : 'bg-black/30 text-slate-400 border-white/5'}`;

      tasks.forEach(task => {
        const div = document.createElement("div");
        // Glassmorphism card styles
        div.className = "p-4 border border-white/10 rounded-2xl bg-white/5 shadow-inner hover:bg-white/10 transition-all duration-300 text-sm backdrop-blur-sm group";
        
        let content = `<p class="mb-4 text-slate-200 text-base leading-relaxed">${escapeHTML(task.text)}</p><div class="flex justify-between gap-2">`;

        // Apple-style translucent buttons
        if (task.status === "todo") {
          const btnClass = isWipFull 
            ? "opacity-30 cursor-not-allowed bg-black/50 text-slate-500 border-white/5" 
            : "bg-indigo-500/20 text-indigo-300 hover:bg-indigo-500/40 border-indigo-500/30 shadow-[0_0_10px_rgba(99,102,241,0)] hover:shadow-[0_0_10px_rgba(99,102,241,0.2)]";
          content += `<button ${isWipFull ? 'disabled' : ''} onclick="moveTask('${task.id}', 'doing')" class="px-3 py-2 rounded-xl w-full text-center border transition-all ${btnClass}">Activate Task &rarr;</button>`;
        } 
        else if (task.status === "doing") {
          content += `<button onclick="moveTask('${task.id}', 'todo')" class="flex-1 px-2 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-400 border border-white/10 transition-all">&larr; Suspend</button>`;
          content += `<button onclick="moveTask('${task.id}', 'done')" class="flex-1 px-2 py-2 rounded-xl bg-emerald-500/20 text-emerald-300 hover:bg-emerald-500/40 border border-emerald-500/30 transition-all">Complete &rarr;</button>`;
        } 
        else if (task.status === "done") {
          content += `<button onclick="moveTask('${task.id}', 'doing')" class="flex-1 px-2 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-400 border border-white/10 transition-all">&larr; Reopen</button>`;
          content += `<button onclick="deleteTask('${task.id}')" class="px-3 py-2 rounded-xl bg-rose-500/10 text-rose-400 hover:bg-rose-500/30 border border-rose-500/20 transition-all opacity-0 group-hover:opacity-100">Purge</button>`;
        }

        content += `</div>`;
        div.innerHTML = content;

        if (task.status === "todo") todoCol.appendChild(div);
        if (task.status === "doing") doingCol.appendChild(div);
        if (task.status === "done") doneCol.appendChild(div);
      });
    }

    loadTasks();
  </script>
</body>
</html>
