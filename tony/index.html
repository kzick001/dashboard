<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Kiosk V0.3.1</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-black text-slate-200 overflow-hidden;
                width: 1440px; height: 900px; cursor: none;
            }
        }
        @keyframes pan {
            0% { transform: translate(0, 0) scale(1.05); }
            100% { transform: translate(-2%, -1%) scale(1.1); }
        }
        @keyframes blink { 50% { opacity: 0; } }
        .bg-mesh {
            background: radial-gradient(circle at 20% 30%, rgba(15, 23, 42, 0.8), transparent 70%),
                        radial-gradient(circle at 80% 70%, rgba(2, 6, 23, 0.9), transparent 70%);
            animation: pan 40s ease-in-out infinite alternate;
            will-change: transform;
        }
        .animate-blink { animation: blink 1s step-start infinite; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="relative flex flex-col p-10">

    <div class="fixed inset-0 z-0 bg-black overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-mesh"></div>
    </div>

    <div class="z-10 flex justify-between items-center mb-8 border-b border-slate-800/60 pb-4">
        <div class="text-[10px] font-mono tracking-[0.3em] text-slate-500 uppercase">Raspberry Tony // V0.3.1 Dashboard</div>
        <div class="flex items-center gap-2">
            <span id="sys-status-dot" class="text-green-500 animate-blink">●</span> 
            <span id="sys-status-text" class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">System Online</span>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-10 z-10 flex-1">
        
        <div class="col-span-3 flex flex-col gap-8">
            <div class="flex flex-col">
                <div class="text-[8rem] font-light tracking-tighter text-white leading-none flex items-center">
                    <span id="comp-hour">--</span><span class="animate-blink opacity-40 mx-1">:</span><span id="comp-minute">--</span>
                </div>
                <div id="comp-date" class="text-xl font-mono text-cyan-500/80 tracking-widest uppercase mt-4">Awaiting Sync</div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2.5rem] p-8 flex flex-col shadow-2xl relative overflow-hidden">
                <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase mb-8">Current Conditions</div>
                <div class="flex flex-col items-center gap-4">
                    <div id="current-icon" class="w-32 h-32 text-slate-200"></div>
                    <div class="flex flex-col items-center">
                        <div id="current-temp" class="text-8xl font-light text-white leading-none tracking-tighter">--°</div>
                        <div class="flex gap-6 mt-4 text-2xl font-mono">
                            <span id="high-temp" class="text-red-500/80">--°</span>
                            <span id="low-temp" class="text-blue-500/80">--°</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-8">
            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2.5rem] p-8">
                <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase mb-6 border-b border-slate-800 pb-4">5 Day Forecast</div>
                <div id="forecast-container" class="flex justify-between items-center h-40"></div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2.5rem] p-8 flex-1 flex flex-col min-h-0">
                <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase mb-6 border-b border-slate-800 pb-4 flex justify-between items-center">
                    <span>Sports Pipeline</span>
                    <span class="text-blue-500/60">ESPN // NCAA</span>
                </div>
                <div class="flex flex-col gap-4 overflow-hidden flex-1">
                    <div id="pro-sports-container" class="flex flex-col gap-3"></div>
                    <div class="h-px bg-slate-800/50 my-2"></div>
                    <div id="college-sports-container" class="flex flex-col gap-3"></div>
                </div>
            </div>
        </div>

        <div class="col-span-3 flex flex-col gap-8">
            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2.5rem] p-8 flex flex-col gap-8">
                <div class="flex justify-between items-center">
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-mono text-slate-600 tracking-widest uppercase">Wind</span>
                        <div class="flex items-center gap-2 text-white font-mono text-xl">
                            <svg id="wind-dir-icon" class="w-5 h-5 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-width="2.5" d="M12 2L16 10L12 8L8 10L12 2Z"></path></svg>
                            <span id="wind-speed">--</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-[9px] font-mono text-slate-600 tracking-widest uppercase text-right">Dew Point</span>
                        <span id="dew-point" class="text-white font-mono text-xl text-right">--°</span>
                    </div>
                </div>

                <div class="flex flex-col items-center py-4 border-y border-slate-800/50">
                    <span class="text-[9px] font-mono text-slate-600 tracking-widest uppercase mb-4">Air Quality Index</span>
                    <div class="relative w-32 h-32">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle cx="64" cy="64" r="58" fill="none" class="stroke-slate-800" stroke-width="6"></circle>
                            <circle id="aqi-ring" cx="64" cy="64" r="58" fill="none" class="stroke-slate-600" stroke-width="6" stroke-dasharray="364" stroke-dashoffset="364" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="aqi-value" class="text-4xl font-bold text-white tracking-tighter">--</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-500 font-mono tracking-widest text-[10px]">SUNRISE</span>
                        <span id="sunrise-time" class="text-white font-light text-lg tracking-tight">--:--</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-amber-500/80 font-mono tracking-widest text-[10px]">GOLDEN</span>
                        <span id="golden-hour-time" class="text-amber-500/80 font-light text-lg tracking-tight">--:--</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-500 font-mono tracking-widest text-[10px]">SUNSET</span>
                        <span id="sunset-time" class="text-white font-light text-lg tracking-tight">--:--</span>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-end items-end pr-4 opacity-30 mix-blend-screen">
                <img src="rt-logo.png" class="w-48 h-auto grayscale brightness-150">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
