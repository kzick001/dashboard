<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mothership | Neural Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'scanline': 'scanline 6s linear infinite',
                        'electric-pulse': 'electric-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        },
                        'electric-pulse': {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(6, 182, 212, 0.4)' },
                            '50%': { boxShadow: '0 0 15px 2px rgba(6, 182, 212, 0.1)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Cyber-Forge Standard Overrides */
        body {
            background: radial-gradient(circle at 50% 0%, #020617 0%, #000000 100%);
        }
        .hover-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Glitch Effect */
        .glitch-active {
            filter: contrast(1.5) hue-rotate(90deg) brightness(1.2) drop-shadow(4px 0px 0px rgba(255,0,0,0.5));
            transform: skewX(2deg);
        }

        /* Custom Scrollbar for Terminal */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 4px; }

        /* Custom Toggle */
        .cyber-toggle:checked { right: 0; border-color: #06b6d4; }
        .cyber-toggle:checked + .toggle-label { background-color: #0891b2; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4 overflow-hidden font-sans">

    <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-cyan-500/20 p-6 hover-scale overflow-hidden group w-full max-w-6xl h-[85vh] flex flex-col">
        
        <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-cyan-500/5 to-transparent h-32 w-full animate-scanline opacity-20 z-10"></div>
        
        <a href="https://kzick001.github.io/dashboard/" class="absolute top-4 left-4 text-[10px] font-black text-cyan-800 hover:text-cyan-400 transition-colors tracking-tighter z-30">&larr; DASHBOARD</a>

        <canvas id="coreCanvas" class="absolute inset-0 w-full h-full z-0 transition-all duration-75"></canvas>

        <div class="relative z-20 flex flex-col h-full pointer-events-none">
            
            <header class="flex items-center gap-4 ml-24 pointer-events-auto w-max">
                <div class="w-10 h-10 rounded-lg bg-cyan-950/60 border border-cyan-500/30 flex items-center justify-center group-hover:animate-electric-pulse transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold truncate text-slate-100 tracking-tight">Core Reactivity Matrix</h2>
                    <p class="text-[10px] font-mono text-cyan-500/70 uppercase tracking-widest uppercase mt-0.5">Mothership Engine V2.1</p>
                </div>
            </header>

            <div class="flex-1 flex items-end justify-between mt-6">
                <div class="w-1/3 bg-slate-950/80 border border-slate-800 rounded-md p-3 pointer-events-auto backdrop-blur-md">
                    <div class="flex justify-between items-center mb-2 border-b border-slate-800 pb-1">
                        <span class="text-[10px] font-mono text-slate-500">SYS_LOG_PIPELINE</span>
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse-fast"></div>
                        </div>
                    </div>
                    <div id="terminalBody" class="font-mono text-[11px] leading-relaxed h-20 overflow-y-auto flex flex-col justify-end text-slate-400">
                        <div class="text-cyan-400">> Syncing secure pipeline...</div>
                        <div>> Initializing Canvas Context... OK</div>
                        <div>> Awaiting logic directives...</div>
                    </div>
                </div>

                <div class="w-1/3 bg-slate-950/80 border border-cyan-900/50 rounded-md p-4 pointer-events-auto backdrop-blur-md">
                    <div class="space-y-4 font-mono">
                        
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-slate-300 flex items-center gap-2">
                                <svg class="w-3 h-3 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                                Audio Link
                            </span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleAudio" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all duration-200 z-10 top-0 bottom-0 m-auto"/>
                                <label for="toggleAudio" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors duration-200"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-xs text-slate-300">Ghost in Machine</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="togglePersistence" checked class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all duration-200 z-10 top-0 bottom-0 m-auto"/>
                                <label for="togglePersistence" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors duration-200"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-xs text-slate-300">Orbital Capture</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleOrbital" checked class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all duration-200 z-10 top-0 bottom-0 m-auto"/>
                                <label for="toggleOrbital" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors duration-200"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-xs text-slate-300">Fractal Loop</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleFractal" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all duration-200 z-10 top-0 bottom-0 m-auto right-0"/>
                                <label for="toggleFractal" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors duration-200"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-xs text-rose-400/80">System Instability</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleGlitch" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all duration-200 z-10 top-0 bottom-0 m-auto right-0"/>
                                <label for="toggleGlitch" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors duration-200"></label>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- The Basement Architect's IIFE ---
        // Scope locked. No globals leaking out into your mothership.
        (function() {
            const canvas = document.getElementById('coreCanvas');
            const ctx = canvas.getContext('2d', { alpha: false });
            const terminalBody = document.getElementById('terminalBody');
            
            let width, height;
            let particles = [];
            let timeTick = 0;

            // State Matrix
            const state = {
                audio: false,
                persistence: true,
                orbital: true,
                fractal: false,
                glitch: false,
                mouseX: -1000,
                mouseY: -1000,
                audioData: 0 // Will store avg frequency
            };

            // Audio Nodes
            let audioCtx, analyser, dataArray, microphone;

            // Terminal Logger
            function log(msg, isError = false) {
                const div = document.createElement('div');
                div.textContent = `> ${msg}`;
                if(isError) div.className = 'text-rose-500 animate-pulse';
                terminalBody.appendChild(div);
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }

            // Resizing logic tailored to the container
            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                width = canvas.width = rect.width;
                height = canvas.height = rect.height;
                initParticles();
            }
            window.addEventListener('resize', resize);
            
            // Mouse Tracking
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                state.mouseX = e.clientX - rect.left;
                state.mouseY = e.clientY - rect.top;
            });
            canvas.addEventListener('mouseleave', () => { state.mouseX = -1000; state.mouseY = -1000; });

            // --- Control Event Listeners ---
            document.getElementById('toggleAudio').addEventListener('change', async (e) => {
                if(e.target.checked) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioCtx.createAnalyser();
                        microphone = audioCtx.createMediaStreamSource(stream);
                        microphone.connect(analyser);
                        analyser.fftSize = 256;
                        dataArray = new Uint8Array(analyser.frequencyBinCount);
                        state.audio = true;
                        log("Audio Context Connected. Listening...");
                    } catch (err) {
                        log("ERR_MIC_ACCESS_DENIED", true);
                        e.target.checked = false;
                    }
                } else {
                    if(audioCtx) audioCtx.suspend();
                    state.audio = false;
                    state.audioData = 0;
                    log("Audio Context Suspended.");
                }
            });

            document.getElementById('togglePersistence').addEventListener('change', e => state.persistence = e.target.checked);
            document.getElementById('toggleOrbital').addEventListener('change', e => state.orbital = e.target.checked);
            document.getElementById('toggleFractal').addEventListener('change', e => state.fractal = e.target.checked);
            document.getElementById('toggleGlitch').addEventListener('change', e => {
                state.glitch = e.target.checked;
                if(!state.glitch) canvas.classList.remove('glitch-active');
            });

            // --- Physics Engine ---
            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.baseSize = Math.random() * 2 + 1;
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.vy = (Math.random() - 0.5) * 1.5;
                    this.color = Math.random() > 0.5 ? '#06b6d4' : '#64748b'; // Cyan & Slate
                }
                update() {
                    let cvx = this.vx;
                    let cvy = this.vy;

                    // Orbital Capture Module
                    if (state.orbital) {
                        let dx = this.x - state.mouseX;
                        let dy = this.y - state.mouseY;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        const orbitRadius = 250;

                        if (dist < orbitRadius && dist > 20) {
                            // Calculate tangent vector for orbit
                            let force = (orbitRadius - dist) / orbitRadius;
                            // Add tangential velocity
                            cvx += (-dy / dist) * force * 3;
                            cvy += (dx / dist) * force * 3;
                            // Slight pull towards center
                            cvx -= (dx / dist) * force * 0.5;
                            cvy -= (dy / dist) * force * 0.5;
                        }
                    }

                    this.x += cvx;
                    this.y += cvy;

                    // Screen wrap
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }
                draw() {
                    // Audio Reactivity Math
                    let audioScale = state.audio ? (state.audioData / 50) : 1;
                    let currentSize = this.baseSize * Math.max(1, audioScale);

                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.8;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for(let i=0; i<120; i++) particles.push(new Particle());
            }

            function drawLines() {
                ctx.lineWidth = 1;
                // Audio reactivity dictates connection distance
                let maxDist = state.audio ? 100 + (state.audioData) : 120;

                for(let i=0; i<particles.length; i++) {
                    for(let j=i+1; j<particles.length; j++) {
                        let dx = particles[i].x - particles[j].x;
                        let dy = particles[i].y - particles[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < maxDist) {
                            ctx.beginPath();
                            ctx.strokeStyle = '#0891b2'; // Cyan-600
                            ctx.globalAlpha = (1 - dist/maxDist) * 0.4;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            // --- The Main Loop ---
            function animate() {
                timeTick++;

                // Process Audio Data
                if(state.audio && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    state.audioData = sum / dataArray.length;
                }

                // Glitch Module
                if(state.glitch) {
                    if(Math.random() < 0.05) {
                        canvas.classList.add('glitch-active');
                        setTimeout(() => canvas.classList.remove('glitch-active'), 50);
                    }
                }

                // Persistence Layer (Ghost in the Machine)
                ctx.globalAlpha = 1;
                if(state.persistence) {
                    ctx.fillStyle = 'rgba(2, 6, 23, 0.15)'; // Slate-950 with opacity
                    ctx.fillRect(0, 0, width, height);
                } else {
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, width, height);
                }

                // Update & Render
                particles.forEach(p => { p.update(); p.draw(); });
                drawLines();

                // Fractal Feedback Module
                if(state.fractal) {
                    ctx.save();
                    ctx.translate(width/2, height/2);
                    // Rotate based on time and audio
                    let rotSpeed = 0.005 + (state.audioData * 0.0001);
                    ctx.rotate(rotSpeed);
                    ctx.scale(0.98, 0.98); 
                    ctx.globalAlpha = 0.5;
                    ctx.drawImage(canvas, -width/2, -height/2, width, height);
                    ctx.restore();
                }

                requestAnimationFrame(animate);
            }

            // Ignition
            setTimeout(resize, 100); // give DOM a moment to paint the container
            animate();
            
            setTimeout(() => log("Matrix stabilized. Waiting for input..."), 1500);

        })();
    </script>
</body>
</html>
