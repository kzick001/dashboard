<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mothership | Elite Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'scanline': 'scanline 6s linear infinite',
                        'electric-pulse': 'electric-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        },
                        'electric-pulse': {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(6, 182, 212, 0.4)' },
                            '50%': { boxShadow: '0 0 15px 2px rgba(6, 182, 212, 0.1)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Drifting mesh gradient */
            background: radial-gradient(circle at 15% 50%, rgba(2, 6, 23, 1), transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(8, 47, 73, 0.8), transparent 50%),
                        #020617;
            background-size: 200% 200%;
            animation: gradientDrift 15s ease infinite;
        }
        @keyframes gradientDrift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hover-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .glitch-active {
            filter: contrast(1.5) hue-rotate(90deg) brightness(1.2) drop-shadow(4px 0px 0px rgba(225, 29, 72, 0.8));
            transform: skewX(3deg) translateY(-2px);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 4px; }

        .cyber-toggle:checked { right: 0; border-color: #06b6d4; }
        .cyber-toggle:checked + .toggle-label { background-color: #0891b2; }
        
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #06b6d4;
            margin-top: -4px;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4 overflow-hidden">

    <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-cyan-500/20 p-6 hover-scale overflow-hidden group w-full max-w-7xl h-[90vh] flex flex-col">
        
        <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-cyan-500/5 to-transparent h-20 w-full animate-scanline opacity-20 z-10"></div>
        
        <a href="https://kzick001.github.io/dashboard/" class="absolute top-4 left-4 text-[10px] font-black text-cyan-800 hover:text-cyan-400 transition-colors tracking-tighter z-30">&larr; DASHBOARD</a>

        <canvas id="coreCanvas" class="absolute inset-0 w-full h-full z-0"></canvas>

        <div class="relative z-20 flex flex-col h-full pointer-events-none">
            
            <header class="flex items-center gap-4 ml-24 pointer-events-auto w-max">
                <div class="w-10 h-10 rounded-lg bg-cyan-950/60 border border-cyan-500/30 flex items-center justify-center group-hover:animate-electric-pulse transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold truncate text-slate-100">Kzick Core Matrix</h2>
                    <div class="text-[10px] font-mono text-cyan-500/70 uppercase tracking-widest mt-0.5">Mothership System v3.0</div>
                </div>
            </header>

            <div class="flex-1 flex items-end justify-between mt-6 gap-6">
                
                <div class="w-1/4 bg-slate-950/90 border border-slate-800 rounded-lg p-3 pointer-events-auto backdrop-blur-md shadow-2xl">
                    <div class="flex justify-between items-center mb-2 border-b border-slate-800 pb-1">
                        <span class="text-[10px] font-mono text-slate-500">SYS_LOG_PIPELINE</span>
                        <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse-fast"></div>
                    </div>
                    <div id="terminalBody" class="font-mono text-[11px] leading-relaxed h-32 overflow-y-auto flex flex-col justify-end text-slate-400">
                        <div class="text-cyan-400">> Syncing secure pipeline...</div>
                        <div>> Initializing Canvas Context... OK</div>
                    </div>
                </div>

                <div class="w-1/4 bg-slate-950/90 border border-slate-800 rounded-lg p-4 pointer-events-auto backdrop-blur-md shadow-2xl">
                    <span class="text-[10px] font-mono text-slate-500 border-b border-slate-800 block mb-3 pb-1">RENDER_PARAMETERS</span>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[11px] font-mono text-slate-400 mb-1">THEME_SELECT</label>
                            <select id="themeSelect" class="w-full bg-slate-900 border border-slate-700 rounded p-1.5 text-xs font-mono text-cyan-400 focus:outline-none focus:border-cyan-500">
                                <option value="neural">Neural Synapse</option>
                                <option value="orbs">Bioluminescent Orbs</option>
                                <option value="geometric">Geometric Drift</option>
                                <option value="stellar">Stellar Nursery</option>
                                <option value="waves">Sine Waves</option>
                                <option value="zen">Zen Garden</option>
                            </select>
                        </div>
                        <div>
                            <label class="flex justify-between text-[11px] font-mono text-slate-400 mb-1">
                                VELOCITY_MULTI <span id="velVal" class="text-cyan-500">1.0x</span>
                            </label>
                            <input type="range" id="velocitySlider" min="0.1" max="3" step="0.1" value="1" class="w-full">
                        </div>
                        <div>
                            <label class="flex justify-between text-[11px] font-mono text-slate-400 mb-1">
                                PARTICLE_DENSITY <span id="denVal" class="text-cyan-500">80</span>
                            </label>
                            <input type="range" id="densitySlider" min="20" max="200" step="10" value="80" class="w-full">
                        </div>
                    </div>
                </div>

                <div class="w-1/4 bg-slate-950/90 border border-cyan-900/50 rounded-lg p-4 pointer-events-auto backdrop-blur-md shadow-2xl">
                    <span class="text-[10px] font-mono text-slate-500 border-b border-slate-800 block mb-3 pb-1">SYS_MODIFIERS</span>
                    <div class="space-y-3 font-mono">
                        
                        <div class="flex justify-between items-center group/toggle">
                            <span class="text-[11px] text-slate-300 flex items-center gap-2">
                                <svg class="w-3 h-3 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                                SYSTEM_AUDIO
                            </span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleAudio" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                                <label for="toggleAudio" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-[11px] text-slate-300">GHOST_TRAILS</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="togglePersistence" checked class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                                <label for="togglePersistence" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-[11px] text-slate-300">ORBITAL_CAPTURE</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleOrbital" checked class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                                <label for="toggleOrbital" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <span class="text-[11px] text-slate-300">FRACTAL_LOOP</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleFractal" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                                <label for="toggleFractal" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-2 pt-2 border-t border-rose-900/30">
                            <span class="text-[11px] text-rose-500">FORCE_GLITCH</span>
                            <div class="relative inline-block w-8 align-middle select-none">
                                <input type="checkbox" id="toggleGlitch" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto right-0"/>
                                <label for="toggleGlitch" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('coreCanvas');
            const ctx = canvas.getContext('2d', { alpha: false });
            const terminal = document.getElementById('terminalBody');
            
            let width, height, timeTick = 0;
            let particles = [], ripples = [];

            // Architecture State
            const state = {
                theme: 'neural',
                velocity: 1.0,
                density: 80,
                audio: false,
                persistence: true,
                orbital: true,
                fractal: false,
                glitch: false,
                mouseX: -1000,
                mouseY: -1000,
                audioData: 0,
                colorPool: ['#06b6d4', '#3b82f6', '#8b5cf6', '#64748b'] // Cyan, Blue, Purple, Slate
            };

            // Audio Nodes
            let audioCtx, analyser, dataArray, mediaStream;

            function log(msg, type = 'info') {
                const div = document.createElement('div');
                div.textContent = `> ${msg}`;
                if(type === 'error') div.className = 'text-rose-500 animate-pulse';
                if(type === 'warn') div.className = 'text-amber-400';
                terminal.appendChild(div);
                terminal.scrollTop = terminal.scrollHeight;
            }

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                width = canvas.width = rect.width;
                height = canvas.height = rect.height;
                initSystem();
            }
            window.addEventListener('resize', resize);

            // Inputs
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                state.mouseX = e.clientX - rect.left;
                state.mouseY = e.clientY - rect.top;
            });
            canvas.addEventListener('mouseleave', () => { state.mouseX = -1000; state.mouseY = -1000; });

            // UI Bindings
            document.getElementById('themeSelect').addEventListener('change', e => { state.theme = e.target.value; initSystem(); log(`SYS_THEME -> ${state.theme.toUpperCase()}`); });
            document.getElementById('velocitySlider').addEventListener('input', e => { state.velocity = parseFloat(e.target.value); document.getElementById('velVal').textContent = state.velocity.toFixed(1) + 'x'; });
            document.getElementById('densitySlider').addEventListener('input', e => { state.density = parseInt(e.target.value); document.getElementById('denVal').textContent = state.density; initSystem(); });
            
            document.getElementById('togglePersistence').addEventListener('change', e => state.persistence = e.target.checked);
            document.getElementById('toggleOrbital').addEventListener('change', e => state.orbital = e.target.checked);
            document.getElementById('toggleFractal').addEventListener('change', e => state.fractal = e.target.checked);
            document.getElementById('toggleGlitch').addEventListener('change', e => {
                state.glitch = e.target.checked;
                if(!state.glitch) canvas.parentElement.classList.remove('glitch-active');
                log(`SYS_INSTABILITY -> ${state.glitch ? 'FORCED' : 'NORMALIZED'}`, state.glitch ? 'error' : 'info');
            });

            // The System Audio Hack
            document.getElementById('toggleAudio').addEventListener('change', async (e) => {
                if(e.target.checked) {
                    try {
                        log("Requesting SYS_AUDIO stream... Select 'Share Audio'.", 'warn');
                        // Crucial: getDisplayMedia is required to capture system audio. 
                        mediaStream = await navigator.mediaDevices.getDisplayMedia({
                            video: true, // Must request video for screenshare
                            audio: true
                        });
                        
                        // Immediately kill the video track to save processing power
                        mediaStream.getVideoTracks().forEach(track => track.stop());

                        // Check if user actually shared audio
                        if (mediaStream.getAudioTracks().length === 0) {
                            throw new Error("NO_AUDIO_TRACK");
                        }

                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioCtx.createAnalyser();
                        const source = audioCtx.createMediaStreamSource(mediaStream);
                        source.connect(analyser);
                        analyser.fftSize = 256;
                        dataArray = new Uint8Array(analyser.frequencyBinCount);
                        state.audio = true;
                        log("SYS_AUDIO locked. Analyzing frequencies.");

                        // Handle stream stop from browser UI
                        mediaStream.getAudioTracks()[0].onended = () => {
                            document.getElementById('toggleAudio').checked = false;
                            disableAudio();
                        };

                    } catch (err) {
                        log(err.message === "NO_AUDIO_TRACK" ? "ERR: System Audio not shared." : "ERR: Screen capture denied.", 'error');
                        e.target.checked = false;
                        disableAudio();
                    }
                } else {
                    disableAudio();
                }
            });

            function disableAudio() {
                if(audioCtx) audioCtx.suspend();
                if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                state.audio = false;
                state.audioData = 0;
                log("SYS_AUDIO disconnected.");
            }

            // Physics Engine
            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 3 + 1;
                    if(state.theme === 'orbs') this.size = Math.random() * 20 + 10;
                    if(state.theme === 'geometric') this.size = Math.random() * 15 + 5;
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.vy = (Math.random() - 0.5) * 1.5;
                    this.color = state.colorPool[Math.floor(Math.random() * state.colorPool.length)];
                    this.type = Math.floor(Math.random() * 3);
                    this.angle = Math.random() * Math.PI * 2;
                    this.pulseOffset = Math.random() * 100;
                }
                update() {
                    let cvx = this.vx * state.velocity;
                    let cvy = this.vy * state.velocity;

                    // Orbital Logic
                    if (state.orbital) {
                        let dx = this.x - state.mouseX;
                        let dy = this.y - state.mouseY;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 250 && dist > 10) {
                            let force = (250 - dist) / 250;
                            cvx += (-dy / dist) * force * 4;
                            cvy += (dx / dist) * force * 4;
                            cvx -= (dx / dist) * force * 0.5; // pull inward
                            cvy -= (dy / dist) * force * 0.5;
                        }
                    }

                    this.x += cvx;
                    this.y += cvy;
                    this.angle += 0.02 * state.velocity;

                    if (this.x < -50) this.x = width + 50;
                    if (this.x > width + 50) this.x = -50;
                    if (this.y < -50) this.y = height + 50;
                    if (this.y > height + 50) this.y = -50;
                }
                draw() {
                    let audioScale = state.audio ? (state.audioData / 60) : 1;
                    let currentSize = this.size * Math.max(1, audioScale * 0.8);

                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);

                    if (state.theme === 'orbs') {
                        let pulse = Math.sin(timeTick * 0.05 + this.pulseOffset) * 0.3 + 0.7;
                        let grad = ctx.createRadialGradient(0,0,0, 0,0, currentSize * pulse);
                        grad.addColorStop(0, this.color);
                        grad.addColorStop(1, 'transparent');
                        ctx.fillStyle = grad;
                        ctx.globalAlpha = 0.6;
                        ctx.beginPath(); ctx.arc(0,0, currentSize * pulse, 0, Math.PI*2); ctx.fill();
                    } 
                    else if (state.theme === 'geometric') {
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 1.5;
                        ctx.globalAlpha = 0.7;
                        ctx.beginPath();
                        if (this.type === 0) ctx.rect(-currentSize/2, -currentSize/2, currentSize, currentSize);
                        else if (this.type === 1) { ctx.moveTo(0, -currentSize); ctx.lineTo(currentSize, 0); ctx.lineTo(0, currentSize); ctx.lineTo(-currentSize, 0); ctx.closePath(); }
                        else ctx.arc(0,0, currentSize, 0, Math.PI*2);
                        ctx.stroke();
                    }
                    else {
                        ctx.fillStyle = this.color;
                        ctx.globalAlpha = 0.8;
                        ctx.beginPath(); ctx.arc(0,0, currentSize, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function initSystem() {
                particles = []; ripples = [];
                for(let i=0; i<state.density; i++) particles.push(new Particle());
            }

            function drawNeuralNet() {
                let maxDist = state.audio ? 100 + state.audioData : 120;
                ctx.lineWidth = 1;
                for(let i=0; i<particles.length; i++) {
                    for(let j=i+1; j<particles.length; j++) {
                        let dx = particles[i].x - particles[j].x;
                        let dy = particles[i].y - particles[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < maxDist) {
                            ctx.beginPath();
                            ctx.strokeStyle = '#06b6d4';
                            ctx.globalAlpha = (1 - dist/maxDist) * 0.4;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            function drawWaves() {
                ctx.lineWidth = 2;
                let audioOffset = state.audio ? state.audioData * 0.5 : 0;
                for(let j = 0; j < 3; j++) {
                    ctx.beginPath();
                    ctx.strokeStyle = state.colorPool[j];
                    ctx.globalAlpha = 0.3;
                    for(let x = 0; x < width; x += 20) {
                        let y = height / 2 
                              + Math.sin(x * 0.01 + timeTick * 0.02 * state.velocity + j) * (100 + audioOffset)
                              + Math.cos(x * 0.005 - timeTick * 0.01 * state.velocity) * 50;
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }

            // Core Loop
            function animate() {
                timeTick++;

                if(state.audio && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    state.audioData = sum / dataArray.length;
                }

                // Glitch Matrix
                if(state.glitch && Math.random() < 0.08) {
                    canvas.parentElement.classList.add('glitch-active');
                    setTimeout(() => canvas.parentElement.classList.remove('glitch-active'), 50);
                }

                // Render Base
                ctx.globalAlpha = 1;
                if(state.persistence && state.theme !== 'waves') {
                    ctx.fillStyle = 'rgba(2, 6, 23, 0.2)';
                    ctx.fillRect(0, 0, width, height);
                } else {
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, width, height);
                }

                ctx.globalCompositeOperation = (state.theme === 'orbs' || state.theme === 'neural') ? 'lighter' : 'source-over';

                // Render Themes
                if (state.theme === 'waves') {
                    drawWaves();
                } else if (state.theme === 'zen') {
                    if (Math.random() < 0.03 * state.velocity && ripples.length < 8) {
                        ripples.push({ x: Math.random()*width, y: Math.random()*height, r: 1, max: Math.random()*150+50, c: state.colorPool[Math.floor(Math.random()*4)] });
                    }
                    for (let i = ripples.length - 1; i >= 0; i--) {
                        let rip = ripples[i];
                        rip.r += 0.8 * state.velocity + (state.audioData * 0.02);
                        ctx.beginPath(); ctx.strokeStyle = rip.c; ctx.globalAlpha = 0.5 * (1 - rip.r/rip.max);
                        ctx.lineWidth = 2; ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI*2); ctx.stroke();
                        if (rip.r >= rip.max) ripples.splice(i, 1);
                    }
                    particles.forEach(p => { p.update(); p.draw(); });
                } else {
                    particles.forEach(p => { p.update(); p.draw(); });
                    if (state.theme === 'neural') drawNeuralNet();
                }
                ctx.globalCompositeOperation = 'source-over';

                // Fractal Recursion
                if(state.fractal) {
                    ctx.save();
                    ctx.translate(width/2, height/2);
                    let rotSpeed = 0.002 * state.velocity + (state.audioData * 0.00005);
                    ctx.rotate(rotSpeed);
                    ctx.scale(0.97, 0.97); 
                    ctx.globalAlpha = 0.6;
                    ctx.drawImage(canvas, -width/2, -height/2, width, height);
                    ctx.restore();
                }

                requestAnimationFrame(animate);
            }

            setTimeout(resize, 100);
            animate();
            setTimeout(() => log("Matrix stabilized. Waiting for input..."), 1000);

        })();
    </script>
</body>
</html>
