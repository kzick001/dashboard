  <style>
    :root {
      --bg:         #0a0e27;
      --bg-card:    rgba(14,18,40,0.97);
      --accent:     #bb86fc;
      --accent-dim: rgba(187,134,252,0.13);
      --terminal:   #ffeb3b;
      --primary:    #00e5ff;
      --danger:     #f87171;
      --success:    #4ade80;
      --orange:     #fb923c;
      --text:       #e0e0e0;
      --muted:      #888;
      --glass:      rgba(14,18,40,0.88);
      --border:     rgba(187,134,252,0.28);
      --r:          8px;
      --r-sm:       4px;
      --r-pill:     20px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Courier New',Courier,monospace; font-size:14px; overflow:hidden; }
    button { cursor:pointer; font-family:inherit; }
    svg { display:block; }
    .hidden { display:none !important; }

    /* VFX */
    #vfx-layer { position:fixed; inset:0; pointer-events:none; z-index:100; transition:box-shadow 1s ease,background 1s ease; }
    .vfx-critical { box-shadow:inset 0 0 160px rgba(255,0,0,.7),inset 0 0 220px rgba(255,71,87,.5); animation:vfx-crit .8s ease-in-out infinite; }
    .vfx-bleeding { box-shadow:inset 0 0 120px rgba(248,113,113,.55); animation:vfx-bleed 2.5s ease-in-out infinite; }
    .vfx-poison   { box-shadow:inset 0 0 140px rgba(74,222,128,.28); background:radial-gradient(circle at center,transparent 50%,rgba(46,204,113,.07) 100%); }
    .vfx-stunned  { box-shadow:inset 0 0 130px rgba(251,191,36,.32); animation:vfx-stun 1.5s ease-in-out infinite; }
    .vfx-burning  { box-shadow:inset 0 0 150px rgba(251,146,60,.48); animation:vfx-burn 1s ease-in-out infinite; }
    .vfx-blinded  { background:rgba(0,0,0,.88); backdrop-filter:blur(8px); }
    @keyframes vfx-crit  { 0%,100%{box-shadow:inset 0 0 160px rgba(255,0,0,.6),inset 0 0 220px rgba(255,71,87,.4)} 50%{box-shadow:inset 0 0 220px rgba(255,0,0,.9),inset 0 0 300px rgba(255,71,87,.7)} }
    @keyframes vfx-bleed { 0%,100%{box-shadow:inset 0 0 120px rgba(248,113,113,.4)} 50%{box-shadow:inset 0 0 200px rgba(248,113,113,.75)} }
    @keyframes vfx-stun  { 0%,100%{box-shadow:inset 0 0 130px rgba(251,191,36,.22)} 50%{box-shadow:inset 0 0 200px rgba(251,191,36,.52)} }
    @keyframes vfx-burn  { 0%,100%{box-shadow:inset 0 0 150px rgba(251,146,60,.38)} 50%{box-shadow:inset 0 0 210px rgba(251,146,60,.68)} }
    @keyframes hp-pulse  { 0%,100%{background:rgba(248,113,113,.1)} 50%{background:rgba(248,113,113,.3)} }

    /* LOGIN */
    #login-layer { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.5rem; padding:2rem; z-index:2000; overflow-y:auto; }
    .login-hero { display:flex; flex-direction:column; align-items:center; gap:.75rem; text-align:center; }
    #hero-name { font-size:clamp(2rem,7vw,3.2rem); font-weight:bold; color:var(--terminal); letter-spacing:.12em; text-transform:uppercase; text-shadow:0 0 24px rgba(255,235,59,.35); }
    .roster-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:.9rem; width:100%; max-width:680px; }
    .roster-btn { background:var(--glass); border:2px solid var(--border); color:var(--text); padding:1.4rem 1rem; border-radius:var(--r); transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease; display:flex; flex-direction:column; align-items:center; gap:.55rem; }
    .roster-btn:hover { transform:scale(1.06); border-color:var(--accent); box-shadow:0 0 24px rgba(187,134,252,.4); }
    .roster-btn span { font-size:1.15rem; font-weight:bold; letter-spacing:.03em; text-transform:capitalize; }

    /* LOADING */
    #loading-layer { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; z-index:2500; padding:2rem; text-align:center; }
    .load-icon { width:60px; height:60px; color:var(--terminal); animation:spin 2s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #load-title { font-size:clamp(1.3rem,5vw,1.9rem); color:var(--terminal); letter-spacing:.18em; text-transform:uppercase; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    #load-tip { font-size:.82rem; color:var(--muted); max-width:400px; line-height:1.65; font-style:italic; }
    .bar-wrap { width:260px; height:4px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
    .bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--primary)); border-radius:2px; transition:width 6s linear; }

    /* HUD */
    #main-hud { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:min(93vw,480px); max-height:88vh; background:var(--bg-card); border:2px solid var(--accent); border-radius:12px; padding:1.2rem; z-index:1000; display:flex; flex-direction:column; gap:.8rem; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 60px rgba(187,134,252,.08); scrollbar-width:thin; scrollbar-color:var(--accent) transparent; }
    #main-hud::-webkit-scrollbar { width:4px; }
    #main-hud::-webkit-scrollbar-thumb { background:var(--accent); border-radius:2px; }
    .hud-section { background:rgba(0,0,0,.22); border:1px solid var(--border); border-radius:var(--r); padding:.85rem; }
    .section-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; margin-bottom:.55rem; }

    /* Header */
    .hud-header { display:flex; align-items:flex-start; gap:1rem; position:relative; padding-right:3.6rem; }
    #hud-avatar { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--primary)); padding:2px; flex-shrink:0; }
    .av-inner { width:100%; height:100%; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .av-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .av-inner svg { width:55%; height:55%; color:var(--accent); }
    .hud-info { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .hud-info h2 { font-size:1.575rem; color:var(--terminal); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:0; font-weight:bold; letter-spacing:.05em; }
    .hud-info p { font-size:.75rem; color:var(--muted); margin:0.4rem 0 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Vitals Inline */
    #vitals-inline { font-size:.82rem; color:var(--text); text-align:center; padding:.7rem; background:rgba(0,0,0,.22); border:1px solid var(--border); border-radius:var(--r); font-family:monospace; letter-spacing:.03em; }
    .vs { background:rgba(0,0,0,.15); border:1px solid var(--border); border-radius:var(--r-sm); padding:.65rem; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
    .vs .sl { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.2rem; }
    .vs .sv { font-size:.95rem; font-weight:bold; color:var(--primary); font-family:monospace; }
    .vs.hp-low .sv { color:var(--orange); }
    .vs.hp-crit { border-color:var(--danger); box-shadow:inset 0 0 16px rgba(248,113,113,.15); animation:hp-pulse 1.2s ease-in-out infinite; }
    .vs.hp-crit .sv { color:var(--danger); }

    /* Actions */
    #actions { display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; }
    .action-btn { background:rgba(0,0,0,.2); border:1px solid var(--border); color:var(--text); padding:.65rem; border-radius:var(--r-sm); font-size:.75rem; font-weight:bold; letter-spacing:.07em; text-transform:uppercase; transition:all .2s ease; cursor:pointer; }
    .action-btn:hover { border-color:var(--accent); box-shadow:0 0 12px rgba(187,134,252,.25); transform:translateY(-1px); }
    .action-btn:active { transform:translateY(0); }

    /* Conditions */
    #cond-grid { display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; min-height:2.4rem; }
    .chip { display:inline-flex; align-items:center; gap:.4rem; background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:var(--r-pill); padding:.4rem .65rem; font-size:.7rem; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; }
    .chip svg { width:14px; height:14px; }
    .c-poison { border-color:rgba(74,222,128,.4); color:rgba(74,222,128,.9); }
    .c-bleeding { border-color:rgba(248,113,113,.4); color:rgba(248,113,113,.9); }
    .c-burning { border-color:rgba(251,146,60,.4); color:rgba(251,146,60,.9); }
    .c-stunned { border-color:rgba(251,191,36,.4); color:rgba(251,191,36,.9); }
    .c-charmed { border-color:rgba(236,72,153,.4); color:rgba(236,72,153,.9); }
    .c-frightened { border-color:rgba(139,92,246,.4); color:rgba(139,92,246,.9); }
    .c-blinded { border-color:rgba(100,116,139,.4); color:rgba(100,116,139,.9); }
    .c-deafened { border-color:rgba(100,116,139,.4); color:rgba(100,116,139,.9); }
    .c-restrained { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-grappled { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-incap { border-color:rgba(255,193,7,.4); color:rgba(255,193,7,.9); }
    .c-unconscious { border-color:rgba(255,0,0,.4); color:rgba(255,0,0,.9); }
    .c-petrified { border-color:rgba(156,163,175,.4); color:rgba(156,163,175,.9); }
    .c-concentrating { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-exhaustion { border-color:rgba(248,113,113,.4); color:rgba(248,113,113,.9); }
    .c-inspired { border-color:rgba(34,197,94,.4); color:rgba(34,197,94,.9); }
    .c-protected { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-cursed { border-color:rgba(139,92,246,.4); color:rgba(139,92,246,.9); }
    .c-default { border-color:var(--border); color:var(--text); }
    .no-cond { font-size:.75rem; color:var(--muted); font-style:italic; }

    /* Spells */
    #spell-section { margin-top:.6rem; padding-top:.6rem; border-top:1px solid var(--border); }
    .sp-intro { font-size:.75rem; color:var(--muted); margin-bottom:.6rem; }
    .sp-btns { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
    .sp-btn { background:rgba(0,0,0,.2); border:1px solid var(--border); color:var(--text); padding:.5rem 1.6rem .5rem .8rem; border-radius:var(--r-sm); font-size:.7rem; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; transition:all .2s ease; position:relative; }
    .sp-btn:hover { border-color:var(--primary); }
    .sp-btn.no-slots { opacity:.5; cursor:not-allowed; }
    .sp-btn.depleted { border-color:var(--danger); color:var(--danger); }
    .cnt { position:absolute; top:.3rem; right:.5rem; font-size:.55rem; }
    .sp-detail { max-height:0; overflow:hidden; transition:max-height .3s ease; }
    .sp-detail.open { max-height:200px; }
    .sp-dlabel { display:block; font-size:.65rem; color:var(--muted); margin-bottom:.4rem; }
    .sp-ctrl { display:flex; align-items:center; gap:.4rem; margin-bottom:.5rem; }
    .sp-adj { background:rgba(0,0,0,.15); border:1px solid var(--border); color:var(--primary); padding:.35rem .5rem; font-size:.8rem; border-radius:var(--r-sm); cursor:pointer; transition:all .2s ease; }
    .sp-adj:hover { border-color:var(--primary); box-shadow:0 0 8px rgba(0,229,255,.2); }
    .sp-adj:disabled { opacity:.4; cursor:not-allowed; }
    .sp-val { font-family:monospace; font-size:.85rem; flex:1; text-align:center; }
    .sp-reset { background:rgba(187,134,252,.1); border:1px solid var(--accent); color:var(--accent); padding:.4rem .8rem; border-radius:var(--r-sm); font-size:.65rem; font-weight:bold; text-transform:uppercase; letter-spacing:.05em; margin-top:.4rem; cursor:pointer; transition:all .2s ease; align-self:flex-start; }
    .sp-reset:hover { box-shadow:0 0 12px rgba(187,134,252,.25); }
    .spell-toggle-eye { background:none; border:none; color:var(--accent); cursor:pointer; font-size:1rem; padding:0; line-height:1; }

    /* Achievement Badge (top-right of HUD) */
    #ach-pill { position:absolute; top:.4rem; right:2.8rem; display:none; align-items:center; justify-content:center; background:rgba(187,134,252,.15); border:1px solid var(--accent); color:var(--accent); width:28px; height:28px; border-radius:50%; cursor:pointer; transition:all .3s ease; z-index:100; font-size:.9rem; }
    #ach-pill:hover { background:rgba(187,134,252,.25); }
    #ach-pill.unread { animation:badge-glow 1s ease-in-out infinite; }
    #ach-badge { font-weight:bold; font-size:.8rem; }
    @keyframes badge-glow { 0%,100%{box-shadow:0 0 8px rgba(187,134,252,.4)} 50%{box-shadow:0 0 16px rgba(187,134,252,.9)} }

    /* Ticker (centered below HUD) */
    .ticker-container { position:fixed; left:50%; transform:translateX(-50%); top:calc(50% + 220px); z-index:500; display:flex; flex-direction:column; align-items:center; gap:.4rem; }
    .ticker-pill { width:min(90vw,720px); background:rgba(14,18,40,.95); border:1px solid var(--terminal); border-radius:2px; padding:.5rem .8rem; font-size:.75rem; color:var(--terminal); letter-spacing:.08em; text-transform:uppercase; overflow:hidden; white-space:nowrap; cursor:pointer; transition:all .2s ease; }
    .ticker-pill:hover { box-shadow:inset 0 0 12px rgba(255,235,59,.2); }
    #ticker-text { display:inline-block; padding-left:100%; font-weight:bold; animation:ticker-scroll 22.5s linear infinite; }
    @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }
    .ticker-eye { background:none; border:none; color:var(--terminal); font-size:1rem; cursor:pointer; padding:.2rem; transition:all .2s ease; }
    .ticker-eye:hover { transform:scale(1.2); }

    /* Modal */

<body>

<div id="vfx-layer"></div>

<!-- LOGIN -->

<div id="sys-msg-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:3000;align-items:center;justify-content:center;padding:1.5rem;">
  <div style="background:rgba(16,14,36,0.98);border:2px solid rgba(187,134,252,0.35);border-radius:12px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.7);">

          style="background:#bb86fc;color:#150a2e;border:none;padding:0.65rem 2rem;border-radius:4px;font-family:inherit;font-weight:bold;font-size:0.88rem;cursor:pointer;letter-spacing:0.8px;text-transform:uppercase;">

      <button class="btn-confirm" onclick="logout();">Logout</button>

<script>
'use strict';

/* ── Config ── */
const WORKER_URL   = 'https://dmscreen.askozicki.workers.dev';
const TICKER_URL   = 'https://kzick.dev/dm-screen/ticker.json';
const AVATAR_BASE  = 'https://cdn.jsdelivr.net/gh/kzick001/dashboard@main/dm-screen/players/';
const P_KEY        = 'showrunner_active_player';
const T_KEY        = 'showrunner_ticker_visible';
const POLL_MS      = 30000;
const TICKER_MS    = 180000; // 3 minutes per message
const LOAD_MS      = 6000;
const ROSTER       = ['Chuck','Tilly Tiggins','Hendrick Hill','Aelar Menendez','Jimothy'];

/* ── Condition definitions ── */
const CDEF = {
  poisoned:      {icon:'icon-droplet',       css:'c-poison',        vfx:'vfx-poison'  },
  bleeding:      {icon:'icon-droplet',       css:'c-bleeding',      vfx:'vfx-bleeding'},
  burning:       {icon:'icon-flame',          css:'c-burning',       vfx:'vfx-burning' },
  stunned:       {icon:'icon-zap',            css:'c-stunned',       vfx:'vfx-stunned' },
  charmed:       {icon:'icon-heart',          css:'c-charmed',       vfx:null          },
  frightened:    {icon:'icon-alert-triangle', css:'c-frightened',    vfx:null          },
  blinded:       {icon:'icon-eye-off',        css:'c-blinded',       vfx:'vfx-blinded' },
  deafened:      {icon:'icon-eye-off',        css:'c-deafened',      vfx:null          },
  restrained:    {icon:'icon-lock',           css:'c-restrained',    vfx:null          },
  grappled:      {icon:'icon-link',           css:'c-grappled',      vfx:null          },
  incapacitated: {icon:'icon-pause-circle',   css:'c-incap',         vfx:null          },
  unconscious:   {icon:'icon-x-circle',       css:'c-unconscious',   vfx:'vfx-critical'},
  petrified:     {icon:'icon-layers',         css:'c-petrified',     vfx:null          },
  concentrating: {icon:'icon-target',         css:'c-concentrating', vfx:null          },
  exhaustion:    {icon:'icon-battery',        css:'c-exhaustion',    vfx:null          },
  inspired:      {icon:'icon-star',           css:'c-inspired',      vfx:null          },
  protected:     {icon:'icon-shield',         css:'c-protected',     vfx:null          },
  cursed:        {icon:'icon-settings',       css:'c-cursed',        vfx:null          },
};
const VFX_ALL = ['vfx-critical','vfx-bleeding','vfx-poison','vfx-stunned','vfx-burning','vfx-blinded'];

/* ── State ── */
let state      = null;   // full campaign state from KV
let player     = null;   // current character object
let playerName = null;   // active player name string
let pollTimer  = null;
let tickTimer  = null;
let tickData   = null;
let spellBuilt = false;  // track whether spell section DOM exists

/* ══════════════════════════════
   INIT
══════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  console.log('[HUD] DOM loaded, starting init...');
  fetchTickerData();
  startPolling();
  buildRoster();

  get('btn-items').addEventListener('click', openInventoryModal);
  get('btn-ach').addEventListener('click', openModal);
  get('ticker-pill').addEventListener('click', toggleTicker);
  get('modal-overlay').addEventListener('click', e => { if (e.target === get('modal-overlay')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeInventoryModal(); } });

  // Auto-login after first state fetch
  console.log('[HUD] Attempting auto-login...');
  fetchState().then(() => {
    console.log('[HUD] fetchState resolved, state version:', state?.version);
    const saved = localStorage.getItem(P_KEY);
    if (saved !== null) {
      const idx = parseInt(saved);
      console.log('[HUD] Auto-login index:', idx, 'player:', ROSTER[idx]);
      if (!isNaN(idx) && ROSTER[idx]) doLogin(ROSTER[idx], idx, true);
    } else {
      console.log('[HUD] No saved player index');
    }
  }).catch(e => {
    console.error('[HUD] fetchState rejected:', e);
  });
});

/* ══════════════════════════════
   ROSTER
══════════════════════════════ */
function buildRoster() {
  const grid = get('roster-grid');
  grid.innerHTML = '';
  ROSTER.forEach((name, idx) => {
    const btn = document.createElement('button');
    btn.className = 'roster-btn';
    btn.innerHTML = `<span>${x(name)}</span>`;
    btn.addEventListener('click', () => doLogin(name, idx, false));
    grid.appendChild(btn);
  });
}

/* ══════════════════════════════
   LOGIN / LOADING
══════════════════════════════ */
function doLogin(name, idx, isAuto) {
  console.log('[HUD] doLogin:', name, 'auto:', isAuto);
  playerName = name;
  if (state?.characters) {
    player = state.characters.find(c => c.name === name) || null;
    console.log('[HUD] Found player:', player?.name, 'from', state.characters.length, 'chars');
  } else {
    console.warn('[HUD] doLogin: state.characters not available');
  }

  if (isAuto) { showHUD(); return; }

  // Show loading screen, then reveal HUD
  const loginLayer = get('login-layer');
  const loadLayer  = get('loading-layer');

  get('load-title').textContent = 'LOADING';
  get('load-tip').textContent   = randomTip();
  get('load-bar').style.width   = '0%';

  loginLayer.classList.add('hidden');
  loadLayer.classList.remove('hidden');

  // Trigger bar animation on next frame
  requestAnimationFrame(() => requestAnimationFrame(() => {
    get('load-bar').style.width = '100%';
  }));

  setTimeout(() => {
    localStorage.setItem(P_KEY, idx.toString());
    loadLayer.classList.add('hidden');
    showHUD();
  }, LOAD_MS);
}

function showHUD() {
  get('login-layer').classList.add('hidden');
  get('loading-layer').classList.add('hidden');
  get('main-hud').classList.remove('hidden');
  // Delay render to allow DOM to paint
  requestAnimationFrame(() => {
    renderAll();
    initTicker();
    startAchievementPolling();
    startMessagePolling();
  });
}

/* ══════════════════════════════
   KV POLLING
══════════════════════════════ */
async function fetchState() {
  try {
    const res = await fetch(WORKER_URL, {method:'GET', mode:'cors'});
    if (!res.ok) { console.error('[HUD] Poll', res.status); return; }
    state = await res.json();
    console.log('[HUD] State fetched:', state?.version, 'characters:', state?.characters?.length);
    // Migrate old v31 schema (players → characters)
    if (state.version === 31 && state.players && !state.characters) {
      state.characters = state.players;
      console.log('[HUD] Migrated v31 players → characters');
    }
    if (playerName) player = state.characters?.find(c => c.name === playerName) || null;
    console.log('[HUD] Player set:', player?.name);
    if (!get('main-hud').classList.contains('hidden')) renderAll();
  } catch (e) { console.error('[HUD] Poll error:', e.message, e.stack); }
}

function startPolling() {
  fetchState();
  pollTimer = setInterval(fetchState, POLL_MS);
}

async function syncToKV() {
  if (!state) return;
  try {
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({base_version: state.version || 0, data: state})
    });
    if (res.ok) {
      const r = await res.json();
      if (r.version !== undefined) state.version = r.version;
    } else if (res.status === 409) {
      console.warn('[HUD] Collision — re-fetching');
      await fetchState();
    } else {
      toast('Save failed. Try again.');
    }
  } catch (e) { toast('Connection error. Could not save.'); }
}

function updateAvatar() {
  if (!player) { console.warn('[HUD] updateAvatar: player is null'); return; }
  
  // Try multiple selectors to find the element
  let inner = get('av-inner');
  if (!inner) {
    console.error('[HUD] av-inner not found via getElementById, trying querySelector');
    inner = document.querySelector('.av-inner');
  }
  if (!inner) {
    console.error('[HUD] av-inner not found. Available DOM:', document.body.innerHTML.substring(0, 500));

  const name    = player.name?.split(' ')[0].toLowerCase() || '';

  console.log('[HUD] Loading avatar:', imgPath);
  
  const existing = inner.querySelector('img');

function updateVitals() {
  if (!player) { console.warn('[HUD] updateVitals: player is null'); return; }
  const hp    = player?.stats?.hp?.current ?? null;
  const maxHp = player?.stats?.hp?.max     ?? null;
  const ac    = player?.stats?.ac ?? null;
  const pass  = player?.stats?.passivePerception ?? null;
  const speed = player?.stats?.speed ?? null;
  const gold  = player?.gold ?? null;
  console.log('[HUD] Vitals:', {hp, maxHp, ac, pass, speed, gold});

  const fmt = (v, unit='') => v != null ? `${v}${unit}` : '—';
  const el = get('vitals-inline');
  if (!el) return;

  const hpPct = (hp !== null && maxHp) ? hp/maxHp : 1;
  const hpColor = hpPct <= 0.25 ? 'var(--danger)' : hpPct <= 0.5 ? 'var(--orange)' : 'var(--primary)';

  el.innerHTML =
    `<span style="color:${hpColor};">HP ${fmt(hp)}/${fmt(maxHp)}</span>` +
    `<span style="color:var(--muted);"> &nbsp;|&nbsp; </span>` +
    `<span style="color:var(--primary);">AC ${fmt(ac)}</span>` +
    `<span style="color:var(--muted);"> &nbsp;|&nbsp; </span>` +
    `<span style="color:var(--primary);">Passive ${fmt(pass)}</span>` +
    `<span style="color:var(--muted);"> &nbsp;|&nbsp; </span>` +
    `<span style="color:var(--primary);">Speed ${fmt(speed,' ft')}</span>` +
    (gold !== null ? `<span style="color:var(--muted);"> &nbsp;|&nbsp; </span><span style="color:#ffd700;">${fmt(gold)} gp</span>` : '');
}

/* ══════════════════════════════
   CONDITIONS
══════════════════════════════ */
function updateConditions() {
  const grid  = get('cond-grid');
  const conds = player?.conditions || [];
  const prevCount = grid.querySelectorAll('.chip').length;

  grid.innerHTML = '';

  if (!conds.length) {
    grid.innerHTML = '<span class="no-cond">No active conditions</span>';
  } else {
    conds.forEach(raw => {
      const key = raw.toLowerCase().replace(/\s+/g,'_');
      const def = CDEF[key] || {icon:'icon-alert-triangle', css:'c-default', vfx:null};
      const lbl = raw.charAt(0).toUpperCase() + raw.slice(1);
      const chip = document.createElement('span');
      chip.className = `chip ${def.css}`;
      chip.title = lbl;
      chip.innerHTML = `<svg viewBox="0 0 24 24"><use href="#${def.icon}"/></svg>${x(lbl)}`;
      grid.appendChild(chip);
    });
  }

  // Pulse the Status section if condition count changed
  if (conds.length !== prevCount) {
    const section = grid.closest('.hud-section');
    if (section) {
      section.classList.remove('cond-alert');
      void section.offsetWidth; // reflow to restart animation
      section.classList.add('cond-alert');
      setTimeout(() => section.classList.remove('cond-alert'), 600);
    }
  }
}

function applyVFX() {

  if (player?.conditions) {
    player.conditions.map(c => c.toLowerCase().replace(/\s+/g,'_')).forEach(c => {

      const vfxClass = CDEF[c]?.vfx;

}

          Level ${i}
          <span class="cnt" id="sp-cnt-${i}">—</span>
        </button>`).join('')}
    </div>
    ${[1,2,3].map(i=>`
      <div class="sp-detail" id="sp-det-${i}">

function toggleSpellVisibility() {
  const sec = document.getElementById('spell-section');
  if (!sec) return;
  const buttons = sec.querySelector('.sp-btns');
  const intro   = sec.querySelector('.sp-intro');
  const details = sec.querySelectorAll('.sp-detail');
  const reset   = sec.querySelector('.sp-reset');
  const hidden  = buttons?.style.display === 'none';

  if (buttons) buttons.style.display = hidden ? 'flex' : 'none';
  if (intro)   intro.style.display   = hidden ? 'block' : 'none';
  details.forEach(d => d.style.display = hidden ? 'block' : 'none');
  if (reset)   reset.style.display    = hidden ? 'block' : 'none';
}

function updateSpellCounts() {
  if (!player?.spellSlots) return;
  [1,2,3].forEach(i => {
    const slot = player.spellSlots[`level${i}`];
    const btn  = document.getElementById(`sp-btn-${i}`);
    const cnt  = document.getElementById(`sp-cnt-${i}`);
    const val  = document.getElementById(`sp-val-${i}`);
    const dec  = document.getElementById(`sp-dec-${i}`);
    const inc  = document.getElementById(`sp-inc-${i}`);
    if (!btn || !slot) return;
    const max = slot.max ?? 0, cur = slot.current ?? 0;
    if (max === 0) { btn.className='sp-btn no-slots'; if(cnt) cnt.textContent='N/A'; }
    else { btn.className = cur===0 ? 'sp-btn depleted':'sp-btn'; if(cnt) cnt.textContent=`${cur}/${max}`; }
    if (val) val.textContent = `${cur} / ${max}`;
    if (dec) dec.disabled = cur<=0;
    if (inc) inc.disabled = cur>=max;
  });
}

function toggleDetail(i) {
  const d = document.getElementById(`sp-det-${i}`);
  if (d) d.classList.toggle('open');
}

function adjSlot(i, delta) {
  if (!player?.spellSlots) return;
  const slot = player.spellSlots[`level${i}`];
  if (!slot) return;
  const n = (slot.current ?? 0) + delta;
  if (n < 0 || n > (slot.max ?? 0)) return;
  slot.current = n;
  updateSpellCounts();
  syncToKV();
}

function longRest() {
  if (!player?.spellSlots) return;
  if (!confirm('Reset all spell slots? This counts as a long rest.')) return;
  [1,2,3].forEach(i => {
    const s = player.spellSlots[`level${i}`];
    if (s) s.current = s.max ?? 0;
  });
  player.spellSlots.lastLongRest = new Date().toISOString();
  updateSpellCounts();
  syncToKV();
  toast('Long rest complete. All slots restored.');
}

let achCurrentPage = null; // Current achievement detail being shown
let pollAchInterval = null;
const _toastShownFor = new Set();      // achievement IDs that have already popped a toast this session
const _acknowledgedLocally = new Set(); // achievement IDs the player acknowledged this session (survives poll merges)

/* Count of unaward achievements (pending notify) that player earned */
function unacknowledgedCount() {
  if (!state?.achievements || !player) return 0;
  return state.achievements.filter(a => {
    // Only count if NOT archived, player earned it, and notify is pending (not yet awarded)
    if (a.isArchived) return false;
    if (a.earnedBy && typeof a.earnedBy === 'object' && !a.earnedBy[player.id]) return false;
    // Count if notifyPlayerAt is set but awardedAt is NOT set
    if (a.notifyPlayerAt && !a.awardedAt) return true;
    return false;
  }).length;
}

function updateAchPill() {
  const count = unacknowledgedCount();
  const pill  = get('ach-pill');
  const badge = get('ach-badge');
  if (count > 0) {
    pill.style.display = 'flex';
    if (badge) badge.textContent = count;
    pill.classList.add('unread');
  } else {
    pill.style.display = 'none';
    pill.classList.remove('unread');
  }
}

/* Delegated copy button handler for loot details */
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-copy-loot]');
  if (!btn) return;
  const mode = btn.dataset.copyLoot;
  if (mode === 'name' && achCurrentPage?.loot) {
    copyToClipboard(achCurrentPage.loot.name, 'Copied name');
  } else if (mode === 'full' && achCurrentPage?.loot) {
    copyToClipboard(formatLootText(achCurrentPage.loot), 'Copied details');
  }
});

function copyToClipboard(text, label) {
  if (!text) { notifyToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(text).then(() => {
    notifyToast((label || 'Copied'));
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    notifyToast((label || 'Copied'));
  });
}

/* Format loot as all-caps text */
function formatLootText(loot) {
  if (!loot) return '';
  return [
    'NAME: ' + (loot.name || '').toUpperCase(),
    'TYPE: ' + (loot.type || 'WONDROUS').toUpperCase(),
    'RARITY: ' + (loot.rarity || 'COMMON').toUpperCase(),
    'DESCRIPTION: ' + (loot.description || ''),
    'EFFECT: ' + (loot.effect || '')
  ].join('\n');
}

/* Show a transient confirmation toast (copy/acknowledge). NOT a notification. */
function notifyToast(message, duration = 3000) {
  const toast = get('ach-toast');
  // This is a confirmation toast, not an achievement notification —
  // strip any click handler left over from a notification toast.
  toast.onclick = null;
  toast.style.cursor = 'default';
  if (message.includes('Copied') || message === 'Copied') {
    get('ach-toast-subtitle').textContent = message;
  } else {
    get('ach-toast-title').textContent = message;
    get('ach-toast-subtitle').textContent = '';
  }
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, duration);
}

/* Show achievement detail panel (NOT the full modal, just the detail within modal) */
function showAchievementDetail(achId) {
  const a = state?.achievements?.find(x => x.id === achId);
  if (!a) return;
  
  achCurrentPage = a;
  
  // Hide list tabs, show detail
  document.querySelectorAll('.ach-tab-content').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.ach-detail-panel').forEach(p => p.classList.remove('active'));
  
  // Details (description, loot, gold) stay locked until the DM awards.
  const unlocked = !!a.awardedAt || !!a.isArchived;
  
  const statusBadge = a.awardedAt ? '✓ AWARDED' : (a.notifyPlayerAt ? '🔔 NOTIFICATION' : 'PENDING');
  
  let bodyHtml = '';
  let actionBtns = '';
  
  if (unlocked) {
    // Full details
    const goldLine = (a.rewards?.gold) ? `<div class="ach-detail-gold">${a.rewards.gold} gp awarded</div>` : '';
    let lootHtml = '';
    if (a.loot && a.loot.name) {
      lootHtml = `
        <div class="ach-detail-loot">
          <div class="ach-detail-loot-label">Loot Details</div>
          <div class="ach-detail-loot-text">${escapeHtml(formatLootText(a.loot))}</div>
          <div class="ach-detail-actions" style="gap:0.4rem;margin-top:0.5rem;">
            <button class="btn-copy-loot" data-copy-loot="name">📋 Copy Name</button>
            <button class="btn-copy-loot" data-copy-loot="full">📋 Copy All</button>
          </div>
        </div>`;
    }
    bodyHtml = `
      <div class="ach-detail-desc">${escapeHtml(a.description || '')}</div>
      ${goldLine}
      ${lootHtml}`;
    // Archived items are read-only; only awarded-not-acked shows the button
    if (a.awardedAt && !a.isArchived) {
      actionBtns = `<button class="btn-ach-action" onclick="markAcknowledgedAch('${escapeForAttr(a.id)}')">OK, GOT IT</button>`;
    }
  } else {
    // Locked: notification pending. Title only, no flavor/loot/gold yet.
    bodyHtml = `
      <div class="ach-detail-desc" style="font-style:italic;color:var(--muted);">
        You've earned something. The DM will reveal the details when it's awarded.
      </div>`;
    actionBtns = `<button class="btn-ach-action" onclick="markAcknowledgedAch('${escapeForAttr(a.id)}')">OK, I SAW IT</button>`;
  }
  
  const detail = document.createElement('div');
  detail.className = 'ach-detail-panel active';
  detail.innerHTML = `
    <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:0;margin-bottom:0.5rem;" onclick="backToList();">← Back to List</button>
    <div class="ach-detail-name">${escapeHtml(a.name)}</div>
    <div style="font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em;">${statusBadge}</div>
    ${bodyHtml}
    <div class="ach-detail-actions">${actionBtns}</div>
  `;
  
  document.querySelector('.ach-modal').insertBefore(detail, document.querySelector('.ach-modal-tabs').nextElementSibling);
}

function backToList() {
  document.querySelectorAll('.ach-detail-panel').forEach(p => p.remove());
  switchAchTab('new');
}

function openModal() {
  get('modal-overlay').classList.remove('hidden');
  switchAchTab('new');
}

function closeModal() {
  get('modal-overlay').classList.add('hidden');
  document.querySelectorAll('.ach-detail-panel').forEach(p => p.remove());
}

function switchAchTab(tab) {
  // Toggle the content panels...
  get('ach-tab-new').classList.toggle('active', tab === 'new');
  get('ach-tab-archive').classList.toggle('active', tab === 'archive');
  // ...and the tab buttons themselves (this drives the purple underline).
  document.querySelectorAll('.ach-modal-tabs .ach-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  populateAchList(tab);
}

function populateAchList(tab) {
  if (!state?.achievements || !player) return;

  const list = tab === 'new'
    ? state.achievements.filter(a => {
        if (a.isArchived) return false;
        // Show if player earned it or it's unassigned (party achievement)
        const isUnassigned = !a.earnedBy || typeof a.earnedBy === 'boolean' || Object.keys(a.earnedBy).length === 0;
        if (!isUnassigned && !a.earnedBy[player.id]) return false;
        // Only show if NOT acknowledged OR not yet awarded
        return !a.acknowledgedBy?.includes(player.id) || !a.awardedAt;
      })
    : state.achievements.filter(a => {
        if (!a.isArchived) return false;
        // Show archived if player earned it or it's unassigned
        const isUnassigned = !a.earnedBy || typeof a.earnedBy === 'boolean' || Object.keys(a.earnedBy).length === 0;
        if (!isUnassigned && !a.earnedBy[player.id]) return false;
        return true;
      });

  const container = tab === 'new' ? get('ach-list-new') : get('ach-list-archive');
  const empty     = tab === 'new' ? get('ach-empty-new') : get('ach-empty-archive');

  if (!list.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  container.innerHTML = list.map(a => {
    const earnedTs  = a.earnedBy && player ? a.earnedBy[player.id] : null;
    const earnedStr = earnedTs ? new Date(earnedTs).toLocaleDateString() : 'Party achievement';
    
    let statusClass = '';
    let statusIcon = '';
    if (a.notifyPlayerAt && !a.awardedAt) {
      statusClass = 'notified';
      statusIcon = '🔔';
    } else if (a.awardedAt) {
      statusClass = 'awarded';
      statusIcon = '✓';
    }
    
    // Details (flavor text) stay hidden until the DM awards.
    const unlocked = !!a.awardedAt || !!a.isArchived;
    const descHtml = unlocked
      ? `<div class="ach-item-desc">${escapeHtml(a.description || '')}</div>`
      : `<div class="ach-item-desc" style="font-style:italic;opacity:0.7;">Details locked until awarded</div>`;
    
    return `
      <div class="ach-item" onclick="showAchievementDetail('${escapeForAttr(a.id)}');">
        <div style="font-size:0.7rem;color:var(--muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.05em;">${statusIcon} ${statusClass.toUpperCase()}</div>
        <div class="ach-item-name">${escapeHtml(a.name || 'Achievement')}</div>
        ${descHtml}
        <div class="ach-item-earned">Earned: ${escapeHtml(earnedStr)}</div>
      </div>`;
  }).join('');
}

async function markAcknowledgedAch(achId) {
  if (!state || !player) return;
  const ach = state.achievements?.find(a => a.id === achId);
  if (!ach) return;
  
  // Mark acknowledged locally
  if (!ach.acknowledgedBy) ach.acknowledgedBy = [];
  if (!ach.acknowledgedBy.includes(player.id)) ach.acknowledgedBy.push(player.id);
  // Remember this notify-wave so poll merges can't resurrect it; a future
  // DM re-notify produces a new notifyPlayerAt and therefore a new key.
  _acknowledgedLocally.add(_notifyKey(ach));
  
  // Silence the notification toast immediately (kill click handler + hide)
  const toast = get('ach-toast');
  toast.onclick = null;
  toast.style.cursor = 'default';
  toast.classList.remove('show');
  
  // POST to worker to sync KV
  try {
    await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'acknowledge_achievement',
        achievementId: achId,
        characterId: player.id
      })
    });
  } catch (e) {
    console.error('Post acknowledge failed:', e);
  }
  
  // Update UI
  updateAchPill();
  backToList();
  notifyToast('Achievement acknowledged');
}

/* Poll for achievement state changes every 12s */
function startAchievementPolling() {
  if (pollAchInterval) clearInterval(pollAchInterval);
  
  pollAchInterval = setInterval(async () => {
    try {
      const res = await fetch(WORKER_URL);
      if (res.ok) {
        const newState = await res.json();
        // Merge achievements only (don't lose local character state)
        if (newState.achievements) {
          state.achievements = newState.achievements;
          // Re-apply any acks made locally this session so a slow KV write
          // can't resurrect a notification the player already dismissed. Keyed
          // to the notify-wave, so a DM re-notify is not suppressed.
          if (player) {
            state.achievements.forEach(a => {
              if (_acknowledgedLocally.has(_notifyKey(a))) {
                if (!Array.isArray(a.acknowledgedBy)) a.acknowledgedBy = [];
                if (!a.acknowledgedBy.includes(player.id)) a.acknowledgedBy.push(player.id);
              }
            });
          }
        }
        // Process any new notifications
        processAchievementNotifications();
        updateAchPill();
        // Refresh list if modal is open
        if (!get('modal-overlay').classList.contains('hidden')) {
          populateAchList('new');
        }
      }
    } catch (e) {
      console.error('Achievement poll failed:', e);
    }
  }, 5000);
}

/* Build a key unique to a given notification "wave" so a re-notify pops fresh */
function _notifyKey(a) {
  return a.id + '|' + (a.notifyPlayerAt || '');
}

/* Show toast for pending notifications (deduped per notify-wave) */
function processAchievementNotifications() {
  if (!state?.achievements || !player) return;
  
  const unaware = state.achievements.find(a => {
    // Must have an active notification
    if (!a.notifyPlayerAt) return false;
    // Player must have earned it (or it's a party achievement)
    if (a.earnedBy && typeof a.earnedBy === 'object' && !a.earnedBy[player.id]) return false;
    // Not archived
    if (a.isArchived) return false;
    // Already acknowledged on the server → silent
    if (a.acknowledgedBy?.includes(player.id)) return false;
    // Acknowledged locally this session for THIS notify-wave → silent
    if (_acknowledgedLocally.has(_notifyKey(a))) return false;
    // Already toasted this exact notify-wave → don't re-pop every poll
    if (_toastShownFor.has(_notifyKey(a))) return false;
    return true;
  });
  
  if (unaware) {
    _toastShownFor.add(_notifyKey(unaware));
    showNotificationToast(unaware);
  }
}

function showNotificationToast(ach) {
  const toast = get('ach-toast');
  get('ach-toast-title').textContent = '🏆 YOU EARNED: ' + (ach.name || 'Achievement');
  get('ach-toast-subtitle').textContent = 'Click to view details';
  toast.style.cursor = 'pointer';
  toast.classList.add('show');
  
  // Clicking toast opens modal and shows detail
  toast.onclick = () => {
    openModal();
    showAchievementDetail(ach.id);
    toast.onclick = null;
    toast.style.cursor = 'default';
    toast.classList.remove('show');
  };
  
  // Auto-hide after 8s (handler cleared so it can't fire stale)
  setTimeout(() => {
    toast.classList.remove('show');
    toast.onclick = null;
    toast.style.cursor = 'default';
  }, 8000);
}

/* ══════════════════════════════
   PLAYER MESSAGING (V5.1.3)
   Polls Worker every 3s when logged in.
   Messages queue locally, shown one at a time.
   Acknowledge deletes from KV immediately.
══════════════════════════════ */
let _pendingMessages = [];
let _msgPollInterval = null;

async function checkPlayerMessages() {
  if (!playerName) return;
  try {
    const r = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_player_messages', playerName })
    });
    if (!r.ok) return;
    const data = await r.json();
    if (!data.messages || !data.messages.length) return;
    // Enqueue only IDs not already in local queue
    const existingIds = new Set(_pendingMessages.map(m => m.id));
    data.messages.forEach(m => { if (!existingIds.has(m.id)) _pendingMessages.push(m); });
    // Show first message if modal is not already open
    if (_pendingMessages.length > 0 && get('sys-msg-overlay').style.display !== 'flex') {
      showNextSystemMessage();
    }
  } catch (e) {
    console.warn('[HUD] Message poll error:', e.message);
  }
}

function showNextSystemMessage() {
  if (!_pendingMessages.length) return;
  get('sys-msg-text').textContent = _pendingMessages[0].text;
  get('sys-msg-overlay').style.display = 'flex';
}

async function acknowledgeSystemMessage() {
  if (!_pendingMessages.length) return;
  const msg = _pendingMessages.shift();
  get('sys-msg-overlay').style.display = 'none';
  try {
    await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'clear_player_message', playerName, messageId: msg.id })
    });
  } catch (e) {
    console.warn('[HUD] Acknowledge error:', e.message);
  }
  // Show next queued message after brief pause
  if (_pendingMessages.length > 0) setTimeout(showNextSystemMessage, 350);
}

function startMessagePolling() {
  if (_msgPollInterval) clearInterval(_msgPollInterval);
  checkPlayerMessages(); // immediate check on login
  _msgPollInterval = setInterval(checkPlayerMessages, 3000);
}

function stopMessagePolling() {
  if (_msgPollInterval) { clearInterval(_msgPollInterval); _msgPollInterval = null; }
  _pendingMessages = [];
  get('sys-msg-overlay').style.display = 'none';
}

function escapeHtml(text) {
  if (!text) return '';
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return text.replace(/[&<>"']/g, c => map[c]);
}

function escapeForAttr(text) {
  if (!text) return '';
  return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ══════════════════════════════
   INVENTORY (V5.3)
══════════════════════════════ */
function openInventoryModal() {
  renderInventoryList();
  get('inv-modal-overlay').classList.remove('hidden');
}

function closeInventoryModal() {
  const el = get('inv-modal-overlay');
  if (el) el.classList.add('hidden');
}

function renderInventoryList() {
  const list = get('inv-list');
  const inv  = (player?.inventory || []).filter(it => !it.isDeleted);
  if (!inv.length) {
    list.innerHTML = '<p class="inv-empty">No items in inventory.</p>';
    return;
  }
  list.innerHTML = inv.map(it => {
    const meta = [it.type, it.rarity].filter(Boolean).join(' · ');
    const qty  = (it.quantity > 1) ? ` ×${it.quantity}` : '';
    const desc = it.mechanics?.text || it.description || '';
    return `<div class="inv-item-row">` +
      `<div class="inv-item-name">${x(it.name)}${qty}</div>` +
      (meta ? `<div class="inv-item-meta">${x(meta)}</div>` : '') +
      (desc ? `<div class="inv-item-desc">${x(desc)}</div>` : '') +
      `</div>`;
  }).join('');
}

/* ══════════════════════════════
   TICKER
══════════════════════════════ */
async function fetchTickerData() {
  try {
    const res = await fetch(TICKER_URL);
    if (res.ok) tickData = await res.json();
  } catch (e) { console.warn('[HUD] Ticker fetch:', e.message); }
}

function randomTip() {
  if (!tickData?.tips?.length) return 'Stay calm. Extraction in progress.';
  return tickData.tips[Math.floor(Math.random() * tickData.tips.length)];
}

function randomMsg() {
  if (!tickData) return 'DUNGEON BROADCAST SYSTEM — stand by.';
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  return `${pick(tickData.subjects)} ${pick(tickData.actions)} ${pick(tickData.results)}`;
}

function initTicker() {
  const visible = localStorage.getItem(T_KEY) !== 'false';
  const pill = get('ticker-pill');
  const eye  = get('ticker-eye-icon');
  get('ticker-eye').classList.remove('hidden'); // eye always visible once logged in
  if (eye) eye.setAttribute('href', visible ? '#icon-eye' : '#icon-eye-hidden');
  if (visible) {
    pill.classList.remove('hidden');
    rotateTick();
    tickTimer = setInterval(rotateTick, TICKER_MS);
  } else {
    pill.classList.add('hidden');
  }
}

function rotateTick() {
  const textEl = get('ticker-text');
  if (!textEl) return;
  textEl.textContent = randomMsg();
}

function toggleTicker(e) {
  if (e) e.stopPropagation();
  const pill    = get('ticker-pill');
  const eye     = get('ticker-eye-icon');
  const visible = !pill.classList.contains('hidden');
  if (visible) {
    pill.classList.add('hidden');
    if (eye) eye.setAttribute('href', '#icon-eye-hidden');
    localStorage.setItem(T_KEY, 'false');
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
  } else {
    pill.classList.remove('hidden');
    if (eye) eye.setAttribute('href', '#icon-eye');
    localStorage.setItem(T_KEY, 'true');
    rotateTick();
    tickTimer = setInterval(rotateTick, TICKER_MS);
  }
}

/* ══════════════════════════════
   UTILITIES
══════════════════════════════ */
const get = id => document.getElementById(id);

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function x(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
