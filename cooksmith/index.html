<!-- ============================================================ App JS -->
<script type="module">
/* ------------------------------------------------------------ constants */
const API_BASE = 'https://api.cooksmith.kzick.dev';
const TOKEN_KEY = 'cooksmith::token';

const APPLIANCE_COLORS = {
  'Suvie':      '#4A90D9',
  'Stovetop':   '#E8563A',
  'Microwave':  '#9B59B6',
  'Oven':       '#F39C12',
  'Air Fryer':  '#27AE60',
  'Grill':      '#C0392B',
  'Instant Pot':'#2C3E50',
  'custom':     '#7F8C8D',
};

const APPLIANCE_LIST = ['Suvie','Stovetop','Microwave','Oven','Air Fryer','Grill','Instant Pot','custom'];
const CATEGORY_LIST  = ['protein','side','veggie','sauce','grain','other'];

const ERROR_MESSAGES = {
  AUTH_REQUIRED:       'You need to be logged in to do that.',
  AUTH_INVALID:        'Your session has expired. Please log in again.',
  AUTH_FORBIDDEN:      'You don\'t have permission to do that.',
  USER_NOT_FOUND:      'User not found.',
  USER_EXISTS:         'That username or email is already taken.',
  RECIPE_NOT_FOUND:    'Recipe not found.',
  RECIPE_FORBIDDEN:    'You don\'t own this recipe.',
  COMPONENT_NOT_FOUND: 'Component not found.',
  COMPONENT_FORBIDDEN: 'You don\'t own this component.',
  IMAGE_TOO_LARGE:     'Image must be under 10 MB.',
  IMAGE_TYPE_INVALID:  'Accepted image types: JPEG, PNG, WebP, GIF.',
  IMPORT_INVALID:      'Import data is invalid or incomplete.',
  VALIDATION_ERROR:    'Please check your input and try again.',
  INTERNAL_ERROR:      'Something went wrong on the server.',
};

/* ------------------------------------------------------------ global state */
const AppState = {
  currentUser: null,
  currentView: null,
  token: null,
};

/* ------------------------------------------------------------ icon helper */
function icon(id, cls = '') {
  return `<svg class="${cls}" aria-hidden="true"><use href="#icon-${id}"/></svg>`;
}

/* ------------------------------------------------------------ api client */
async function api(method, path, body = undefined) {
  const headers = {};
  if (body !== undefined) headers['Content-Type'] = 'application/json';
  if (AppState.token) headers['Authorization'] = `Bearer ${AppState.token}`;

  const res = await fetch(`${API_BASE}${path}`, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });

  if (res.status === 204) return {};

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    const err = data && data.error ? data : {
      error: true, code: 'INTERNAL_ERROR',
      message: `Request failed (${res.status})`, status: res.status,
    };
    if (err.code === 'AUTH_REQUIRED' || err.code === 'AUTH_INVALID') {
      clearAuth();
      renderNav();
      route('#home');
    }
    throw err;
  }

  return data;
}

async function uploadImage(uploadUrl, file) {
  const form = new FormData();
  form.append('file', file);
  const res = await fetch(uploadUrl, { method: 'POST', body: form });
  if (!res.ok) throw { code: 'INTERNAL_ERROR', message: 'Image upload failed.', status: res.status };
  return res;
}

/* ------------------------------------------------------------ auth helpers */
function clearAuth() {
  AppState.token = null;
  AppState.currentUser = null;
  localStorage.removeItem(TOKEN_KEY);
}

function setAuth(token, user) {
  AppState.token = token;
  AppState.currentUser = user;
  localStorage.setItem(TOKEN_KEY, token);
}

/* ------------------------------------------------------------ toast */
function toast(message, type = 'default') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = message;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show'); }); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3200);
}

/* ------------------------------------------------------------ nav */
function renderNav() {
  const navRight = document.getElementById('nav-right');
  const adminLink = document.getElementById('nav-admin-link');
  const sheetContent = document.getElementById('mobile-sheet-content');

  if (AppState.currentUser) {
    const user = AppState.currentUser;
    const avatarHtml = user.avatar_url
      ? `<img src="${user.avatar_url}" alt="${user.username}">`
      : icon('user');

    navRight.innerHTML = `
      <a href="#profile/${user.username}" class="nav-user">
        <span class="nav-avatar">${avatarHtml}</span>
        ${user.username}
      </a>
      <a href="#settings" class="btn btn-ghost btn-sm">${icon('settings')} Settings</a>
      <button class="btn btn-ghost btn-sm" id="logout-btn">${icon('logout')} Log out</button>
    `;

    if (user.role === 'admin') adminLink.classList.remove('hidden');
    else adminLink.classList.add('hidden');

    sheetContent.innerHTML = `
      <a href="#profile/${user.username}" class="sheet-item">${icon('user')} ${user.username}</a>
      <a href="#settings" class="sheet-item">${icon('settings')} Settings</a>
      ${user.role === 'admin' ? `<a href="#admin" class="sheet-item">${icon('shield')} Admin</a>` : ''}
      <button class="sheet-item danger" id="mobile-logout-btn">${icon('logout')} Log out</button>
    `;

    document.getElementById('logout-btn')?.addEventListener('click', handleLogout);
    document.getElementById('mobile-logout-btn')?.addEventListener('click', handleLogout);
  } else {
    navRight.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="nav-login-btn">Log in</button>
      <button class="btn btn-primary btn-sm" id="nav-register-btn">Register</button>
    `;
    adminLink.classList.add('hidden');
    sheetContent.innerHTML = `
      <button class="sheet-item" id="mobile-login-btn">${icon('user')} Log in</button>
    `;

    document.getElementById('nav-login-btn')?.addEventListener('click', () => showAuthModal('login'));
    document.getElementById('nav-register-btn')?.addEventListener('click', () => showAuthModal('register'));
    document.getElementById('mobile-login-btn')?.addEventListener('click', () => {
      closeMobileSheet();
      showAuthModal('login');
    });
  }

  updateNavActive();
}

function updateNavActive() {
  const hash = location.hash.replace('#', '') || 'home';
  const routeBase = hash.split('/')[0];

  document.querySelectorAll('.nav-link[data-route]').forEach(el => {
    el.classList.toggle('active', el.dataset.route === routeBase);
  });
  document.querySelectorAll('.mobile-nav-btn[data-route]').forEach(el => {
    el.classList.toggle('active', el.dataset.route === routeBase);
  });
}

/* ------------------------------------------------------------ mobile sheet */
const mobileSheetOverlay = document.getElementById('mobile-sheet-overlay');

function openMobileSheet() {
  mobileSheetOverlay.classList.add('open');
}
function closeMobileSheet() {
  mobileSheetOverlay.classList.remove('open');
}
mobileSheetOverlay.addEventListener('click', e => {
  if (e.target === mobileSheetOverlay) closeMobileSheet();
});
document.getElementById('mobile-profile-btn').addEventListener('click', () => {
  if (AppState.currentUser) {
    openMobileSheet();
  } else {
    showAuthModal('login');
  }
});

/* ------------------------------------------------------------ confirm modal */
function showConfirmModal({ title, body, confirmLabel = 'Confirm', danger = true, onConfirm }) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.innerHTML = `
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <button class="btn btn-ghost btn-icon" id="cm-close">${icon('close')}</button>
      </div>
      <div class="modal-body"><p style="color:var(--text-secondary);font-size:.88rem;">${body}</p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cm-cancel">Cancel</button>
        <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="cm-confirm">${confirmLabel}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#cm-close').addEventListener('click', close);
  overlay.querySelector('#cm-cancel').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#cm-confirm').addEventListener('click', async () => {
    const btn = overlay.querySelector('#cm-confirm');
    btn.disabled = true;
    await onConfirm();
    close();
  });
}


async function handleLogout() {
  try {
    await api('POST', '/auth/logout');
  } catch { /* token may already be expired */ }
  clearAuth();
  renderNav();
  toast('Logged out.');
  route('#home');
}

/* ------------------------------------------------------------ auth modal */
let authModal = null;

function showAuthModal(mode = 'login') {
  closeMobileSheet();
  if (authModal) authModal.remove();

  authModal = document.createElement('div');
  authModal.className = 'modal-overlay open';
  authModal.innerHTML = buildAuthModal(mode);
  document.body.appendChild(authModal);

  authModal.querySelector('#auth-close').addEventListener('click', () => {
    authModal.remove(); authModal = null;
  });
  authModal.addEventListener('click', e => {
    if (e.target === authModal) { authModal.remove(); authModal = null; }
  });

  const form = authModal.querySelector('#auth-form');
  form.addEventListener('submit', e => handleAuthSubmit(e, mode));

  authModal.querySelector('#auth-toggle')?.addEventListener('click', () => {
    authModal.remove(); authModal = null;
    showAuthModal(mode === 'login' ? 'register' : 'login');
  });

  // Focus first field
  requestAnimationFrame(() => {
    const first = authModal.querySelector('input');
    first?.focus();
  });
}

function buildAuthModal(mode) {
  const isLogin = mode === 'login';
  return `
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">${isLogin ? 'Log in' : 'Create account'}</span>
        <button class="btn btn-ghost btn-icon" id="auth-close">${icon('close')}</button>
      </div>
      <form id="auth-form">
        <div class="modal-body">
          ${!isLogin ? `<div class="form-group">
            <label for="auth-username">Username</label>
            <input type="text" id="auth-username" name="username" autocomplete="username" required />
          </div>` : ''}
          <div class="form-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" name="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" name="password" autocomplete="${isLogin ? 'current-password' : 'new-password'}" required />
          </div>
          <div class="form-error hidden" id="auth-error"></div>
        </div>
        <div class="modal-footer" style="justify-content:space-between;align-items:center;">
          <button type="button" class="btn btn-ghost btn-sm" id="auth-toggle">
            ${isLogin ? 'Need an account? Register' : 'Have an account? Log in'}
          </button>
          <button type="submit" class="btn btn-primary" id="auth-submit">
            ${isLogin ? 'Log in' : 'Register'}
          </button>
        </div>
      </form>
    </div>
  `;
}

async function handleAuthSubmit(e, mode) {
  e.preventDefault();
  const form = e.target;
  const errEl = form.querySelector('#auth-error');
  const submitBtn = form.querySelector('#auth-submit');
  errEl.classList.add('hidden');
  errEl.textContent = '';
  submitBtn.disabled = true;
  const origLabel = submitBtn.textContent;
  submitBtn.textContent = mode === 'login' ? 'Logging in…' : 'Creating account…';

  const email = form.querySelector('#auth-email').value.trim();
  const password = form.querySelector('#auth-password').value;
  const body = { email, password };
  if (mode === 'register') {
    body.username = form.querySelector('#auth-username').value.trim();
  }

  try {
    const path = mode === 'login' ? '/auth/login' : '/auth/register';
    const data = await api('POST', path, body);
    setAuth(data.token, data.user);
    renderNav();
    authModal?.remove(); authModal = null;
    toast(`Welcome, ${data.user.username}!`, 'success');
    route(location.hash || '#home');
  } catch (err) {
    const msg = ERROR_MESSAGES[err.code] || err.message || 'Something went wrong.';
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.textContent = origLabel;
  }
}

/* ------------------------------------------------------------ router */
const ROUTES = [
  { pattern: /^home$|^$/, view: viewHome },
  { pattern: /^recipe\/(.+)$/, view: viewRecipe, param: 1 },
  { pattern: /^my-recipes$/, view: viewMyRecipes },
  { pattern: /^components$/, view: viewComponents },
  { pattern: /^builder$/, view: viewBuilder },
  { pattern: /^profile\/(.+)$/, view: viewProfile, param: 1 },
  { pattern: /^settings$/, view: viewSettings },
  { pattern: /^admin$/, view: viewAdmin },
];

function route(hash) {
  if (hash && hash !== location.hash) {
    location.hash = hash;
  } else {
    router();
  }
}

function router() {
  const raw = (location.hash || '#home').replace(/^#/, '').replace(/\/+$/, '');

  for (const r of ROUTES) {
    const m = raw.match(r.pattern);
    if (m) {
      const param = r.param ? m[r.param] : undefined;
      AppState.currentView = raw.split('/')[0];
      setSidebar(false);
      r.view(param);
      updateNavActive();
      return;
    }
  }

  // Unknown route → home
  location.hash = '#home';
}

window.addEventListener('hashchange', router);

/* ------------------------------------------------------------ sidebar helper */
function setSidebar(visible, contentHtml = '') {
  const sidebar = document.getElementById('sidebar');
  const body = document.body;
  if (visible) {
    sidebar.innerHTML = contentHtml;
    sidebar.classList.add('visible');
    body.classList.add('has-sidebar');
  } else {
    sidebar.innerHTML = '';
    sidebar.classList.remove('visible');
    body.classList.remove('has-sidebar');
  }
}

/* ------------------------------------------------------------ view helpers */
function setView(html) {
  document.getElementById('view-container').innerHTML = html;
}

function requireAuth() {
  if (!AppState.currentUser) {
    const intended = location.hash || '#home';
    showAuthModal('login');
    // After successful login, handleAuthSubmit routes to location.hash which
    // will still be the intended route since we haven't navigated away.
    return false;
  }
  return true;
}

function applianceBadge(appliance, customName) {
  const display = appliance === 'custom' ? (customName || 'Custom') : appliance;
  const color = APPLIANCE_COLORS[appliance] || APPLIANCE_COLORS.custom;
  return `<span class="badge badge-appliance" style="background:${color}">${display}</span>`;
}

function visibilityBadge(v) {
  if (v === 'published')     return `<span class="badge badge-published">Published</span>`;
  if (v === 'admin_removed') return `<span class="badge badge-removed">Removed</span>`;
  return `<span class="badge badge-draft">Draft</span>`;
}

    <div id="home-pagination" class="pagination hidden"></div>
  `);

  loadFeed({ page: 1 }).then(() => renderTagPills());

    row.innerHTML = allTags.map(t =>

    ).join('');
    row.querySelectorAll('[data-tag]').forEach(btn => {

        renderTagPills();

let feedData = [];

async function loadFeed({ page = 1, tag = '' } = {}) {
  const grid = document.getElementById('home-grid');
  const pag  = document.getElementById('home-pagination');
  if (!grid) return;
  grid.innerHTML = skeletonCards(8);

  try {
    const params = new URLSearchParams({ page, limit: 12 });
    if (tag) params.set('tag', tag);
    const data = await api('GET', `/recipes?${params}`);
    feedData = data.items || [];

    renderFeedCards(feedData);

    const totalPages = Math.ceil(data.total / data.limit);
    if (totalPages > 1) {
      pag.classList.remove('hidden');
      pag.innerHTML = `
        <button class="btn btn-ghost btn-sm" ${page <= 1 ? 'disabled' : ''} id="pag-prev">${icon('chevron-up')} Prev</button>
        <span class="page-info">${page} / ${totalPages}</span>
        <button class="btn btn-ghost btn-sm" ${page >= totalPages ? 'disabled' : ''} id="pag-next">Next ${icon('chevron-down')}</button>
      `;
      document.getElementById('pag-prev')?.addEventListener('click', () => loadFeed({ page: page - 1, tag }));
      document.getElementById('pag-next')?.addEventListener('click', () => loadFeed({ page: page + 1, tag }));
    } else {
      pag.classList.add('hidden');
    }
  } catch (err) {
    grid.innerHTML = `<div class="empty-state"><p class="empty-state-title">Failed to load recipes.</p></div>`;
  }
}

function renderFeedCards(items) {
  const grid = document.getElementById('home-grid');
  if (!grid) return;
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      ${icon('book')}
      <div class="empty-state-title">No recipes found</div>
      <div class="empty-state-body">Try a different tag or search term.</div>
    </div>`;
    return;

  grid.innerHTML = items.map(r => recipeCard(r)).join('');

/* ------------------------------------------------------------ Gantt renderer */
function renderGantt(container, components, calculateTimeline) {
  const { bars, totalMinutes } = calculateTimeline(components);
  if (!bars.length) { container.innerHTML = ''; return; }

  const ROW_H    = 36;
  const LABEL_W  = 140;
  const AXIS_H   = 28;
  const LEGEND_H = 32;
  const PAD      = 16;

  // Separate floating from sequential
  const floatingBars    = bars.filter(b => b.canStartAnytime);
  const sequentialBars  = bars.filter(b => !b.canStartAnytime);
  const allRows         = [...floatingBars, ...sequentialBars];
  const height          = allRows.length * ROW_H + AXIS_H + LEGEND_H + PAD * 2;
  const WIDTH           = 800;
  const chartW          = WIDTH - LABEL_W - PAD;

  // Compute ticks
  const tickStep = totalMinutes <= 60 ? 5 : 10;
  const ticks = [];
  for (let t = 0; t <= totalMinutes; t += tickStep) ticks.push(t);
  if (ticks[ticks.length - 1] < totalMinutes) ticks.push(totalMinutes);

  const xScale = t => (t / (totalMinutes || 1)) * chartW;

  // Unique appliances for legend
  const appliancesSeen = [...new Set(bars.map(b => b.appliance))];

  let svgContent = `<svg viewBox="0 0 ${WIDTH} ${height}" xmlns="http://www.w3.org/2000/svg" style="width:100%;font-family:system-ui,sans-serif;">`;

  // Background
  svgContent += `<rect width="${WIDTH}" height="${height}" fill="none"/>`;

  // X-axis ticks + gridlines
  ticks.forEach(t => {
    const x = LABEL_W + xScale(t);
    svgContent += `<line x1="${x}" y1="${PAD}" x2="${x}" y2="${PAD + allRows.length * ROW_H}" stroke="#3A3A36" stroke-width="1"/>`;
    svgContent += `<text x="${x}" y="${PAD + allRows.length * ROW_H + 16}" text-anchor="middle" font-size="10" fill="#5E5E56" font-family="ui-monospace,monospace">${t}m</text>`;
  });

  // Divider between floating and sequential
  if (floatingBars.length && sequentialBars.length) {
    const divY = PAD + floatingBars.length * ROW_H;
    svgContent += `<line x1="${LABEL_W - 8}" y1="${divY}" x2="${WIDTH - PAD}" y2="${divY}" stroke="#3A3A36" stroke-width="1" stroke-dasharray="4,4"/>`;
  }

  // Bars
  allRows.forEach((bar, i) => {
    const y   = PAD + i * ROW_H;
    const x   = LABEL_W + xScale(bar.startMin);
    const w   = Math.max(xScale(bar.endMin - bar.startMin), 4);
    const mid = y + ROW_H / 2;

    // Label
    svgContent += `<text x="${LABEL_W - 6}" y="${mid + 4}" text-anchor="end" font-size="11" fill="#9A9A8E" font-family="system-ui,sans-serif">${truncateText(bar.name, 18)}</text>`;

    // Bar rect
    const isFloat = bar.canStartAnytime;
    svgContent += `<rect x="${x}" y="${y + 5}" width="${w}" height="${ROW_H - 10}" rx="3" fill="${bar.color}" opacity="${isFloat ? '0.6' : '0.85'}" ${isFloat ? 'stroke="' + bar.color + '" stroke-dasharray="4,3" fill-opacity="0.35"' : ''}/>`;

    // Duration label inside bar if wide enough
    if (w > 36) {
      svgContent += `<text x="${x + w / 2}" y="${mid + 4}" text-anchor="middle" font-size="10" fill="#fff" font-family="ui-monospace,monospace" opacity="0.9">${bar.endMin - bar.startMin}m</text>`;
    }
  });

  // Legend
  const legendY = PAD + allRows.length * ROW_H + AXIS_H + 4;
  let legendX = LABEL_W;
  appliancesSeen.forEach(app => {
    const color = APPLIANCE_COLORS[app] || APPLIANCE_COLORS.custom;
    const label = app === 'custom' ? 'Custom' : app;
    svgContent += `<rect x="${legendX}" y="${legendY}" width="12" height="12" rx="2" fill="${color}"/>`;
    svgContent += `<text x="${legendX + 16}" y="${legendY + 10}" font-size="10" fill="#9A9A8E" font-family="system-ui,sans-serif">${label}</text>`;
    legendX += label.length * 6.5 + 28;
  });

  svgContent += '</svg>';
  container.innerHTML = svgContent;
  return { totalMinutes };
}

function truncateText(str, max) {
  return str.length > max ? str.slice(0, max - 1) + '…' : str;
}

/* ------------------------------------------------------------ Progress */
function loadProgress(key) {
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return { checked: {} };
    const p = JSON.parse(raw);
    if (p.expires && p.expires < Date.now()) {
      sessionStorage.removeItem(key);
      return { checked: {} };
    }
    return p;
  } catch { return { checked: {} }; }
}

function saveProgress(key, recipeId) {
  const checked = {};
  document.querySelectorAll('.step-item input[type="checkbox"]').forEach(cb => {
    const item = cb.closest('.step-item');
    if (cb.checked) checked[item.dataset.key] = true;
  });
  const expires = Date.now() + 12 * 60 * 60 * 1000;
  sessionStorage.setItem(key, JSON.stringify({ expires, checked }));
}

function viewMyRecipes() {
  if (!requireAuth()) return;
  setView(`
    <div class="view-header">
      <div>
        <div class="view-title">My Recipes</div>
        <div class="view-subtitle">Manage your recipe collection.</div>
      </div>
      <button class="btn btn-primary" id="new-recipe-btn">${icon('plus')} New Recipe</button>
    </div>
    <div id="my-recipes-grid" class="card-grid">${skeletonCards(4)}</div>
  `);

  document.getElementById('new-recipe-btn').addEventListener('click', () => showRecipeModal());

}

async function loadMyRecipes() {
  const grid = document.getElementById('my-recipes-grid');
  if (!grid) return;
  try {
    const data = await api('GET', '/recipes/mine');
    const recipes = data.items || [];
    if (!recipes.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        ${icon('book')}
        <div class="empty-state-title">No recipes yet</div>
        <div class="empty-state-body">Create your first recipe to get started.</div>
        <button class="btn btn-primary" onclick="showRecipeModal()">${icon('plus')} New Recipe</button>
      </div>`;
      return;
    }
    grid.innerHTML = recipes.map(r => myRecipeCard(r)).join('');
    wireMyRecipeCards(recipes);
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-title">Failed to load recipes.</div>
    </div>`;
  }
}

function wireMyRecipeCards(recipes) {
  const grid = document.getElementById('my-recipes-grid');
  if (!grid) return;

  grid.querySelectorAll('.recipe-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = recipes.find(x => x.slug === btn.dataset.slug);
      if (r) showRecipeModal(r);
    });
  });

  grid.querySelectorAll('.recipe-publish-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const r = recipes.find(x => x.slug === btn.dataset.slug);
      if (!r) return;
      try {
        await api('PATCH', `/recipes/${r.slug}/publish`);
        toast(r.visibility === 'published' ? 'Recipe unpublished.' : 'Recipe published.', 'success');
        loadMyRecipes();
      } catch (err) { toast(ERROR_MESSAGES[err.code] || err.message, 'error'); }
    });
  });

  grid.querySelectorAll('.recipe-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = recipes.find(x => x.slug === btn.dataset.slug);
      if (!r) return;
      showConfirmModal({
        title: 'Delete recipe',
        body: `Permanently delete <strong>${r.name}</strong>?`,
        confirmLabel: 'Delete',
        onConfirm: async () => {
          try {
            await api('DELETE', `/recipes/${r.slug}`);
            toast('Recipe deleted.');
            loadMyRecipes();
          } catch (err) { toast(ERROR_MESSAGES[err.code] || err.message, 'error'); }
        },
      });
    });
  });
}

function myRecipeCard(r) {
  const tags = safeParseJSON(r.tags, []);
  const isRemoved = r.visibility === 'admin_removed';
  return `
    <div class="card recipe-card">

        ${r.photo_url ? `<img src="${r.photo_url}" alt="${r.name}">` : icon('image')}

        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">

          ${visibilityBadge(r.visibility)}
        </div>
        ${tags.length ? `<div class="tag-chips">${tags.slice(0,3).map(t => `<span class="badge badge-tag">${t}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-footer">
        <button class="btn btn-ghost btn-sm recipe-edit-btn" data-slug="${r.slug}" ${isRemoved ? 'disabled' : ''}>${icon('edit')}</button>

/* ------------------------------------------------------------ Recipe modal */
async function showRecipeModal(existing = null) {
  // Always fetch fresh component list for the selector
  let components = allComponents;
  if (!components.length) {
    try { const d = await api('GET', '/components'); components = d.items || []; allComponents = components; }
    catch { components = []; }
  }

  // If editing, fetch current recipe components
  let existingComponents = [];
  if (existing) {
    try {
      const d = await api('GET', `/recipes/${existing.slug}`);
      existingComponents = d.components || [];
    } catch { existingComponents = []; }
  }

  const tags = existing ? safeParseJSON(existing.tags, []) : [];
  const isEdit = !!existing;

  // Build meal rows from existing components
  // mealRows: [{component_id, sort_order, name, appliance, custom_appliance_name, duration}]
  let mealRows = existingComponents.map(c => ({
    component_id: c.id,
    sort_order: c.sort_order,
    name: c.name,
    appliance: c.appliance,
    custom_appliance_name: c.custom_appliance_name,
    duration: c.duration,
  }));

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.style.cssText = 'align-items:flex-start;padding-top:40px;';
  overlay.innerHTML = `
    <div class="modal" style="max-width:640px;">
      <div class="modal-header">
        <span class="modal-title">${isEdit ? 'Edit recipe' : 'New recipe'}</span>
        <button class="btn btn-ghost btn-icon" id="rm-close">${icon('close')}</button>
      </div>
      <div class="modal-body" style="max-height:75vh;overflow-y:auto;">
        <div class="form-group">
          <label for="rm-name">Recipe name</label>
          <input type="text" id="rm-name" value="${existing?.name || ''}" maxlength="120" required />
        </div>
        <div class="form-group">
          <label for="rm-description">Description</label>
          <textarea id="rm-description" rows="2">${existing?.description || ''}</textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="rm-servings">Servings</label>
            <input type="number" id="rm-servings" value="${existing?.servings || 1}" min="1" max="100" />
          </div>
          <div class="form-group">
            <label for="rm-tags">Tags <span class="form-hint" style="display:inline;">(comma-separated)</span></label>
            <input type="text" id="rm-tags" value="${tags.join(', ')}" placeholder="weeknight, chicken…" />
          </div>
        </div>
        <div class="form-group">
          <label for="rm-notes">Notes</label>
          <textarea id="rm-notes" rows="2">${existing?.notes || ''}</textarea>
        </div>

        ${isEdit ? `
        <div class="form-group">
          <label>Photo</label>
          <div style="display:flex;align-items:center;gap:var(--s3);">
            ${existing?.photo_url ? `<img src="${existing.photo_url}" style="width:72px;height:48px;object-fit:cover;border-radius:var(--r1);border:1px solid var(--border);">` : ''}
            <label class="btn btn-ghost btn-sm" style="cursor:pointer;">
              ${icon('upload')} ${existing?.photo_url ? 'Replace photo' : 'Upload photo'}
              <input type="file" id="rm-photo" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;" />
            </label>
            <span id="rm-photo-status" class="text-sm text-muted"></span>
          </div>
        </div>
        ` : ''}

        <div class="form-group">
          <label>Components <span class="form-hint" style="display:inline;">— drag order controls cook sequence</span></label>
          <div id="rm-meal-rows" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">
            ${mealRows.length ? '' : '<p class="text-sm text-muted" id="rm-no-components">No components added yet.</p>'}
          </div>
          <div style="position:relative;">
            ${icon('search')}
            <input type="search" id="rm-comp-search" placeholder="Search your components to add…"
              style="padding-left:32px;background:var(--surface-2);" />
          </div>
          <div id="rm-comp-list" class="component-select-list" style="margin-top:6px;max-height:200px;"></div>
        </div>

        <div class="form-error hidden" id="rm-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="rm-cancel">Cancel</button>
        <button class="btn btn-primary" id="rm-save">${isEdit ? 'Save changes' : 'Create recipe'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.querySelector('#rm-close').addEventListener('click', close);
  overlay.querySelector('#rm-cancel').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  // Render initial meal rows
  renderMealRows();

  // Component search
  const compSearch = overlay.querySelector('#rm-comp-search');
  const compList   = overlay.querySelector('#rm-comp-list');
  renderCompPicker('');
  compSearch.addEventListener('input', () => renderCompPicker(compSearch.value));

  function renderCompPicker(q) {
    const lower = q.toLowerCase();
    const filtered = components.filter(c =>
      (!lower || c.name.toLowerCase().includes(lower)) &&
      !mealRows.find(r => r.component_id === c.id)
    );
    compList.innerHTML = filtered.slice(0, 20).map(c => `
      <div class="component-select-item" data-id="${c.id}">
        <div class="component-select-item-name">${c.name}</div>
        ${applianceBadge(c.appliance, c.custom_appliance_name)}
        <span class="data-time">${icon('clock')} ${c.duration}m</span>
        <button class="btn btn-ghost btn-sm" data-id="${c.id}">${icon('plus')}</button>
      </div>
    `).join('');
    compList.querySelectorAll('[data-id]').forEach(el => {
      el.addEventListener('click', () => {
        const c = components.find(x => x.id === +el.dataset.id);
        if (!c) return;
        const maxOrder = mealRows.length ? Math.max(...mealRows.map(r => r.sort_order)) : -1;
        mealRows.push({ component_id: c.id, sort_order: maxOrder + 1, name: c.name,
          appliance: c.appliance, custom_appliance_name: c.custom_appliance_name, duration: c.duration });
        renderMealRows();
        renderCompPicker(compSearch.value);
        compSearch.value = '';
      });
    });
  }

  function renderMealRows() {
    const container = overlay.querySelector('#rm-meal-rows');
    if (!mealRows.length) {
      container.innerHTML = '<p class="text-sm text-muted" id="rm-no-components">No components added yet.</p>';
      return;
    }
    // Sort by sort_order then render
    mealRows.sort((a, b) => a.sort_order - b.sort_order);
    container.innerHTML = mealRows.map((row, i) => {
      const prevOrder = i > 0 ? mealRows[i-1].sort_order : null;
      const isParallel = prevOrder !== null && row.sort_order === prevOrder;
      return `
        <div class="meal-row" data-idx="${i}">
          <div style="display:flex;flex-direction:column;gap:2px;">
            <button class="btn btn-ghost btn-icon meal-up" data-idx="${i}" ${i === 0 ? 'disabled' : ''}>${icon('chevron-up')}</button>
            <button class="btn btn-ghost btn-icon meal-down" data-idx="${i}" ${i === mealRows.length-1 ? 'disabled' : ''}>${icon('chevron-down')}</button>
          </div>
          <div class="meal-row-name">
            <div style="font-weight:500;font-size:.87rem;">${row.name}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
              ${applianceBadge(row.appliance, row.custom_appliance_name)}
              <span class="data-time">${icon('clock')} ${row.duration}m</span>
            </div>
          </div>
          ${i > 0 ? `
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.75rem;color:var(--text-muted);white-space:nowrap;">
            <input type="checkbox" class="parallel-toggle" data-idx="${i}" ${isParallel ? 'checked' : ''} style="width:auto;accent-color:var(--accent);" />
            parallel
          </label>` : '<span style="width:72px;"></span>'}
          <button class="btn btn-ghost btn-icon meal-remove" data-idx="${i}" style="color:var(--danger);">${icon('close')}</button>
        </div>
      `;
    }).join('');

    // Wire row controls
    container.querySelectorAll('.meal-up').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = +btn.dataset.idx;
        if (i === 0) return;
        [mealRows[i], mealRows[i-1]] = [mealRows[i-1], mealRows[i]];
        reassignOrders();
        renderMealRows();
        renderCompPicker(compSearch.value);
      });
    });
    container.querySelectorAll('.meal-down').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = +btn.dataset.idx;
        if (i >= mealRows.length - 1) return;
        [mealRows[i], mealRows[i+1]] = [mealRows[i+1], mealRows[i]];
        reassignOrders();
        renderMealRows();
        renderCompPicker(compSearch.value);
      });
    });
    container.querySelectorAll('.parallel-toggle').forEach(cb => {
      cb.addEventListener('change', () => {
        const i = +cb.dataset.idx;
        if (cb.checked) {
          mealRows[i].sort_order = mealRows[i-1].sort_order;
        } else {
          mealRows[i].sort_order = mealRows[i-1].sort_order + 1;
          // Shift everything after up
          for (let j = i+1; j < mealRows.length; j++) mealRows[j].sort_order++;
        }
        renderMealRows();
      });
    });
    container.querySelectorAll('.meal-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        mealRows.splice(+btn.dataset.idx, 1);
        reassignOrders();
        renderMealRows();
        renderCompPicker(compSearch.value);
      });
    });
  }

  function reassignOrders() {
    // Re-index sort_orders 0,1,2... preserving parallel groups
    let order = 0;
    mealRows.forEach((row, i) => {
      row.sort_order = i === 0 ? 0 : order;
      if (i > 0) order++;
      else order = 1;
    });
    // simpler: just set sequential orders; parallel toggle handles grouping
    mealRows.forEach((row, i) => { row.sort_order = i; });
  }

  // Photo upload (edit mode only)
  const photoInput = overlay.querySelector('#rm-photo');
  if (photoInput) {
    photoInput.addEventListener('change', async () => {
      const file = photoInput.files[0];
      if (!file) return;
      const status = overlay.querySelector('#rm-photo-status');
      status.textContent = 'Uploading…';
      try {
        const { uploadUrl, deliveryUrl } = await api('POST', `/recipes/${existing.slug}/photo`, {
          contentType: file.type, size: file.size,
        });
        await uploadImage(uploadUrl, file);
        await api('PUT', `/recipes/${existing.slug}`, { photo_url: deliveryUrl });
        existing.photo_url = deliveryUrl;
        status.textContent = 'Photo updated.';
        const img = overlay.querySelector('img');
        if (img) img.src = deliveryUrl;
        else status.insertAdjacentHTML('beforebegin',
          `<img src="${deliveryUrl}" style="width:72px;height:48px;object-fit:cover;border-radius:var(--r1);border:1px solid var(--border);">`);
      } catch (err) {
        status.textContent = ERROR_MESSAGES[err.code] || err.message;
        status.style.color = 'var(--danger)';
      }
    });
  }

  // Save
  overlay.querySelector('#rm-save').addEventListener('click', async () => {
    const errEl  = overlay.querySelector('#rm-error');
    const saveBtn = overlay.querySelector('#rm-save');
    errEl.classList.add('hidden');

    const name = overlay.querySelector('#rm-name').value.trim();
    if (!name) { errEl.textContent = 'Recipe name is required.'; errEl.classList.remove('hidden'); return; }

    const tagsRaw = overlay.querySelector('#rm-tags').value;
    const body = {
      name,
      description: overlay.querySelector('#rm-description').value.trim(),
      servings: parseInt(overlay.querySelector('#rm-servings').value, 10) || 1,
      tags: tagsRaw.split(',').map(t => t.trim()).filter(Boolean),
      notes: overlay.querySelector('#rm-notes').value.trim(),
      components: mealRows.map(r => ({ component_id: r.component_id, sort_order: r.sort_order })),
    };

    saveBtn.disabled = true;
    saveBtn.textContent = isEdit ? 'Saving…' : 'Creating…';
    try {
      if (isEdit) {
        await api('PUT', `/recipes/${existing.slug}`, body);
        toast('Recipe updated.', 'success');
      } else {
        const data = await api('POST', '/recipes', body);
        toast('Recipe created.', 'success');
        close();
        route(`#recipe/${data.recipe.slug}`);
        return;
      }
      close();
      loadMyRecipes();
    } catch (err) {
      errEl.textContent = ERROR_MESSAGES[err.code] || err.message;
      errEl.classList.remove('hidden');
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? 'Save changes' : 'Create recipe';
    }
  });

  requestAnimationFrame(() => overlay.querySelector('#rm-name')?.focus());
}

// Expose for empty-state inline onclick
window.showRecipeModal = showRecipeModal;



/* ------------------------------------------------------------ Components */
function viewComponents() {
  if (!requireAuth()) return;
  setView(`
    <div class="view-header">
      <div>
        <div class="view-title">Component Library</div>
        <div class="view-subtitle">Reusable cooking steps for any appliance.</div>
      </div>
      <button class="btn btn-primary" id="new-component-btn">${icon('plus')} New Component</button>
    </div>
    <div class="filter-row">
      <div class="search-wrap">
        ${icon('search')}
        <input type="search" id="comp-search" placeholder="Search components…" />
      </div>
      <select id="comp-cat-filter">
        <option value="">All categories</option>
        ${CATEGORY_LIST.map(c => `<option>${c}</option>`).join('')}
      </select>
      <select id="comp-app-filter">
        <option value="">All appliances</option>
        ${APPLIANCE_LIST.map(a => `<option>${a}</option>`).join('')}
      </select>
    </div>
    <div id="components-grid" class="card-grid">${skeletonCards(6)}</div>
  `);

  document.getElementById('new-component-btn').addEventListener('click', () => showComponentModal());
  loadComponents();

  let compTimer;
  document.getElementById('comp-search').addEventListener('input', () => {
    clearTimeout(compTimer);
    compTimer = setTimeout(filterComponents, 200);
  });
  document.getElementById('comp-cat-filter').addEventListener('change', filterComponents);
  document.getElementById('comp-app-filter').addEventListener('change', filterComponents);
}

let allComponents = [];

async function loadComponents() {
  const grid = document.getElementById('components-grid');
  if (!grid) return;
  try {
    const data = await api('GET', '/components');
    allComponents = data.items || [];
    renderComponents(allComponents);
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-title">Failed to load components.</div></div>`;
  }
}

function filterComponents() {
  const q   = document.getElementById('comp-search')?.value.toLowerCase() || '';
  const cat = document.getElementById('comp-cat-filter')?.value || '';
  const app = document.getElementById('comp-app-filter')?.value || '';
  renderComponents(allComponents.filter(c =>
    (!q   || c.name.toLowerCase().includes(q)) &&
    (!cat || c.category === cat) &&
    (!app || c.appliance === app)
  ));
}

function renderComponents(items) {
  const grid = document.getElementById('components-grid');
  if (!grid) return;
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      ${icon('grid')}
      <div class="empty-state-title">No components found</div>
      <div class="empty-state-body">Add your first cooking component to build recipes.</div>
    </div>`;
    return;
  }
  grid.innerHTML = items.map(c => componentCard(c)).join('');
  grid.querySelectorAll('.comp-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const c = allComponents.find(x => x.id === +btn.dataset.id);
      if (c) showComponentModal(c);
    });
  });
  grid.querySelectorAll('.comp-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const c = allComponents.find(x => x.id === +btn.dataset.id);
      if (!c) return;
      showConfirmModal({
        title: 'Delete component',
        body: `Delete <strong>${c.name}</strong>? It will be removed from any recipes that use it.`,
        confirmLabel: 'Delete',
        onConfirm: async () => {
          try {
            await api('DELETE', `/components/${c.id}`);
            toast('Component deleted.');
            await loadComponents();
          } catch (err) {
            toast(ERROR_MESSAGES[err.code] || err.message, 'error');
          }
        },
      });
    });
  });
}

function componentCard(c) {
  const steps = safeParseJSON(c.steps, []);
  return `
    <div class="card">
      <div class="card-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;">
          <div style="font-weight:600;font-size:.9rem;">${c.name}</div>
          <span class="badge" style="text-transform:capitalize;background:var(--surface-2);color:var(--text-secondary);border:1px solid var(--border);flex-shrink:0;">${c.category}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${applianceBadge(c.appliance, c.custom_appliance_name)}
          <span class="data-time">${icon('clock')} ${c.duration} min</span>
          ${c.can_start_anytime ? '<span class="badge badge-tag">Flexible</span>' : ''}
        </div>
        <div class="text-sm text-muted" style="margin-top:8px;">${steps.length} step${steps.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="card-footer">
        <button class="btn btn-ghost btn-sm comp-edit-btn" data-id="${c.id}">${icon('edit')}</button>
        <button class="btn btn-ghost btn-sm comp-del-btn" data-id="${c.id}" style="color:var(--danger);margin-left:auto;">${icon('trash')}</button>
      </div>
    </div>
  `;
}

/* ------------------------------------------------------------ Component modal */
function showComponentModal(existing = null, prefill = null) {
  // prefill: data from another user's component to copy (Extract as Component)
  const src = existing || prefill || {};
  const isEdit = !!existing;
  const steps = safeParseJSON(src.steps, []);
  const isCustom = src.appliance === 'custom';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.innerHTML = `
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <span class="modal-title">${isEdit ? 'Edit component' : 'New component'}</span>
        <button class="btn btn-ghost btn-icon" id="comp-modal-close">${icon('close')}</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group" style="grid-column:1/-1;">
            <label for="cm-name">Name</label>
            <input type="text" id="cm-name" value="${src.name || ''}" maxlength="120" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="cm-category">Category</label>
            <select id="cm-category">
              ${CATEGORY_LIST.map(c => `<option ${src.category === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label for="cm-appliance">Appliance</label>
            <select id="cm-appliance">
              ${APPLIANCE_LIST.map(a => `<option ${src.appliance === a ? 'selected' : ''}>${a}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group ${isCustom ? '' : 'hidden'}" id="cm-custom-wrap">
          <label for="cm-custom-name">Custom appliance name</label>
          <input type="text" id="cm-custom-name" value="${src.custom_appliance_name || ''}" maxlength="60" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="cm-duration">Duration (minutes)</label>
            <input type="number" id="cm-duration" value="${src.duration ?? 0}" min="0" max="1440" />
          </div>
          <div class="form-group" style="justify-content:flex-end;padding-top:20px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;">
              <input type="checkbox" id="cm-anytime" ${src.can_start_anytime ? 'checked' : ''} style="width:auto;" />
              <span style="font-size:.85rem;color:var(--text-secondary);">Flexible start</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>Steps</label>
          <div class="steps-editor" id="cm-steps-editor">
            ${steps.map((s, i) => stepEditRow(s, i)).join('')}
          </div>
          <button type="button" class="btn btn-ghost btn-sm" id="cm-add-step" style="margin-top:6px;">${icon('plus')} Add step</button>
        </div>
        <div class="form-group">
          <label for="cm-notes">Notes</label>
          <textarea id="cm-notes" rows="3">${src.notes || ''}</textarea>
        </div>
        <div class="form-error hidden" id="cm-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="comp-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="comp-modal-save">${isEdit ? 'Save changes' : 'Create component'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.querySelector('#comp-modal-close').addEventListener('click', close);
  overlay.querySelector('#comp-modal-cancel').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  // Appliance → custom name reveal
  const appSel = overlay.querySelector('#cm-appliance');
  const customWrap = overlay.querySelector('#cm-custom-wrap');
  appSel.addEventListener('change', () => {
    customWrap.classList.toggle('hidden', appSel.value !== 'custom');
  });

  // Steps
  const stepsEditor = overlay.querySelector('#cm-steps-editor');
  overlay.querySelector('#cm-add-step').addEventListener('click', () => {
    const idx = stepsEditor.querySelectorAll('.step-edit-row').length;
    stepsEditor.insertAdjacentHTML('beforeend', stepEditRow('', idx));
    stepsEditor.lastElementChild.querySelector('input').focus();
    wireStepRemove(stepsEditor);
  });
  wireStepRemove(stepsEditor);

  // Save
  overlay.querySelector('#comp-modal-save').addEventListener('click', async () => {
    const errEl = overlay.querySelector('#cm-error');
    const saveBtn = overlay.querySelector('#comp-modal-save');
    errEl.classList.add('hidden');

    const name = overlay.querySelector('#cm-name').value.trim();
    if (!name) { errEl.textContent = 'Name is required.'; errEl.classList.remove('hidden'); return; }

    const stepInputs = [...stepsEditor.querySelectorAll('.step-edit-row input[type="text"]')];
    const steps = stepInputs.map(i => i.value.trim()).filter(Boolean);
    const appliance = appSel.value;

    const body = {
      name,
      category: overlay.querySelector('#cm-category').value,
      appliance,
      custom_appliance_name: appliance === 'custom' ? (overlay.querySelector('#cm-custom-name').value.trim() || null) : null,
      duration: parseInt(overlay.querySelector('#cm-duration').value, 10) || 0,
      can_start_anytime: overlay.querySelector('#cm-anytime').checked ? 1 : 0,
      steps,
      notes: overlay.querySelector('#cm-notes').value.trim(),
    };

    saveBtn.disabled = true;
    saveBtn.textContent = isEdit ? 'Saving…' : 'Creating…';
    try {
      if (isEdit) {
        await api('PUT', `/components/${existing.id}`, body);
        toast('Component updated.', 'success');
      } else {
        await api('POST', '/components', body);
        toast('Component created.', 'success');
      }
      close();
      await loadComponents();
    } catch (err) {
      errEl.textContent = ERROR_MESSAGES[err.code] || err.message;
      errEl.classList.remove('hidden');
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? 'Save changes' : 'Create component';
    }
  });

  requestAnimationFrame(() => overlay.querySelector('#cm-name')?.focus());
}

function stepEditRow(value, idx) {
  return `<div class="step-edit-row">
    <input type="text" value="${value.replace(/"/g, '&quot;')}" placeholder="Step ${idx + 1}…" />
    <button type="button" class="btn btn-ghost btn-icon step-remove-btn">${icon('close')}</button>
  </div>`;
}

function wireStepRemove(editor) {
  editor.querySelectorAll('.step-remove-btn').forEach(btn => {
    btn.replaceWith(btn.cloneNode(true)); // de-dupe listeners
  });

let calcTimeline = null;    // cached import

async function loadBuilderComponents() {
  const listEl = document.getElementById('builder-comp-list');
  if (!listEl) return;
  listEl.innerHTML = `<div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="margin-top:6px;"></div>`;
  try {
    if (!allComponents.length) {
      const d = await api('GET', '/components');
      allComponents = d.items || [];
    }
    renderBuilderCompList();
  } catch {
    if (listEl) listEl.innerHTML = `<p class="text-sm text-muted">Failed to load components.</p>`;
  }
}

function renderBuilderCompList() {
  const listEl = document.getElementById('builder-comp-list');
  if (!listEl) return;
  const q   = (document.getElementById('builder-search')?.value || '').toLowerCase();
  const cat = document.getElementById('builder-cat')?.value || '';

  const filtered = allComponents.filter(c =>
    (!q   || c.name.toLowerCase().includes(q)) &&
    (!cat || c.category === cat)
  );

  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty-state" style="padding:var(--s8) 0;">
      ${icon('grid')}
      <div class="empty-state-title" style="font-size:.85rem;">No components found</div>
    </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(c => `
    <div class="component-select-item builder-add-item" data-id="${c.id}" style="cursor:pointer;">
      <div class="component-select-item-name">${c.name}</div>
      ${applianceBadge(c.appliance, c.custom_appliance_name)}
      <span class="data-time" style="white-space:nowrap;">${icon('clock')} ${c.duration}m</span>
      <button class="btn btn-ghost btn-sm" tabindex="-1">${icon('plus')}</button>
    </div>
  `).join('');

  listEl.querySelectorAll('.builder-add-item').forEach(el => {
    el.addEventListener('click', () => {
      const c = allComponents.find(x => x.id === +el.dataset.id);
      if (!c) return;
      const maxOrder = builderMeal.length
        ? Math.max(...builderMeal.map(r => r.sort_order)) + 1 : 0;
      builderMeal.push({
        component_id: c.id, sort_order: maxOrder,
        name: c.name, appliance: c.appliance,
        custom_appliance_name: c.custom_appliance_name, duration: c.duration,
      });
      renderBuilderAssembly();
      updateBuilderGantt();
    });
  });
}

function renderBuilderAssembly() {
  const panel = document.getElementById('builder-assembly');
  const saveBtn = document.getElementById('builder-save-btn');
  if (!panel) return;

  if (saveBtn) saveBtn.disabled = builderMeal.length === 0;

  if (!builderMeal.length) {
    panel.innerHTML = `<div class="empty-state" style="padding:var(--s10) 0;">
      ${icon('layers')}
      <div class="empty-state-title">Nothing here yet</div>
      <div class="empty-state-body">Click a component on the left to add it.</div>
    </div>`;
    return;
  }

  // Sort by sort_order
  builderMeal.sort((a, b) => a.sort_order - b.sort_order);

  panel.innerHTML = builderMeal.map((row, i) => {
    const prevOrder = i > 0 ? builderMeal[i-1].sort_order : null;
    const isParallel = prevOrder !== null && row.sort_order === prevOrder;
    return `
      <div class="meal-row" data-idx="${i}" style="margin-bottom:6px;">
        <div style="display:flex;flex-direction:column;gap:1px;">
          <button class="btn btn-ghost btn-icon bld-up" data-idx="${i}" ${i === 0 ? 'disabled' : ''}>${icon('chevron-up')}</button>
          <button class="btn btn-ghost btn-icon bld-down" data-idx="${i}" ${i === builderMeal.length-1 ? 'disabled' : ''}>${icon('chevron-down')}</button>
        </div>
        <div class="meal-row-name">
          <div style="font-weight:500;font-size:.87rem;">${row.name}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap;">
            ${applianceBadge(row.appliance, row.custom_appliance_name)}
            <span class="data-time">${icon('clock')} ${row.duration}m</span>
          </div>
        </div>
        ${i > 0 ? `
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.72rem;color:var(--text-muted);white-space:nowrap;">
            <input type="checkbox" class="bld-parallel" data-idx="${i}" ${isParallel ? 'checked' : ''}
              style="width:auto;accent-color:var(--accent);" />
            parallel
          </label>` : '<span style="min-width:60px;"></span>'}
        <button class="btn btn-ghost btn-icon bld-remove" data-idx="${i}" style="color:var(--danger);">${icon('close')}</button>
      </div>
    `;
  }).join('');

  // Wire controls
  panel.querySelectorAll('.bld-up').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.idx;
      if (i === 0) return;
      [builderMeal[i], builderMeal[i-1]] = [builderMeal[i-1], builderMeal[i]];
      builderReindex();
      renderBuilderAssembly();
      updateBuilderGantt();
    });
  });
  panel.querySelectorAll('.bld-down').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.idx;
      if (i >= builderMeal.length - 1) return;
      [builderMeal[i], builderMeal[i+1]] = [builderMeal[i+1], builderMeal[i]];
      builderReindex();
      renderBuilderAssembly();
      updateBuilderGantt();
    });
  });
  panel.querySelectorAll('.bld-parallel').forEach(cb => {
    cb.addEventListener('change', () => {
      const i = +cb.dataset.idx;
      if (cb.checked) {
        builderMeal[i].sort_order = builderMeal[i-1].sort_order;
      } else {
        // Give it its own order, shift everything after
        const base = builderMeal[i-1].sort_order + 1;
        for (let j = i; j < builderMeal.length; j++) {
          builderMeal[j].sort_order = base + (j - i);
        }
      }
      renderBuilderAssembly();
      updateBuilderGantt();
    });
  });
  panel.querySelectorAll('.bld-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      builderMeal.splice(+btn.dataset.idx, 1);
      builderReindex();
      renderBuilderAssembly();
      updateBuilderGantt();
    });
  });
}

function builderReindex() {
  builderMeal.forEach((row, i) => { row.sort_order = i; });
}

async function updateBuilderGantt() {
  const container = document.getElementById('builder-gantt');
  const totalEl   = document.getElementById('builder-total-time');
  if (!container) return;

  if (!builderMeal.length) {
    container.innerHTML = '';
    if (totalEl) totalEl.textContent = '';
    return;
  }

  const calc = await getCalcTimeline();
  if (!calc) {
    container.innerHTML = '<p class="text-sm text-muted">Timeline unavailable — timeline.js not found.</p>';
    return;
  }

  const ganttData = builderMeal.map(r => ({
    id: r.component_id, name: r.name, appliance: r.appliance,
    duration: r.duration, can_start_anytime: false, sort_order: r.sort_order,
  }));

  const { totalMinutes } = renderGantt(container, ganttData, calc);
  if (totalEl) totalEl.innerHTML = `${icon('clock')} ${totalMinutes} min total`;
}

  if (!builderMeal.length) return;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.innerHTML = `
    <div class="modal" style="max-width:460px;">
      <div class="modal-header">
        <span class="modal-title">Save as Recipe</span>
        <button class="btn btn-ghost btn-icon" id="bsm-close">${icon('close')}</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="bsm-name">Recipe name</label>
          <input type="text" id="bsm-name" placeholder="My Weeknight Bowl…" maxlength="120" required />
        </div>
        <div class="form-group">
          <label for="bsm-description">Description <span class="form-hint" style="display:inline;">optional</span></label>
          <textarea id="bsm-description" rows="2" placeholder="Quick summary of the meal…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="bsm-servings">Servings</label>

            <label for="bsm-tags">Tags <span class="form-hint" style="display:inline;">comma-sep</span></label>

          </div>
        </div>
        <div class="form-group">
          <label for="bsm-notes">Notes <span class="form-hint" style="display:inline;">optional</span></label>
          <textarea id="bsm-notes" rows="2"></textarea>
        </div>
        <div class="form-error hidden" id="bsm-error"></div>
        <p class="text-sm text-muted" style="margin-top:var(--s2);">Saves as a draft. You can publish it from My Recipes.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="bsm-cancel">Cancel</button>
        <button class="btn btn-primary" id="bsm-save">${icon('check')} Save recipe</button>
      </div>
    </div>
  `;

  const close = () => overlay.remove();
  overlay.querySelector('#bsm-close').addEventListener('click', close);

      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    const tagsRaw = overlay.querySelector('#bsm-tags').value;
    try {
      const data = await api('POST', '/builder/save', {
        name,
        description: overlay.querySelector('#bsm-description').value.trim(),
        servings: parseInt(overlay.querySelector('#bsm-servings').value, 10) || 1,
        tags: tagsRaw.split(',').map(t => t.trim()).filter(Boolean),
        notes: overlay.querySelector('#bsm-notes').value.trim(),
        components: builderMeal.map(r => ({
          component_id: r.component_id,
          sort_order: r.sort_order,
        })),
      });
      builderMeal = [];
      toast('Recipe saved!', 'success');
      close();
      route(`#recipe/${data.recipe.slug}`);
    } catch (err) {
      errEl.textContent = ERROR_MESSAGES[err.code] || err.message;
      errEl.classList.remove('hidden');
      saveBtn.disabled = false;
      saveBtn.textContent = `${icon('check')} Save recipe`;
    }
  });

  requestAnimationFrame(() => overlay.querySelector('#bsm-name')?.focus());
}

async function loadAdminLogs({ page = 1, level = '' } = {}) {
  const wrap = document.getElementById('admin-logs-wrap');
  const pag  = document.getElementById('admin-logs-pag');
  if (!wrap) return;
  try {
    const params = new URLSearchParams({ page, limit: 50 });
    if (level) params.set('level', level);
    const data = await api('GET', `/admin/errors?${params}`);
    const items = data.items || [];

    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state">${icon('check')}<div class="empty-state-title">No logs</div></div>`;
      pag.classList.add('hidden');
      return;
    }

    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>Time</th><th>Level</th><th>Context</th><th>Message</th></tr></thead>
          <tbody>
            ${items.map(l => `
              <tr class="expandable-row" onclick="this.querySelector('.expand-content')?.classList.toggle('hidden')">
                <td class="font-mono text-sm" style="white-space:nowrap;">${l.created_at?.slice(0,19)}</td>
                <td><span class="badge badge-${l.level}">${l.level}</span></td>
                <td class="text-sm">${l.context}</td>
                <td class="text-sm">
                  ${l.message}
                  ${l.stack ? `<div class="expand-content hidden">${l.stack}</div>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;

    const totalPages = Math.ceil(data.total / data.limit);
    if (totalPages > 1) {
      pag.classList.remove('hidden');
      pag.innerHTML = `
        <button class="btn btn-ghost btn-sm" ${page <= 1 ? 'disabled' : ''} id="log-pag-prev">${icon('chevron-up')} Prev</button>
        <span class="page-info">${page} / ${totalPages}</span>
        <button class="btn btn-ghost btn-sm" ${page >= totalPages ? 'disabled' : ''} id="log-pag-next">Next ${icon('chevron-down')}</button>
      `;
      document.getElementById('log-pag-prev')?.addEventListener('click', () => loadAdminLogs({ page: page-1, level }));
      document.getElementById('log-pag-next')?.addEventListener('click', () => loadAdminLogs({ page: page+1, level }));
    } else {
      pag.classList.add('hidden');
    }
  } catch (err) {
    wrap.innerHTML = `<div class="form-error">Failed to load logs.</div>`;
  }
}

/* ------------------------------------------------------------ utils */
function safeParseJSON(val, fallback) {
  if (Array.isArray(val) || (val && typeof val === 'object')) return val;
  try { return JSON.parse(val); } catch { return fallback; }
}

/* ============================================================ Boot */
async function boot() {
  const savedToken = localStorage.getItem(TOKEN_KEY);
  if (savedToken) {
    AppState.token = savedToken;
    try {
      const { user } = await api('GET', '/auth/me');
      AppState.currentUser = user;
    } catch {
      clearAuth();
    }
  }

  renderNav();
  router();
}

boot();
</script>
