<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCID Forge | Dictionary Review v2.0</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'><path d='M32 52 L32 12 M32 52 L12 26 M32 52 L52 26' stroke='%2330d158' stroke-width='6' stroke-linecap='round'/><circle cx='32' cy='52' r='6' fill='%2330d158'/><circle cx='32' cy='12' r='6' fill='%2330d158'/><circle cx='12' cy='26' r='6' fill='%2330d158'/><circle cx='52' cy='26' r='6' fill='%2330d158'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --glass: rgba(255,255,255,0.03);
      --glass-hover: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.06);
      --text-main: #f5f5f7;
      --text-muted: #86868b;
      --accent: #5e5ce6;
      --success: #30d158;
      --danger: #ff453a;
      --warning: #ff9500;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      padding: 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-bar h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-bar h1 span {
      font-size: 10px;
      background: var(--warning);
      color: #000;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .header-meta { font-size: 12px; color: var(--text-muted); }
    .back-btn {
      background: var(--glass);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .back-btn:hover { color: var(--text-main); background: var(--glass-hover); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      flex: 1;
      min-width: 80px;
    }
    .stat-chip .n { font-size: 24px; font-weight: 700; display: block; line-height: 1; margin-bottom: 4px; }
    .stat-chip .l { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-chip.s-high  .n { color: var(--success); }
    .stat-chip.s-med   .n { color: var(--warning); }
    .stat-chip.s-low   .n { color: var(--danger);  }
    .stat-chip.s-done  .n { color: var(--accent);  }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-tabs {
      display: flex;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .ftab {
      padding: 7px 14px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
    }
    .ftab.active { background: var(--glass-hover); color: var(--text-main); }
    .ftab .cnt { font-size: 10px; margin-left: 4px; opacity: 0.6; }
    .search-input {
      flex: 1;
      min-width: 180px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 9px 12px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* ── REVIEW ROWS ── */
    .review-list { display: flex; flex-direction: column; gap: 10px; }

    .rrow {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      transition: border-color 0.2s, opacity 0.3s, max-height 0.4s;
      overflow: hidden;
    }
    .rrow:hover { border-color: rgba(255,255,255,0.1); }
    .rrow.submitting { opacity: 0.4; pointer-events: none; }
    .rrow.flash-ok { border-color: var(--success); background: rgba(48,209,88,0.05); }
    .rrow.collapsing { opacity: 0; max-height: 0 !important; padding: 0; margin: 0; }

    /* Row top meta */
    .rmeta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .cbadge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .cbadge.low    { background: rgba(255,69,58,0.15);  color: var(--danger);  border: 1px solid var(--danger); }
    .cbadge.medium { background: rgba(255,149,0,0.15); color: var(--warning); border: 1px solid var(--warning); }
    .sbadge {
      font-size: 10px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .rslug {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
    }
    .rsizes {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .rnotes {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* Row fields */
    .rfields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .fg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
    }
    .fg.wide { flex: 2; min-width: 160px; }
    .flabel {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .finput {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 8px 10px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .finput:focus { border-color: var(--accent); }
    option { background: var(--bg); color: var(--text-main); }

    /* Row actions */
    .ractions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
    }
    .rbtn {
      padding: 8px 16px;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--glass-border);
      transition: 0.15s;
      background: var(--glass);
      color: var(--text-muted);
    }
    .rbtn:hover { background: var(--glass-hover); color: var(--text-main); }
    .rbtn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .rbtn.primary:hover { opacity: 0.85; }

    /* ── EMPTY / ERROR / LOADER ── */
    .center-state {
      text-align: center;
      padding: 60px 20px;
    }
    .center-state .icon { font-size: 44px; margin-bottom: 14px; }
    .center-state h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .center-state p { color: var(--text-muted); font-size: 13px; line-height: 1.6; }
    .center-state.ok h2 { color: var(--success); }
    .center-state.err h2 { color: var(--danger); }
    .center-state.warn h2 { color: var(--warning); }

    #loader {
      text-align: center;
      padding: 50px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header-bar">
    <div class="header-left">
      <a href="index.html" class="back-btn">← Dashboard</a>
      <h1>LUCID FORGE <span>v2.0</span></h1>
    </div>
    <div class="header-meta" id="headerMeta">Loading vault...</div>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="ftab active" data-f="all"    onclick="setFilter('all')">All <span class="cnt" id="cAll">—</span></button>
      <button class="ftab"        data-f="low"    onclick="setFilter('low')">Low <span class="cnt" id="cLow">—</span></button>
      <button class="ftab"        data-f="medium" onclick="setFilter('medium')">Medium <span class="cnt" id="cMed">—</span></button>
    </div>
    <input type="text" class="search-input" id="searchInput"
      placeholder="Search slug, brand, or strain..."
      oninput="applyFilters()">
  </div>

  <!-- CONTENT AREA -->
  <div id="loader">Fetching vault data...</div>
  <div id="reviewList" class="review-list"></div>
  <div id="statusState" style="display:none;"></div>

<script>
  const WORKER_URL = "https://dispo.askozicki.workers.dev";

  const T2_OPTS = {
    'Flower':   ['Flower','Smalls','Ground','Mini-Buds','Smalls (Sale)','Flower (Sale)','Mini-Buds (Sale)','Strain of the Week'],
    'Pre-Roll': ['Standard Pre-Roll','Infused Pre-Roll','Pre-Roll Pack'],
    'Vape':     ['Distillate Vape','Resin Vape','Rosin Vape','Disposable'],
    'Extract':  ['Live Resin','Live Rosin','Distillate','Badder','Sugar','Hash'],
    'Edible':   ['Edible','Gummy','Chocolate','Beverage','Capsule'],
    'Tincture': ['Tincture','RSO'],
    'Topical':  ['Topical','Lotion','Patch'],
    'Gear':     ['Accessories','Apparel','Papers / Wraps','Other']
  };

  let allItems   = [];
  let vaultMeta  = {};
  let activeFilter = 'all';
  let sessionDone  = 0;

  // ── INIT ────────────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(`${WORKER_URL}/vault`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const vault = await res.json();

      vaultMeta = {
        timestamp:        vault.lastUpdated || vault.timestamp || null,
        totalItems:       vault.totalItems  || 0,
        confidenceCounts: vault.confidenceCounts || null,
        storeCounts:      vault.storeCounts || {}
      };

      const inventory = vault.inventory || {};
      const hasConf   = Object.values(inventory).some(i => i.confidence);

      document.getElementById('loader').style.display = 'none';

      if (!hasConf) {
        showState('warn',
          '⚠ Vault needs a refresh',
          'This vault was captured before confidence scoring was added. Run an ingest from the Dashboard to generate new scored data, then reload this page.'
        );
        renderStats(null);
        return;
      }

      allItems = processVaultData(inventory);
      renderStats(vaultMeta.confidenceCounts);
      updateCounts();
      applyFilters();

    } catch (err) {
      document.getElementById('loader').style.display = 'none';
      showState('err', 'Failed to load vault', err.message);
    }
  }

  // ── DATA ─────────────────────────────────────────────────────────────
  function processVaultData(inventory) {
    const map = {};

    Object.entries(inventory).forEach(([key, item]) => {
      if (!item.confidence || item.confidence === 'high') return;

      const at   = key.lastIndexOf('@');
      const slug = at !== -1 ? key.substring(0, at) : key;
      const size = at !== -1 ? key.substring(at + 1) : 'N/A';

      if (!map[slug]) {
        map[slug] = {
          slug,
          brand:      item.brand   || '',
          strain:     item.strain  || '',
          store:      item.store   || '',
          confidence: item.confidence,
          parseNotes: item.parseNotes  || '',
          suggestedT2: item.suggestedT2 || '',
          sizes:  [],
          prices: [],
          _done: false
        };
      } else {
        // escalate: low beats medium
        if (item.confidence === 'low') map[slug].confidence = 'low';
      }

      if (size && size !== 'N/A' && !map[slug].sizes.includes(size))          map[slug].sizes.push(size);
      if (item.price && !map[slug].prices.includes(`$${item.price}`))         map[slug].prices.push(`$${item.price}`);
    });

    return Object.values(map).sort((a, b) => {
      if (a.confidence !== b.confidence) return a.confidence === 'low' ? -1 : 1;
      return a.brand.localeCompare(b.brand);
    });
  }

  // ── STATS ────────────────────────────────────────────────────────────
  function renderStats(cc) {
    const ts  = vaultMeta.timestamp ? new Date(vaultMeta.timestamp).toLocaleString() : '—';
    document.getElementById('headerMeta').textContent = `Last ingest: ${ts}`;

    const high = cc?.high   || 0;
    const med  = cc?.medium || 0;
    const low  = cc?.low    || 0;

    document.getElementById('statsBar').innerHTML = `
      <div class="stat-chip">
        <span class="n">${vaultMeta.totalItems}</span>
        <span class="l">Total</span>
      </div>
      <div class="stat-chip s-high">
        <span class="n">${high}</span>
        <span class="l">High</span>
      </div>
      <div class="stat-chip s-med">
        <span class="n">${med}</span>
        <span class="l">Medium</span>
      </div>
      <div class="stat-chip s-low">
        <span class="n">${low}</span>
        <span class="l">Low</span>
      </div>
      <div class="stat-chip s-done">
        <span class="n" id="sessionCount">0</span>
        <span class="l">Reviewed</span>
      </div>`;
  }

  function updateCounts() {
    const visible = allItems.filter(i => !i._done);
    const low     = visible.filter(i => i.confidence === 'low').length;
    const med     = visible.filter(i => i.confidence === 'medium').length;
    document.getElementById('cAll').textContent = visible.length;
    document.getElementById('cLow').textContent = low;
    document.getElementById('cMed').textContent = med;
  }

  // ── FILTER / RENDER ───────────────────────────────────────────────────
  function setFilter(mode) {
    activeFilter = mode;
    document.querySelectorAll('.ftab').forEach(t =>
      t.classList.toggle('active', t.dataset.f === mode)
    );
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();

    const visible = allItems.filter(item => {
      if (item._done) return false;
      if (activeFilter === 'low'    && item.confidence !== 'low')    return false;
      if (activeFilter === 'medium' && item.confidence !== 'medium') return false;
      if (q && !item.slug.includes(q)
            && !item.brand.toLowerCase().includes(q)
            && !item.strain.toLowerCase().includes(q)) return false;
      return true;
    });

    const list = document.getElementById('reviewList');

    if (visible.length === 0 && allItems.filter(i => !i._done).length === 0) {
      list.innerHTML = '';
      showState('ok', '✓ All items reviewed',
        'No low or medium confidence items remain. Inventory taxonomy is fully verified.');
      return;
    }

    if (visible.length === 0) {
      list.innerHTML = `<div class="center-state"><p style="color:var(--text-muted);padding:40px 0;">No items match the current filter.</p></div>`;
      hideState();
      return;
    }

    hideState();
    list.innerHTML = visible.map(renderRow).join('');
  }

  // ── ROW RENDERER ──────────────────────────────────────────────────────
  function renderRow(item) {
    const t1d  = guessT1(item);
    const t2d  = item.suggestedT2 || T2_OPTS[t1d]?.[0] || '';
    const typed = guessType(item);
    const sizes = item.sizes.length ? item.sizes.join(', ') : 'N/A';
    const safe  = CSS.escape(item.slug);

    const t1Opts   = Object.keys(T2_OPTS).map(k =>
      `<option value="${k}"${k === t1d ? ' selected' : ''}>${k}</option>`).join('');

    const t2Opts   = (T2_OPTS[t1d] || []).map(v =>
      `<option value="${v}"${v === t2d ? ' selected' : ''}>${v}</option>`).join('');

    const typeOpts = ['Indica','Sativa','Hybrid','N/A'].map(v =>
      `<option value="${v}"${v === typed ? ' selected' : ''}>${v}</option>`).join('');

    return `
    <div class="rrow" id="row-${safe}" data-slug="${esc(item.slug)}">
      <div class="rmeta">
        <span class="cbadge ${item.confidence}">${item.confidence}</span>
        <span class="sbadge">${esc(item.store)}</span>
        <span class="rslug">${esc(item.slug)}</span>
        <span class="rsizes">${esc(sizes)}</span>
      </div>
      <div class="rnotes">⚙ ${esc(item.parseNotes || 'No parse notes')}</div>
      <div class="rfields">
        <div class="fg wide">
          <span class="flabel">Brand</span>
          <input class="finput" type="text" data-f="brand" value="${esc(item.brand)}">
        </div>
        <div class="fg wide">
          <span class="flabel">Strain</span>
          <input class="finput" type="text" data-f="strain" value="${esc(item.strain)}">
        </div>
        <div class="fg">
          <span class="flabel">T1 Category</span>
          <select class="finput" data-f="t1"
            onchange="syncT2(this)">${t1Opts}</select>
        </div>
        <div class="fg">
          <span class="flabel">T2 Format</span>
          <select class="finput" data-f="t2">${t2Opts}</select>
        </div>
        <div class="fg">
          <span class="flabel">Genetics</span>
          <select class="finput" data-f="type">${typeOpts}</select>
        </div>
      </div>
      <div class="ractions">
        <button class="rbtn" onclick="skipRow('${esc(item.slug)}')">Skip</button>
        <button class="rbtn primary" onclick="saveRow('${esc(item.slug)}')">Save to Dict →</button>
      </div>
    </div>`;
  }

  // ── T2 SYNC ───────────────────────────────────────────────────────────
  function syncT2(t1El) {
    const row  = t1El.closest('.rrow');
    const t2El = row.querySelector('[data-f="t2"]');
    const opts = (T2_OPTS[t1El.value] || []).map(v => `<option value="${v}">${v}</option>`).join('');
    t2El.innerHTML = opts;
  }

  // ── GUESS HELPERS ─────────────────────────────────────────────────────
  function guessT1(item) {
    const s = item.slug;
    if (item.sizes.length === 1 && ['0.5g','0.75g','1.75g','4.2g'].includes(item.sizes[0])) return 'Pre-Roll';
    if (/vape|cart|distillate/.test(s))   return 'Vape';
    if (/edible|gummy|chocolate/.test(s)) return 'Edible';
    if (/tincture|rso|oral/.test(s))      return 'Tincture';
    if (/topical|lotion/.test(s))         return 'Topical';
    if (/paper|wrap|gear|apparel/.test(s))return 'Gear';
    return 'Flower';
  }

  function guessType(item) {
    const s = item.strain.toLowerCase();
    if (/indica/.test(s))                                          return 'Indica';
    if (/sativa|jack|haze|dream|durban|orange|citrus/.test(s))    return 'Sativa';
    return 'Hybrid';
  }

  // ── ACTIONS ───────────────────────────────────────────────────────────
  async function saveRow(slug) {
    const rowEl = document.getElementById(`row-${CSS.escape(slug)}`);
    if (!rowEl) return;

    const get = f => rowEl.querySelector(`[data-f="${f}"]`)?.value || '';
    const payload = {
      slug,
      t1:     get('t1'),
      t2:     get('t2'),
      type:   get('type'),
      brand:  get('brand').trim(),
      strain: get('strain').trim()
    };

    if (!payload.t1 || !payload.type) {
      alert('T1 Category and Genetics are required.');
      return;
    }

    rowEl.classList.add('submitting');

    try {
      const res    = await fetch(`${WORKER_URL}/dictionary-entry`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      const result = await res.json();

      if (result.success) {
        const item = allItems.find(i => i.slug === slug);
        if (item) item._done = true;

        rowEl.classList.remove('submitting');
        rowEl.classList.add('flash-ok');

        sessionDone++;
        const el = document.getElementById('sessionCount');
        if (el) el.textContent = sessionDone;
        updateCounts();

        setTimeout(() => {
          rowEl.classList.add('collapsing');
          setTimeout(() => applyFilters(), 420);
        }, 700);
      } else {
        rowEl.classList.remove('submitting');
        alert(`Save failed: ${result.message}`);
      }
    } catch (err) {
      rowEl.classList.remove('submitting');
      alert(`Network error: ${err.message}`);
    }
  }

  function skipRow(slug) {
    const rowEl = document.getElementById(`row-${CSS.escape(slug)}`);
    const item  = allItems.find(i => i.slug === slug);
    if (item)  item._done = true;
    if (rowEl) {
      rowEl.classList.add('collapsing');
      setTimeout(() => { updateCounts(); applyFilters(); }, 280);
    }
  }

  // ── UTILS ─────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showState(type, title, body) {
    const el = document.getElementById('statusState');
    el.style.display = 'block';
    el.innerHTML = `
      <div class="center-state ${type}">
        <div class="icon">${type === 'ok' ? '✓' : type === 'err' ? '✗' : '⚠'}</div>
        <h2>${title}</h2>
        <p>${body}</p>
      </div>`;
  }

  function hideState() {
    document.getElementById('statusState').style.display = 'none';
  }

  init();
</script>
</body>
</html>
