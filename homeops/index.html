<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0d0f14"/>
<title>Household Ops // v1.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
/* =========================================================
   DESIGN TOKENS
   ========================================================= */
:root {
  --bg-primary:     #0d0f14;
  --bg-card:        #161a23;
  --bg-elevated:    #1e2330;
  --bg-input:       #252b3b;
  --accent-primary: #4f8ef7;
  --accent-success: #3ecf8e;
  --accent-warn:    #f5a623;
  --accent-danger:  #e5534b;
  --accent-gold:    #f0c040;
  --text-primary:   #e8eaf0;
  --text-secondary: #8b93a8;
  --text-muted:     #4a5168;
  --text-danger:    #e5534b;
  --border:         #252b3b;
  --border-active:  #4f8ef7;
  --radius-card:    12px;
  --radius-btn:     8px;
  --radius-pill:    999px;
  --font-display:   'Barlow Condensed', system-ui, sans-serif;
  --font-body:      'DM Sans', system-ui, sans-serif;
  --safe-bottom:    env(safe-area-inset-bottom, 0px);
  --nav-height:     64px;
}

/* =========================================================
   RESET & BASE
   ========================================================= */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overscroll-behavior:none; }
body { font-family:var(--font-body); font-size:16px; background:var(--bg-primary); color:var(--text-primary); line-height:1.5; -webkit-font-smoothing:antialiased; }
#app { min-height:100svh; position:relative; }
button { cursor:pointer; font-family:var(--font-body); border:none; background:none; color:inherit; touch-action:manipulation; }
button:focus-visible { outline:2px solid var(--accent-primary); outline-offset:2px; border-radius:var(--radius-btn); }
input,select { font-family:var(--font-body); color:var(--text-primary); }
a { color:var(--accent-primary); text-decoration:none; }

/* =========================================================
   TYPOGRAPHY
   ========================================================= */
.display-xl { font-family:var(--font-display); font-size:3rem; font-weight:800; line-height:1; letter-spacing:-0.02em; }
.display-lg { font-family:var(--font-display); font-size:2rem; font-weight:700; line-height:1.1; }
.display-md { font-family:var(--font-display); font-size:1.4rem; font-weight:600; line-height:1.2; }
.body-lg    { font-family:var(--font-body); font-size:1rem; font-weight:500; line-height:1.5; }
.body-md    { font-family:var(--font-body); font-size:0.9rem; font-weight:400; line-height:1.5; }
.label      { font-family:var(--font-body); font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; line-height:1; }
.text-primary   { color:var(--text-primary); }
.text-secondary { color:var(--text-secondary); }
.text-muted     { color:var(--text-muted); }
.text-danger    { color:var(--text-danger); }
.text-success   { color:var(--accent-success); }
.text-gold      { color:var(--accent-gold); }
.hidden { display:none !important; }

/* =========================================================
   ICONS
   ========================================================= */
.icon { display:inline-block; vertical-align:middle; flex-shrink:0; }

/* =========================================================
   BUTTONS
   ========================================================= */
.btn-primary   { display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; background:var(--accent-primary); color:#fff; font-family:var(--font-body); font-weight:600; font-size:0.9rem; border:none; border-radius:var(--radius-btn); padding:0.75rem 1.5rem; cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
.btn-primary:active { opacity:0.85; transform:scale(0.97); }
.btn-secondary { display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; background:var(--bg-elevated); color:var(--text-primary); font-family:var(--font-body); font-weight:600; font-size:0.9rem; border:1px solid var(--border); border-radius:var(--radius-btn); padding:0.75rem 1.5rem; cursor:pointer; transition:opacity 0.15s; }
.btn-secondary:active { opacity:0.8; }
.btn-danger    { display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; background:rgba(229,83,75,0.1); color:var(--accent-danger); font-family:var(--font-body); font-weight:600; font-size:0.9rem; border:1px solid var(--accent-danger); border-radius:var(--radius-btn); padding:0.75rem 1.5rem; cursor:pointer; }
.icon-btn      { display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:var(--radius-btn); color:var(--text-secondary); transition:background 0.15s; }
.icon-btn:active { background:var(--bg-elevated); }

/* =========================================================
   FORM FIELDS
   ========================================================= */
.field-label   { display:block; color:var(--text-secondary); margin-bottom:0.4rem; margin-top:1.1rem; }
.field-input   { display:block; width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-btn); padding:0.7rem 0.9rem; color:var(--text-primary); font-size:1rem; transition:border-color 0.15s; }
.field-input:focus { outline:none; border-color:var(--accent-primary); }
.field-input::placeholder { color:var(--text-muted); }
.field-select  { display:block; width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-btn); padding:0.7rem 0.9rem; color:var(--text-primary); font-size:0.9rem; appearance:none; }

/* =========================================================
   TOGGLE
   ========================================================= */
.toggle-label  { display:flex; align-items:center; gap:0.6rem; cursor:pointer; }
.toggle-label input[type="checkbox"] { display:none; }
.toggle-track  { width:44px; height:26px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-pill); position:relative; transition:background 0.2s,border-color 0.2s; }
.toggle-track::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--text-muted); transition:transform 0.2s,background 0.2s; }
.toggle-label input:checked + .toggle-track { background:rgba(79,142,247,0.2); border-color:var(--accent-primary); }
.toggle-label input:checked + .toggle-track::after { transform:translateX(18px); background:var(--accent-primary); }

/* =========================================================
   CHIPS
   ========================================================= */
.chip-group { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.25rem; }
.chip { padding:0.4rem 0.9rem; border-radius:var(--radius-pill); border:1px solid var(--border); background:var(--bg-input); font-family:var(--font-body); font-size:0.82rem; font-weight:600; color:var(--text-secondary); cursor:pointer; text-transform:capitalize; transition:all 0.15s; }
.chip:active { transform:scale(0.95); }
.chip.selected { border-color:var(--accent-primary); color:var(--accent-primary); background:rgba(79,142,247,0.12); }
.chip.diff-easy.selected   { border-color:var(--accent-success); color:var(--accent-success); background:rgba(62,207,142,0.1); }
.chip.diff-medium.selected { border-color:var(--accent-warn);    color:var(--accent-warn);    background:rgba(245,166,35,0.1); }
.chip.diff-hard.selected   { border-color:var(--accent-danger);  color:var(--accent-danger);  background:rgba(229,83,75,0.1); }
.chip.diff-epic.selected   { border-color:var(--accent-gold);    color:var(--accent-gold);    background:rgba(240,192,64,0.1); }

/* =========================================================
   BOTTOM NAV
   ========================================================= */
#bottom-nav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-height) + var(--safe-bottom)); padding-bottom:var(--safe-bottom); display:flex; align-items:stretch; background:var(--bg-card); border-top:1px solid var(--border); z-index:100; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:0.5rem 0; background:none; border:none; color:var(--text-muted); cursor:pointer; transition:color 0.15s; position:relative; }
.nav-btn.active { color:var(--accent-primary); }
.nav-btn.active::after { content:''; position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--accent-primary); }
.nav-btn:active { opacity:0.7; }
.nav-label { font-family:var(--font-body); font-size:0.62rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }

/* =========================================================
   OVERLAY & BOTTOM SHEET
   ========================================================= */
#overlay { position:fixed; inset:0; z-index:200; display:none; background:rgba(0,0,0,0.65); backdrop-filter:blur(2px); }
#overlay.open { display:flex; align-items:flex-end; justify-content:center; }
.bottom-sheet { position:relative; bottom:0; left:0; right:0; width:100%; max-width:480px; background:var(--bg-elevated); border-radius:16px 16px 0 0; padding:0 1.25rem calc(1.5rem + var(--safe-bottom)); max-height:92svh; overflow-y:auto; -webkit-overflow-scrolling:touch; animation:slideUp 0.28s cubic-bezier(0.34,1.15,0.64,1) both; }
.sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0.75rem auto 1.25rem; }
.sheet-title  { margin-bottom:0.25rem; }
.sheet-actions { display:flex; gap:0.75rem; margin-top:1.5rem; }
.sheet-actions .btn-primary,.sheet-actions .btn-secondary { flex:1; }

/* =========================================================
   SCREENS — BASE
   ========================================================= */
.screen { padding:0 1rem calc(var(--nav-height) + var(--safe-bottom) + 1rem); min-height:100svh; }
.screen-title { padding:1.25rem 0 1rem; }
.empty-state  { text-align:center; padding:2.5rem 1rem; color:var(--text-muted); line-height:1.6; }

/* =========================================================
   AUTH SCREENS
   ========================================================= */
.screen-auth  { display:flex; flex-direction:column; align-items:stretch; justify-content:flex-start; min-height:100svh; padding:0; }
.auth-back-row { padding:1rem 1.25rem 0; }
.back-btn     { display:inline-flex; align-items:center; gap:0.25rem; color:var(--accent-primary); font-size:0.9rem; padding:0.25rem 0; }
.auth-hero    { display:flex; flex-direction:column; align-items:center; padding:3rem 1.5rem 2rem; text-align:center; gap:0.5rem; }
.auth-hero--compact { padding:1.5rem 1.5rem 1rem; }
.app-logo-icon { color:var(--accent-primary); margin-bottom:0.75rem; }
.auth-title   { color:var(--text-primary); letter-spacing:0.04em; }
.auth-card    { margin:0 1rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-card); overflow:hidden; }
.household-btn { display:flex; align-items:center; gap:0.75rem; width:100%; padding:1rem 1.25rem; border-bottom:1px solid var(--border); text-align:left; transition:background 0.12s; }
.household-btn:last-child { border-bottom:none; }
.household-btn:active { background:var(--bg-elevated); }
.household-btn-icon { color:var(--text-muted); flex-shrink:0; }
.household-btn-name { flex:1; }
.household-btn-arrow { color:var(--text-muted); flex-shrink:0; }
.player-list  { display:flex; flex-direction:column; }
.player-btn   { display:flex; align-items:center; gap:1rem; padding:1.1rem 1.25rem; border-bottom:1px solid var(--border); text-align:left; transition:background 0.12s; }
.player-btn:last-child { border-bottom:none; }
.player-btn:active { background:var(--bg-elevated); }
.player-btn-avatar { width:44px; height:44px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; color:var(--text-muted); flex-shrink:0; }
.screen-pin   { min-height:100svh; }
.pin-header   { display:flex; flex-direction:column; align-items:center; padding:2.5rem 1.5rem 2rem; gap:1.25rem; text-align:center; }
.pin-callsign { color:var(--text-primary); }
.pin-dots     { display:flex; gap:1.1rem; justify-content:center; }
.pin-dot      { width:16px; height:16px; border-radius:50%; border:2px solid var(--text-muted); background:transparent; transition:background 0.15s,border-color 0.15s,transform 0.15s; }
.pin-dot.filled { background:var(--accent-primary); border-color:var(--accent-primary); transform:scale(1.15); }
.pin-status   { color:var(--text-secondary); min-height:1em; }
.pin-status.pin-error { color:var(--accent-danger); }
.numpad       { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; padding:0 1rem calc(2rem + var(--safe-bottom)); max-width:360px; margin:0 auto; }
.numpad-key   { display:flex; align-items:center; justify-content:center; aspect-ratio:1.3/1; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-card); font-family:var(--font-display); font-size:1.75rem; font-weight:700; color:var(--text-primary); cursor:pointer; transition:background 0.1s,transform 0.1s; user-select:none; }
.numpad-key:active { background:var(--bg-input); transform:scale(0.93); }
.numpad-empty { visibility:hidden; pointer-events:none; }

/* =========================================================
   BOARD SCREEN
   ========================================================= */
.screen-board { padding-top:0; }
.board-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1rem 0.75rem; position:sticky; top:0; background:var(--bg-primary); z-index:10; border-bottom:1px solid var(--border); box-shadow:0 1px 0 var(--border); }
.player-info  { display:flex; align-items:center; gap:0.65rem; }
.player-avatar-sm { width:36px; height:36px; border-radius:50%; background:var(--bg-elevated); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text-muted); flex-shrink:0; }
.player-info-text { display:flex; flex-direction:column; gap:1px; min-width:0; }
.player-callsign  { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
.header-actions   { display:flex; align-items:center; gap:0.25rem; }
.xp-bar-wrap  { padding:0.75rem 1rem 0; display:flex; flex-direction:column; gap:0.35rem; }
.xp-bar-track { height:5px; background:var(--bg-elevated); border-radius:var(--radius-pill); overflow:hidden; }
.xp-bar-fill  { height:100%; background:linear-gradient(90deg,var(--accent-primary),var(--accent-success)); border-radius:var(--radius-pill); transition:width 0.8s cubic-bezier(0.4,0,0.2,1); will-change:width; }
.xp-bar-meta  { display:flex; justify-content:space-between; align-items:center; padding-top:0.2rem; }
/* House XP bar */
.house-bar-wrap { padding:0.35rem 1rem 0; display:flex; flex-direction:column; gap:0.25rem; }
.house-bar-track { height:3px; background:var(--bg-elevated); border-radius:var(--radius-pill); overflow:hidden; }
.house-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent-gold),var(--accent-warn)); border-radius:var(--radius-pill); transition:width 0.8s cubic-bezier(0.4,0,0.2,1); will-change:width; }
.house-bar-meta { display:flex; justify-content:space-between; align-items:center; }
/* Quest section */
.quest-section { padding:0.85rem 1rem 0; }
.quest-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; }
.quest-label { display:inline-flex; align-items:center; gap:0.3rem; }
.quest-badge { display:inline-flex; align-items:center; gap:0.3rem; background:rgba(240,192,64,0.1); color:var(--accent-gold); font-size:0.68rem; font-weight:600; padding:0.18rem 0.5rem; border-radius:var(--radius-pill); border:1px solid rgba(240,192,64,0.25); text-transform:uppercase; letter-spacing:0.05em; }
.task-card.status-quest { border-left-color:var(--accent-gold); }
.weekly-strip { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1rem; border-bottom:1px solid var(--border); }
.dot-progress { display:flex; gap:5px; flex-wrap:wrap; max-width:200px; }
.dot-pip      { width:9px; height:9px; border-radius:50%; background:var(--bg-elevated); border:1px solid var(--border); transition:background 0.2s; }
.dot-pip.done { background:var(--accent-success); border-color:var(--accent-success); }
.weekly-meta  { display:flex; align-items:center; gap:0.5rem; flex-shrink:0; }
.streak-badge { display:inline-flex; align-items:center; gap:3px; color:var(--accent-warn); font-family:var(--font-body); font-weight:600; font-size:0.85rem; }
.streak-badge .icon { color:var(--accent-danger); }
.task-section { padding:0.85rem 1rem 0; }
.task-section:last-of-type { padding-bottom:1.5rem; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; }
.add-task-btn { display:inline-flex; align-items:center; gap:0.3rem; color:var(--accent-primary); font-family:var(--font-body); font-size:0.82rem; font-weight:600; padding:0.3rem 0.6rem; border-radius:var(--radius-btn); border:1px solid rgba(79,142,247,0.3); background:rgba(79,142,247,0.07); transition:background 0.15s; }
.add-task-btn:active { background:rgba(79,142,247,0.15); }
.expand-btn   { display:inline-flex; align-items:center; gap:0.3rem; color:var(--text-secondary); font-size:0.78rem; font-weight:600; }
.expand-chevron { display:inline-flex; transition:transform 0.2s ease; }
.expand-chevron.expanded { transform:rotate(180deg); }
.task-list    { display:flex; flex-direction:column; gap:0; }
.task-card    { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--border); border-radius:var(--radius-card); padding:0.85rem; margin-bottom:0.6rem; cursor:default; user-select:none; }
.task-card:not(.status-done):active { transform:scale(0.99); border-color:var(--border-active); transition:transform 0.08s,border-color 0.08s; }
.task-card.status-overdue { border-left-color:var(--accent-danger); }
.task-card.status-urgent  { border-left-color:var(--accent-warn); }
.task-card.status-today   { border-left-color:var(--accent-warn); }
.task-card.status-done    { opacity:0.55; }
.task-card-top { display:flex; align-items:center; gap:0.4rem; margin-bottom:0.45rem; }
.status-badge  { font-family:var(--font-body); font-size:0.68rem; font-weight:600; padding:0.18rem 0.5rem; border-radius:var(--radius-pill); text-transform:uppercase; letter-spacing:0.05em; }
.badge-overdue { background:rgba(229,83,75,0.15); color:var(--accent-danger); }
.badge-urgent  { background:rgba(245,166,35,0.15); color:var(--accent-warn); }
.badge-today   { background:rgba(245,166,35,0.10); color:var(--accent-warn); }
.badge-done    { background:rgba(62,207,142,0.10); color:var(--accent-success); }
.badge-upcoming { background:var(--bg-elevated); color:var(--text-muted); }
.difficulty-badge { font-family:var(--font-body); font-size:0.65rem; font-weight:600; padding:0.18rem 0.5rem; border-radius:var(--radius-pill); text-transform:uppercase; letter-spacing:0.04em; border:1px solid var(--border); color:var(--text-muted); background:var(--bg-elevated); }
.diff-badge-easy   { border-color:rgba(62,207,142,0.3); color:var(--accent-success); }
.diff-badge-medium { border-color:rgba(245,166,35,0.3); color:var(--accent-warn); }
.diff-badge-hard   { border-color:rgba(229,83,75,0.3);  color:var(--accent-danger); }
.diff-badge-epic   { border-color:rgba(240,192,64,0.3); color:var(--accent-gold); }
.task-title    { font-family:var(--font-body); font-size:0.95rem; font-weight:500; color:var(--text-primary); margin-bottom:0.55rem; line-height:1.35; }
.task-card-bottom { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
.task-pts      { display:inline-flex; align-items:center; gap:3px; font-family:var(--font-body); font-size:0.78rem; font-weight:600; color:var(--accent-primary); flex:1; }
.task-pts .icon { color:var(--accent-warn); position:relative; top:-1px; }
.task-repeat   { color:var(--text-muted); }
.complete-btn  { display:inline-flex; align-items:center; gap:0.35rem; background:var(--accent-success); color:#0d0f14; font-family:var(--font-body); font-size:0.82rem; font-weight:600; border:none; border-radius:var(--radius-btn); padding:0.45rem 0.9rem; cursor:pointer; transition:transform 0.1s,opacity 0.1s; margin-left:auto; }
.complete-btn:active { transform:scale(0.95); opacity:0.85; }
.complete-btn.btn-loading { opacity:0.6; pointer-events:none; }
.complete-btn:disabled { opacity:0.4; pointer-events:none; }
.claim-btn     { display:inline-flex; align-items:center; background:rgba(79,142,247,0.1); color:var(--accent-primary); font-family:var(--font-body); font-size:0.78rem; font-weight:600; border:1px solid rgba(79,142,247,0.3); border-radius:var(--radius-btn); padding:0.4rem 0.75rem; margin-left:auto; }
.done-label    { display:inline-flex; align-items:center; gap:3px; color:var(--accent-success); font-size:0.78rem; font-weight:600; margin-left:auto; }
.partner-section { margin-top:0.25rem; padding-bottom:1rem; }
.badge-overdue-sm { display:inline-block; background:rgba(229,83,75,0.15); color:var(--accent-danger); font-size:0.65rem; font-weight:600; padding:0.1rem 0.4rem; border-radius:var(--radius-pill); margin-left:0.35rem; }
.board-loading    { display:flex !important; align-items:center; justify-content:center; min-height:100svh; }
.board-loading-inner { display:flex; flex-direction:column; align-items:center; gap:0.75rem; color:var(--accent-primary); animation:boardLoadPulse 1.4s ease-in-out infinite; }
.board-loading-icon { color:var(--accent-primary); }
.repeat-row    { display:flex; flex-direction:column; gap:0.5rem; margin-top:0.25rem; }
.field-error   { border-color:var(--accent-danger) !important; animation:fieldShake 0.35s ease; }

/* =========================================================
   TOAST
   ========================================================= */
.hh-toast { position:fixed; bottom:calc(var(--nav-height) + var(--safe-bottom) + 12px); left:50%; transform:translateX(-50%) translateY(8px); background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-pill); padding:0.55rem 1.1rem; font-family:var(--font-body); font-size:0.82rem; font-weight:500; color:var(--text-primary); white-space:nowrap; z-index:300; opacity:0; transition:opacity 0.2s,transform 0.2s; pointer-events:none; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
.hh-toast--visible { opacity:1; transform:translateX(-50%) translateY(0); }

/* =========================================================
   STATS SCREEN
   ========================================================= */
.screen-stats  { padding-top:0; }
.stat-card     { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-card); padding:1rem; margin-bottom:0.75rem; }
.stat-card-label { display:block; margin-bottom:0.6rem; }
.stat-card-row { display:flex; gap:1rem; }
.stat-card-ring { }
.stat-ring-row { display:flex; align-items:center; gap:1.25rem; }
.ring-wrap     { position:relative; display:flex; align-items:center; justify-content:center; margin:0.75rem auto; width:140px; height:140px; }
.ring-center   { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:2px; }
.ring-pct      { font-size:1.75rem; line-height:1; }
.ring-breakdown { flex:1; display:flex; flex-direction:column; gap:0.3rem; }
.ring-breakdown-row { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
.ring-breakdown-label { color:var(--text-muted); flex:1; }
.ring-breakdown-val   { min-width:40px; text-align:right; }
.ring-breakdown-bold  { font-size:0.85rem; font-weight:700; }
.ring-breakdown-divider { height:1px; background:var(--border); margin:0.2rem 0; }
.balance-players  { display:flex; justify-content:space-between; margin-bottom:0.3rem; }
.balance-bar-wrap { display:flex; align-items:center; gap:0.5rem; margin-top:0.75rem; }
.balance-track    { flex:1; height:12px; background:var(--bg-elevated); border-radius:var(--radius-pill); overflow:hidden; display:flex; }
.balance-fill-me      { background:var(--accent-primary); height:100%; transition:width 0.6s ease; will-change:width; }
.balance-fill-partner { background:var(--accent-success); height:100%; transition:width 0.6s ease; will-change:width; }
.balance-label    { min-width:60px; font-size:0.7rem; }
.balance-pts-row  { display:flex; justify-content:space-between; margin-top:0.4rem; padding-top:0.4rem; border-top:1px solid var(--border); }
.balance-alert    { display:flex; align-items:center; gap:0.35rem; color:var(--accent-warn); margin-top:0.5rem; font-size:0.72rem; }
.streak-col     { flex:1; display:flex; flex-direction:column; gap:0.3rem; }
.streak-divider { width:1px; background:var(--border); align-self:stretch; }
.streak-val     { display:flex; align-items:center; gap:0.3rem; color:var(--text-muted); font-size:1.3rem; }
.streak-val.streak-active { color:var(--accent-danger); }
.streak-val .icon { color:var(--accent-danger); }
.streak-risk    { display:inline-flex; align-items:center; gap:0.25rem; color:var(--accent-warn); margin-top:0.3rem; font-size:0.68rem; }
.spark-wrap     { margin-top:0.5rem; }
.spark-labels   { display:flex; justify-content:space-around; margin-top:0.35rem; }
.spark-label    { flex:1; text-align:center; font-size:0.6rem; color:var(--text-muted); }
.spark-legend   { display:flex; align-items:center; gap:0.4rem; margin-top:0.6rem; flex-wrap:wrap; }
.spark-legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.month-summary-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.75rem; margin-top:0.5rem; }
.summary-cell   { background:var(--bg-elevated); border-radius:var(--radius-btn); padding:0.75rem; display:flex; flex-direction:column; gap:0.25rem; }
.summary-icon   { line-height:1; margin-bottom:0.1rem; }
.summary-value  { font-size:1.2rem; color:var(--text-primary); line-height:1.1; font-family:var(--font-display); font-weight:700; }
.summary-label  { font-size:0.65rem; color:var(--text-muted); }

/* =========================================================
   RANKS SCREEN
   ========================================================= */
.screen-ranks  { padding-top:0; }
.rank-compare  { display:flex; gap:0.75rem; margin-bottom:1.25rem; }
.rank-card     { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-card); padding:1rem; display:flex; flex-direction:column; gap:0.35rem; min-width:0; }
.rank-card-me  { border-color:var(--accent-primary); background:rgba(79,142,247,0.05); }
.rank-card-who { margin-bottom:0.1rem; }
.rank-card-badge { display:flex; align-items:baseline; gap:0.5rem; flex-wrap:wrap; }
.rank-card-name  { color:var(--text-primary); line-height:1.1; }
.rank-card-level { color:var(--accent-primary); white-space:nowrap; }
.rank-bar-track  { height:5px; background:var(--bg-elevated); border-radius:var(--radius-pill); overflow:hidden; margin:0.25rem 0; }
.rank-bar-fill   { height:100%; background:linear-gradient(90deg,var(--accent-primary),var(--accent-success)); border-radius:var(--radius-pill); transition:width 0.7s cubic-bezier(0.4,0,0.2,1); will-change:width; }
.rank-pip-row    { display:flex; gap:3px; margin:0.15rem 0 0.35rem; }
.rank-pip        { flex:1; height:3px; border-radius:2px; background:var(--bg-elevated); }
.rank-pip.filled { background:linear-gradient(90deg,var(--accent-primary),var(--accent-success)); }
.rank-card-to-next { font-size:0.8rem; line-height:1.3; }
.rank-card-totals  { display:flex; justify-content:space-between; margin-top:0.1rem; padding-top:0.4rem; border-top:1px solid var(--border); }
.milestones-wrap   { margin-bottom:1.25rem; }
.milestones-title  { display:block; margin-bottom:0.6rem; }
.milestones-row    { display:flex; gap:0.5rem; }
.milestone-chip    { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-btn); padding:0.6rem 0.75rem; display:flex; flex-direction:column; gap:0.2rem; min-height:52px; }
.milestone-chip-next { border-color:var(--accent-primary); background:rgba(79,142,247,0.06); }
.milestone-rank    { color:var(--text-secondary); font-size:0.65rem; line-height:1; font-family:var(--font-body); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
.milestone-pts     { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--text-primary); line-height:1.1; }
.milestone-chip-next .milestone-rank { color:var(--accent-primary); }
.milestone-chip-next .milestone-pts  { color:var(--accent-primary); }
.rank-ladder-wrap  { margin-bottom:2rem; }
.rank-ladder-header { display:flex; justify-content:space-between; align-items:center; padding:0.25rem 0 0.75rem; }
.rank-ladder       { display:flex; flex-direction:column; }
.rank-tier-divider { height:1px; background:var(--border); margin:0.5rem 0.75rem; opacity:0.5; }
.rank-row          { display:flex; align-items:center; gap:0.75rem; padding:0.65rem 0.75rem; border-radius:var(--radius-btn); transition:background 0.1s; border-left:2px solid transparent; }
.rank-row.earned   { color:var(--text-secondary); }
.rank-row.locked   { color:var(--text-muted); opacity:0.5; }
.rank-row.current  { background:rgba(79,142,247,0.08); color:var(--accent-primary); border-left-color:var(--accent-primary); }
.rank-row-level    { min-width:24px; text-align:right; color:var(--text-muted); }
.rank-row-name     { flex:1; }
.rank-row-pts      { text-align:right; min-width:64px; font-size:0.68rem; }
.rank-row-you      { color:var(--accent-primary); background:rgba(79,142,247,0.12); border-radius:var(--radius-pill); padding:0.15rem 0.5rem; font-size:0.65rem; white-space:nowrap; font-family:var(--font-body); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; }
.rank-row-partner  { color:var(--accent-success); background:rgba(62,207,142,0.12); border-radius:var(--radius-pill); padding:0.15rem 0.5rem; font-size:0.65rem; white-space:nowrap; font-family:var(--font-body); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; }

/* =========================================================
   SETTINGS SCREEN
   ========================================================= */
.screen-settings   { padding-top:0; }
.settings-section  { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-card); padding:1rem; margin-bottom:0.75rem; display:flex; flex-direction:column; gap:0.75rem; }
.settings-section-title { display:block; margin-bottom:0; }
.settings-note     { color:var(--text-muted); line-height:1.4; }
.settings-push-row { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
.settings-push-info { display:flex; flex-direction:column; gap:0.2rem; }
.settings-toggle-btn { display:flex; align-items:center; background:none; border:none; cursor:pointer; padding:0; flex-shrink:0; }
.settings-toggle-btn .toggle-track { pointer-events:none; }
.settings-toggle-btn.active .toggle-track { background:rgba(79,142,247,0.2); border-color:var(--accent-primary); }
.settings-toggle-btn.active .toggle-track::after { transform:translateX(18px); background:var(--accent-primary); }
.settings-push-types { margin-top:0.85rem; border-top:1px solid var(--border); padding-top:0.75rem; display:flex; flex-direction:column; gap:0.4rem; }
.settings-push-types-title { display:block; margin-bottom:0.35rem; color:var(--text-muted); }
.push-type-row     { display:flex; justify-content:space-between; align-items:center; gap:0.5rem; }
.push-type-label   { color:var(--text-secondary); flex-shrink:0; min-width:100px; }
.push-type-desc    { text-align:right; color:var(--text-muted); }
.settings-btn-row  { display:flex; gap:0.6rem; }
.settings-btn-row .btn-primary,.settings-btn-row .btn-secondary { flex:1; }
.settings-btn-row .btn-secondary:disabled { opacity:0.4; pointer-events:none; }
.settings-webhook-status { min-height:1.2em; margin-top:0.4rem; transition:color 0.15s; }
.settings-status-success { color:var(--accent-success); }
.settings-status-error   { color:var(--accent-danger); }
.settings-player-row     { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0 0.85rem; }
.settings-player-avatar  { width:40px; height:40px; border-radius:50%; background:var(--bg-elevated); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text-muted); flex-shrink:0; }
/* Setup screen */
.setup-step { display:none; flex-direction:column; gap:0; }
.setup-step.active { display:flex; }
.setup-progress { display:flex; gap:0.4rem; padding:0 1.5rem; margin-bottom:1.5rem; }
.setup-pip { flex:1; height:3px; background:var(--border); border-radius:2px; transition:background 0.2s; }
.setup-pip.done { background:var(--accent-primary); }
.setup-hero { text-align:center; padding:2rem 1.5rem 1.5rem; }
.setup-card { margin:0 1rem 1rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-card); padding:1.25rem; display:flex; flex-direction:column; gap:0.75rem; }
.setup-footer { padding:0 1rem calc(2rem + var(--safe-bottom)); display:flex; gap:0.75rem; }
.setup-footer .btn-primary,.setup-footer .btn-secondary { flex:1; }
.setup-error { color:var(--accent-danger); font-size:0.78rem; min-height:1.1em; margin-top:0.25rem; }
.settings-app-info { text-align:center; padding:1rem 0 2rem; color:var(--text-muted); font-size:0.65rem; }

/* =========================================================
   BURST LAYER
   ========================================================= */
#burst-layer { position:fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; background:rgba(13,15,20,0.97); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); will-change:opacity; }
#burst-layer.active { display:flex; animation:burstFadeIn 0.18s ease both; }
.burst-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem 1.5rem; width:100%; max-width:360px; }
.burst-task-name { color:var(--text-secondary); margin-bottom:0.5rem; max-width:280px; animation:burstFadeIn 0.2s 0.05s ease both; }
.burst-pts-wrap  { position:relative; margin:0.25rem 0; }
.burst-pts-wrap::after { content:''; position:absolute; inset:-20px; background:radial-gradient(circle,rgba(62,207,142,0.15) 0%,transparent 70%); animation:ptsGlow 0.6s 0.4s ease both; opacity:0; pointer-events:none; animation-fill-mode:both; }
.burst-pts   { font-family:var(--font-display); font-size:5.5rem; font-weight:800; line-height:1; color:var(--accent-success); animation:ptsUp 0.45s cubic-bezier(0.34,1.56,0.64,1) both; letter-spacing:-0.02em; will-change:transform,opacity; }
.burst-bonuses { display:flex; flex-direction:column; align-items:center; gap:0.45rem; margin:1.25rem 0; min-height:2rem; }
.bonus-chip    { display:inline-flex; align-items:center; gap:0.4rem; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-pill); padding:0.4rem 1rem; color:var(--accent-gold); font-family:var(--font-body); font-size:0.88rem; font-weight:500; opacity:0; animation:chipSlideIn 0.3s ease forwards; }
.bonus-chip strong { font-weight:700; }
.burst-total { font-family:var(--font-body); font-size:0.78rem; color:var(--text-muted); margin-top:0.25rem; animation:burstFadeIn 0.2s 0.4s ease both; opacity:0; animation-fill-mode:both; }
.burst-dismiss-hint { font-family:var(--font-body); font-size:0.7rem; color:var(--text-muted); margin-top:2rem; letter-spacing:0.05em; text-transform:uppercase; animation:burstFadeIn 0.2s 1.5s ease both; opacity:0; animation-fill-mode:both; }
.burst-streak-msg  { display:inline-flex; align-items:center; gap:0.3rem; font-family:var(--font-body); font-size:0.82rem; font-weight:600; margin-top:0.5rem; padding:0.3rem 0.8rem; border-radius:var(--radius-pill); animation:burstFadeIn 0.2s 0.5s ease both; opacity:0; animation-fill-mode:both; }
.burst-streak-active { background:rgba(229,83,75,0.12); color:var(--accent-danger); border:1px solid rgba(229,83,75,0.25); }
.burst-streak-broken { background:rgba(74,81,104,0.3); color:var(--text-muted); border:1px solid var(--border); }
.burst-streak-icon   { display:flex; align-items:center; justify-content:center; opacity:0.4; }
.burst-rankup { gap:0.75rem; position:relative; }
.burst-rankup::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:280px; height:280px; background:radial-gradient(circle,rgba(240,192,64,0.12) 0%,transparent 70%); pointer-events:none; animation:rankGlow 2s ease-in-out infinite alternate; }
.rankup-badge { font-family:var(--font-display); font-size:0.85rem; font-weight:800; letter-spacing:0.22em; color:var(--accent-gold); border:2px solid var(--accent-gold); border-radius:var(--radius-pill); display:inline-block; padding:0.3rem 1.1rem; animation:rankBadgePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
.rankup-name   { color:var(--accent-gold); animation:ptsUp 0.5s 0.15s cubic-bezier(0.34,1.56,0.64,1) both; opacity:0; animation-fill-mode:both; }
.rankup-number { color:var(--text-secondary); animation:burstFadeIn 0.2s 0.4s ease both; opacity:0; animation-fill-mode:both; }
.rankup-stars  { display:flex; justify-content:center; gap:0.5rem; margin-top:1rem; }
.rankup-star   { color:var(--accent-gold); opacity:0; animation:starPop 0.4s ease forwards; }
.rankup-star:nth-child(1){animation-delay:0.35s} .rankup-star:nth-child(2){animation-delay:0.48s} .rankup-star:nth-child(3){animation-delay:0.60s} .rankup-star:nth-child(4){animation-delay:0.72s} .rankup-star:nth-child(5){animation-delay:0.84s}
.confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti-dot { position:absolute; opacity:0; animation:confettiFall linear forwards; }
.pin-dots { display:flex; gap:1.1rem; justify-content:center; }

/* =========================================================
   HOVER STATES (pointer devices only)
   ========================================================= */
@media (hover:hover) {
  .household-btn:hover,.player-btn:hover { background:var(--bg-elevated); }
  .task-card:not(.status-done):hover { border-color:var(--border-active); }
  .complete-btn:hover { opacity:0.9; transform:scale(1.02); }
  .nav-btn:hover { color:var(--text-secondary); }
  .nav-btn.active:hover { color:var(--accent-primary); }
}

/* =========================================================
   RESPONSIVE
   ========================================================= */
@media (max-width:340px) { .stat-ring-row { flex-direction:column; align-items:center; } .ring-breakdown { width:100%; } }
@media (min-width:400px) { .numpad { max-width:340px; } .numpad-key { font-size:2rem; } }
@media (min-width:560px) { .screen-auth { max-width:420px; margin:0 auto; } .auth-card { margin:0; } }

/* =========================================================
   ACCESSIBILITY
   ========================================================= */
@media (prefers-reduced-motion:reduce) {
  *,*::before,*::after { animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important; }
  #burst-layer.active { animation:none; }
  .xp-bar-fill,.rank-bar-fill { transition:none; }
}
@media (prefers-color-scheme:light) { :root { color-scheme:dark; } }
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::selection { background:rgba(79,142,247,0.25); color:var(--text-primary); }

/* =========================================================
   KEYFRAMES
   ========================================================= */
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px)} 30%{transform:translateX(8px)} 45%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(3px)} }
@keyframes burstFadeIn { from{opacity:0} to{opacity:1} }
@keyframes ptsUp { from{opacity:0;transform:scale(0.4) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes chipSlideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes rankBadgePop { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }
@keyframes starPop { from{opacity:0;transform:scale(0) rotate(-30deg)} 80%{transform:scale(1.3) rotate(5deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
@keyframes confettiFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }
@keyframes ptsGlow { from{opacity:0;transform:scale(0.8)} 50%{opacity:1} to{opacity:0;transform:scale(1.4)} }
@keyframes rankGlow { from{transform:translate(-50%,-50%) scale(1);opacity:0.6} to{transform:translate(-50%,-50%) scale(1.2);opacity:1} }
@keyframes boardLoadPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes fieldShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
@keyframes screenFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>

// =========================================================
// SESSION (localStorage, 7-day TTL)
// =========================================================
const SESSION_KEY='homeops_session';
const SESSION_TTL=7*24*60*60*1000;
function getSession(){
  try{
    const raw=localStorage.getItem(SESSION_KEY);
    if(!raw)return{authenticated:false};
    const s=JSON.parse(raw);
    if(Date.now()>new Date(s.expiresAt).getTime()){localStorage.removeItem(SESSION_KEY);return{authenticated:false};}
    return{...s,authenticated:true,household:{id:s.householdId,name:s.householdName},player:s.playerData};
  }catch{return{authenticated:false};}
}
function setSession(household,player){
  const s={householdId:household.id,householdName:household.name,playerId:player.id,playerData:player,token:player.token||'',expiresAt:new Date(Date.now()+SESSION_TTL).toISOString()};
  localStorage.setItem(SESSION_KEY,JSON.stringify(s));
}
function updateSessionPlayer(p){
  const s=getSession();if(!s.authenticated)return;
  const updated={...s,playerData:{...s.playerData,...p},expiresAt:new Date(Date.now()+SESSION_TTL).toISOString()};
  delete updated.authenticated;delete updated.household;delete updated.player;
  localStorage.setItem(SESSION_KEY,JSON.stringify(updated));
}
function clearSession(){localStorage.removeItem(SESSION_KEY);}

const API_BASE='https://homeops.askozicki.workers.dev';
async function api(path,opts={}){
  const s=getSession();
  const headers={'Content-Type':'application/json',...(opts.headers||{})};
  if(s.token)headers['Authorization']=`Bearer ${s.token}`;
  if(s.householdId)headers['X-Household-ID']=s.householdId;
  if(s.playerId)headers['X-Player-ID']=s.playerId;
  const res=await fetch(`${API_BASE}${path}`,{...opts,headers});
  if(!res.ok)throw new Error(`API ${res.status}`);
  return res.json();
}

// =========================================================
// POINTS ENGINE
// =========================================================
const DIFF_BASE={easy:30,medium:60,hard:120,epic:250};
function calculatePoints(task,player){
  const base=task.basePoints||DIFF_BASE[task.difficulty]||60;
  const now=Date.now(),dueAt=new Date(task.dueAt).getTime();
  const bonuses=[];let mult=1.0,flat=0;
  if(now<=dueAt){mult+=0.15;bonuses.push({label:'On Time',value:'+15%'});}
  const over=now-dueAt;
  if(over>0&&over<=3600000){flat+=50;bonuses.push({label:'Clutch!',value:'+50 pts'});}
  const streak=player.currentStreak||0;
  if(streak>=30){mult+=0.25;bonuses.push({label:'30-Day Streak',value:'+25%'});}
  else if(streak>=7){mult+=0.10;bonuses.push({label:'7-Day Streak',value:'+10%'});}
  const sc=player.sessionTasks||0;
  if(sc>=4){mult+=0.50;bonuses.push({label:'Combo ×5',value:'+50%'});}
  else if(sc>=2){mult+=0.25;bonuses.push({label:'Combo ×3',value:'+25%'});}
  return{base,multiplier:mult,flat,total:Math.round(base*mult)+flat,bonuses};
}
function computeStreakUpdate(player){
  const now=Date.now(),last=player.lastActive?new Date(player.lastActive).getTime():0;
  if(!last)return{currentStreak:1,streakExtended:true,streakBroken:false};
  const h=(now-last)/3600000;
  if(h<48)return{currentStreak:(player.currentStreak||0)+1,streakExtended:true,streakBroken:false};
  return{currentStreak:1,streakExtended:false,streakBroken:(player.currentStreak||0)>1};
}

async function hashPIN(pin){
  const d=new TextEncoder().encode(pin);
  const h=await crypto.subtle.digest('SHA-256',d);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function countUp(el,target,prefix='+'){
  if(!el||target<=0){if(el)el.textContent=`${prefix}${target.toLocaleString()}`;return()=>{};}
  const dur=900,start=performance.now();let raf=null;
  function tick(now){const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3),c=Math.round(e*target);el.textContent=`${prefix}${c.toLocaleString()}`;if(p<1)raf=requestAnimationFrame(tick);else el.textContent=`${prefix}${target.toLocaleString()}`;}
  raf=requestAnimationFrame(tick);return()=>{if(raf)cancelAnimationFrame(raf);};
}
function makeConfetti(n=36){
  const colors=['#4f8ef7','#3ecf8e','#f0c040','#e5534b','#f5a623','#c084fc'];
  return Array.from({length:n},(_,i)=>{
    const c=colors[i%colors.length],l=(Math.random()*100).toFixed(1),d=(Math.random()*0.7).toFixed(2),dur=(1.4+Math.random()*1.6).toFixed(2),sz=Math.round(6+Math.random()*7),r=i%2?'50%':'2px';
    return `<div class="confetti-dot" style="left:${l}%;background:${c};width:${sz}px;height:${sz}px;border-radius:${r};animation-duration:${dur}s;animation-delay:${d}s;"></div>`;
  }).join('');
}

function getTaskStatus(task){
  if(task.status==='done')return{key:'done',label:'Done'};
  const now=Date.now(),dueAt=new Date(task.dueAt).getTime(),diff=dueAt-now;
  if(diff<0)return{key:'overdue',label:`Overdue ${fmtOver(-diff)}`};
  if(diff<3600000)return{key:'urgent',label:`Due in ${Math.ceil(diff/60000)}m`};
  if(diff<86400000)return{key:'today',label:`Due by ${fmtTime(dueAt)}`};
  return{key:'upcoming',label:`Due ${fmtDate(dueAt)}`};
}
function fmtOver(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>=24?`${Math.floor(h/24)}d ago`:h>0?`${h}h ago`:`${m}m ago`;}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function fmtDate(ts){return new Date(ts).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}

async function handleComplete(task,session,appEl){
  // Check if we're in tutorial phase 3
  if(window.TUT_PHASE_3_PENDING){
    window.TUT_PHASE_3_PENDING=false;
    const callback=window.TUT_PHASE_3_CALLBACK;
    if(callback)callback();
  }

  const{household,player}=session;
  const result=calculatePoints(task,player),streak=computeStreakUpdate(player);
  const oldRank=getRankForPoints(player.totalPoints||0),newTotal=(player.totalPoints||0)+result.total,newRank=getRankForPoints(newTotal),isRankUp=newRank.level>oldRank.level;
  const houseXP=Math.floor(result.total*0.1);
  let sr;
  try{
    sr=await api(`/api/households/${household.id}/tasks/${task.id}/complete`,{method:'POST',body:JSON.stringify({pointsAwarded:result.total,bonusesApplied:result.bonuses.map(b=>b.label),newStreak:streak.currentStreak,houseXP:Math.floor(result.total*0.1)})});
  }catch(e){showToast('Could not save.');renderBoard(appEl,session);return;}
  const sp=sr.player||{};
  const up={...player,totalPoints:sp.totalPoints??newTotal,weeklyPoints:sp.weeklyPoints??((player.weeklyPoints||0)+result.total),rank:newRank.level,currentStreak:sp.currentStreak??streak.currentStreak,longestStreak:sp.longestStreak??Math.max(player.longestStreak||0,streak.currentStreak),sessionTasks:(player.sessionTasks||0)+1,lastActive:new Date().toISOString()};
  updateSessionPlayer(up);
  const si={streakExtended:streak.streakExtended,streakBroken:streak.streakBroken,currentStreak:up.currentStreak};
  await fireCompletionBurst({result,task,streakInfo:si});
  if(streak.streakBroken&&(player.currentStreak||0)>=3){
    const l=document.getElementById('burst-layer');
    if(l){l.innerHTML=`<div class="burst-screen"><div class="burst-streak-icon">${icon('fire',40)}</div><div class="display-md" style="color:var(--text-secondary)">Streak Ended</div><div class="body-md text-muted" style="margin-top:0.5rem">${player.currentStreak}-day run</div><div class="burst-dismiss-hint">Tap to continue</div></div>`;l.classList.add('active');await new Promise(r=>{const t=setTimeout(()=>{l.classList.remove('active');l.innerHTML='';r();},1800);l.addEventListener('click',()=>{clearTimeout(t);l.classList.remove('active');l.innerHTML='';r();},{once:true});});}
  }
  if(isRankUp)await fireRankUpBurst({rankName:newRank.name,rank:newRank.level});
  // Check house level-up from server response
  if(sr.houseLevelUp&&sr.house){
    const newHL=getHouseLevel(sr.house.totalXP||0);
    await fireHouseLevelBurst({levelName:newHL.name,level:newHL.level});
  }
  renderBoard(appEl,{household,player:up});
}

function animateRing(canvas,targetPct){
  const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,cx=70,cy=70,r=52,lw=10;
  canvas.width=140*dpr;canvas.height=140*dpr;canvas.style.width='140px';canvas.style.height='140px';ctx.scale(dpr,dpr);
  const start=performance.now(),dur=800,fill=targetPct===100?'#3ecf8e':'#4f8ef7';
  function draw(p){ctx.clearRect(0,0,140,140);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#252b3b';ctx.lineWidth=lw;ctx.stroke();if(p<=0)return;ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(p/100)*Math.PI*2);ctx.strokeStyle=fill;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();}
  function tick(now){const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3);draw(e*targetPct);if(p<1)requestAnimationFrame(tick);}
  requestAnimationFrame(tick);
}
function drawSparkline(canvas,myData,partnerData=null){
  const dpr=window.devicePixelRatio||1,W=320,H=90;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const weeks=4,hasBoth=partnerData&&partnerData.length===weeks;
  const all=hasBoth?[...myData,...partnerData]:myData;
  const maxVal=Math.max(...all,1),pad=8,baw=(W-pad*2)/weeks,gap=hasBoth?3:0;
  const bw=hasBoth?Math.floor((baw-gap*3)/2):Math.floor(baw*0.65),maxH=H-16;
  for(let i=0;i<weeks;i++){
    const gx=pad+i*baw,last=i===weeks-1;
    const mv=myData[i]||0,mh=Math.max(3,Math.floor(mv/maxVal*maxH)),mx=gx+(hasBoth?gap:(baw-bw)/2),my=H-16-mh;
    ctx.fillStyle=last?'#4f8ef7':'#252b3b';rr(ctx,mx,my,bw,mh,3);ctx.fill();
    if(hasBoth&&partnerData){const pv=partnerData[i]||0,ph=Math.max(3,Math.floor(pv/maxVal*maxH)),px=mx+bw+gap,py=H-16-ph;ctx.fillStyle=last?'#3ecf8e':'#3ecf8e80';rr(ctx,px,py,bw,ph,3);ctx.fill();}
    if(last&&mv>0){ctx.fillStyle='#4f8ef7';ctx.font=`bold ${Math.round(9*dpr)/dpr}px 'DM Sans',sans-serif`;ctx.textAlign='center';ctx.fillText(mv.toLocaleString(),mx+bw/2,my-4);}
  }
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

  const ladderHtml=RANKS.map(r=>{
    const earned=mypts>=r.minPoints,cur=myPd.rank.level===r.level;
    const pHere=pPd&&pPd.rank.level===r.level&&pPd.rank.level!==myPd.rank.level;
    const div=r.level%5===1&&r.level>1?'<div class="rank-tier-divider"></div>':'';
    return `${div}<div class="rank-row${cur?' current':earned?' earned':' locked'}"><span class="rank-row-level label">${r.level}</span><span class="rank-row-name body-lg">${esc(r.name)}</span><span class="rank-row-pts label text-muted">${r.minPoints.toLocaleString()}</span>${cur?`<span class="rank-row-you label">You</span>`:''}${pHere?`<span class="rank-row-partner label">${esc(pPd.callsign)}</span>`:''}</div>`;
  }).join('');
  appEl.innerHTML=`<div class="screen screen-ranks"><h2 class="display-lg screen-title">Ranks</h2><div class="rank-compare">${plist.map(pd=>compareCard(pd)).join('')}</div>${milesHtml}<div class="rank-ladder-wrap"><div class="rank-ladder-header"><span class="label text-secondary">Full Progression</span><span class="label text-muted">${esc(myPd.rank.name)} · Lv.${myPd.rank.level}</span></div><div class="rank-ladder">${ladderHtml}</div></div></div>`;
  requestAnimationFrame(()=>{appEl.querySelectorAll('.rank-bar-fill').forEach((el,i)=>{const t=el.dataset.pct||'0';el.style.width='0%';setTimeout(()=>{el.style.transition='width 0.7s cubic-bezier(0.4,0,0.2,1)';el.style.width=t+'%';},80+i*40);});});
}

  const granted=push==='granted',denied=push==='denied',noSupport=push==='unsupported';
  const rank=getRankForPoints(player.totalPoints||0);
  appEl.innerHTML=`<div class="screen screen-settings">
  <h2 class="display-lg screen-title">Settings</h2>
  <div class="settings-section">
    <div class="settings-section-title label text-secondary">Account</div>
    <div class="settings-player-row">
      <div class="settings-player-avatar">${icon('user',22)}</div>
      <div>
        <div class="body-lg">${esc(player.callsign||'Unknown')}</div>
        <div class="label text-muted">${esc(rank.name)} · Lv.${rank.level} · ${esc(household.name||'')}</div>
      </div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-section-title label text-secondary">Notifications</div>
    ${noSupport?`<div class="settings-note body-md text-muted">Push notifications not supported in this browser.</div>`
    :denied?`<div class="settings-note body-md text-muted">Push blocked. Enable in your browser settings, then reload.</div>`
    :`<div class="settings-push-row">
        <div class="settings-push-info">
          <div class="body-md">Push Notifications</div>
          <div class="label text-muted" id="push-status-label">${granted?'Active on this device':'Not enabled'}</div>
        </div>
        <button class="settings-toggle-btn${granted?' active':''}" id="push-toggle-btn" aria-pressed="${granted}"><span class="toggle-track"></span></button>
      </div>
      ${granted?`<div class="settings-push-types">
        <div class="label text-muted settings-push-types-title">You will receive:</div>
        <div class="push-type-row"><span class="push-type-label label">Task Completed</span><span class="push-type-desc label text-muted">Partner finishes a task</span></div>
        <div class="push-type-row"><span class="push-type-label label">Streak Alert</span><span class="push-type-desc label text-muted">Before midnight</span></div>
        <div class="push-type-row"><span class="push-type-label label">House Level Up</span><span class="push-type-desc label text-muted">Instant</span></div>
      </div>`:''}`}
  </div>
  <div class="settings-section">
    <div class="settings-section-title label text-secondary">Household</div>
    <div class="label text-muted" style="margin-bottom:0.5rem">${esc(household.name)}</div>
    <button class="btn-danger" id="switch-household-btn" style="width:100%">${icon('lock',16)} Switch Account</button>
  </div>
  <div class="settings-app-info label text-muted">Household Ops · All data in Cloudflare KV · No ads</div>
  </div>`;
  document.getElementById('push-toggle-btn')?.addEventListener('click',async()=>{
    if(Notification.permission==='granted'){showToast('To disable, revoke permission in browser settings.');return;}
    const perm=await Notification.requestPermission();
    if(perm==='granted'){
      try{
        const reg=await navigator.serviceWorker.ready;
        const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array('BEablsxHTJtGNls5Sdo7VayFjZeZzfywHZlVec47RsN3TUQURt-sAyiZm0GL7HPTcHALcmsCBYFqH4t2RMi37jM')});
        await api(`/api/households/${household.id}/players/${player.id}/push`,{method:'POST',body:JSON.stringify(sub)});
        showToast('Notifications enabled!');renderSettings(appEl,session);
      }catch(e){showToast('Could not enable notifications.');}
    }else{showToast('Permission denied.');}
  });
  document.getElementById('switch-household-btn')?.addEventListener('click',()=>{clearSession();App.navigate('auth');});
}

function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=window.atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

async function renderSetup(){
  navEl.classList.add('hidden');
  appEl.innerHTML=`<div class="screen screen-auth">
  <div class="auth-hero"><div class="app-logo-icon">${icon('shield',48)}</div><h1 class="display-lg auth-title">HOUSEHOLD<br>OPS</h1><p class="body-md text-secondary">Set up your household</p></div>

  <!-- Step 1: Household Name -->

    </div>
    <div class="setup-footer"><button class="btn-primary" id="setup-step0-next">Next</button></div>
  </div>

  <!-- Step 2: Player 1 callsign + PIN -->

    <div class="setup-card">

        <span class="pin-dot" id="s1d0"></span><span class="pin-dot" id="s1d1"></span><span class="pin-dot" id="s1d2"></span><span class="pin-dot" id="s1d3"></span>
      </div>
      <div class="numpad" style="max-width:280px;padding:0.75rem 0 0" id="setup-p1-numpad">
        ${[1,2,3,4,5,6,7,8,9,'',0,'del'].map(k=>`<button class="numpad-key${k===''?' numpad-empty':''}" data-key="${k}" ${k===''?'aria-hidden="true" tabindex="-1"':''}>${k==='del'?icon('trash',16):k===''?'':k}</button>`).join('')}
      </div>
      <div class="setup-error" id="setup-p1-err"></div>
    </div>
    <div class="setup-footer"><button class="btn-secondary" id="setup-step1-back">Back</button><button class="btn-primary" id="setup-step1-next">Next</button></div>
  </div>

  <!-- Step 3: Player 2 callsign + PIN -->
  <div class="setup-step" id="step-2">
    <div class="setup-card">
      <div class="body-lg">Player 2 callsign</div>
      <input class="field-input" type="text" id="setup-p2-callsign" placeholder="e.g. Doc" maxlength="20" autocomplete="off"/>
      <div class="body-md text-secondary" style="margin-top:0.75rem">Set a 4-digit PIN</div>
      <div class="pin-dots" id="setup-p2-dots" style="justify-content:flex-start;gap:0.75rem;margin-top:0.5rem">
        <span class="pin-dot" id="s2d0"></span><span class="pin-dot" id="s2d1"></span><span class="pin-dot" id="s2d2"></span><span class="pin-dot" id="s2d3"></span>
      </div>
      <div class="numpad" style="max-width:280px;padding:0.75rem 0 0" id="setup-p2-numpad">
        ${[1,2,3,4,5,6,7,8,9,'',0,'del'].map(k=>`<button class="numpad-key${k===''?' numpad-empty':''}" data-key="${k}" ${k===''?'aria-hidden="true" tabindex="-1"':''}>${k==='del'?icon('trash',16):k===''?'':k}</button>`).join('')}
      </div>
      <div class="setup-error" id="setup-p2-err"></div>
    </div>
    <div class="setup-footer"><button class="btn-secondary" id="setup-step2-back">Back</button><button class="btn-primary" id="setup-step2-finish">Create Household</button></div>

  let hhName='',p1={callsign:'',digits:[]},p2={callsign:'',digits:[]};

  function showStep(n){
    document.querySelectorAll('.setup-step').forEach((el,i)=>{el.classList.toggle('active',i===n);});
    document.querySelectorAll('.setup-pip').forEach((el,i)=>{el.classList.toggle('done',i<=n);});
  }

  function bindNumpad(numpadId,dotsPrefix,playerObj,errId){
    document.getElementById(numpadId)?.querySelectorAll('.numpad-key').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const k=btn.dataset.key;if(!k||k==='undefined')return;
        if(k==='del'){playerObj.digits.pop();}
        else if(playerObj.digits.length<4){playerObj.digits.push(k);}
        [0,1,2,3].forEach(i=>{const d=document.getElementById(`${dotsPrefix}${i}`);if(d)d.classList.toggle('filled',i<playerObj.digits.length);});
        document.getElementById(errId).textContent='';
      });

  bindNumpad('setup-p1-numpad','s1d',p1,'setup-p1-err');

    showStep(2);setTimeout(()=>document.getElementById('setup-p2-callsign')?.focus(),200);
  });
  document.getElementById('setup-step2-back').addEventListener('click',()=>showStep(1));
  document.getElementById('setup-step2-finish').addEventListener('click',async()=>{
    p2.callsign=document.getElementById('setup-p2-callsign')?.value.trim()||'';
    if(!p2.callsign){document.getElementById('setup-p2-err').textContent='Enter a callsign.';return;}
    if(p2.digits.length<4){document.getElementById('setup-p2-err').textContent='Enter a 4-digit PIN.';return;}
    if(p2.callsign.toLowerCase()===p1.callsign.toLowerCase()){document.getElementById('setup-p2-err').textContent='Callsigns must be different.';return;}
    const btn=document.getElementById('setup-step2-finish');btn.disabled=true;btn.textContent='Creating...';
    try{
      const p1hash=await hashPIN(p1.digits.join(''));
      const p2hash=await hashPIN(p2.digits.join(''));
      const res=await api('/api/setup',{method:'POST',body:JSON.stringify({householdName:hhName,players:[{callsign:p1.callsign,pinHash:p1hash},{callsign:p2.callsign,pinHash:p2hash}]})});
      if(res.success){

      }else{
        document.getElementById('setup-p2-err').textContent=res.error||'Could not create household.';
        btn.disabled=false;btn.textContent='Create Household';
      }
    }catch(e){
      document.getElementById('setup-p2-err').textContent='Connection error. Try again.';
      btn.disabled=false;btn.textContent='Create Household';
    }
  });
}

async function renderPlayerSelect(household){

  }catch(e){document.getElementById('player-list').innerHTML=`<p class="body-md text-danger" style="padding:1rem">Could not load.</p>`;}

function renderPINEntry(household,player){
  let digits=[],pending=false;
  appEl.innerHTML=`<div class="screen screen-auth screen-pin"><div class="auth-back-row"><button class="back-btn" id="back-pl">${icon('chevronLeft',18)} <span class="body-md">${esc(player.callsign)}</span></button></div><div class="pin-header"><div class="pin-callsign display-md">${esc(player.callsign)}</div><div class="pin-dots" id="pin-dots"><span class="pin-dot" id="dot-0"></span><span class="pin-dot" id="dot-1"></span><span class="pin-dot" id="dot-2"></span><span class="pin-dot" id="dot-3"></span></div><p class="pin-status label text-secondary" id="pin-status">Enter your PIN</p></div><div class="numpad" id="numpad">${[1,2,3,4,5,6,7,8,9,'',0,'del'].map(k=>`<button class="numpad-key${k===''?' numpad-empty':''}" data-key="${k}" ${k===''?'aria-hidden="true" tabindex="-1"':''}>${k==='del'?icon('trash',20):k===''?'':k}</button>`).join('')}</div></div>`;
  document.getElementById('back-pl').addEventListener('click',()=>renderPlayerSelect(household));
  function dots(){[0,1,2,3].forEach(i=>{const d=document.getElementById(`dot-${i}`);if(d)d.classList.toggle('filled',i<digits.length);});}
  function stat(m,err=false){const el=document.getElementById('pin-status');if(el){el.textContent=m;el.classList.toggle('pin-error',err);}}
  async function submit(){
    if(pending)return;pending=true;stat('Checking...');
    const pin=digits.join(''),ph=await hashPIN(pin);
    try{
      const d=await api(`/api/households/${household.id}/auth`,{method:'POST',body:JSON.stringify({playerId:player.id,pinHash:ph})});
      if(d.success){stat('Authenticated');setSession(household,{...d.player,token:d.token||''});App.navigate('board');}
      else{digits=[];pending=false;dots();stat('Incorrect PIN. Try again.',true);const pd=document.getElementById('pin-dots');if(pd){pd.classList.add('shake');setTimeout(()=>pd.classList.remove('shake'),500);}}
    }catch(e){digits=[];pending=false;dots();stat('Connection error.',true);}
  }
  document.getElementById('numpad').querySelectorAll('.numpad-key').forEach(b=>{
    b.addEventListener('click',()=>{
      if(pending)return;const k=b.dataset.key;if(!k||k==='undefined')return;
      if(k==='del'){digits.pop();dots();stat('Enter your PIN');return;}
      if(digits.length>=4)return;digits.push(k);dots();if(digits.length===4)submit();
    });
  });
}

// =========================================================
// APP ROUTER
// =========================================================
window.App={
  async navigate(screen){
    const s=getSession();
    if(!s.authenticated&&screen!=='auth'){navEl.classList.add('hidden');renderHouseholdSelect();return;}
    if(screen==='auth'){navEl.classList.add('hidden');renderHouseholdSelect();return;}
    renderNav(screen);
    const anim=()=>{appEl.querySelector('.screen')?.classList.add('screen-enter');};
    switch(screen){
      case 'board':    await renderBoard(appEl,s);   break;
      case 'stats':    await renderStats(appEl,s);   break;
      case 'ranks':    await renderRanks(appEl,s);   break;
      case 'settings': await renderSettings(appEl,s);break;
    }
    setTimeout(anim,10);
  },
  logout(){clearSession();navEl.classList.add('hidden');renderHouseholdSelect();}
};

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(() => {});
}

// Boot — check session and tutorial status
(async function boot(){
  const s=getSession();
  if(!s.authenticated){
    App.navigate('auth');
    return;
  }

  // Check if tutorial complete
  try {
    const tutStatus = await api(`/api/players/${s.player.id}/tutorial-status`);
    if (!tutStatus.complete) {
      navEl.classList.add('hidden');
      await Tutorial.start(s);
    }
  } catch (e) {
    // No tutorial status = new player, run tutorial
    navEl.classList.add('hidden');
    await Tutorial.start(s);
  }

  App.navigate('board');
})();
