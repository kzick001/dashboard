<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Weather v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } }
            }
        }
    </script>
    <style>
        body { 
            background-color: #000000; 
            background-image: radial-gradient(at 0% 0%, rgba(20, 20, 20, 1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(10, 10, 10, 1) 0, transparent 50%);
            background-attachment: fixed; 
            color: #f1f5f9;
        }
        .glass-tile {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans flex flex-col items-center">

    <div class="w-full max-w-4xl flex justify-between items-end mb-8 border-b border-white/10 pb-4">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight">Dev Weather</h1>
            <p class="font-mono text-xs text-slate-500 mt-1">v1.0 • Diagnostic Build</p>
        </div>
        <div id="sys-status" class="font-mono text-[10px] px-3 py-1 bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 rounded-full tracking-widest animate-pulse">
            CONNECTING...
        </div>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="glass-tile p-6 flex flex-col justify-center">
            <span class="font-mono text-xs text-slate-400 tracking-widest uppercase mb-2">Location 55426</span>
            <div class="flex items-center gap-4">
                <span id="ui-temp" class="text-6xl font-light tracking-tighter">--°</span>
                <div class="flex flex-col">
                    <span id="ui-desc" class="text-lg font-medium text-white">Awaiting Data</span>
                    <span id="ui-feels" class="font-mono text-xs text-slate-500">Dew Point: --°</span>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mt-8 border-t border-white/5 pt-4">
                <div class="flex flex-col">
                    <span class="font-mono text-[9px] text-slate-500 tracking-widest">WIND</span>
                    <span id="ui-wind" class="font-mono text-sm text-white mt-1">-- mph</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-mono text-[9px] text-slate-500 tracking-widest">HUMIDITY</span>
                    <span id="ui-hum" class="font-mono text-sm text-white mt-1">--%</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-mono text-[9px] text-slate-500 tracking-widest">PRECIP PROB</span>
                    <span id="ui-precip" class="font-mono text-sm text-white mt-1">--%</span>
                </div>
            </div>
        </div>

        <div class="glass-tile p-6 flex flex-col justify-between">
            <div>
                <span class="font-mono text-xs text-slate-400 tracking-widest uppercase">Edge Cache Metrics</span>
                <div class="mt-4 space-y-3 font-mono text-sm">
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-slate-500">Data Source:</span>
                        <span id="ui-source" class="text-white">--</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-slate-500">Cache Key:</span>
                        <span id="ui-key" class="text-white">--</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">Timestamp:</span>
                        <span id="ui-time" class="text-white">--</span>
                    </div>
                </div>
            </div>
            <button onclick="fetchData()" class="mt-6 w-full bg-white/10 hover:bg-white/20 text-white font-mono text-xs py-3 rounded-lg border border-white/10 transition-colors">
                FORCE REFRESH
            </button>
        </div>

        <div class="glass-tile p-0 md:col-span-2 overflow-hidden flex flex-col h-96">
            <div class="bg-black/40 px-6 py-3 border-b border-white/10 flex justify-between items-center">
                <span class="font-mono text-xs text-slate-400 tracking-widest">RAW JSON PAYLOAD</span>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                <pre id="json-output" class="font-mono text-[10px] text-slate-300 leading-relaxed break-words whitespace-pre-wrap">Awaiting Worker connection...</pre>
            </div>
        </div>

    </div>

    <script>
        const WORKER_URL = "https://kzick-weather.askozicki.workers.dev/";

        const DOM = {
            status: document.getElementById('sys-status'),
            temp: document.getElementById('ui-temp'),
            desc: document.getElementById('ui-desc'),
            feels: document.getElementById('ui-feels'),
            wind: document.getElementById('ui-wind'),
            hum: document.getElementById('ui-hum'),
            precip: document.getElementById('ui-precip'),
            source: document.getElementById('ui-source'),
            key: document.getElementById('ui-key'),
            time: document.getElementById('ui-time'),
            jsonOut: document.getElementById('json-output')
        };

        const weatherCodes = {
            1000: 'Clear', 1100: 'Mostly Clear', 1101: 'Partly Cloudy', 1102: 'Mostly Cloudy',
            1001: 'Cloudy', 2000: 'Fog', 2100: 'Light Fog', 4000: 'Drizzle', 4001: 'Rain',
            4200: 'Light Rain', 4201: 'Heavy Rain', 5000: 'Snow', 5001: 'Flurries',
            5100: 'Light Snow', 5101: 'Heavy Snow', 6000: 'Freezing Drizzle',
            6001: 'Freezing Rain', 6200: 'Light Freezing Rain', 6201: 'Heavy Freezing Rain',
            7000: 'Ice Pellets', 7101: 'Heavy Ice Pellets', 7102: 'Light Ice Pellets', 8000: 'Thunderstorm'
        };

        async function fetchData() {
            DOM.status.textContent = "FETCHING...";
            DOM.status.className = "font-mono text-[10px] px-3 py-1 bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 rounded-full tracking-widest animate-pulse";
            
            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();

                // Dump Raw JSON to Inspector
                DOM.jsonOut.textContent = JSON.stringify(data, null, 2);

                if (!response.ok || data.error) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                // Parse Data
                let currentVals = {};
                if (data.timelines && data.timelines.current && data.timelines.current[0]) {
                    currentVals = data.timelines.current[0].values;
                } else if (data.data && data.data.timelines) {
                    const currentLine = data.data.timelines.find(t => t.timestep === 'current') || data.data.timelines[0];
                    if (currentLine && currentLine.intervals) currentVals = currentLine.intervals[0].values;
                } else if (Array.isArray(data.timelines)) {
                    const currentLine = data.timelines.find(t => t.timestep === 'current') || data.timelines[0];
                    if (currentLine && currentLine.intervals) currentVals = currentLine.intervals[0].values;
                }

                // Update UI
                DOM.temp.textContent = `${Math.round(currentVals.temperature || 0)}°`;
                DOM.desc.textContent = weatherCodes[currentVals.weatherCode] || 'Unknown';
                DOM.feels.textContent = `Dew Point: ${Math.round(currentVals.dewPoint || 0)}°`;
                DOM.wind.textContent = `${Math.round(currentVals.windSpeed || 0)} mph`;
                DOM.hum.textContent = `${Math.round(currentVals.humidity || 0)}%`;
                DOM.precip.textContent = `${currentVals.precipitationProbability || 0}%`;

                // Update Meta
                if (data._meta) {
                    DOM.source.textContent = data._meta.source;
                    DOM.key.textContent = data._meta.cache_key;
                    DOM.time.textContent = new Date(data._meta.timestamp).toLocaleTimeString();
                    
                    if (data._meta.source === "KV_CACHE_SUCCESS") {
                        DOM.status.textContent = "KV CACHE HIT";
                        DOM.status.className = "font-mono text-[10px] px-3 py-1 bg-blue-500/20 text-blue-400 border border-blue-500/30 rounded-full tracking-widest";
                    } else {
                        DOM.status.textContent = "API LIVE FETCH";
                        DOM.status.className = "font-mono text-[10px] px-3 py-1 bg-green-500/20 text-green-400 border border-green-500/30 rounded-full tracking-widest";
                    }
                }

            } catch (error) {
                DOM.status.textContent = "ERROR";
                DOM.status.className = "font-mono text-[10px] px-3 py-1 bg-red-500/20 text-red-400 border border-red-500/30 rounded-full tracking-widest";
                DOM.jsonOut.textContent = `CRITICAL FAILURE:\n\n${error.message}\n\nCheck Worker Logs.`;
                console.error(error);
            }
        }

        // Boot
        fetchData();
    </script>
</body>
</html>
