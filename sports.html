<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Tracker</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9H4.5a2.5 2.5 0 0 1 0-5H6'/><path d='M18 9h1.5a2.5 2.5 0 0 0 0-5H18'/><path d='M4 22h16'/><path d='M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22'/><path d='M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22'/><path d='M18 2H6v7a6 6 0 0 0 12 0V2Z'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'drift': 'drift 20s ease infinite',
                        'electric-pulse': 'electric-pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                    },
                    keyframes: {
                        drift: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        },
                        'electric-pulse': {
                            '0%, 100%': { opacity: '1', filter: 'brightness(1) drop-shadow(0 0 2px rgba(59, 130, 246, 0.4))' },
                            '50%': { opacity: '0.8', filter: 'brightness(1.5) drop-shadow(0 0 10px rgba(59, 130, 246, 0.9))' },
                        },
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        }
                    }
                }
            }
        }
    </script>
    <script>
        document.documentElement.classList.add('dark'); 
    </script>
    
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        .hover-scale { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out, border-color 0.2s ease-in-out; }
        .hover-scale:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3); border-color: rgba(59, 130, 246, 0.6); }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
    </style>
</head>
<body class="bg-slate-950 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black bg-[length:200%_200%] animate-drift min-h-screen flex flex-col font-sans text-slate-200 transition-colors duration-300">

    <div class="flex-1 flex flex-col items-center px-4 w-full pt-16 relative z-10">
        
        <a href="index.html" class="absolute top-8 left-8 text-xs font-black text-blue-800 hover:text-blue-400 transition-colors tracking-tighter z-20">&larr; BACK TO LAUNCHPAD</a>

        <main class="w-full max-w-4xl flex flex-col gap-6">

            <!-- COLLEGIATE -->
            <details class="group relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-yellow-500/20 hover-scale overflow-hidden">

                            <div class="bg-slate-950/50">

                                <div id="ncaa-mens-feed" class="max-h-[400px] overflow-y-auto divide-y divide-indigo-900/30">
                                    <div class="p-6 text-center text-sm font-mono text-indigo-500/70 animate-pulse">> Loading bracket...</div>
                                </div>
                            </div>
                            <div class="bg-slate-950/50">
                                <h3 class="font-bold p-3 bg-indigo-950/40 text-sm font-mono text-indigo-300 text-center uppercase tracking-widest border-b border-indigo-900/50">Women's Bracket</h3>
                                <div id="ncaa-womens-feed" class="max-h-[400px] overflow-y-auto divide-y divide-indigo-900/30">
                                    <div class="p-6 text-center text-sm font-mono text-indigo-500/70 animate-pulse">> Loading bracket...</div>

        </main>

    </div>

    <!-- THE ENGINE ROOM -->
    <script>
        // --- Custom SVG Strings for Dynamic Injection ---
        const svgFootball = `<svg class="w-5 h-5 inline-block -mt-1 text-orange-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.32 18.68A12.04 12.04 0 0 0 18.68 5.32 12.04 12.04 0 0 0 5.32 18.68Z"/><path d="m14.5 10.5-5 5"/><path d="m10.5 9.5-1 1"/><path d="m14.5 13.5-1 1"/></svg>`;
        const svgBasketball = `<svg class="w-5 h-5 inline-block -mt-1 text-orange-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2v20"/><path d="M5.5 5.5a9.5 9.5 0 0 1 0 13"/><path d="M18.5 5.5a9.5 9.5 0 0 0 0 13"/></svg>`;
        const svgBaseball = `<svg class="w-5 h-5 inline-block -mt-1 text-slate-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M6.5 4.5a9 9 0 0 1 0 15"/><path d="M17.5 4.5a9 9 0 0 0 0 15"/></svg>`;
        const svgHockey = `<svg class="w-5 h-5 inline-block -mt-1 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18l11-11 2 2-11 11H4v-2z"/><path d="M7 21h3"/><path d="M20 18l-11-11-2 2 11 11h2v-2z"/><path d="M14 21h3"/><circle cx="12" cy="16" r="2" fill="currentColor" stroke="none"/></svg>`;

        // --- Sports Pipelines ---
        const proConfig = [
            { id: 'min-nfl', name: 'Minnesota Vikings', teamId: '15', league: 'nfl', icon: svgFootball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/15/schedule' },
            { id: 'gb-nfl', name: 'Green Bay Packers', teamId: '9', league: 'nfl', icon: svgFootball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/9/schedule' },
            { id: 'min-nba', name: 'Minnesota Timberwolves', teamId: '16', league: 'nba', icon: svgBasketball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/16/schedule' },
            { id: 'min-wnba', name: 'Minnesota Lynx', teamId: '14', league: 'wnba', icon: svgBasketball, gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/teams/14/schedule' },
            { id: 'mil-nba', name: 'Milwaukee Bucks', teamId: '15', league: 'nba', icon: svgBasketball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/15/schedule' },
            { id: 'min-mlb', name: 'Minnesota Twins', teamId: '10', league: 'mlb', icon: svgBaseball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/10/schedule' },
            { id: 'mil-mlb', name: 'Milwaukee Brewers', teamId: '8', league: 'mlb', icon: svgBaseball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/8/schedule' },
            { id: 'min-nhl', name: 'Minnesota Wild', teamId: '30', league: 'nhl', icon: svgHockey, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/teams/30/schedule' },
            { id: 'min-pwhl', name: 'Minnesota Frost', teamId: '4', league: 'pwhl', icon: svgHockey, gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/pwhl/teams/4/schedule' }
        ];

        const collegeConfig = [
            { name: 'Wisconsin Football', teamId: '275', icon: svgFootball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/college-football/teams/275/schedule' },
            { name: 'Minnesota Football', teamId: '135', icon: svgFootball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/college-football/teams/135/schedule' },
            { name: 'Wisconsin Basketball', teamId: '275', icon: svgBasketball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/teams/275/schedule' },
            { name: 'Minnesota Basketball', teamId: '135', icon: svgBasketball, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/teams/135/schedule' },
            { name: 'Wisconsin Basketball', teamId: '275', icon: svgBasketball, gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/womens-college-basketball/teams/275/schedule' },
            { name: 'Minnesota Basketball', teamId: '135', icon: svgBasketball, gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/womens-college-basketball/teams/135/schedule' },
            { name: 'Wisconsin Hockey', teamId: '275', icon: svgHockey, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/mens-college-hockey/teams/275/schedule' },
            { name: 'Minnesota Hockey', teamId: '135', icon: svgHockey, gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/mens-college-hockey/teams/135/schedule' },
            { name: 'Wisconsin Hockey', teamId: '275', icon: svgHockey, gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/womens-college-hockey/teams/275/schedule' },
            { name: 'Minnesota Hockey', teamId: '135', icon: svgHockey, gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/womens-college-hockey/teams/135/schedule' }
        ];

        let standingsCache = {};

        async function fetchAllStandings() {
            const leagues = [
                { id: 'nfl', sport: 'football' }, { id: 'nba', sport: 'basketball' },
                { id: 'wnba', sport: 'basketball' }, { id: 'mlb', sport: 'baseball' }, 
                { id: 'nhl', sport: 'hockey' }, { id: 'mens-college-basketball', sport: 'basketball' },
                { id: 'womens-college-basketball', sport: 'basketball' }
            ];
            for (const lg of leagues) {
                try {
                    const resp = await fetch(`https://site.api.espn.com/apis/v2/sports/${lg.sport}/${lg.id}/standings`);
                    standingsCache[lg.id] = await resp.json();
                } catch (e) {}
            }
        }

        function getRecord(teamData, leagueId) {
            let record = teamData?.records?.[0]?.summary || teamData?.team?.record?.items?.[0]?.summary || teamData?.team?.record?.summary;
            if (record) return record;
            
            const data = standingsCache[leagueId];
            if (!data || !teamData?.team?.id) return '';
            
            function search(obj) {
                if (record) return; 
                if (!obj || typeof obj !== 'object') return;
                if (obj.team && String(obj.team.id) === String(teamData.team.id)) {
                    const stats = obj.stats || [];
                    const overall = stats.find(s => s.name === 'overall') || stats.find(s => s.type === 'overall') || stats[0];
                    if (overall) record = overall.displayValue || overall.summary || '';
                    return;
                }
                if (Array.isArray(obj)) { for (let item of obj) search(item); } 
                else { for (let key in obj) search(obj[key]); }
            }
            search(data);
            return record;
        }

        function buildTitle(config, event) {
            let name = config.name;
            if (config.league === 'nfl' && event?.season?.type === 1) name += ' <span class="text-orange-500 ml-1 font-mono">[PRE]</span>';
            
            let genderTag = '';
            if (config.gender === 'W') genderTag = '<span class="bg-fuchsia-900/50 text-fuchsia-400 border border-fuchsia-500/30 px-1.5 rounded text-[10px] ml-2 font-mono">W</span>';
            if (config.gender === 'M') genderTag = '<span class="bg-blue-900/50 text-blue-400 border border-blue-500/30 px-1.5 rounded text-[10px] ml-2 font-mono">M</span>';
            
            return `<div class="flex items-center gap-1.5">${config.icon} <span class="text-slate-200 text-base">${name}</span> ${genderTag}</div>`;
        }

        function renderStatusCard(config, status, statusClass) {
            return `
                <div class="p-4 flex items-center justify-between bg-slate-900/40 hover:bg-slate-800/50 transition-colors">
                    <span class="font-bold flex items-center">${buildTitle(config, null)}</span>
                    <span class="text-xs font-mono px-2 py-1 rounded tracking-widest ${statusClass}">${status}</span>
                </div>
            `;
        }

        function processTeamData(config, data) {
            if (!data?.events || data.events.length === 0) return { html: renderStatusCard(config, 'OFFLINE', 'bg-slate-800 text-slate-300 border border-slate-700'), weight: 6 };

            const isPreseason = data.events.some(e => e.season?.type === 1);
            if (config.league === 'mlb' && isPreseason) {
                return { html: renderStatusCard(config, 'SPRING_TRAINING', 'bg-yellow-900/30 text-yellow-500 border border-yellow-700/50'), weight: 5 };
            }

            const teamEvents = data.events.filter(e => {
                const comps = e?.competitions?.[0]?.competitors || [];
                return comps.some(c => String(c?.team?.id) === String(config.teamId));
            });
            
            if (teamEvents.length === 0) return { html: renderStatusCard(config, 'HIBERNATION', 'bg-slate-800 text-slate-300 border border-slate-700'), weight: 5 };

            const now = new Date();
            let event = teamEvents.find(e => e.status?.type?.state === 'in');
            
            if (!event) {
                event = teamEvents.reduce((closest, current) => {
                    const cDate = new Date(current.competitions?.[0]?.date || 0);
                    const clDate = new Date(closest.competitions?.[0]?.date || 0);
                    return Math.abs(cDate - now) < Math.abs(clDate - now) ? current : closest;
                });
            }

            const comp = event?.competitions?.[0];
            if (!comp) return { html: renderStatusCard(config, 'HIBERNATION', 'bg-slate-800 text-slate-300 border border-slate-700'), weight: 5 };

            const gameDate = new Date(comp.date);
            const daysDiff = (gameDate - now) / (1000 * 60 * 60 * 24);
            
            if (Math.abs(daysDiff) > 21) return { html: renderStatusCard(config, 'HIBERNATION', 'bg-slate-800 text-slate-300 border border-slate-700'), weight: 5 };

            const comps = comp.competitors || [];
            const home = comps.find(c => c?.homeAway === 'home') || comps[0];
            const away = comps.find(c => c?.homeAway === 'away') || comps[1];

            const state = comp.status?.type?.state || 'pre';
            const isLive = state === 'in';
            const weight = isLive ? 1 : (daysDiff > 0 ? 2 : 3); 

            const venue = comp.notes?.[0]?.headline || comp.venue?.fullName || 'TBD Venue';
            const displayDate = gameDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit' }).toUpperCase();
            
            const parseScore = (team) => {
                if (state === 'pre' || team?.score == null) return '-';
                return typeof team.score === 'object' ? (team.score.displayValue ?? team.score.value ?? '-') : team.score;
            };
            
            const statusClass = isLive 
                ? 'bg-red-900/40 text-red-400 border border-red-500/50 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.3)]' 
                : 'bg-slate-800 text-slate-300 border border-slate-700';
            
            const renderRow = (t) => `
                <div class="flex justify-between items-center group/team">
                    <div class="flex items-center gap-4">
                        ${t?.team?.logos?.[0]?.href ? `<img src="${t.team.logos[0].href}" class="w-8 h-8 object-contain drop-shadow-md group-hover/team:drop-shadow-[0_0_8px_rgba(59,130,246,0.8)] transition-all duration-300">` : '<div class="w-8 h-8 rounded-full bg-slate-700"></div>'}
                        <div class="flex flex-col">
                            <span class="text-base font-bold ${t?.winner ? 'text-cyan-300 drop-shadow-[0_0_5px_rgba(103,232,249,0.5)]' : 'text-slate-200'}">${t?.team?.shortDisplayName || t?.team?.displayName || 'TBA'}</span>
                            <span class="text-xs font-mono text-slate-400">${getRecord(t, config.league)}</span>
                        </div>
                    </div>
                    <span class="text-2xl font-mono ${t?.winner ? 'text-cyan-400 font-black' : 'text-slate-400'}">${parseScore(t)}</span>
                </div>
            `;

            const html = `
                <div class="p-4 bg-slate-900/60 hover:bg-slate-800/80 transition-colors border-b border-transparent hover:border-cyan-900/50">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <span class="text-xs font-mono text-cyan-600 block flex items-center">${buildTitle(config, event)}</span>
                            <div class="text-xs font-mono text-slate-300 flex items-center gap-2 bg-slate-950/50 px-2 py-1 rounded border border-slate-800">
                                <span>${displayDate}</span><span class="text-cyan-800">|</span><span class="truncate max-w-[200px]">${venue}</span>
                            </div>
                        </div>
                        <span class="text-xs font-mono px-2 py-1 rounded ${statusClass}">${comp.status?.type?.shortDetail || 'TBD'}</span>
                    </div>
                    <div class="flex flex-col gap-3 mt-2">${renderRow(away)}${renderRow(home)}</div>
                </div>
            `;
            return { html, weight };
        }

        async function fetchFeedGroup(configArray, containerId) {
            const container = document.getElementById(containerId);
            try {
                const results = await Promise.all(configArray.map(async (config) => {
                    try {
                        const resp = await fetch(config.url);
                        return processTeamData(config, await resp.json());
                    } catch (e) {
                        return { html: renderStatusCard(config, 'OFFLINE', 'bg-slate-800 text-slate-300 border border-slate-700'), weight: 6 };
                    }
                }));
                const valid = results.filter(r => r !== null).sort((a, b) => a.weight - b.weight);
                container.innerHTML = valid.map(r => r.html).join('') || '<div class="p-8 text-center text-sm font-mono text-slate-400">> NO DATA</div>';
            } catch (e) {
                container.innerHTML = '<div class="p-8 text-center text-sm font-mono text-red-500">> ERROR</div>';
            }
        }

        async function fetchNCAATournament(gender, containerId) {
            const container = document.getElementById(containerId);
            try {
                const now = new Date();
                const d = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/${gender}-college-basketball/scoreboard?dates=${d}`;
                
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (!data?.events || data.events.length === 0) {
                    container.innerHTML = '<div class="p-6 text-center text-sm font-mono text-slate-400">> NO GAMES TODAY</div>';
                    return;
                }
                
                let targetGames = data.events.sort((a, b) => {
                    const sA = a.status?.type?.state; const sB = b.status?.type?.state;
                    if (sA === 'in' && sB !== 'in') return -1;
                    if (sA !== 'in' && sB === 'in') return 1;
                    return new Date(a.date) - new Date(b.date);
                });

                container.innerHTML = targetGames.map(event => {
                    const comp = event.competitions?.[0];
                    if (!comp) return '';
                    const home = comp.competitors?.find(c => c.homeAway === 'home');
                    const away = comp.competitors?.find(c => c.homeAway === 'away');
                    if (!home || !away) return '';

                    const state = comp.status?.type?.state;
                    const isLive = state === 'in';
                    const isPre = state === 'pre';
                    
                    const time = new Date(comp.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const statusClass = isLive ? 'text-red-400 bg-red-950/40 px-1.5 py-0.5 rounded border border-red-900 animate-pulse' : 'text-slate-300';

                    const renderTeam = (t) => `
                        <div class="flex items-center gap-3">
                            ${t.curatedRank?.current < 26 ? `<span class="text-[10px] text-indigo-400 font-mono bg-indigo-950/50 px-1.5 py-0.5 rounded border border-indigo-900/50">${t.curatedRank.current}</span>` : ''}
                            <span class="text-base font-bold ${t.winner ? 'text-indigo-300 drop-shadow-[0_0_5px_rgba(165,180,252,0.5)]' : 'text-slate-200'}">${t.team?.shortDisplayName || 'TBA'}</span>
                        </div>
                        <span class="text-lg font-mono ${t.winner ? 'font-black text-indigo-400' : 'text-slate-400'}">${isPre ? '-' : (t.score || '-')}</span>
                    `;

                    return `
                        <div class="p-4 bg-slate-900/40 hover:bg-slate-800/60 transition-colors border-b border-transparent hover:border-indigo-900/30">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-mono text-indigo-600 uppercase truncate max-w-[200px]">${event.shortName}</span>
                                <span class="text-xs font-mono ${statusClass}">${isPre ? time : comp.status?.type?.shortDetail}</span>
                            </div>
                            <div class="flex flex-col gap-2 w-full">
                                <div class="flex justify-between items-center">${renderTeam(away)}</div>
                                <div class="flex justify-between items-center">${renderTeam(home)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div class="p-4 text-center text-sm font-mono text-red-500">> UNAVAILABLE</div>';
            }
        }

        function checkNCAAWindow() {
            const container = document.getElementById('ncaa-container');
            const details = document.getElementById('ncaa-details');
            const title = document.getElementById('ncaa-title');
            
            const now = new Date();
            const year = now.getFullYear();
            
            const activeStart = new Date(year, 2, 10);
            const activeEnd = new Date(year, 3, 15);
            
            if (now < activeStart || now > activeEnd) {
                container.classList.add('opacity-30', 'grayscale', 'pointer-events-none');
                details.classList.remove('hover-scale');
                title.innerHTML += ' <span class="text-xs font-mono text-slate-400 ml-3 border border-slate-600 px-1.5 py-0.5 rounded">> INACTIVE</span>';
                return false;
            }
            return true;
        }

        // --- Boot Sequence ---
        async function initializeSports() {
            await fetchAllStandings();
            fetchFeedGroup(proConfig, 'pro-feed');
            fetchFeedGroup(collegeConfig, 'college-feed');
            
            if (checkNCAAWindow()) {
                fetchNCAATournament('mens', 'ncaa-mens-feed');
                fetchNCAATournament('womens', 'ncaa-womens-feed');
            }
        }

        document.addEventListener("DOMContentLoaded", initializeSports);
        
        setInterval(() => {
            fetchFeedGroup(proConfig, 'pro-feed');
            fetchFeedGroup(collegeConfig, 'college-feed');
        }, 15000);
        
        setInterval(fetchAllStandings, 3600000);
    </script>
</body>
</html>
