<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Tracker // V2.0</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9H4.5a2.5 2.5 0 0 1 0-5H6'/><path d='M18 9h1.5a2.5 2.5 0 0 0 0-5H18'/><path d='M4 22h16'/><path d='M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22'/><path d='M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22'/><path d='M18 2H6v7a6 6 0 0 0 12 0V2Z'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-200 antialiased selection:bg-white/20">

    <div class="fixed top-0 w-full px-8 py-4 flex justify-between items-center z-50 border-b border-white/10 bg-black/50 backdrop-blur-xl">
        <a href="index.html" class="text-[11px] font-bold text-white/60 hover:text-white transition-colors tracking-widest flex items-center gap-2 p-3 -ml-3">
            <span>&larr;</span> LAUNCHPAD
        </a>
        <div class="flex items-center gap-3 text-white/60 font-mono text-[10px] uppercase tracking-widest" id="last-updated">
            <span class="animate-pulse text-green-500">●</span> SYNCING...
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-6 w-full pt-32 pb-20 relative z-10">
        <header class="mb-12 text-center w-full max-w-7xl">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-2 text-white/90">Sports Feed</h1>
        </header>

        <main class="w-full max-w-7xl flex flex-col gap-8">
            <details class="group relative glass-card overflow-hidden" open>
                <summary class="flex justify-between items-center font-semibold cursor-pointer p-6 relative z-10 border-b border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/10 p-2.5 rounded-xl border border-white/10 text-white/80">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        </div>
                        <span class="text-white/90 tracking-wide text-xl">Pro</span>
                    </div>
                    <span class="transition-transform duration-300 group-open:rotate-180 text-white/40">
                        <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24"><polyline points="6 9 12 15 18 9"/></svg>
                    </span>
                </summary>
                <div class="relative z-10 bg-black/20">
                    <div id="pro-feed" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 p-6">
                        <div class="col-span-full p-12 text-center text-sm font-mono text-white/40 animate-pulse">Establishing uplink...</div>
                    </div>
                </div>
            </details>

            <details class="group relative glass-card overflow-hidden" open>
                <summary class="flex justify-between items-center font-semibold cursor-pointer p-6 relative z-10 border-b border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/10 p-2.5 rounded-xl border border-white/10 text-white/80">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v7" /></svg>
                        </div>
                        <span class="text-white/90 tracking-wide text-xl">College</span>
                    </div>
                    <span class="transition-transform duration-300 group-open:rotate-180 text-white/40">
                        <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24"><polyline points="6 9 12 15 18 9"/></svg>
                    </span>
                </summary>
                <div class="relative z-10 bg-black/20">
                    <div id="college-feed" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 p-6">
                        <div class="col-span-full p-12 text-center text-sm font-mono text-white/40 animate-pulse">Establishing uplink...</div>
                    </div>
                </div>
            </details>

            <div id="ncaa-container" class="transition-all duration-500">
                <details id="ncaa-details" class="group relative glass-card overflow-hidden">
                    <summary id="ncaa-summary" class="flex justify-between items-center font-semibold cursor-pointer p-6 relative z-10 border-b border-white/5">
                        <div class="flex items-center gap-4">
                            <div class="bg-white/10 p-2.5 rounded-xl border border-white/10 text-white/80">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2v20"/><path d="M5.5 5.5a9.5 9.5 0 0 1 0 13"/><path d="M18.5 5.5a9.5 9.5 0 0 0 0 13"/></svg>
                            </div>
                            <span id="ncaa-title" class="text-white/90 tracking-wide text-xl">March Madness</span>
                        </div>
                        <span class="transition-transform duration-300 group-open:rotate-180 text-white/40">
                            <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24"><polyline points="6 9 12 15 18 9"/></svg>
                        </span>
                    </summary>
                    <div class="p-0 relative z-10 bg-black/20">
                        <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-white/5">
                            <div>
                                <h3 class="font-bold p-3 bg-white/5 text-xs font-mono text-white/60 text-center uppercase tracking-widest border-b border-white/5">Men's Bracket</h3>
                                <div id="ncaa-mens-feed" class="max-h-[500px] overflow-y-auto p-4 flex flex-col gap-4">
                                    <div class="p-6 text-center text-sm font-mono text-white/40 animate-pulse">Awaiting bracket...</div>
                                </div>
                            </div>
                            <div>
                                <h3 class="font-bold p-3 bg-white/5 text-xs font-mono text-white/60 text-center uppercase tracking-widest border-b border-white/5">Women's Bracket</h3>
                                <div id="ncaa-womens-feed" class="max-h-[500px] overflow-y-auto p-4 flex flex-col gap-4">
                                    <div class="p-6 text-center text-sm font-mono text-white/40 animate-pulse">Awaiting bracket...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </details>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
