  <style>
    :root {
      --bg:         #0a0e27;
      --bg-card:    rgba(14,18,40,0.97);
      --accent:     #bb86fc;
      --accent-dim: rgba(187,134,252,0.13);
      --terminal:   #ffeb3b;
      --primary:    #00e5ff;
      --danger:     #f87171;
      --success:    #4ade80;
      --orange:     #fb923c;
      --text:       #e0e0e0;
      --muted:      #888;
      --glass:      rgba(14,18,40,0.88);
      --border:     rgba(187,134,252,0.28);
      --r:          8px;
      --r-sm:       4px;
      --r-pill:     20px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Courier New',Courier,monospace; font-size:14px; overflow:hidden; }
    button { cursor:pointer; font-family:inherit; }
    svg { display:block; }
    .hidden { display:none !important; }

    /* VFX */
    #vfx-layer { position:fixed; inset:0; pointer-events:none; z-index:100; transition:box-shadow 1s ease,background 1s ease; }
    .vfx-critical { box-shadow:inset 0 0 160px rgba(255,0,0,.7),inset 0 0 220px rgba(255,71,87,.5); animation:vfx-crit .8s ease-in-out infinite; }
    .vfx-bleeding { box-shadow:inset 0 0 120px rgba(248,113,113,.55); animation:vfx-bleed 2.5s ease-in-out infinite; }
    .vfx-poison   { box-shadow:inset 0 0 140px rgba(74,222,128,.28); background:radial-gradient(circle at center,transparent 50%,rgba(46,204,113,.07) 100%); }
    .vfx-stunned  { box-shadow:inset 0 0 130px rgba(251,191,36,.32); animation:vfx-stun 1.5s ease-in-out infinite; }
    .vfx-burning  { box-shadow:inset 0 0 150px rgba(251,146,60,.48); animation:vfx-burn 1s ease-in-out infinite; }
    .vfx-blinded  { background:rgba(0,0,0,.88); backdrop-filter:blur(8px); }
    @keyframes vfx-crit  { 0%,100%{box-shadow:inset 0 0 160px rgba(255,0,0,.6),inset 0 0 220px rgba(255,71,87,.4)} 50%{box-shadow:inset 0 0 220px rgba(255,0,0,.9),inset 0 0 300px rgba(255,71,87,.7)} }
    @keyframes vfx-bleed { 0%,100%{box-shadow:inset 0 0 120px rgba(248,113,113,.4)} 50%{box-shadow:inset 0 0 200px rgba(248,113,113,.75)} }
    @keyframes vfx-stun  { 0%,100%{box-shadow:inset 0 0 130px rgba(251,191,36,.22)} 50%{box-shadow:inset 0 0 200px rgba(251,191,36,.52)} }
    @keyframes vfx-burn  { 0%,100%{box-shadow:inset 0 0 150px rgba(251,146,60,.38)} 50%{box-shadow:inset 0 0 210px rgba(251,146,60,.68)} }
    @keyframes hp-pulse  { 0%,100%{background:rgba(248,113,113,.1)} 50%{background:rgba(248,113,113,.3)} }

    /* LOGIN */
    #login-layer { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem; padding:2rem; z-index:2000; overflow-y:auto; }
    .login-hero { display:flex; flex-direction:column; align-items:center; gap:.75rem; text-align:center; }
    .hero-ring { width:200px; height:200px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--primary)); padding:4px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 50px rgba(187,134,252,.45); flex-shrink:0; }
    .hero-inner { width:100%; height:100%; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .hero-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .hero-inner svg { width:55%; height:55%; color:var(--accent); }
    #hero-name { font-size:clamp(1.3rem,5vw,2.1rem); font-weight:bold; color:#fff; letter-spacing:.1em; text-transform:uppercase; }
    #hero-sub  { font-size:.9rem; color:var(--accent); text-transform:uppercase; letter-spacing:.07em; }
    .roster-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(125px,1fr)); gap:.8rem; width:100%; max-width:660px; }
    .roster-btn { background:var(--glass); border:2px solid var(--border); color:var(--text); padding:1.2rem .7rem; border-radius:var(--r); transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease; display:flex; flex-direction:column; align-items:center; gap:.55rem; }
    .roster-btn:hover { transform:scale(1.06); border-color:var(--accent); box-shadow:0 0 24px rgba(187,134,252,.4); }
    .roster-btn svg { width:34px; height:34px; color:var(--accent); }
    .roster-btn span { font-size:.82rem; font-weight:bold; letter-spacing:.06em; text-transform:uppercase; }

    /* LOADING */
    #loading-layer { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; z-index:2500; padding:2rem; text-align:center; }
    .load-icon { width:60px; height:60px; color:var(--terminal); animation:spin 2s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #load-title { font-size:clamp(1.3rem,5vw,1.9rem); color:var(--terminal); letter-spacing:.18em; text-transform:uppercase; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    #load-tip { font-size:.82rem; color:var(--muted); max-width:400px; line-height:1.65; font-style:italic; }
    .bar-wrap { width:260px; height:4px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
    .bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--primary)); border-radius:2px; transition:width 6s linear; }

    /* HUD */
    #main-hud { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:min(93vw,480px); max-height:88vh; background:var(--bg-card); border:2px solid var(--accent); border-radius:12px; padding:1.2rem; z-index:1000; display:flex; flex-direction:column; gap:.8rem; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 60px rgba(187,134,252,.08); scrollbar-width:thin; scrollbar-color:var(--accent) transparent; }
    #main-hud::-webkit-scrollbar { width:4px; }
    #main-hud::-webkit-scrollbar-thumb { background:var(--accent); border-radius:2px; }
    .hud-section { background:rgba(0,0,0,.22); border:1px solid var(--border); border-radius:var(--r); padding:.85rem; }
    .section-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; margin-bottom:.55rem; }

    /* Header */
    .hud-header { display:flex; align-items:center; gap:.8rem; }
    #hud-avatar { width:54px; height:54px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--primary)); padding:2px; flex-shrink:0; }
    .av-inner { width:100%; height:100%; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .av-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .av-inner svg { width:55%; height:55%; color:var(--accent); }
    .hud-info { flex:1; min-width:0; }
    .hud-info h2 { font-size:1.05rem; color:var(--terminal); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:0; }
    .hud-info p { font-size:.75rem; color:var(--muted); margin:0.2rem 0 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Vitals Grid */
    #vitals-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; }
    .vs { background:rgba(0,0,0,.15); border:1px solid var(--border); border-radius:var(--r-sm); padding:.65rem; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
    .vs .sl { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.2rem; }
    .vs .sv { font-size:.95rem; font-weight:bold; color:var(--primary); font-family:monospace; }
    .vs.hp-low .sv { color:var(--orange); }
    .vs.hp-crit { border-color:var(--danger); box-shadow:inset 0 0 16px rgba(248,113,113,.15); animation:hp-pulse 1.2s ease-in-out infinite; }
    .vs.hp-crit .sv { color:var(--danger); }

    /* Actions */
    #actions { display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; }
    .action-btn { background:rgba(0,0,0,.2); border:1px solid var(--border); color:var(--text); padding:.65rem; border-radius:var(--r-sm); font-size:.75rem; font-weight:bold; letter-spacing:.07em; text-transform:uppercase; transition:all .2s ease; cursor:pointer; }
    .action-btn:hover { border-color:var(--accent); box-shadow:0 0 12px rgba(187,134,252,.25); transform:translateY(-1px); }
    .action-btn:active { transform:translateY(0); }

    /* Conditions */
    #cond-grid { display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; min-height:2.4rem; }
    .chip { display:inline-flex; align-items:center; gap:.4rem; background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:var(--r-pill); padding:.4rem .65rem; font-size:.7rem; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; }
    .chip svg { width:14px; height:14px; }
    .c-poison { border-color:rgba(74,222,128,.4); color:rgba(74,222,128,.9); }
    .c-bleeding { border-color:rgba(248,113,113,.4); color:rgba(248,113,113,.9); }
    .c-burning { border-color:rgba(251,146,60,.4); color:rgba(251,146,60,.9); }
    .c-stunned { border-color:rgba(251,191,36,.4); color:rgba(251,191,36,.9); }
    .c-charmed { border-color:rgba(236,72,153,.4); color:rgba(236,72,153,.9); }
    .c-frightened { border-color:rgba(139,92,246,.4); color:rgba(139,92,246,.9); }
    .c-blinded { border-color:rgba(100,116,139,.4); color:rgba(100,116,139,.9); }
    .c-deafened { border-color:rgba(100,116,139,.4); color:rgba(100,116,139,.9); }
    .c-restrained { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-grappled { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-incap { border-color:rgba(255,193,7,.4); color:rgba(255,193,7,.9); }
    .c-unconscious { border-color:rgba(255,0,0,.4); color:rgba(255,0,0,.9); }
    .c-petrified { border-color:rgba(156,163,175,.4); color:rgba(156,163,175,.9); }
    .c-concentrating { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-exhaustion { border-color:rgba(248,113,113,.4); color:rgba(248,113,113,.9); }
    .c-inspired { border-color:rgba(34,197,94,.4); color:rgba(34,197,94,.9); }
    .c-protected { border-color:rgba(59,130,246,.4); color:rgba(59,130,246,.9); }
    .c-cursed { border-color:rgba(139,92,246,.4); color:rgba(139,92,246,.9); }
    .c-default { border-color:var(--border); color:var(--text); }
    .no-cond { font-size:.75rem; color:var(--muted); font-style:italic; }

    /* Spells */
    #spell-section { margin-top:.6rem; padding-top:.6rem; border-top:1px solid var(--border); }
    .sp-intro { font-size:.75rem; color:var(--muted); margin-bottom:.6rem; }
    .sp-btns { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
    .sp-btn { background:rgba(0,0,0,.2); border:1px solid var(--border); color:var(--text); padding:.5rem .8rem; border-radius:var(--r-sm); font-size:.7rem; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; transition:all .2s ease; position:relative; }
    .sp-btn:hover { border-color:var(--primary); }
    .sp-btn.no-slots { opacity:.5; cursor:not-allowed; }
    .sp-btn.depleted { border-color:var(--danger); color:var(--danger); }
    .cnt { position:absolute; top:.3rem; right:.5rem; font-size:.55rem; }
    .sp-detail { max-height:0; overflow:hidden; transition:max-height .3s ease; }
    .sp-detail.open { max-height:200px; }
    .sp-dlabel { display:block; font-size:.65rem; color:var(--muted); margin-bottom:.4rem; }
    .sp-ctrl { display:flex; align-items:center; gap:.4rem; margin-bottom:.5rem; }
    .sp-adj { background:rgba(0,0,0,.15); border:1px solid var(--border); color:var(--primary); padding:.35rem .5rem; font-size:.8rem; border-radius:var(--r-sm); cursor:pointer; transition:all .2s ease; }
    .sp-adj:hover { border-color:var(--primary); box-shadow:0 0 8px rgba(0,229,255,.2); }
    .sp-adj:disabled { opacity:.4; cursor:not-allowed; }
    .sp-val { font-family:monospace; font-size:.85rem; flex:1; text-align:center; }
    .sp-close { background:rgba(248,113,113,.15); border:1px solid rgba(248,113,113,.3); color:var(--danger); padding:.35rem .65rem; font-size:.65rem; border-radius:var(--r-sm); cursor:pointer; transition:all .2s ease; }
    .sp-close:hover { border-color:var(--danger); background:rgba(248,113,113,.25); }
    .lr-btn { background:linear-gradient(135deg,rgba(187,134,252,.2),rgba(0,229,255,.15)); border:1px solid var(--accent); color:var(--accent); padding:.65rem; border-radius:var(--r-sm); font-size:.75rem; font-weight:bold; text-transform:uppercase; letter-spacing:.07em; margin-top:.6rem; cursor:pointer; transition:all .2s ease; }
    .lr-btn:hover { box-shadow:0 0 16px rgba(187,134,252,.35); }

    /* Achievement Pill */
    #ach-pill { position:fixed; bottom:2rem; right:2rem; display:none; align-items:center; gap:.6rem; background:linear-gradient(135deg,var(--accent),var(--primary)); padding:1rem 1.4rem; border-radius:var(--r-pill); box-shadow:0 4px 20px rgba(187,134,252,.4); cursor:pointer; transition:all .3s ease; z-index:500; }
    #ach-pill:hover { transform:scale(1.08); box-shadow:0 6px 30px rgba(187,134,252,.6); }
    #ach-pill svg { width:20px; height:20px; color:#fff; }
    #ach-pill > span:nth-child(2) { font-size:.8rem; font-weight:bold; color:#fff; text-transform:uppercase; letter-spacing:.06em; }
    .badge { display:inline-flex; align-items:center; justify-content:center; background:var(--danger); color:#fff; width:20px; height:20px; border-radius:50%; font-size:.65rem; font-weight:bold; }
    @keyframes pill-pulse { 0%,100%{box-shadow:0 4px 20px rgba(187,134,252,.4)} 50%{box-shadow:0 4px 40px rgba(187,134,252,.8)} }

    /* Ticker */
    #ticker-pill { position:fixed; bottom:2rem; left:2rem; max-width:400px; background:rgba(14,18,40,.95); border:1px solid var(--terminal); border-radius:var(--r-sm); padding:.6rem .8rem; font-size:.7rem; color:var(--terminal); letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .2s ease; z-index:500; }
    #ticker-pill:hover { box-shadow:inset 0 0 12px rgba(255,235,59,.2); }
    #ticker-text { display:block; word-break:break-word; font-weight:bold; }
    #ticker-text.fade { opacity:.2; transition:opacity .4s ease; }

    /* Modal */
    #modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(4px); }
    .ach-modal { background:var(--bg-card); border:2px solid var(--accent); border-radius:var(--r); padding:1.5rem; max-width:320px; text-align:center; box-shadow:0 8px 32px rgba(187,134,252,.25); }
    .ach-modal svg { width:48px; height:48px; color:var(--accent); margin:0 auto 1rem; }
    .ach-modal h2 { font-size:1.1rem; color:var(--terminal); margin-bottom:.5rem; text-transform:uppercase; letter-spacing:.08em; }
    .ach-modal p { font-size:.8rem; color:var(--muted); margin-bottom:1.2rem; }
    .ack-btn { background:linear-gradient(135deg,var(--accent),var(--primary)); border:none; color:#fff; padding:.7rem 1.4rem; border-radius:var(--r-sm); font-size:.8rem; font-weight:bold; text-transform:uppercase; letter-spacing:.07em; cursor:pointer; transition:all .2s ease; }
    .ack-btn:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(187,134,252,.4); }

    /* Toast */
    .toast { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%); background:rgba(14,18,40,.95); border:1px solid var(--accent); color:var(--text); padding:.8rem 1.2rem; border-radius:var(--r-sm); font-size:.8rem; z-index:4000; box-shadow:0 4px 16px rgba(0,0,0,.6); animation:toast-slide 0.3s ease-out; }
    @keyframes toast-slide { from { transform:translateX(-50%) translateY(20px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }

    /* Logout Button */
    #btn-logout { position:fixed; top:1rem; right:1rem; background:rgba(248,113,113,.1); border:1px solid var(--danger); color:var(--danger); padding:.5rem .8rem; border-radius:var(--r-sm); font-size:.7rem; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; cursor:pointer; transition:all .2s ease; z-index:500; }
    #btn-logout:hover { background:rgba(248,113,113,.2); box-shadow:0 0 12px rgba(248,113,113,.3); }
  </style>
</head>
<body>

<div id="vfx-layer"></div>

<!-- LOGIN -->
<div id="login-layer">
  <div class="login-hero">
    <div class="hero-ring">
      <div class="hero-inner">
        <svg viewBox="0 0 24 24"><use href="#icon-user"/></svg>
      </div>
    </div>
    <h1 id="hero-name">CRAWLERS</h1>
    <p id="hero-sub">Terminal Ready</p>
  </div>
  <div class="roster-grid" id="roster-grid"></div>
</div>

<!-- LOADING -->
<div id="loading-layer" class="hidden">
  <svg class="load-icon" viewBox="0 0 24 24"><use href="#icon-radio"/></svg>
  <h1 id="load-title">STANDBY</h1>
  <p id="load-tip"></p>
  <div class="bar-wrap"><div class="bar" id="load-bar"></div></div>
</div>

<!-- MAIN HUD -->
<div id="main-hud" class="hidden">
  <div class="hud-header">
    <div id="hud-avatar">
      <div class="av-inner"><svg viewBox="0 0 24 24"><use href="#icon-user"/></svg></div>
    </div>
    <div class="hud-info">
      <h2 id="hud-name">—</h2>
      <p id="hud-sub">Awaiting data...</p>
    </div>
  </div>

  <div class="hud-section">
    <div class="section-label">Vitals</div>
    <div id="vitals-grid"></div>
  </div>

  <div class="hud-section">
    <div class="section-label">Status</div>
    <div id="cond-grid"><span class="no-cond">No active conditions</span></div>
  </div>

  <div id="actions">
    <button class="action-btn" id="btn-items">Inventory</button>
    <button class="action-btn" id="btn-ach">Achievements</button>
  </div>
  <button id="btn-logout" style="position:fixed; top:1rem; right:1rem;">Logout</button>
</div>

<!-- TICKER -->
<div id="ticker-pill" class="hidden">
  <span id="ticker-text">DUNGEON BROADCAST SYSTEM</span>
</div>

<!-- ACHIEVEMENT PILL -->
<div id="ach-pill">
  <svg viewBox="0 0 24 24"><use href="#icon-star"/></svg>
  <span>New</span>
  <span class="badge" id="ach-badge">0</span>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="hidden">
  <div class="ach-modal">
    <svg viewBox="0 0 24 24"><use href="#icon-star"/></svg>
    <h2 id="modal-name">Achievement</h2>
    <p id="modal-date"></p>
    <button class="ack-btn" id="btn-ack">Acknowledge</button>
  </div>
</div>

<script>
'use strict';

/* ── Config ── */
const WORKER_URL   = 'https://dmscreen.askozicki.workers.dev';
const TICKER_URL   = 'https://kzick.dev/dm-screen/ticker.json';
const AVATAR_BASE  = 'https://cdn.jsdelivr.net/gh/kzick001/dashboard@main/dm-screen/players/';
const P_KEY        = 'showrunner_active_player';
const T_KEY        = 'showrunner_ticker_visible';
const POLL_MS      = 30000;
const TICKER_MS    = 8000;
const LOAD_MS      = 6000;
const ROSTER       = ['Chuck','Tilly','Hendrick','Aelar','Jimothy'];

/* ── Condition definitions ── */
const CDEF = {
  poisoned:      {icon:'icon-droplet',       css:'c-poison',        vfx:'vfx-poison'  },
  bleeding:      {icon:'icon-droplet',       css:'c-bleeding',      vfx:'vfx-bleeding'},
  burning:       {icon:'icon-flame',          css:'c-burning',       vfx:'vfx-burning' },
  stunned:       {icon:'icon-zap',            css:'c-stunned',       vfx:'vfx-stunned' },
  charmed:       {icon:'icon-heart',          css:'c-charmed',       vfx:null          },
  frightened:    {icon:'icon-alert-triangle', css:'c-frightened',    vfx:null          },
  blinded:       {icon:'icon-eye-off',        css:'c-blinded',       vfx:'vfx-blinded' },
  deafened:      {icon:'icon-eye-off',        css:'c-deafened',      vfx:null          },
  restrained:    {icon:'icon-lock',           css:'c-restrained',    vfx:null          },
  grappled:      {icon:'icon-link',           css:'c-grappled',      vfx:null          },
  incapacitated: {icon:'icon-pause-circle',   css:'c-incap',         vfx:null          },
  unconscious:   {icon:'icon-x-circle',       css:'c-unconscious',   vfx:'vfx-critical'},
  petrified:     {icon:'icon-layers',         css:'c-petrified',     vfx:null          },
  concentrating: {icon:'icon-target',         css:'c-concentrating', vfx:null          },
  exhaustion:    {icon:'icon-battery',        css:'c-exhaustion',    vfx:null          },
  inspired:      {icon:'icon-star',           css:'c-inspired',      vfx:null          },
  protected:     {icon:'icon-shield',         css:'c-protected',     vfx:null          },
  cursed:        {icon:'icon-settings',       css:'c-cursed',        vfx:null          },
};
const VFX_ALL = ['vfx-critical','vfx-bleeding','vfx-poison','vfx-stunned','vfx-burning','vfx-blinded'];

/* ── State ── */
let state      = null;   // full campaign state from KV
let player     = null;   // current character object
let playerName = null;   // active player name string
let pollTimer  = null;
let tickTimer  = null;
let tickData   = null;
let curAch     = null;   // achievement currently in modal
let spellBuilt = false;  // track whether spell section DOM exists

/* ══════════════════════════════
   INIT
══════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  fetchTickerData();
  startPolling();
  buildRoster();

  get('btn-logout').addEventListener('click', logout);
  get('btn-items').addEventListener('click', () => toast('Items list coming soon.'));
  get('btn-ach').addEventListener('click', openModal);
  get('btn-ack').addEventListener('click', acknowledgeAch);
  get('ach-pill').addEventListener('click', openModal);
  get('ticker-pill').addEventListener('click', toggleTicker);
  get('modal-overlay').addEventListener('click', e => { if (e.target === get('modal-overlay')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Auto-login
  const saved = localStorage.getItem(P_KEY);
  if (saved !== null) {
    const idx = parseInt(saved);
    if (!isNaN(idx) && ROSTER[idx]) doLogin(ROSTER[idx], idx, true);
  }
});

/* ══════════════════════════════
   ROSTER
══════════════════════════════ */
function buildRoster() {
  const grid = get('roster-grid');
  grid.innerHTML = '';
  ROSTER.forEach((name, idx) => {
    const btn = document.createElement('button');
    btn.className = 'roster-btn';
    btn.innerHTML = `<svg viewBox="0 0 24 24"><use href="#icon-user"/></svg><span>${x(name)}</span>`;
    btn.addEventListener('click', () => doLogin(name, idx, false));
    grid.appendChild(btn);
  });
}

/* ══════════════════════════════
   LOGIN / LOADING
══════════════════════════════ */
function doLogin(name, idx, isAuto) {
  playerName = name;
  if (state?.characters) player = state.characters.find(c => c.name === name) || null;

  if (isAuto) { showHUD(); return; }

  // Show loading screen, then reveal HUD
  const loginLayer = get('login-layer');
  const loadLayer  = get('loading-layer');

  get('load-title').textContent = `EXTRACTING ${name.toUpperCase()}...`;
  get('load-tip').textContent   = randomTip();
  get('load-bar').style.width   = '0%';

  loginLayer.classList.add('hidden');
  loadLayer.classList.remove('hidden');

  // Trigger bar animation on next frame
  requestAnimationFrame(() => requestAnimationFrame(() => {
    get('load-bar').style.width = '100%';
  }));

  setTimeout(() => {
    localStorage.setItem(P_KEY, idx.toString());
    loadLayer.classList.add('hidden');
    showHUD();
  }, LOAD_MS);
}

function showHUD() {
  get('login-layer').classList.add('hidden');
  get('loading-layer').classList.add('hidden');
  get('main-hud').classList.remove('hidden');
  renderAll();
  initTicker();
}

/* ══════════════════════════════
   LOGOUT
══════════════════════════════ */
function logout() {
  localStorage.removeItem(P_KEY);
  playerName = null; player = null; curAch = null; spellBuilt = false;

  VFX_ALL.forEach(c => get('vfx-layer').classList.remove(c));
  if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }

  get('ach-pill').style.display = 'none';
  get('ticker-pill').classList.add('hidden');
  get('vitals-grid').innerHTML = '';
  get('cond-grid').innerHTML = '<span class="no-cond">No active conditions</span>';

  const ss = document.getElementById('spell-section');
  if (ss) ss.remove();

  get('main-hud').classList.add('hidden');
  get('login-layer').classList.remove('hidden');
  buildRoster();
}

/* ══════════════════════════════
   KV POLLING
══════════════════════════════ */
async function fetchState() {
  try {
    const res = await fetch(WORKER_URL, {method:'GET', mode:'cors'});
    if (!res.ok) { console.error('[HUD] Poll', res.status); return; }
    state = await res.json();
    // Migrate old v31 schema (players → characters)
    if (state.version === 31 && state.players && !state.characters) {
      state.characters = state.players;
    }
    if (playerName) player = state.characters?.find(c => c.name === playerName) || null;
    if (!get('main-hud').classList.contains('hidden')) renderAll();
  } catch (e) { console.error('[HUD] Poll error:', e.message); }
}

function startPolling() {
  fetchState();
  pollTimer = setInterval(fetchState, POLL_MS);
}

async function syncToKV() {
  if (!state) return;
  try {
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({base_version: state.version || 0, data: state})
    });
    if (res.ok) {
      const r = await res.json();
      if (r.new_version !== undefined) state.version = r.new_version;
    } else if (res.status === 409) {
      console.warn('[HUD] Collision — re-fetching');
      await fetchState();
    } else {
      toast('Save failed. Try again.');
    }
  } catch (e) { toast('Connection error. Could not save.'); }
}

/* ══════════════════════════════
   RENDER ALL
══════════════════════════════ */
function renderAll() {
  updateHeader();
  updateAvatar();
  updateVitals();
  updateConditions();
  renderSpellSection();
  updateSpellCounts();
  applyVFX();
  updateAchPill();
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
function updateHeader() {
  get('hud-name').textContent = player?.name || playerName || '—';
  const sub = player ? [player.race, player.class].filter(Boolean).join(' ') : 'Awaiting data...';
  get('hud-sub').textContent = sub || '—';
}

/* ══════════════════════════════
   AVATAR
══════════════════════════════ */
function updateAvatar() {
  if (!player) return;
  const name    = player.name?.toLowerCase() || '';
  const imgPath = player.profileImage || `${AVATAR_BASE}${name}.png`;
  const inner   = get('av-inner');
  const existing = inner.querySelector('img');
  if (existing && existing.dataset.src === imgPath) return; // no-op if unchanged

  const img = new Image();
  img.dataset.src = imgPath;
  img.onload = () => {
    inner.innerHTML = '';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
    inner.appendChild(img);
  };
  img.onerror = () => {
    inner.innerHTML = '<svg viewBox="0 0 24 24"><use href="#icon-user"/></svg>';
  };
  img.src = imgPath;
}

/* ══════════════════════════════
   VITALS
══════════════════════════════ */
function updateVitals() {
  const hp    = player?.stats?.hp?.current ?? null;
  const maxHp = player?.stats?.hp?.max     ?? null;
  const pct   = (hp !== null && maxHp) ? hp/maxHp : 1;

  let cls = 'vs';
  if      (pct <= 0.25) cls += ' hp-crit';
  else if (pct <= 0.50) cls += ' hp-low';

  const fmt = (v, unit='') => v != null ? `${v}${unit}` : '—';

  get('vitals-grid').innerHTML = `
    <div class="${cls}"><span class="sl">HP</span><span class="sv">${x(fmt(hp)+'/'+ fmt(maxHp))}</span></div>
    <div class="vs"><span class="sl">AC</span><span class="sv">${x(fmt(player?.stats?.ac))}</span></div>
    <div class="vs"><span class="sl">Passive</span><span class="sv">${x(fmt(player?.stats?.passivePerception))}</span></div>
    <div class="vs"><span class="sl">Speed</span><span class="sv">${x(fmt(player?.stats?.speed,' ft'))}</span></div>
  `;
}

/* ══════════════════════════════
   CONDITIONS
══════════════════════════════ */
function updateConditions() {
  const grid  = get('cond-grid');
  const conds = player?.conditions || [];
  grid.innerHTML = '';

  if (!conds.length) {
    grid.innerHTML = '<span class="no-cond">No active conditions</span>';
    return;
  }
  conds.forEach(raw => {
    const key = raw.toLowerCase().replace(/\s+/g,'_');
    const def = CDEF[key] || {icon:'icon-alert-triangle', css:'c-default', vfx:null};
    const lbl = raw.charAt(0).toUpperCase() + raw.slice(1);
    const chip = document.createElement('span');
    chip.className = `chip ${def.css}`;
    chip.title = lbl;
    chip.innerHTML = `<svg viewBox="0 0 24 24"><use href="#${def.icon}"/></svg>${x(lbl)}`;
    grid.appendChild(chip);
  });
}

/* ══════════════════════════════
   VFX
══════════════════════════════ */
function applyVFX() {
  const vfx = get('vfx-layer');
  VFX_ALL.forEach(c => vfx.classList.remove(c));
  if (!player?.conditions) return;
  const conds = player.conditions.map(c => c.toLowerCase().replace(/\s+/g,'_'));
  conds.forEach(c => {
    const vfxClass = CDEF[c]?.vfx;
    if (vfxClass) vfx.classList.add(vfxClass);
  });
}

/* ══════════════════════════════
   SPELLS
══════════════════════════════ */
function renderSpellSection() {
  if (!player?.spellSlots || spellBuilt) return;
  const hud = get('main-hud');
  const actions = document.getElementById('actions');
  const sec = document.createElement('div');
  sec.id = 'spell-section';
  sec.className = 'hud-section';
  sec.innerHTML = `
    <div class="section-label">Spell Slots</div>
    <div class="sp-intro">Track and spend spell slots across levels.</div>
    <div class="sp-btns">
      ${[1,2,3].map(i=>`
        <button class="sp-btn" id="sp-btn-${i}" onclick="toggleDetail(${i})">
          Level ${i}
          <span class="cnt" id="sp-cnt-${i}">—</span>
        </button>`).join('')}
    </div>
    ${[1,2,3].map(i=>`
      <div class="sp-detail" id="sp-det-${i}">
        <span class="sp-dlabel">Level ${i}</span>
        <div class="sp-ctrl">
          <button class="sp-adj" id="sp-dec-${i}" onclick="adjSlot(${i},-1)">−</button>
          <span class="sp-val" id="sp-val-${i}">—</span>
          <button class="sp-adj" id="sp-inc-${i}" onclick="adjSlot(${i},1)">+</button>
        </div>
        <button class="sp-close" onclick="toggleDetail(${i})">Close</button>
      </div>`).join('')}
    <button class="lr-btn" onclick="longRest()">☽ Long Rest — Reset All</button>
  `;
  hud.insertBefore(sec, actions);
  spellBuilt = true;
}

function updateSpellCounts() {
  if (!player?.spellSlots) return;
  [1,2,3].forEach(i => {
    const slot = player.spellSlots[`level${i}`];
    const btn  = document.getElementById(`sp-btn-${i}`);
    const cnt  = document.getElementById(`sp-cnt-${i}`);
    const val  = document.getElementById(`sp-val-${i}`);
    const dec  = document.getElementById(`sp-dec-${i}`);
    const inc  = document.getElementById(`sp-inc-${i}`);
    if (!btn || !slot) return;
    const max = slot.max ?? 0, cur = slot.current ?? 0;
    if (max === 0) { btn.className='sp-btn no-slots'; if(cnt) cnt.textContent='N/A'; }
    else { btn.className = cur===0 ? 'sp-btn depleted':'sp-btn'; if(cnt) cnt.textContent=`${cur}/${max}`; }
    if (val) val.textContent = `${cur} / ${max}`;
    if (dec) dec.disabled = cur<=0;
    if (inc) inc.disabled = cur>=max;
  });
}

function toggleDetail(i) {
  const d = document.getElementById(`sp-det-${i}`);
  if (d) d.classList.toggle('open');
}

function adjSlot(i, delta) {
  if (!player?.spellSlots) return;
  const slot = player.spellSlots[`level${i}`];
  if (!slot) return;
  const n = (slot.current ?? 0) + delta;
  if (n < 0 || n > (slot.max ?? 0)) return;
  slot.current = n;
  updateSpellCounts();
  syncToKV();
}

function longRest() {
  if (!player?.spellSlots) return;
  if (!confirm('Reset all spell slots? This counts as a long rest.')) return;
  [1,2,3].forEach(i => {
    const s = player.spellSlots[`level${i}`];
    if (s) s.current = s.max ?? 0;
  });
  player.spellSlots.lastLongRest = new Date().toISOString();
  updateSpellCounts();
  syncToKV();
  toast('Long rest complete. All slots restored.');
}

/* ══════════════════════════════
   ACHIEVEMENTS
══════════════════════════════ */
function unacked() {
  if (!state?.achievements) return [];
  return state.achievements.filter(a => !a.archived && !a.acknowledgedBy?.includes(playerName));
}

function updateAchPill() {
  const list  = unacked();
  const pill  = get('ach-pill');
  const badge = get('ach-badge');
  if (list.length > 0) {
    pill.style.display = 'flex';
    if (badge) badge.textContent = list.length;
    pill.style.animation = list.some(a=>a.glow) ? 'pill-pulse 1s ease-in-out infinite':'';
  } else {
    pill.style.display = 'none';
    pill.style.animation = '';
  }
}

function openModal() {
  const list = unacked();
  if (!list.length) { toast('No new achievements.'); return; }
  curAch = list[0];
  get('modal-name').textContent = curAch.name || 'Achievement';
  get('modal-date').textContent = curAch.earned
    ? `Earned ${new Date(curAch.earned).toLocaleDateString()}` : '';
  get('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  get('modal-overlay').classList.add('hidden');
  curAch = null;
}

async function acknowledgeAch() {
  if (!curAch || !state) return;
  const ach = state.achievements?.find(a => a.id === curAch.id);
  if (ach) {
    if (!ach.acknowledgedBy) ach.acknowledgedBy = [];
    if (!ach.acknowledgedBy.includes(playerName)) ach.acknowledgedBy.push(playerName);
    ach.glow = false;
    await syncToKV();
    updateAchPill();
  }
  closeModal();
}

/* ══════════════════════════════
   TICKER
══════════════════════════════ */
async function fetchTickerData() {
  try {
    const res = await fetch(TICKER_URL);
    if (res.ok) tickData = await res.json();
  } catch (e) { console.warn('[HUD] Ticker fetch:', e.message); }
}

function randomTip() {
  if (!tickData?.tips?.length) return 'Stay calm. Extraction in progress.';
  return tickData.tips[Math.floor(Math.random() * tickData.tips.length)];
}

function randomMsg() {
  if (!tickData) return 'DUNGEON BROADCAST SYSTEM — stand by.';
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  return `${pick(tickData.subjects)} ${pick(tickData.actions)} ${pick(tickData.results)}`;
}

function initTicker() {
  const visible = localStorage.getItem(T_KEY) !== 'false';
  const pill = get('ticker-pill');
  if (visible) {
    pill.classList.remove('hidden');
    rotateTick();
    tickTimer = setInterval(rotateTick, TICKER_MS);
  }
}

function rotateTick() {
  const textEl = get('ticker-text');
  if (!textEl) return;
  // Fade out → swap text → fade in
  textEl.classList.add('fade');
  setTimeout(() => {
    textEl.textContent = randomMsg();
    textEl.classList.remove('fade');
  }, 400);
}

function toggleTicker() {
  const pill    = get('ticker-pill');
  const visible = !pill.classList.contains('hidden');
  if (visible) {
    pill.classList.add('hidden');
    localStorage.setItem(T_KEY, 'false');
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
  } else {
    pill.classList.remove('hidden');
    localStorage.setItem(T_KEY, 'true');
    rotateTick();
    tickTimer = setInterval(rotateTick, TICKER_MS);
  }
}

/* ══════════════════════════════
   UTILITIES
══════════════════════════════ */
const get = id => document.getElementById(id);

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function x(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
