<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showrunner | Player HUD V4.1</title>
  
  <!-- SVG Icon Library (SP1: Foundations) -->
  <svg style="display: none; width: 0; height: 0;">
    <defs>

      <!-- Eye (Ticker Pill, Blinded) -->

      </svg>

      <!-- Eye Off (Blinded, Invisible) -->

      <!-- Heart (Charmed) -->

      <!-- Lock (Restrained, Grappled) -->

      </svg>

      <!-- Zap (Stunned) -->
      <svg id="icon-zap" viewBox="0 0 24 24">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>

      <!-- Flame (Burning) -->
      <svg id="icon-flame" viewBox="0 0 24 24">
        <path d="M13.75 1.69a1 1 0 0 0-3.5 0c-5.47 3.43-9 6.77-9 10.82 0 5.93 4.18 10.74 9.35 10.74 5.17 0 9.35-4.81 9.35-10.74 0-4.05-3.53-7.39-9-10.82z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <path d="M12 8.5c-1.66 1-3 2.5-3 4.5 0 1.66 1.34 3 3 3s3-1.34 3-3c0-2-1.34-3.5-3-4.5z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- X Circle (Unconscious) -->
      <svg id="icon-x-circle" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Alert Triangle (Frightened) -->
      <svg id="icon-alert-triangle" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Target (Concentrating) -->
      <svg id="icon-target" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="1" fill="currentColor"/>
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>

      <!-- Pause Circle (Incapacitated) -->
      <svg id="icon-pause-circle" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="10" y1="8" x2="10" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="8" x2="14" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Layers (Petrified) -->
      <svg id="icon-layers" viewBox="0 0 24 24">
        <polygon points="12 2 2 7 2 12 12 17 22 12 22 7 12 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <polyline points="2 12 12 17 22 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <polyline points="2 17 12 22 22 17" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Link (Grappled) -->
      <svg id="icon-link" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Arrow Down (Pushed, Pulled) -->
      <svg id="icon-arrow-down" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="19 12 12 19 5 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <!-- Battery (Exhaustion) -->
      <svg id="icon-battery" viewBox="0 0 24 24">
        <rect x="1" y="6" width="16" height="12" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="17" y1="8" x2="17" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <rect x="2" y="7" width="4" height="10" fill="currentColor"/>
      </svg>

      <!-- Star (Inspiration) -->
      <svg id="icon-star" viewBox="0 0 24 24">
        <polygon points="12 2 15.09 10.26 23.77 11.36 17.88 17.15 19.54 25.88 12 21.77 4.46 25.88 6.12 17.15 0.23 11.36 8.91 10.26 12 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Shield (Protected) -->
      <svg id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 1L3 5v7c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Gear (Cursed) -->
      <svg id="icon-gear" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6m-16.78 7.78l4.24-4.24m5.08-5.08l4.24-4.24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Plus (Add) -->
      <svg id="icon-plus" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Light Bulb (Idea / Custom) -->
      <svg id="icon-light" viewBox="0 0 24 24">
        <path d="M21 17v2H3v-2s0-4 9-4 9 4 9 4z" fill="currentColor"/>
        <path d="M3.21 7a7 7 0 0 1 13.58 0M7 17v2m10 0v2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <!-- User -->
      <svg id="icon-user" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </defs>
  </svg>

  <style>
    :root {
      --bg: #0a0e27;
      --accent: #bb86fc;
      --ai-terminal: #ffeb3b;
      --primary: #00e5ff;
      --danger: #f87171;
      --success: #4ade80;
      --text: #e0e0e0;
      --text-dark: #888888;
      --glass: rgba(30, 30, 40, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    /* VFX Overlay */
    .vfx-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 100;
      transition: all 1s ease;
    }

    .vfx-critical {
      box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8), inset 0 0 200px rgba(255, 71, 87, 0.6);
      background: radial-gradient(circle at center, transparent 40%, rgba(255, 71, 87, 0.2) 100%);
      animation: vfx-critical-pulse 0.8s infinite;
    }

    .vfx-bleeding {
      box-shadow: inset 0 0 120px rgba(255, 71, 87, 0.6);
      animation: vfx-bleed-pulse 2.5s infinite;
    }

    .vfx-poison {
      box-shadow: inset 0 0 150px rgba(46, 204, 113, 0.4);
      background: radial-gradient(circle, transparent 60%, rgba(46, 204, 113, 0.1) 100%);
    }

    .vfx-blinded {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
    }

    @keyframes vfx-critical-pulse {
      0% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.6), inset 0 0 200px rgba(255, 71, 87, 0.4); }
      50% { box-shadow: inset 0 0 200px rgba(255, 0, 0, 0.8), inset 0 0 250px rgba(255, 71, 87, 0.6); }
      100% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.6), inset 0 0 200px rgba(255, 71, 87, 0.4); }
    }

    @keyframes vfx-bleed-pulse {
      0% { box-shadow: inset 0 0 120px rgba(255, 71, 87, 0.4); }
      50% { box-shadow: inset 0 0 200px rgba(255, 71, 87, 0.7); }
      100% { box-shadow: inset 0 0 120px rgba(255, 71, 87, 0.4); }
    }

    /* Login Screen */
    .login-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2500;
      gap: 2rem;
      padding: 2rem;
      overflow-y: auto;
    }

    .login-layer.hidden {
      display: none;
    }

    .login-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .hero-avatar-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      box-shadow: 0 0 40px var(--accent);
    }

    .hero-avatar-ring img {
      width: 192px;
      height: 192px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #000;
    }

    .hero-avatar-ring svg {
      width: 192px;
      height: 192px;
      color: var(--accent);
    }

    .hero-player-name {
      font-size: 2.5rem;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      margin: 0;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--accent);
      text-transform: uppercase;
      margin: 0;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 800px;
    }

    .roster-btn {
      background: var(--glass);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .roster-btn:hover {
      box-shadow: 0 0 20px var(--accent);
      transform: scale(1.05);
    }

    /* Player HUD */
    .player-hud {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 320px;
      max-height: calc(100vh - 40px);
      background: var(--glass);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 1.5rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    .player-hud.hidden {
      display: none;
    }

    .hud-header {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .hud-player-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hud-player-avatar img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
    }

    .hud-player-avatar svg {
      width: 40px;
      height: 40px;
      color: #000;
    }

    .hud-player-info h2 {
      font-size: 1.2rem;
      margin: 0;
      color: var(--ai-terminal);
    }

    .hud-player-info p {
      font-size: 0.85rem;
      color: var(--text-dark);
      margin: 0;
    }

    /* Vitals */
    .vitals-display {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .vitals-stat {
      font-size: 0.9rem;
      text-align: center;
      padding: 0.5rem;
      background: rgba(187, 134, 252, 0.1);
      border-radius: 4px;
      color: var(--ai-terminal);
    }

    /* Spell Slots (Phase 5) */
    .spell-slots-section {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 1rem;
    }

    .spell-slots-section h3 {
      margin: 0 0 0.75rem 0;
      font-size: 0.95rem;
      color: var(--ai-terminal);
      text-transform: uppercase;
    }

    .spell-slots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .spell-level-btn {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
      font-size: 0.75rem;
    }

    .spell-level-btn:hover {
      filter: brightness(1.1);
    }

    .spell-level-btn .level {
      display: block;
      font-size: 0.7rem;
      margin-bottom: 0.25rem;
    }

    .spell-level-btn .count {
      display: block;
      font-size: 1rem;
    }

    .slots-detail {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      margin-top: 0.5rem;
    }

    .slots-detail.show {
      display: flex;
    }

    .slots-detail button {
      background: var(--ai-terminal);
      color: #000;
      border: none;
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .long-rest-btn {
      background: var(--success);
      color: #000;
      border: none;
      padding: 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: all 0.2s ease;
    }

    .long-rest-btn:hover {
      filter: brightness(1.1);
    }

    /* Notification Pill (Phase 5) */
    .notification-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #000;
      border-radius: 20px;
      padding: 0.5rem 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .notification-pill:hover {
      filter: brightness(1.1);
    }

    .notification-pill .badge {
      background: var(--danger);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .notification-pill svg {
      width: 20px;
      height: 20px;
    }

    /* Ticker Pill */
    .ticker-pill {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--glass);
      border: 1px solid var(--ai-terminal);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: var(--ai-terminal);
      z-index: 999;
    }

    .ticker-pill.hidden {
      display: none;
    }

    .ticker-icon {
      width: 18px;
      height: 18px;
    }

    .ticker-text {
      font-size: 0.85rem;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--glass);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 1rem;
      border-radius: 8px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .achievement-modal {
      background: var(--glass);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 2rem;
      max-width: 400px;
      text-align: center;
    }

    .achievement-modal h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--ai-terminal);
    }

    .achievement-modal p {
      font-size: 0.9rem;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }

    .achievement-modal button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

  </style>

  <script>
    // ========== CONFIGURATION ==========
    const WORKER_URL = 'https://dmscreen.askozicki.workers.dev';
    const AUTH_TOKEN_KEY = 'showrunner_auth_token';
    const TICKER_STORAGE_KEY = 'showrunner_ticker_visible';
    const PLAYER_ACTIVE_KEY = 'showrunner_active_player';
    const POLLING_INTERVAL = 30000; // 30 seconds (Phase 4)

    // ========== STATE ==========
    let campaignState = null; // Phase 4: KV-synced campaign state
    let currentPlayer = null; // Phase 4: Current player from campaign state
    let playerName = new URLSearchParams(window.location.search).get("player") || "Jimothy"; // Phase 4: Player name from URL or default
    
    let activePlayerIndex = null;
    let notificationCache = [];
    let pollingInterval = null; // Phase 4: Polling timer
    let currentAchievementModal = null; // Phase 5: Achievement modal tracking

    // ========== INITIALIZATION ==========
    window.addEventListener('DOMContentLoaded', () => {
      initLoginScreen();
      initTickerToggle();
      initNotificationBadge();
      initLogoutButton();
      
      // Phase 4: Start KV polling for campaign state
      startKVPolling();

      // Auto-login check
      const savedIdx = localStorage.getItem(PLAYER_ACTIVE_KEY);
      if (savedIdx !== null) {
        const idx = parseInt(savedIdx);
        if (idx === 0) selectPlayer(playerName, idx, true);
      }
    });

    // ========== PHASE 1: LOGIN SCREEN ==========
    function initLoginScreen() {
      populateRoster();
    }

    function populateRoster() {
      const grid = document.getElementById('roster-grid');
      grid.innerHTML = '';

      const players = ['Chuck', 'Tilly', 'Hendrick', 'Aelar', 'Jimothy'];
      
      players.forEach((name, idx) => {
        const btn = document.createElement('button');
        btn.className = 'roster-btn';
        btn.innerHTML = `
          <div style="text-align: center;">
            <svg style="width: 40px; height: 40px; margin-bottom: 0.5rem;" viewBox="0 0 24 24">
              <use xlink:href="#icon-user"></use>
            </svg>
            <p style="margin: 0.5rem 0 0 0; font-weight: bold;">${name}</p>
          </div>
        `;
        btn.addEventListener('click', () => selectPlayer(name, idx, false));
        grid.appendChild(btn);
      });
    }

    function selectPlayer(name, idx, isAutoLogin) {
      activePlayerIndex = idx;
      playerName = name; // Phase 4: Track player name for KV lookups
      localStorage.setItem(PLAYER_ACTIVE_KEY, idx.toString());

      const loginLayer = document.getElementById('login-layer');
      const hudLayer = document.getElementById('main-hud');
      
      document.getElementById('hero-player-name').textContent = name;
      document.getElementById('hero-avatar-ring').style.background = 'var(--accent)';
      
      // Phase 4: Try to get data from KV first
      if (campaignState && campaignState.characters) {
        currentPlayer = campaignState.characters.find(c => c.name === name);
        if (currentPlayer) {
          document.getElementById('hero-subtitle').textContent = `${currentPlayer.race} ${currentPlayer.class}`;
        }
      }

      // Transition to HUD
      loginLayer.style.animation = 'fadeOut 0.5s ease forwards';
      setTimeout(() => {
        loginLayer.classList.add('hidden');
        hudLayer.classList.remove('hidden');
        renderPlayerHUD();
        updateAchievementNotifier();
      }, 500);
    }

    // ========== KV POLLING (Phase 4) ==========
    async function fetchCampaignStateFromKV() {
      try {
        const token = localStorage.getItem(AUTH_TOKEN_KEY) || sessionStorage.getItem(AUTH_TOKEN_KEY);
        if (!token) {
          console.warn("No auth token for KV polling");
          return;
        }
        
        const response = await fetch(WORKER_URL, {
          method: "GET",
          headers: { "Authorization": `Bearer ${token}` }
        });
        
        if (response.ok) {
          campaignState = await response.json();
          currentPlayer = campaignState.characters?.find(c => c.name === playerName);
          updatePlayerDisplayFromKV();
        }
      } catch (e) {
        console.error("KV polling error:", e);
      }
    }

    function updatePlayerDisplayFromKV() {
      if (!currentPlayer) {
        console.warn(`Player "${playerName}" not found in campaign state.`);
        return;
      }
      
      // Update profile image (Phase 4)
      const profileImg = document.querySelector(".hud-player-avatar img");
      if (profileImg) {
        profileImg.src = currentPlayer.profileImage || `/players/${playerName}.png`;
        profileImg.onerror = function() {
          this.style.display = 'none';
        };
      }
      
      // Update vitals display
      updateVitalsDisplay();
      updateSpellSlotsDisplay();
      updateAchievementNotifier();
    }

    function updateVitalsDisplay() {
      if (!currentPlayer) return;
      
      const vitalsContainer = document.querySelector(".vitals-display");
      if (vitalsContainer) {
        vitalsContainer.innerHTML = `
          <div class="vitals-stat">HP: ${currentPlayer.currentHP}/${currentPlayer.maxHP}</div>
          <div class="vitals-stat">AC: ${currentPlayer.ac}</div>
          <div class="vitals-stat">Passive: ${currentPlayer.passivePerception}</div>
        `;
      }
    }

    function startKVPolling() {
      // Fetch immediately
      fetchCampaignStateFromKV();
      
      // Then set interval (Phase 4: 30 second polling)
      pollingInterval = setInterval(fetchCampaignStateFromKV, POLLING_INTERVAL);
    }

    function stopKVPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    // ========== SPELL SLOTS (Phase 5) ==========
    function updateSpellSlotsDisplay() {
      if (!currentPlayer || !currentPlayer.spellSlots) return;
      
      for (let i = 1; i <= 3; i++) {
        const key = `level${i}`;
        const slot = currentPlayer.spellSlots[key];
        const countEl = document.getElementById(`slots-l${i}`);
        if (countEl) {
          countEl.textContent = `${slot.current}/${slot.max}`;
        }
      }
    }

    function toggleSpellSlots(level) {
      const detail = document.getElementById(`slots-l${level}-detail`);
      if (detail) {
        detail.classList.toggle('show');
      }
    }

    function decrementSpellSlot(level) {
      if (!currentPlayer || !currentPlayer.spellSlots) return;
      
      const key = `level${level}`;
      if (currentPlayer.spellSlots[key].current > 0) {
        currentPlayer.spellSlots[key].current--;
        updateSpellSlotsDisplay();
        syncPlayerToKV();
      }
    }

    function incrementSpellSlot(level) {
      if (!currentPlayer || !currentPlayer.spellSlots) return;
      
      const key = `level${level}`;
      const max = currentPlayer.spellSlots[key].max;
      if (currentPlayer.spellSlots[key].current < max) {
        currentPlayer.spellSlots[key].current++;
        updateSpellSlotsDisplay();
        syncPlayerToKV();
      }
    }

    async function longRest() {
      if (!currentPlayer || !currentPlayer.spellSlots) return;
      if (!confirm("Reset all spell slots? This triggers a long rest.")) return;
      
      for (let i = 1; i <= 3; i++) {
        const key = `level${i}`;
        currentPlayer.spellSlots[key].current = currentPlayer.spellSlots[key].max;
      }
      currentPlayer.spellSlots.lastLongRest = new Date().toISOString();
      
      updateSpellSlotsDisplay();
      await syncPlayerToKV();
      showToast("Long rest completed!");
    }

    // ========== ACHIEVEMENTS (Phase 5) ==========
    function getUnacknowledgedAchievements() {
      if (!campaignState || !campaignState.achievements) return [];
      return campaignState.achievements.filter(a => 
        !a.archived && 
        !a.acknowledgedBy?.includes(playerName)
      );
    }

    function updateAchievementNotifier() {
      const unack = getUnacknowledgedAchievements();
      const badge = document.getElementById('achievement-badge');
      const pill = document.getElementById('achievement-pill');
      
      if (unack.length > 0) {
        if (badge) badge.textContent = unack.length;
        if (pill) pill.style.display = 'flex';
        
        // Add glow if any are glowing
        const glowing = unack.some(a => a.glow);
        if (glowing && pill) {
          pill.style.animation = 'pulse 1s infinite';
        }
      } else {
        if (pill) pill.style.display = 'none';
      }
    }

    function openAchievementModal() {
      const unack = getUnacknowledgedAchievements();
      if (unack.length === 0) return;
      
      currentAchievementModal = unack[0];
      const overlay = document.getElementById('achievement-overlay');
      const modal = document.getElementById('achievement-modal');
      
      if (modal) {
        modal.innerHTML = `
          <svg style="width: 60px; height: 60px; margin: 0 auto 1rem; color: var(--ai-terminal);" viewBox="0 0 24 24">
            <use xlink:href="#icon-star"></use>
          </svg>
          <h2>${currentAchievementModal.name}</h2>
          <p>Earned on ${new Date(currentAchievementModal.earned).toLocaleDateString()}</p>
          <button onclick="acknowledgeAchievement()">Acknowledge</button>
        `;
      }
      
      if (overlay) overlay.classList.remove('hidden');
    }

    function closeAchievementModal() {
      const overlay = document.getElementById('achievement-overlay');
      if (overlay) overlay.classList.add('hidden');
      currentAchievementModal = null;
    }

    async function acknowledgeAchievement() {
      if (!currentAchievementModal || !campaignState) return;
      
      const ach = campaignState.achievements.find(a => a.id === currentAchievementModal.id);
      if (ach) {
        if (!ach.acknowledgedBy) ach.acknowledgedBy = [];
        if (!ach.acknowledgedBy.includes(playerName)) {
          ach.acknowledgedBy.push(playerName);
        }
        ach.glow = false;
        
        await syncPlayerToKV();
        updateAchievementNotifier();
        closeAchievementModal();
      }
    }

    // ========== PLAYER HUD RENDERING ==========
    function renderPlayerHUD() {
      if (!currentPlayer) return;
      
      const hudHeader = document.querySelector('.hud-player-info');
      if (hudHeader) {
        hudHeader.innerHTML = `
          <h2>${currentPlayer.name}</h2>
          <p>${currentPlayer.race} ${currentPlayer.class}</p>
        `;
      }

      const vitalsContainer = document.querySelector(".vitals-display");
      if (!vitalsContainer) {
        const hud = document.getElementById('main-hud');
        if (hud) {
          const vitals = document.createElement('div');
          vitals.className = 'vitals-display';
          vitals.innerHTML = `
            <div class="vitals-stat">HP: ${currentPlayer.currentHP}/${currentPlayer.maxHP}</div>
            <div class="vitals-stat">AC: ${currentPlayer.ac}</div>
            <div class="vitals-stat">Passive: ${currentPlayer.passivePerception}</div>
          `;
          hud.appendChild(vitals);
        }
      } else {
        updateVitalsDisplay();
      }

      // Create spell slots section if needed
      const spellSection = document.querySelector('.spell-slots-section');
      if (!spellSection && currentPlayer.spellSlots) {
        const hud = document.getElementById('main-hud');
        if (hud) {
          const section = document.createElement('div');
          section.className = 'spell-slots-section';
          section.innerHTML = `
            <h3>Spell Slots</h3>
            <div class="spell-slots-grid">
              <button class="spell-level-btn" onclick="toggleSpellSlots(1)">
                <span class="level">L1</span>
                <span class="count" id="slots-l1">2/2</span>
              </button>
              <button class="spell-level-btn" onclick="toggleSpellSlots(2)">
                <span class="level">L2</span>
                <span class="count" id="slots-l2">0/0</span>
              </button>
              <button class="spell-level-btn" onclick="toggleSpellSlots(3)">
                <span class="level">L3</span>
                <span class="count" id="slots-l3">0/0</span>
              </button>
            </div>
            <div id="slots-l1-detail" class="slots-detail">
              <button onclick="decrementSpellSlot(1)">−</button>
              <span id="slots-l1-current">2</span>
              <button onclick="incrementSpellSlot(1)">+</button>
              <button onclick="toggleSpellSlots(1)">Close</button>
            </div>
            <div id="slots-l2-detail" class="slots-detail">
              <button onclick="decrementSpellSlot(2)">−</button>
              <span id="slots-l2-current">0</span>
              <button onclick="incrementSpellSlot(2)">+</button>
              <button onclick="toggleSpellSlots(2)">Close</button>
            </div>
            <div id="slots-l3-detail" class="slots-detail">
              <button onclick="decrementSpellSlot(3)">−</button>
              <span id="slots-l3-current">0</span>
              <button onclick="incrementSpellSlot(3)">+</button>
              <button onclick="toggleSpellSlots(3)">Close</button>
            </div>
            <button class="long-rest-btn" onclick="longRest()">Long Rest (Reset)</button>
          `;
          hud.appendChild(section);
          updateSpellSlotsDisplay();
        }
      }
    }

    // ========== SYNC TO KV ==========
    async function syncPlayerToKV() {
      if (!currentPlayer || !campaignState) return;
      
      try {
        const token = localStorage.getItem(AUTH_TOKEN_KEY) || sessionStorage.getItem(AUTH_TOKEN_KEY);
        if (!token) {
          console.error("No auth token for sync.");
          return;
        }
        
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            action: "update",
            state: campaignState,
            base_version: campaignState.base_version || 1
          })
        });
        
        if (response.ok) {
          const data = await response.json();
          campaignState.base_version = data.base_version;
          console.log("Player synced to KV");
        }
      } catch (e) {
        console.error("Sync error:", e);
      }
    }

    // ========== TICKER & NOTIFICATIONS ==========
    function initTickerToggle() {
      const pill = document.getElementById('ticker-pill');
      if (pill) {
        pill.addEventListener('click', () => {
          const isVisible = localStorage.getItem(TICKER_STORAGE_KEY) === 'true';
          localStorage.setItem(TICKER_STORAGE_KEY, (!isVisible).toString());
        });
      }
    }

    function initNotificationBadge() {
      const pill = document.getElementById('achievement-pill');
      if (pill) {
        pill.addEventListener('click', openAchievementModal);
      }
    }

    function initLogoutButton() {
      const btn = document.getElementById('btn-logout');
      if (btn) {
        btn.addEventListener('click', logout);
      }
    }

    function logout() {
      activePlayerIndex = null;
      localStorage.removeItem(PLAYER_ACTIVE_KEY);
      stopKVPolling();
      
      const loginLayer = document.getElementById('login-layer');
      const hudLayer = document.getElementById('main-hud');
      
      hudLayer.classList.add('hidden');
      loginLayer.classList.remove('hidden');
      loginLayer.style.animation = '';
      populateRoster();
    }

    // ========== UTILITIES ==========
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.toString()
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeAchievementModal();
      }
    });
  </script>

</head>

<body>
  <div class="vfx-overlay" id="vfx-layer"></div>

  <!-- PHASE 1: LOGIN SCREEN -->
  <div class="login-layer" id="login-layer">
    <div class="login-hero">
      <div class="hero-avatar-ring" id="hero-avatar-ring">
        <svg id="hero-avatar-svg" class="icon-xl" viewBox="0 0 24 24" style="width: 192px; height: 192px;">
          <use xlink:href="#icon-user"></use>
        </svg>
      </div>
      <h1 class="hero-player-name" id="hero-player-name">SELECT CHARACTER</h1>
      <p class="hero-subtitle" id="hero-subtitle">Choose your hero</p>
    </div>

    <div class="roster-grid" id="roster-grid"></div>

    <div class="login-loading hidden" id="loading-layer">
      <h2 id="auth-id">EXTRACTING...</h2>
      <p id="auth-tip">Stay calm and wait for extraction.</p>
    </div>
  </div>

  <!-- Ticker Pill (Phase 5) -->
  <div class="ticker-pill hidden" id="ticker-pill">
    <svg class="ticker-icon" viewBox="0 0 24 24">
      <use xlink:href="#icon-eye"></use>
    </svg>
    <span class="ticker-text">TICKER</span>
  </div>

  <!-- Player HUD Widget (Bottom Left) -->
  <div class="player-hud hidden" id="main-hud">
    <div class="hud-header">
      <div class="hud-player-avatar" id="hud-player-avatar">
        <svg viewBox="0 0 24 24">
          <use xlink:href="#icon-user"></use>
        </svg>
      </div>
      <div class="hud-player-info"></div>
      <button id="btn-logout" style="background: var(--danger); border: none; color: #fff; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; flex-shrink: 0;">×</button>
    </div>

    <div class="vitals-display"></div>
  </div>

  <!-- Achievement Notification Pill (Phase 5) -->
  <div id="achievement-pill" class="notification-pill" style="position: fixed; bottom: 30px; right: 30px; display: none; z-index: 999;">
    <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24">
      <use xlink:href="#icon-star"></use>
    </svg>
    <span>Achievement</span>
    <span class="badge" id="achievement-badge">1</span>
  </div>

  <!-- Achievement Modal (Phase 5) -->
  <div class="modal-overlay hidden" id="achievement-overlay" onclick="closeAchievementModal()">
    <div class="achievement-modal" id="achievement-modal" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" style="position: fixed; bottom: 1rem; right: 1rem; z-index: 3000;"></div>

</body>
</html>
