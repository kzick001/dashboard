<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showrunner | Player HUD V2.3</title>
  
  <!-- SVG Icon Library (SP1: Foundations) -->
  <svg style="display: none; width: 0; height: 0;">
    <defs>

      </svg>

      <!-- Skull (Death Saves) -->
      <svg id="icon-skull" viewBox="0 0 24 24">

      <!-- Eye (Ticker Pill, Blinded) -->

      </svg>

      <!-- Eye Off (Blinded, Invisible) -->
      <svg id="icon-eye-off" viewBox="0 0 24 24">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <!-- Heart (Charmed) -->
      <svg id="icon-heart" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Lock (Restrained, Grappled) -->
      <svg id="icon-lock" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Zap (Stunned) -->
      <svg id="icon-zap" viewBox="0 0 24 24">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>

      <!-- Flame (Burning) -->
      <svg id="icon-flame" viewBox="0 0 24 24">
        <path d="M13.75 1.69a1 1 0 0 0-3.5 0c-5.47 3.43-9 6.77-9 10.82 0 5.93 4.18 10.74 9.35 10.74 5.17 0 9.35-4.81 9.35-10.74 0-4.05-3.53-7.39-9-10.82z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <path d="M12 8.5c-1.66 1-3 2.5-3 4.5 0 1.66 1.34 3 3 3s3-1.34 3-3c0-2-1.34-3.5-3-4.5z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- X Circle (Unconscious) -->
      <svg id="icon-x-circle" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Alert Triangle (Frightened) -->
      <svg id="icon-alert-triangle" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Target (Concentrating) -->
      <svg id="icon-target" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="1" fill="currentColor"/>
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>

      <!-- Pause Circle (Incapacitated) -->
      <svg id="icon-pause-circle" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="10" y1="8" x2="10" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="8" x2="14" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Layers (Petrified) -->
      <svg id="icon-layers" viewBox="0 0 24 24">
        <polygon points="12 2 2 7 2 12 12 17 22 12 22 7 12 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <polyline points="2 12 12 17 22 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <polyline points="2 17 12 22 22 17" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Link (Grappled) -->
      <svg id="icon-link" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <!-- Arrow Down (Pushed, Pulled) -->
      <svg id="icon-arrow-down" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="19 12 12 19 5 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <!-- Battery (Exhaustion) -->
      <svg id="icon-battery" viewBox="0 0 24 24">
        <rect x="1" y="6" width="16" height="12" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="17" y1="8" x2="17" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <rect x="2" y="7" width="4" height="10" fill="currentColor"/>
      </svg>

      <!-- Star (Inspiration) -->
      <svg id="icon-star" viewBox="0 0 24 24">
        <polygon points="12 2 15.09 10.26 23.77 11.36 17.88 17.15 19.54 25.88 12 21.77 4.46 25.88 6.12 17.15 0.23 11.36 8.91 10.26 12 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Shield (Protected) -->
      <svg id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 1L3 5v7c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- Gear (Cursed) -->
      <svg id="icon-gear" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6m-16.78 7.78l4.24-4.24m5.08-5.08l4.24-4.24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Plus (Add) -->
      <svg id="icon-plus" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <!-- Light Bulb (Idea / Custom) -->
      <svg id="icon-light" viewBox="0 0 24 24">
        <path d="M21 17v2H3v-2s0-4 9-4 9 4 9 4zM3.21 9a6 6 0 0 1 9.58-9 6 6 0 1 0 .02 12A6.97 6.97 0 0 1 3.21 9z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>

      <!-- User (Fallback Avatar) -->
      <svg id="icon-user" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </defs>
  </svg>
  
  <style>
    :root {
      --bg: rgba(10, 10, 12, 0.90);
      --glass: rgba(15, 15, 18, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #bb86fc;
      --danger: #ff4757;
      --success: #03dac6;
      --warning: #f1c40f;
      --text: #e0e0e0;
      --text-muted: #888;
      --ai-terminal: #ffeb3b;
    }

    /* === ICON UTILITIES === */
    .inline-icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
      color: inherit;
    }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 24px; height: 24px; }
    .icon-lg { width: 32px; height: 32px; }
    .icon-xl { width: 48px; height: 48px; }

    /* === PLAYER COLOR PALETTE (SP1: Foundations) === */
    .color-chuck { --player-color: #ff6b6b; }     /* Red */
    .color-tilly { --player-color: #4ecdc4; }     /* Teal */
    .color-hendrick { --player-color: #ffd93d; }  /* Gold */
    .color-aelar { --player-color: #a78bfa; }     /* Purple */
    .color-jimothy { --player-color: #60a5fa; }   /* Blue */

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      color: var(--text);
      background-color: #050505;
      background-image: 
        linear-gradient(rgba(187, 134, 252, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(187, 134, 252, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* ========== LAYER 0: VFX OVERLAYS ========== */
    .vfx-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 100;
      transition: all 1s ease;
    }

    .vfx-critical {
      box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8), inset 0 0 200px rgba(255, 71, 87, 0.6);
      background: radial-gradient(circle at center, transparent 40%, rgba(255, 71, 87, 0.2) 100%);
      animation: vfx-critical-pulse 0.8s infinite;
    }

    .vfx-bleeding {
      box-shadow: inset 0 0 120px rgba(255, 71, 87, 0.6);
      animation: vfx-bleed-pulse 2.5s infinite;
    }

    .vfx-poison {
      box-shadow: inset 0 0 150px rgba(46, 204, 113, 0.4);
      background: radial-gradient(circle, transparent 60%, rgba(46, 204, 113, 0.1) 100%);
    }

    .vfx-blinded {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
    }

    @keyframes vfx-critical-pulse {
      0% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.6), inset 0 0 200px rgba(255, 71, 87, 0.4); }
      50% { box-shadow: inset 0 0 200px rgba(255, 0, 0, 0.8), inset 0 0 250px rgba(255, 71, 87, 0.6); }
      100% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.6), inset 0 0 200px rgba(255, 71, 87, 0.4); }
    }

    @keyframes vfx-bleed-pulse {
      0% { box-shadow: inset 0 0 120px rgba(255, 71, 87, 0.4); }
      50% { box-shadow: inset 0 0 200px rgba(255, 71, 87, 0.7); }
      100% { box-shadow: inset 0 0 120px rgba(255, 71, 87, 0.4); }
    }

    /* ========== PHASE 1: LOGIN SCREEN ========== */
    .login-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      background-image: 
        linear-gradient(rgba(187, 134, 252, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(187, 134, 252, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2500;
      gap: 2rem;
      padding: 2rem;
      overflow-y: auto;
      animation: fade-in 0.5s ease;
    }

    .login-layer.hidden {
      display: none;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .login-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      animation: slide-down 0.6s ease;
    }

    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-avatar-ring {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--player-color, var(--accent));
      flex-shrink: 0;
      box-shadow: 0 0 40px var(--player-color, var(--accent)), inset 0 0 20px rgba(255, 255, 255, 0.1);
      animation: pulse-avatar 2s ease-in-out infinite;
    }

    @keyframes pulse-avatar {
      0%, 100% { box-shadow: 0 0 40px var(--player-color, var(--accent)), inset 0 0 20px rgba(255, 255, 255, 0.1); }
      50% { box-shadow: 0 0 60px var(--player-color, var(--accent)), inset 0 0 30px rgba(255, 255, 255, 0.15); }
    }

    .hero-avatar-ring img {
      width: 192px;
      height: 192px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #000;
      background: #222;
    }

    .hero-avatar-ring svg {
      width: 192px;
      height: 192px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #000;
      background: #222;
      color: var(--accent);
    }

    .hero-player-name {
      margin: 0;
      font-size: clamp(1.5rem, 6vw, 3rem);
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .hero-subtitle {
      margin: 0;
      font-size: clamp(0.95rem, 3vw, 1.25rem);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 1000px;
      padding: 0 1rem;
      animation: fade-in 0.8s ease 0.2s both;
    }

    @media (max-width: 1024px) {
      .roster-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
    }

    @media (max-width: 768px) {
      .roster-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
      .hero-avatar-ring {
        width: 160px;
        height: 160px;
      }
      .hero-avatar-ring img,
      .hero-avatar-ring svg {
        width: 152px;
        height: 152px;
      }
    }

    @media (max-width: 480px) {
      .roster-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .hero-avatar-ring {
        width: 120px;
        height: 120px;
      }
      .hero-avatar-ring img,
      .hero-avatar-ring svg {
        width: 112px;
        height: 112px;
        border-width: 2px;
      }
      .login-hero {
        margin-bottom: 0.5rem;
      }
    }

    .roster-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 1.5rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: all 0.3s ease;
      color: var(--text);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .roster-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .roster-btn:hover {
      border-color: var(--accent);
      background: rgba(187, 134, 252, 0.1);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .roster-btn:hover::before {
      left: 100%;
    }

    .roster-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--player-color, var(--accent));
      flex-shrink: 0;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .roster-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .roster-avatar svg {
      width: 100%;
      height: 100%;
      color: var(--accent);
      padding: 10px;
    }

    .roster-name {
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
      margin: 0;
    }

    .roster-class {
      font-size: 0.85rem;
      color: var(--accent);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .login-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 5, 5, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 2600;
      animation: fade-in 0.3s ease;
    }

    .login-loading.hidden {
      display: none;
    }

    .loading-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid var(--glass-border);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-spinner.pulse {
      animation: spin 1s linear infinite, pulse-glow 1.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px var(--accent); }
      50% { box-shadow: 0 0 40px var(--accent); }
    }

    #auth-id {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0;
      text-align: center;
    }

    .auth-tip {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      max-width: 400px;
      margin: 0;
      line-height: 1.5;
    }

    /* ========== LAYER 1: MARQUEE ========== */
    .ticker-marquee {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.95);
      border-bottom: 1px solid var(--ai-terminal);
      padding: 8px 0;
      overflow: hidden;
      z-index: 200;
      transition: all 0.3s ease;
      height: 28px;
    }

    .ticker-marquee.hidden {
      height: 0;
      padding: 0;
      border: none;
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: scroll-left 40s linear infinite;
    }

    .marquee-text {
      font-family: monospace;
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--ai-terminal);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-right: 100px;
      white-space: nowrap;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ========== PHASE 4: TICKER PILL ========== */
    .ticker-pill {
      position: fixed;
      bottom: 120px;
      right: 20px;
      max-width: 320px;
      width: auto;
      padding: 0.75rem 1rem;
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--accent);
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 950;
      animation: pill-slide-in 0.4s ease;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .ticker-pill.hidden {
      display: none;
    }

    @keyframes pill-slide-in {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .ticker-pill:hover {
      background: rgba(187, 134, 252, 0.15);
      border-color: #fff;
      transform: translateY(-2px);
    }

<body>

  <!-- VFX Layer -->
  <div id="vfx-layer" class="vfx-overlay"></div>

  <!-- PHASE 1: LOGIN SCREEN -->
  <div class="login-layer" id="login-layer">
    <div class="login-hero">
      <div class="hero-avatar-ring" id="hero-avatar-ring">
        <svg id="hero-avatar-svg" class="icon-xl" viewBox="0 0 24 24">
          <use xlink:href="#icon-user"></use>
        </svg>
      </div>
      <h1 class="hero-player-name" id="hero-player-name">SELECT CHARACTER</h1>
      <p class="hero-subtitle" id="hero-subtitle">Choose your hero</p>
    </div>

    <div class="roster-grid" id="roster-grid"></div>

    <div class="login-loading hidden" id="loading-layer">
      <div class="loading-spinner" id="loading-spinner"></div>
      <h2 id="auth-id">EXTRACTING...</h2>
      <p class="auth-tip" id="auth-tip">Stay calm and wait for extraction.</p>
    </div>
  </div>

  <!-- Ticker Marquee -->
  <div class="ticker-marquee" id="ticker">
    <div class="marquee-track">
      <span class="marquee-text" id="marquee-text-1"></span>
      <span class="marquee-text" id="marquee-text-2" aria-hidden="true"></span>
    </div>
  </div>

  <!-- PHASE 4: Ticker Pill -->
  <div class="ticker-pill hidden" id="ticker-pill">
    <svg class="ticker-icon" viewBox="0 0 24 24">
      <use xlink:href="#icon-eye"></use>
    </svg>
    <span class="ticker-text" id="ticker-pill-text">Loading...</span>
  </div>

  <!-- Player HUD Widget (Bottom Right) -->
  <div class="player-hud hidden" id="main-hud">
    <div class="hud-header">
      <div class="hud-player-info">
        <div class="hud-player-avatar" id="hud-player-avatar">
          <svg viewBox="0 0 24 24">
            <use xlink:href="#icon-user"></use>
          </svg>
        </div>
        <div>
          <p class="hud-player-name" id="hud-player-name">Player</p>
          <p class="hud-player-hp" id="hud-player-hp">HP: —</p>
        </div>
      </div>
      <div class="hud-controls">
        <button class="hud-btn" id="ticker-toggle" title="Toggle ticker" aria-label="Toggle ticker visibility">👁</button>
        <div class="notif-badge empty" id="notif-badge" title="View all notifications" aria-label="Notification count">0</div>
      </div>
    </div>

    <div class="notification-queue" id="notif-queue"></div>

    <div style="border-top: 1px solid var(--glass-border); padding-top: 0.75rem; margin-top: 0.75rem;">
      <button class="btn-view-history" id="btn-view-history" title="View achievement and loot history" aria-label="View my items">📋 My Items</button>
      <button class="btn-spell-slots" id="btn-spell-slots" title="Manage spell slots" aria-label="Spell Slots">⚡ Spell Slots</button>
      <button class="logout-btn" id="btn-logout" title="Return to character select" aria-label="Logout">🚪 Logout</button>
    </div>
  </div>

  <!-- Notification Stack Modal -->
  <div class="modal-overlay" id="stack-overlay" onclick="closeStack()"></div>
  <div class="notification-stack" id="notif-stack">
    <div class="stack-header">
      <h3>Notifications</h3>
      <button class="stack-close" id="stack-close-btn" onclick="closeStack()" aria-label="Close notifications">×</button>
    </div>
    <div class="stack-list" id="stack-list"></div>
  </div>

  <!-- PHASE 3: Spell Slots Modal -->
  <div class="modal-overlay" id="spell-slots-overlay" onclick="closeSpellSlotsModal()"></div>
  <div class="spell-slots-modal" id="spell-slots-modal">
    <div class="spell-slots-header">
      <h3>⚡ Spell Slots</h3>
      <button class="spell-slots-close" onclick="closeSpellSlotsModal()" aria-label="Close spell slots">×</button>
    </div>
    <div class="spell-slots-content" id="spell-slots-content"></div>
    <div class="spell-slots-footer">
      <button class="long-rest-btn" id="long-rest-btn">🌙 Long Rest</button>
    </div>
  </div>

  <!-- History Modal (Achievements + Loot) -->
  <div class="modal-overlay" id="history-overlay" onclick="closeHistory()"></div>
  <div class="history-modal" id="history-modal">
    <div class="history-header">
      <h3>My Items & Achievements</h3>
      <button class="history-close" onclick="closeHistory()" aria-label="Close history">×</button>
    </div>
    
    <div class="history-tabs">
      <button class="history-tab active" data-tab="achievements" onclick="switchHistoryTab('achievements')">🏆 Achievements</button>
      <button class="history-tab" data-tab="loot" onclick="switchHistoryTab('loot')">⭐ Loot Awards</button>
    </div>

    <div class="history-content" id="history-content"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script>
    // ========== CONFIGURATION ==========
    const WORKER_URL = 'https://dmscreen.askozicki.workers.dev';
    const TICKER_STORAGE_KEY = 'showrunner_ticker_visible';
    const PLAYER_ACTIVE_KEY = 'showrunner_active_player';

    // ========== PLAYER DEFAULTS (SP1: PHASE 1) ==========
    const PLAYER_DEFAULTS = {
      'Chuck': { race: 'Half-Orc', class: 'Barbarian', subclass: 'Berserker' },
      'Tilly': { race: 'Gnome', class: 'Rogue', subclass: 'Arcane Trickster' },
      'Hendrick': { race: 'Human', class: 'Fighter', subclass: 'Battle Master' },
      'Aelar': { race: 'Elf', class: 'Wizard', subclass: 'Evocation' },
      'Jimothy': { race: 'Halfling', class: 'Cleric', subclass: 'Life' }
    };

    const PLAYER_COLORS = {
      'Chuck': 'color-chuck',
      'Tilly': 'color-tilly',
      'Hendrick': 'color-hendrick',
      'Aelar': 'color-aelar',
      'Jimothy': 'color-jimothy'
    };

    // ========== STATE ==========
    let localState = {
      version: 0,
      players: [
        { name: "Chuck", is_deleted: false, status: { conditions: [] }, achievements: { pending: [] }, stats: { hp_current: 35, hp_max: 60 }, resources: [] },
        { name: "Tilly", is_deleted: false, status: { conditions: [] }, achievements: { pending: [] }, stats: { hp_current: 28, hp_max: 32 }, resources: [] },
        { name: "Hendrick", is_deleted: false, status: { conditions: [] }, achievements: { pending: [] }, stats: { hp_current: 52, hp_max: 72 }, resources: [] },
        { name: "Aelar", is_deleted: false, status: { conditions: [] }, achievements: { pending: [] }, stats: { hp_current: 22, hp_max: 26 }, resources: [] },
        { name: "Jimothy", is_deleted: false, status: { conditions: [] }, achievements: { pending: [] }, stats: { hp_current: 44, hp_max: 48 }, resources: [] }
      ]
    };

    let activePlayerIndex = null;
    let notificationCache = [];
    let tickerData = null;
    let historyDataCache = { achievements: [], loot: [] };
    let currentHistoryTab = 'achievements';

    // ========== INITIALIZATION ==========
    window.addEventListener('DOMContentLoaded', () => {
      initLoginScreen();
      initTickerToggle();
      initNotificationBadge();
      initHistoryButton();
      initSpellSlotsButton();
      initLogoutButton();
      fetchTickerData();
      generateAiMessage();
      setInterval(generateAiMessage, 180000);
      setInterval(rotateTickerPill, 8000);
      pollDatabase(false);
      setInterval(() => pollDatabase(false), 60000);

      // Auto-login check
      const savedIdx = localStorage.getItem(PLAYER_ACTIVE_KEY);
      if (savedIdx !== null && localState.players[savedIdx] && !localState.players[savedIdx].is_deleted) {
        activePlayerIndex = parseInt(savedIdx);
        selectPlayer(localState.players[activePlayerIndex].name, activePlayerIndex, true);
      }
    });

    // ========== PHASE 1: LOGIN SCREEN ==========
    function initLoginScreen() {
      populateRoster();
    }

    function populateRoster() {
      const grid = document.getElementById('roster-grid');
      grid.innerHTML = '';

      localState.players.forEach((player, idx) => {
        if (player.is_deleted) return;

        const btn = document.createElement('button');
        btn.className = `roster-btn ${PLAYER_COLORS[player.name] || ''}`;
        btn.tabIndex = 0;
        btn.setAttribute('aria-label', `Select ${player.name}`);

        const defaults = PLAYER_DEFAULTS[player.name] || { race: 'Unknown', class: 'Adventurer' };

        btn.innerHTML = `
          <div class="roster-avatar">
            <svg viewBox="0 0 24 24">
              <use xlink:href="#icon-user"></use>
            </svg>
          </div>
          <p class="roster-name">${escapeHtml(player.name)}</p>
          <p class="roster-class">${defaults.race} ${defaults.class}</p>
        `;

        btn.addEventListener('click', () => selectPlayer(player.name, idx, false));
        btn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') selectPlayer(player.name, idx, false);
        });

        grid.appendChild(btn);
      });
    }

    function selectPlayer(name, idx, isAutoLogin) {
      activePlayerIndex = idx;
      localStorage.setItem(PLAYER_ACTIVE_KEY, idx.toString());

      const defaults = PLAYER_DEFAULTS[name] || { race: 'Unknown', class: 'Adventurer' };

      // Update hero display
      const heroRing = document.getElementById('hero-avatar-ring');
      heroRing.className = `hero-avatar-ring ${PLAYER_COLORS[name] || ''}`;

      document.getElementById('hero-player-name').textContent = escapeHtml(name);
      document.getElementById('hero-subtitle').textContent = `${defaults.race} ${defaults.class}`;

      // Show loading screen
      const loginLayer = document.getElementById('login-layer');
      const loadingLayer = document.getElementById('loading-layer');

      loginLayer.style.opacity = '0.5';
      loginLayer.style.pointerEvents = 'none';

      loadingLayer.classList.remove('hidden');
      document.getElementById('auth-id').textContent = `EXTRACTING ${escapeHtml(name.toUpperCase())}...`;

      // Random tip from ticker
      const tip = getRandomTip();
      document.getElementById('auth-tip').textContent = tip;

      // 6 second delay
      setTimeout(() => transitionToHUD(), 6000);
    }

    function getRandomTip() {
      if (!tickerData || !tickerData.tips || tickerData.tips.length === 0) {
        return "Loading...";
      }
      return tickerData.tips[Math.floor(Math.random() * tickerData.tips.length)];
    }

    function transitionToHUD() {
      const loginLayer = document.getElementById('login-layer');
      const hudLayer = document.getElementById('main-hud');

      loginLayer.style.animation = 'fade-out 0.4s ease forwards';
      loginLayer.style.pointerEvents = 'none';

      setTimeout(() => {
        loginLayer.classList.add('hidden');
        hudLayer.classList.remove('hidden');
        syncAndRender();
        displayTickerPill();
      }, 400);
    }

    function renderPlayerHUD() {
      if (activePlayerIndex === null || !localState.players[activePlayerIndex]) return;

      const player = localState.players[activePlayerIndex];

      // Update player info in HUD header
      document.getElementById('hud-player-name').textContent = escapeHtml(player.name);

      const hp = player.stats?.hp_current || 0;
      const maxHp = player.stats?.hp_max || 1;
      document.getElementById('hud-player-hp').textContent = `HP: ${hp}/${maxHp}`;

      // Update avatar ring state
      const avatarRing = document.getElementById('hud-player-avatar');
      avatarRing.className = `hud-player-avatar ${PLAYER_COLORS[player.name] || ''}`;

      const hpPercent = (hp / maxHp) * 100;
      if (hpPercent > 50) {
        avatarRing.classList.add('state-healthy');
      } else if (hpPercent > 0) {
        avatarRing.classList.add('state-critical');
      } else {
        avatarRing.classList.add('state-fallen');
      }
    }

    // ========== TICKER SYSTEM ==========
    async function fetchTickerData() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        const res = await fetch('ticker.json', { signal: controller.signal });
        clearTimeout(timeoutId);

        if (res.ok) {
          tickerData = await res.json();
        } else {
          tickerData = getDefaultTickerData();
        }
      } catch (e) {
        tickerData = getDefaultTickerData();
      }
    }

    function getDefaultTickerData() {
      return {
        subjects: ["SYSTEM", "NETWORK", "PROTOCOL"],
        actions: ["REPORTS", "CONFIRMS", "DENIES"],
        results: ["STABLE", "CRITICAL", "NOMINAL"],
        signoffs: ["STAY CALM", "CONTINUE", "ABORT"],
        tips: ["Explore every corridor", "Trust your party", "Gold is life", "Stay vigilant"]
      };
    }

    function generateAiMessage() {
      if (!tickerData) return;

      const sub = tickerData.subjects[Math.floor(Math.random() * tickerData.subjects.length)];
      const act = tickerData.actions[Math.floor(Math.random() * tickerData.actions.length)];
      const reslt = tickerData.results[Math.floor(Math.random() * tickerData.results.length)];
      const sign = tickerData.signoffs[Math.floor(Math.random() * tickerData.signoffs.length)];

      const fullMessage = `[SYS_BROADCAST] ${sub} ${act} ${reslt} — ${sign}`;

      const track = document.querySelector('.marquee-track');
      if (track) {
        track.style.animation = 'none';
        track.offsetHeight;
        track.style.animation = '';
      }
      document.querySelectorAll('.marquee-text').forEach(el => { el.innerText = fullMessage; });
    }

    function initTickerToggle() {
      const toggle = document.getElementById('ticker-toggle');
      toggle.addEventListener('click', () => {
        const ticker = document.getElementById('ticker');
        const isHidden = ticker.classList.toggle('hidden');
        toggle.textContent = isHidden ? '🔒' : '👁';
        localStorage.setItem(TICKER_STORAGE_KEY, !isHidden);
      });

      // Restore ticker visibility
      const tickerVisible = localStorage.getItem(TICKER_STORAGE_KEY) !== 'false';
      if (!tickerVisible) {
        document.getElementById('ticker').classList.add('hidden');
        toggle.textContent = '🔒';
      }
    }

    // ========== PHASE 4: TICKER PILL ==========
    function displayTickerPill() {
      const pill = document.getElementById('ticker-pill');
      pill.classList.remove('hidden');
      rotateTickerPill();
    }

    function rotateTickerPill() {
      if (!tickerData) return;

      const pillText = document.getElementById('ticker-pill-text');
      const sub = tickerData.subjects[Math.floor(Math.random() * tickerData.subjects.length)];
      const act = tickerData.actions[Math.floor(Math.random() * tickerData.actions.length)];
      const reslt = tickerData.results[Math.floor(Math.random() * tickerData.results.length)];

      pillText.textContent = `${sub} ${act} ${reslt}`;
    }

    // ========== POLLING & SYNC ==========
    async function pollDatabase(isManual = false) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        const res = await fetch(WORKER_URL, { signal: controller.signal });
        clearTimeout(timeoutId);

        if (res.ok) {
          const remote = await res.json();
          if (remote.players && remote.players.length > 0) {
            localState = remote;
          } else {
            localState.version = remote.version || localState.version;
          }
          if (activePlayerIndex !== null) syncAndRender();
          if (isManual) showToast("Synchronized.");
        }
      } catch (e) {
        if (isManual) showToast("Sync failed. Offline mode.");
      }
    }

    function syncAndRender() {
      if (activePlayerIndex === null || !localState.players[activePlayerIndex] || localState.players[activePlayerIndex].is_deleted) {
        activePlayerIndex = null;
        return;
      }

      const player = localState.players[activePlayerIndex];
      renderPlayerHUD();
      updateConditions(player.status?.conditions || []);
      evaluateNotifications(player);
    }

    // ========== VFX SYSTEM ==========
    function updateConditions(conditions) {
      const vfx = document.getElementById('vfx-layer');
      vfx.className = 'vfx-overlay';

      if (!conditions || conditions.length === 0) return;

      const condList = conditions.map(c => c.toLowerCase());

      if (condList.includes('critical trauma') || condList.includes('critical')) {
        vfx.classList.add('vfx-critical');
      } else if (condList.includes('bleeding')) {
        vfx.classList.add('vfx-bleeding');
      } else if (condList.includes('poisoned') || condList.includes('poison')) {
        vfx.classList.add('vfx-poison');
      } else if (condList.includes('blinded') || condList.includes('blind')) {
        vfx.classList.add('vfx-blinded');
      }
    }

    // ========== NOTIFICATION SYSTEM ==========
    function evaluateNotifications(player) {
      const pending = player.achievements?.pending || [];
      notificationCache = pending;
      renderNotificationQueue();
      updateNotificationBadge();
    }

    function renderNotificationQueue() {
      const queue = document.getElementById('notif-queue');
      queue.innerHTML = '';

      notificationCache.forEach((item, idx) => {
        const notif = document.createElement('div');
        const isLoot = item.rewards && item.rewards.items && item.rewards.items.length > 0;
        const type = isLoot ? 'loot' : 'achievement';

        notif.className = `notification ${type}`;
        notif.tabIndex = 0;
        notif.setAttribute('role', 'button');
        notif.setAttribute('aria-label', `${isLoot ? 'Loot' : 'Achievement'}: ${item.name}`);

        const actualItem = isLoot ? item.rewards.items[0] : item;
        const rarity = actualItem?.rarity || 'standard';

        let rarityClass = 'rarity-common';
        if (rarity.toLowerCase() === 'uncommon') rarityClass = 'rarity-uncommon';
        else if (rarity.toLowerCase() === 'rare') rarityClass = 'rarity-rare';
        else if (rarity.toLowerCase() === 'epic') rarityClass = 'rarity-epic';
        else if (rarity.toLowerCase() === 'legendary') rarityClass = 'rarity-legendary';
        else if (rarity.toLowerCase() === 'contraband') rarityClass = 'rarity-contraband';

        const icon = isLoot ? '⭐' : '🏆';

        notif.innerHTML = `
          <div class="notif-content">
            <h4>${icon} ${escapeHtml(item.name || actualItem.name)}</h4>
            <p>${escapeHtml(actualItem.description || '')}</p>
            ${isLoot ? `<p class="notif-rarity ${rarityClass}">${rarity.toUpperCase()}</p>` : ''}
          </div>
        `;

        notif.addEventListener('click', () => {
          notif.remove();
          notificationCache.splice(idx, 1);
          updateNotificationBadge();
          acknowledgeNotification(idx);
        });

        notif.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            notif.click();
          }
        });

        queue.appendChild(notif);
      });
    }

    function updateNotificationBadge() {
      const badge = document.getElementById('notif-badge');
      const count = notificationCache.length;

      badge.textContent = count;
      badge.setAttribute('aria-label', `${count} notification${count !== 1 ? 's' : ''}`);

      if (count === 0) {
        badge.classList.add('empty');
      } else {
        badge.classList.remove('empty');
      }
    }

    function initNotificationBadge() {
      const badge = document.getElementById('notif-badge');
      badge.addEventListener('click', openStack);
      badge.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') openStack();
      });
    }

    function openStack() {
      const stack = document.getElementById('notif-stack');
      const overlay = document.getElementById('stack-overlay');
      const list = document.getElementById('stack-list');

      list.innerHTML = '';
      notificationCache.forEach((item, idx) => {
        const isLoot = item.rewards && item.rewards.items && item.rewards.items.length > 0;
        const type = isLoot ? 'loot' : 'achievement';

        const stackItem = document.createElement('div');
        stackItem.className = `stack-item ${type}`;
        stackItem.tabIndex = 0;
        stackItem.setAttribute('role', 'option');

        const actualItem = isLoot ? item.rewards.items[0] : item;
        const rarity = actualItem?.rarity || 'standard';
        const icon = isLoot ? '⭐' : '🏆';

        stackItem.innerHTML = `
          <h4>${icon} ${escapeHtml(item.name || actualItem.name)}</h4>
          <p>${escapeHtml(actualItem.description || '')}</p>
          ${isLoot ? `<p style="margin-top: 0.25rem; font-weight: bold; color: var(--text);">Rarity: ${rarity.toUpperCase()}</p>` : ''}
        `;

        stackItem.addEventListener('click', () => {
          notificationCache.splice(idx, 1);
          renderNotificationQueue();
          updateNotificationBadge();
          renderStackList();
          acknowledgeNotification(idx);
        });

        stackItem.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') stackItem.click();
        });

        list.appendChild(stackItem);
      });

      stack.classList.add('visible');
      overlay.classList.add('visible');
    }

    function renderStackList() {
      const list = document.getElementById('stack-list');
      list.innerHTML = '';
      notificationCache.forEach((item, idx) => {
        const isLoot = item.rewards && item.rewards.items && item.rewards.items.length > 0;
        const type = isLoot ? 'loot' : 'achievement';

        const stackItem = document.createElement('div');
        stackItem.className = `stack-item ${type}`;
        stackItem.tabIndex = 0;
        stackItem.setAttribute('role', 'option');

        const actualItem = isLoot ? item.rewards.items[0] : item;
        const rarity = actualItem?.rarity || 'standard';
        const icon = isLoot ? '⭐' : '🏆';

        stackItem.innerHTML = `
          <h4>${icon} ${escapeHtml(item.name || actualItem.name)}</h4>
          <p>${escapeHtml(actualItem.description || '')}</p>
          ${isLoot ? `<p style="margin-top: 0.25rem; font-weight: bold; color: var(--text);">Rarity: ${rarity.toUpperCase()}</p>` : ''}
        `;

        stackItem.addEventListener('click', () => {
          notificationCache.splice(idx, 1);
          renderNotificationQueue();
          updateNotificationBadge();
          renderStackList();
          acknowledgeNotification(idx);
        });

        stackItem.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') stackItem.click();
        });

        list.appendChild(stackItem);
      });
    }

    function closeStack() {
      const stack = document.getElementById('notif-stack');
      const overlay = document.getElementById('stack-overlay');
      stack.classList.remove('visible');
      overlay.classList.remove('visible');
    }

    async function acknowledgeNotification(idx) {
      if (activePlayerIndex === null) return;

      try {
        const latestRes = await fetch(WORKER_URL);
        if (!latestRes.ok) throw new Error("Fetch failed");
        const remoteState = await latestRes.json();
        const remotePlayer = remoteState.players ? remoteState.players[activePlayerIndex] : null;

        if (!remotePlayer || remotePlayer.is_deleted) throw new Error("Player invalid");

        if (remotePlayer.achievements && remotePlayer.achievements.pending && remotePlayer.achievements.pending[idx]) {
          remotePlayer.achievements.pending[idx].is_acknowledged = true;
        }

        remoteState.version = (remoteState.version || 0) + 1;
        remoteState.last_modified = Date.now();
        const payload = { base_version: remoteState.version - 1, last_modified: remoteState.last_modified, data: remoteState };

        const postRes = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!postRes.ok) throw new Error("Push failed");

        localState = remoteState;
      } catch (e) {
        showToast("Sync error. Local only.");
      }
    }

    // ========== PHASE 3: SPELL SLOTS SYSTEM ==========
    function initSpellSlotsButton() {
      const btn = document.getElementById('btn-spell-slots');
      btn.addEventListener('click', openSpellSlotsModal);
    }

    function openSpellSlotsModal() {
      if (activePlayerIndex === null) return;

      const player = localState.players[activePlayerIndex];
      const spellSlots = player.resources?.find(r => r.type === 'spell_slots');

      if (!spellSlots) {
        showToast("No spell slots configured.");
        return;
      }

      renderSpellSlotsUI(spellSlots);
      document.getElementById('spell-slots-modal').classList.add('visible');
      document.getElementById('spell-slots-overlay').classList.add('visible');
    }

    function renderSpellSlotsUI(spellSlots) {
      const content = document.getElementById('spell-slots-content');
      content.innerHTML = '';

      const SPELL_LEVELS = [
        { level: 1, name: 'Cantrips' },
        { level: 1, name: '1st Level' },
        { level: 2, name: '2nd Level' },
        { level: 3, name: '3rd Level' },
        { level: 4, name: '4th Level' },
        { level: 5, name: '5th Level' },
        { level: 6, name: '6th Level' },
        { level: 7, name: '7th Level' },
        { level: 8, name: '8th Level' },
        { level: 9, name: '9th Level' }
      ];

      SPELL_LEVELS.forEach((spellLevel, idx) => {
        const slot = spellSlots.slots?.[idx] || { level: idx + 1, current: 0, max: 0 };
        const rowHtml = document.createElement('div');
        rowHtml.className = 'spell-level-row';

        const label = document.createElement('div');
        label.className = 'spell-level-label';
        label.textContent = spellLevel.name;

        const boxesContainer = document.createElement('div');
        boxesContainer.className = 'spell-slot-boxes';

        for (let i = 0; i < slot.max; i++) {
          const box = document.createElement('div');
          box.className = `spell-slot-box ${i < slot.current ? 'used' : 'available'}`;
          box.tabIndex = 0;
          box.setAttribute('role', 'button');
          box.setAttribute('aria-label', `Slot ${i + 1}`);

          box.addEventListener('click', () => toggleSpellSlot(idx, i));
          box.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') toggleSpellSlot(idx, i);
          });

          boxesContainer.appendChild(box);
        }

        rowHtml.appendChild(label);
        rowHtml.appendChild(boxesContainer);
        content.appendChild(rowHtml);
      });
    }

    function toggleSpellSlot(levelIdx, slotIdx) {
      if (activePlayerIndex === null) return;

      const player = localState.players[activePlayerIndex];
      const spellSlots = player.resources?.find(r => r.type === 'spell_slots');

      if (!spellSlots || !spellSlots.slots?.[levelIdx]) return;

      const slot = spellSlots.slots[levelIdx];
      if (slot.current > slotIdx) {
        slot.current--;
      } else if (slot.current === slotIdx) {
        slot.current++;
      } else {
        slot.current = slotIdx + 1;
      }

      renderSpellSlotsUI(spellSlots);
      saveSpellSlotState();
    }

    function closeSpellSlotsModal() {
      document.getElementById('spell-slots-modal').classList.remove('visible');
      document.getElementById('spell-slots-overlay').classList.remove('visible');
    }

    function performLongRest() {
      if (activePlayerIndex === null) return;

      const player = localState.players[activePlayerIndex];
      const spellSlots = player.resources?.find(r => r.type === 'spell_slots');

      if (!spellSlots || !spellSlots.slots) return;

      spellSlots.slots.forEach(slot => {
        slot.current = 0;
      });

      renderSpellSlotsUI(spellSlots);
      saveSpellSlotState();
      showToast("Long rest: Spell slots restored!");
    }

    async function saveSpellSlotState() {
      if (activePlayerIndex === null) return;

      try {
        const latestRes = await fetch(WORKER_URL);
        if (!latestRes.ok) throw new Error("Fetch failed");
        const remoteState = await latestRes.json();

        remoteState.version = (remoteState.version || 0) + 1;
        remoteState.last_modified = Date.now();
        const payload = { base_version: remoteState.version - 1, last_modified: remoteState.last_modified, data: remoteState };

        const postRes = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!postRes.ok) throw new Error("Push failed");

        localState = remoteState;
      } catch (e) {
        showToast("Spell slot save failed.");
      }
    }

    // Long rest button
    document.addEventListener('DOMContentLoaded', () => {
      const longRestBtn = document.getElementById('long-rest-btn');
      if (longRestBtn) {
        longRestBtn.addEventListener('click', performLongRest);
      }
    });

    // ========== HISTORY MODAL (PHASE 5) ==========
    function initHistoryButton() {
      const btn = document.getElementById('btn-view-history');
      btn.addEventListener('click', openHistory);
    }

    async function openHistory() {
      if (activePlayerIndex === null) return;

      const playerName = localState.players[activePlayerIndex].name;

      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error("Fetch failed");
        const data = await res.json();

        const allAchievements = [];
        if (data.players && data.players[activePlayerIndex] && data.players[activePlayerIndex].achievements) {
          const playerAchievements = data.players[activePlayerIndex].achievements;
          if (playerAchievements.pending) {
            allAchievements.push(...playerAchievements.pending.map(a => ({ ...a, status: 'active' })));
          }
          if (playerAchievements.archived) {
            allAchievements.push(...playerAchievements.archived.map(a => ({ ...a, status: 'archived' })));
          }
        }

        const allLoot = [];
        if (data.campaign_notes && data.campaign_notes.loot) {
          data.campaign_notes.loot.forEach(loot => {
            if (!loot.is_deleted) {
              allLoot.push({ ...loot, status: 'active' });
            }
          });
        }

        historyDataCache = {
          achievements: allAchievements,
          loot: allLoot
        };

        renderHistoryTab('achievements');
        document.getElementById('history-modal').classList.add('visible');
        document.getElementById('history-overlay').classList.add('visible');
      } catch (e) {
        showToast("Failed to load history.");
      }
    }

    function switchHistoryTab(tab) {
      currentHistoryTab = tab;

      document.querySelectorAll('.history-tab').forEach(t => {
        t.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      renderHistoryTab(tab);
    }

    function renderHistoryTab(tab) {
      const content = document.getElementById('history-content');
      const items = tab === 'achievements' ? historyDataCache.achievements : historyDataCache.loot;

      if (items.length === 0) {
        content.innerHTML = '<div class="history-empty">No ' + tab + ' yet.</div>';
        return;
      }

      let html = '';
      items.forEach(item => {
        const isArchived = item.status === 'archived';
        const isLoot = tab === 'loot';

        if (isLoot) {
          const name = item.raw_text ? item.raw_text.split('\n')[0] : 'Unknown Item';
          html += `
            <div class="history-item loot ${isArchived ? 'archived' : ''}">
              <h4>⭐ ${escapeHtml(name)}</h4>
              <span class="history-badge ${isArchived ? 'badge-archived' : 'badge-active'}">
                ${isArchived ? 'Archived' : 'Active'}
              </span>
            </div>
          `;
        } else {
          const name = item.name || 'Unknown Achievement';
          html += `
            <div class="history-item ${isArchived ? 'archived' : ''}">
              <h4>🏆 ${escapeHtml(name)}</h4>
              <span class="history-badge ${isArchived ? 'badge-archived' : 'badge-active'}">
                ${isArchived ? 'Archived' : 'Active'}
              </span>
            </div>
          `;
        }
      });

      content.innerHTML = html;
    }

    function closeHistory() {
      const modal = document.getElementById('history-modal');
      const overlay = document.getElementById('history-overlay');
      modal.classList.remove('visible');
      overlay.classList.remove('visible');
    }

    // ========== LOGOUT ==========
    function initLogoutButton() {
      const btn = document.getElementById('btn-logout');
      btn.addEventListener('click', logout);
    }

    function logout() {
      activePlayerIndex = null;
      localStorage.removeItem(PLAYER_ACTIVE_KEY);

      const loginLayer = document.getElementById('login-layer');
      const hudLayer = document.getElementById('main-hud');
      const loadingLayer = document.getElementById('loading-layer');
      const tickerPill = document.getElementById('ticker-pill');

      loadingLayer.classList.add('hidden');
      loginLayer.classList.remove('hidden');
      hudLayer.classList.add('hidden');
      tickerPill.classList.add('hidden');
      loginLayer.style.opacity = '1';
      loginLayer.style.pointerEvents = 'auto';
      loginLayer.style.animation = '';

      populateRoster();
    }

    // ========== UTILITIES ==========
    function showToast(msg) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      toast.setAttribute('role', 'status');
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.toString()
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeStack();
        closeHistory();
        closeSpellSlotsModal();
      }
    });
  </script>
</body>
</html>
