  <script>
    // V3.1: PIN-based auth system (restored)
    const WORKER_URL = "https://dmscreen.askozicki.workers.dev";
    const PIN_STORAGE_KEY = "showrunner_pin_authenticated";
    
    let campaignState = null;
    
    async function initAuth() {
      document.documentElement.style.display = 'none';
      
      // Check if PIN already validated in this session
      let isAuthenticated = false;
      try {
        isAuthenticated = localStorage.getItem(PIN_STORAGE_KEY) === "true";
      } catch (e) {
        console.warn("localStorage unavailable; will require PIN validation.");
      }
      
      if (isAuthenticated) {
        // Try to fetch campaign state to verify we're still connected
        try {
          const response = await fetch(WORKER_URL);
          if (response.ok) {
            campaignState = await response.json();
            if (!campaignState.players) campaignState.players = [];
            document.documentElement.style.display = '';
            return;
          }
        } catch (e) {
          console.warn("State fetch failed; prompting for PIN again.");
        }
      }
      
      // Prompt for PIN
      const pin = prompt("🔐 ACCESS RESTRICTED: Enter Showrunner PIN.");
      if (!pin) {
        window.location.href = "about:blank";
        return;
      }
      
      // Validate PIN against Worker
      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "validate_pin", pin: pin })
        });
        
        if (response.ok) {
          const data = await response.json();
          if (data.valid === true) {
            // PIN is valid; mark as authenticated
            try {
              localStorage.setItem(PIN_STORAGE_KEY, "true");
            } catch (e) {
              console.warn("Failed to store auth in localStorage; using session only.");
              sessionStorage.setItem(PIN_STORAGE_KEY, "true");
            }
            
            // Fetch campaign state
            const stateResponse = await fetch(WORKER_URL);
            if (stateResponse.ok) {
              campaignState = await stateResponse.json();
              if (!campaignState.players) campaignState.players = [];
              document.documentElement.style.display = '';
              return;
            }
          }
        }
      } catch (e) {
        console.error("PIN validation failed:", e);
      }
      
      alert("Authentication failed. Access denied.");
      window.location.href = "about:blank";
    }
    
    // Run auth on page load
    initAuth().catch(e => {
      console.error("Auth init error:", e);
      window.location.href = "about:blank";
    });
  </script>

  <style>

      font-size: 1.1rem;

    }

    .nav-link:hover, .nav-link.active {

    }

      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;

      font-size: 0.85rem;

    .btn-global-action:hover, .btn-global-action.toggle-active {

      color: var(--accent);
    }

      border: 1px solid var(--glass-border);
      color: var(--text);
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    .mini-select:hover {
      border-color: var(--accent);
    }

    .heartbeat {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Buttons */
    button { cursor: pointer; }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: bold;
      transition: all 0.2s ease;

    .btn-primary:hover {
      box-shadow: 0 0 16px rgba(187, 134, 252, 0.4);
      transform: scale(1.02);
    }

    .btn-secondary {
      background: var(--glass);

      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.5rem;
      border-radius: 4px;

      border-radius: 4px;
      transition: all 0.2s ease;

      align-items: center;

      border-radius: 4px;

    }

      from { transform: translateX(400px); }
      to { transform: translateX(0); }
    }

  <script>
    // Lore Parser (Phase 2)
    function parseLoreDocument(loreText) {
      const characters = [];
      
      // Split by character name at start of line (followed by parentheses)
      const characterBlocks = loreText.split(/^(?:[\d+\.]?\s+)?"?([A-Z][a-zA-Z\s]+)"?\s*\(Played by:/m);
      
      // Process matches (every odd index is a name, every even+1 is the block)
      for (let i = 1; i < characterBlocks.length; i += 2) {
        const name = characterBlocks[i].trim();
        const blockText = characterBlocks[i + 1] || "";
        
        // Extract Vitals: Max HP | AC | Passive Perception
        const vitalMatch = blockText.match(/Vitals:?\s*(?:Max\s+)?HP:\s*(\d+)\s*\|\s*AC:\s*(\d+)(?:\s*\([^)]+\))?\s*\|\s*Passive Perception:\s*(\d+)/);
        const maxHP = vitalMatch ? parseInt(vitalMatch[1]) : 20;
        const ac = vitalMatch ? parseInt(vitalMatch[2]) : 10;
        const passivePerception = vitalMatch ? parseInt(vitalMatch[3]) : 10;
        
        // Extract Build: Class - Race
        const buildMatch = blockText.match(/Build:\s*(.+?)(?:\n|Backstory|Death Save|Companions|$)/);
        const buildText = buildMatch ? buildMatch[1].trim() : "";
        
        // Parse class and race from build text (e.g., "College of Lore Bard - Lightfoot Halfling")
        const classRaceMatch = buildText.match(/^(.+?)\s+-\s+(.+)$/);
        const charClass = classRaceMatch ? classRaceMatch[1].trim() : buildText.split(' - ')[0] || "Unknown Class";
        const race = classRaceMatch ? classRaceMatch[2].trim() : buildText.split(' - ')[1] || "Unknown Race";
        
        // Extract Backstory/Lore
        const backstoryMatch = blockText.match(/Backstory\/Lore:\s*(.+?)(?:\nParty Connections|Inventory|Death Save|Economy|Companions|$)/s);
        const lore = backstoryMatch ? backstoryMatch[1].trim() : "";
        
        // Extract Economy (gold)
        const economyMatch = blockText.match(/Economy:\s*(.+?)(?:\n|Death Save|$)/);
        const gold = economyMatch ? economyMatch[1].trim() : "0gp";
        
        characters.push({
          id: name.toLowerCase().replace(/\s+/g, "_"),
          name: name,
          class: charClass,
          race: race,
          maxHP: maxHP,
          currentHP: maxHP,
          ac: ac,
          passivePerception: passivePerception,
          lore: lore,
          gold: gold,
          profileImage: `/players/${name}.png`,
          stats: { str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10 },
          spellSlots: {
            cantrips: 99,
            level1: 2,
            level2: 0,
            level3: 0,
            lastLongRest: new Date().toISOString()
          }
        });
      }
      
      return characters;
    }

    // KV Sync Function (Phase 1)
    async function syncCampaignStateToKV() {
      try {
        const token = localStorage.getItem(AUTH_TOKEN_KEY) || sessionStorage.getItem(AUTH_TOKEN_KEY);
        if (!token) {
          console.error("No auth token available for sync.");
          return;
        }
        
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            action: "update",
            state: campaignState,
            base_version: campaignState.base_version || 1
          })
        });
        
        if (response.ok) {
          const data = await response.json();
          campaignState.base_version = data.base_version;
          console.log("State synced to KV");
        } else {
          console.error("KV sync failed:", response.status);
          alert("Failed to save changes. Please try again.");
        }
      } catch (e) {
        console.error("Sync error:", e);
        alert("Network error while saving.");
      }
    }

    // Character Editor Functions (Phase 2)
    let currentCharacterEditing = null;

    function openCharacterEditor(character) {
      currentCharacterEditing = character;
      
      document.getElementById("char-editor-name").textContent = character.name;
      document.getElementById("char-lore-text").value = character.lore || "";
      document.getElementById("char-stat-str").value = character.stats?.str || 10;
      document.getElementById("char-stat-dex").value = character.stats?.dex || 10;
      document.getElementById("char-stat-con").value = character.stats?.con || 10;
      document.getElementById("char-stat-int").value = character.stats?.int || 10;
      document.getElementById("char-stat-wis").value = character.stats?.wis || 10;
      document.getElementById("char-stat-cha").value = character.stats?.cha || 10;
      document.getElementById("char-current-hp").value = character.currentHP;
      document.getElementById("char-max-hp").value = character.maxHP;
      document.getElementById("char-ac").value = character.ac;
      document.getElementById("char-passive-per").value = character.passivePerception;
      
      document.getElementById("char-editor-overlay").classList.remove("hidden");
      document.getElementById("char-editor-modal").classList.remove("hidden");
    }

    function closeCharacterEditor() {
      document.getElementById("char-editor-overlay").classList.add("hidden");
      document.getElementById("char-editor-modal").classList.add("hidden");
      currentCharacterEditing = null;
    }

    function switchCharTab(tabName) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
      document.getElementById(`char-${tabName}-tab`).classList.remove("hidden");
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      event.target.classList.add("active");
    }

    async function saveCharacterEditor() {
      if (!currentCharacterEditing) return;
      
      const updated = {
        ...currentCharacterEditing,
        lore: document.getElementById("char-lore-text").value,
        stats: {
          str: parseInt(document.getElementById("char-stat-str").value) || 10,
          dex: parseInt(document.getElementById("char-stat-dex").value) || 10,
          con: parseInt(document.getElementById("char-stat-con").value) || 10,
          int: parseInt(document.getElementById("char-stat-int").value) || 10,
          wis: parseInt(document.getElementById("char-stat-wis").value) || 10,
          cha: parseInt(document.getElementById("char-stat-cha").value) || 10
        },
        currentHP: parseInt(document.getElementById("char-current-hp").value) || 0,
        maxHP: parseInt(document.getElementById("char-max-hp").value) || 1,
        ac: parseInt(document.getElementById("char-ac").value) || 10,
        passivePerception: parseInt(document.getElementById("char-passive-per").value) || 10
      };
      
      // Update local state
      const idx = campaignState.characters.findIndex(c => c.id === updated.id);
      if (idx !== -1) campaignState.characters[idx] = updated;
      
      // Sync to KV
      await syncCampaignStateToKV();
      renderCharacterTiles();
      closeCharacterEditor();
    }

    // Character Tile Rendering
    function renderCharacterTiles() {
      const grid = document.getElementById("character-grid");
      if (!grid) return;
      grid.innerHTML = "";
      
      if (!campaignState || !campaignState.characters) return;
      
      campaignState.characters.forEach(char => {
        const tile = document.createElement("div");
        tile.className = "character-tile";
        tile.innerHTML = `
          <img src="${char.profileImage}" alt="${char.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2214%22%3E?%3C/text%3E%3C/svg%3E'">
          <div class="name">${char.name}</div>
          <div class="class">${char.class}</div>
          <div style="font-size: 0.7rem; color: var(--text-muted);">HP: ${char.currentHP}/${char.maxHP}</div>
        `;
        tile.onclick = () => openCharacterEditor(char);
        grid.appendChild(tile);
      });
    }

    function renderAll() {
      renderCharacterTiles();
    }

    // Delete Room Function (Phase 3)
    async function deleteRoom(roomId) {
      if (!confirm("Soft delete this room? It will not appear in the UI.")) return;
      
      const room = campaignState.rooms?.find(r => r.id === roomId);
      if (room) {
        room.deleted = true;
        await syncCampaignStateToKV();
        renderAll();
      }
    }

    // Initialize on page ready
    document.addEventListener('DOMContentLoaded', () => {
      renderAll();
    });
  </script>
