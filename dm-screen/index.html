<!DOCTYPE html>

<head>

  <title>Showrunner | Dashboard V4.0</title>

  <!-- ============================================================
       PIN-BASED AUTH (preserved from V3.1/V4.1.1)
       Gates page render behind Worker PIN validation.
       ============================================================ -->
  <script>
    const WORKER_URL = "https://dmscreen.askozicki.workers.dev";
    const PIN_STORAGE_KEY = "showrunner_pin_authenticated";

    // Global campaign state, populated by auth, mutated by editors, synced to KV.
    let campaignState = null;

    async function initAuth() {
      document.documentElement.style.display = 'none';

      let isAuthenticated = false;
      try {
        isAuthenticated = localStorage.getItem(PIN_STORAGE_KEY) === "true";
      } catch (e) {
        console.warn("localStorage unavailable; will require PIN validation.");
      }

      if (isAuthenticated) {
        try {
          const response = await fetch(WORKER_URL);
          if (response.ok) {
            campaignState = await response.json();
            normalizeState();
            document.documentElement.style.display = '';
            return;
          }
        } catch (e) {
          console.warn("State fetch failed; prompting for PIN again.");
        }
      }

      const pin = prompt("ACCESS RESTRICTED: Enter Showrunner PIN.");
      if (!pin) { window.location.href = "about:blank"; return; }

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "validate_pin", pin: pin })
        });

        if (response.ok) {
          const data = await response.json();
          if (data.valid === true) {
            try {
              localStorage.setItem(PIN_STORAGE_KEY, "true");
            } catch (e) {
              try { sessionStorage.setItem(PIN_STORAGE_KEY, "true"); } catch (_) {}
            }
            const stateResponse = await fetch(WORKER_URL);
            if (stateResponse.ok) {
              campaignState = await stateResponse.json();
              normalizeState();
              document.documentElement.style.display = '';
              return;
            }
          }
        }
      } catch (e) {
        console.error("PIN validation failed:", e);
      }

      alert("Authentication failed. Access denied.");
      window.location.href = "about:blank";
    }

    // Guarantee the shape the dashboard expects, so missing keys never crash render.
    function normalizeState() {
      if (!campaignState || typeof campaignState !== 'object') campaignState = {};
      if (typeof campaignState.version !== 'number') campaignState.version = 0;
      if (!Array.isArray(campaignState.characters)) campaignState.characters = [];
      if (!Array.isArray(campaignState.achievements)) campaignState.achievements = [];
      if (!campaignState.campaign || typeof campaignState.campaign !== 'object') campaignState.campaign = {};
      const c = campaignState.campaign;
      if (!Array.isArray(c.rooms)) c.rooms = [];
      if (!Array.isArray(c.npcs)) c.npcs = [];
      if (!Array.isArray(c.rules)) c.rules = [];
      if (!Array.isArray(c.timeline)) c.timeline = [];
      if (typeof c.currentRoom !== 'string' && c.rooms[0]) c.currentRoom = c.rooms[0].id;
      if (typeof c.sessionNumber !== 'number') c.sessionNumber = 1;
      if (typeof c.sessionNotes !== 'string') c.sessionNotes = "";
      if (!campaignState.loot || typeof campaignState.loot !== 'object') campaignState.loot = { active: [], archived: [] };
      if (!campaignState.lootTables || typeof campaignState.lootTables !== 'object') campaignState.lootTables = { tiers: { bronze: [], silver: [], gold: [], platinum: [] }, personal: {}, custom: {}, allItems: [] };
    }

    initAuth().catch(e => {
      console.error("Auth init error:", e);
      window.location.href = "about:blank";
    });
  </script>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='none' stroke='white' stroke-width='4' stroke-linejoin='round' d='M50 5 L90 30 L90 70 L50 95 L10 70 L10 30 Z M50 5 L50 45 M10 30 L50 45 L90 30 M10 70 L50 45 L90 70 M50 95 L50 45'/></svg>">

  <style>
    :root {
      --primary: #6366f1;
      --accent: #bb86fc;
      --danger: #f87171;
      --success: #4ade80;
      --warning: #facc15;
      --glass: rgba(30, 30, 40, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #e0e0e0;
      --text-muted: #888888;
      --bg-dark: #0a0e27;
      --subtle-dark: #1a1f3a;
      --card-bg: rgba(20, 24, 48, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(99,102,241,0.10), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(187,134,252,0.08), transparent 60%),
        var(--bg-dark);
      color: var(--text);
      font-family: 'Courier New', ui-monospace, monospace;
      font-size: 14px;
      overflow-x: hidden;
    }

    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ---------- Navbar ---------- */
    .navbar {
      background: var(--subtle-dark);
      border-bottom: 1px solid var(--glass-border);
      padding: 0.85rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;
    }
    .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .nav-link {
      color: var(--text-muted); text-decoration: none;
      padding: 0.5rem 1rem; border-radius: 4px; transition: all 0.2s ease;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--accent); background: rgba(187, 134, 252, 0.1);
    }
    .heartbeat {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--success); display: inline-block;
      box-shadow: 0 0 8px var(--success); transition: all 0.3s ease;
    }
    .heartbeat.syncing { background: var(--warning); box-shadow: 0 0 8px var(--warning); animation: pulse 1s infinite; }
    .heartbeat.error   { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* ---------- Buttons ---------- */
    button { cursor: pointer; font-family: inherit; }
    .btn-primary {
      background: var(--accent); color: #100; border: none;
      padding: 0.6rem 1.2rem; border-radius: 4px; font-weight: bold;
      transition: all 0.2s ease;
    }
    .btn-primary:hover { box-shadow: 0 0 16px rgba(187,134,252,0.4); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--glass); color: var(--text);
      border: 1px solid var(--glass-border); padding: 0.6rem 1.2rem;
      border-radius: 4px; transition: all 0.2s ease;
    }
    .btn-secondary:hover { border-color: var(--text-muted); }
    .btn-danger {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(248,113,113,0.4); padding: 0.4rem 0.8rem;
      border-radius: 4px; transition: all 0.2s ease; font-size: 0.8rem;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.12); }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--glass-border); padding: 0.45rem 0.7rem;
      border-radius: 4px; font-size: 0.8rem; transition: all 0.2s ease;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-ghost.active { border-color: var(--accent); color: var(--accent); background: rgba(187,134,252,0.08); }

    /* ---------- Inputs ---------- */
    textarea, input[type="number"], input[type="text"], input[type="url"], select {
      width: 100%; padding: 0.5rem; background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border); color: var(--text);
      border-radius: 4px; font-family: inherit; font-size: 0.9rem;
    }
    textarea:focus, input:focus, select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(187,134,252,0.18);
    }
    label { display: block; font-size: 0.8rem; margin-bottom: 0.25rem; color: var(--text-muted); }
    .form-group { margin-bottom: 0.9rem; }

    /* ---------- Layout ---------- */
    .dashboard-layout {
      flex: 1; display: flex; align-items: flex-start;
      gap: 1rem; padding: 1rem; max-width: 1600px; width: 100%; margin: 0 auto;
    }

    /* ---------- Player Cards Sidebar ---------- */
    .cards-sidebar {
      width: 230px; flex-shrink: 0; position: sticky; top: 72px;
      max-height: calc(100vh - 88px); overflow-y: auto;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .sidebar-title {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; letter-spacing: 1px; color: var(--text-muted);
      padding: 0 0.2rem;
    }
    .player-card {
      background: var(--card-bg); border: 1px solid var(--glass-border);
      border-radius: 8px; padding: 0.6rem; transition: border-color 0.2s ease;
    }
    .player-card:hover { border-color: rgba(187,134,252,0.4); }
    .pc-head { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .pc-portrait {
      width: 42px; height: 42px; border-radius: 6px; object-fit: cover;
      background: #222; flex-shrink: 0;
    }
    .pc-id { flex: 1; min-width: 0; }
    .pc-name { font-weight: bold; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-stats { font-size: 0.72rem; color: var(--text-muted); }
    .pc-caret { color: var(--text-muted); font-size: 0.7rem; transition: transform 0.2s ease; }
    .player-card.expanded .pc-caret { transform: rotate(180deg); }

    .hp-pill { color: var(--success); }
    .hp-pill.warn { color: var(--warning); }
    .hp-pill.crit { color: var(--danger); }

    .pc-body { display: none; margin-top: 0.6rem; border-top: 1px solid var(--glass-border); padding-top: 0.6rem; }
    .player-card.expanded .pc-body { display: block; }
    .pc-class { font-size: 0.74rem; color: var(--text-muted); margin-bottom: 0.5rem; }

    .pc-hp-row { display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.5rem; }
    .pc-hp-row input[type="number"] { width: 48px; padding: 0.25rem; text-align: center; }
    .hp-step {
      width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--glass-border);
      background: transparent; color: var(--text); font-size: 0.9rem; line-height: 1;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .hp-step:hover { border-color: var(--accent); color: var(--accent); }

    .cond-title { font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); margin: 0.3rem 0; }
    .cond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.15rem 0.4rem; }
    .cond-grid label {
      display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem;
      color: var(--text); margin: 0; cursor: pointer;
    }
    .cond-grid input { width: auto; margin: 0; accent-color: var(--accent); }

    .pc-actions { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
    .pc-actions button { flex: 1; }

    .sidebar-actions { margin-top: 0.4rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .sidebar-actions .btn-ghost { text-align: left; }

    /* ---------- Main Content ---------- */
    .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1rem; }

    .section-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 10px; overflow: hidden;
    }
    .section-head {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
    }
    .section-head h2 { font-size: 1.05rem; letter-spacing: 1px; margin: 0; }
    .section-head .meta { color: var(--text-muted); font-size: 0.8rem; }
    .section-head .spacer { flex: 1; }
    .section-body { padding: 1.1rem; }
    .section-card.collapsed .section-body { display: none; }

    /* Top row: Room + Notes side by side */
    .content-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }

    /* Room selector inline */
    .room-picker { display: flex; align-items: center; gap: 0.5rem; }
    .room-picker select { width: auto; min-width: 160px; }

    /* Rendered (display) content for room + notes */
    .rendered { line-height: 1.6; font-size: 0.92rem; min-height: 120px; }
    .rendered h4 {
      color: var(--accent); font-size: 0.85rem; letter-spacing: 1.5px;
      margin: 1rem 0 0.35rem; padding-bottom: 0.2rem;
      border-bottom: 1px solid var(--glass-border);
    }
    .rendered h4:first-child { margin-top: 0; }
    .rendered p { margin: 0 0 0.6rem; white-space: pre-wrap; }
    .rendered .empty-hint { color: var(--text-muted); font-style: italic; }

    .editor-area textarea { min-height: 240px; resize: vertical; line-height: 1.5; }
    .editor-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .hidden { display: none !important; }

    .save-state { font-size: 0.75rem; color: var(--text-muted); }
    .save-state.saving { color: var(--warning); }
    .save-state.saved { color: var(--success); }
    .save-state.error { color: var(--danger); }

    /* ---------- Modals ---------- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 1rem; backdrop-filter: blur(2px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-panel {
      background: var(--subtle-dark); border: 1px solid var(--glass-border);
      border-radius: 10px; width: 100%; max-width: 560px;
      max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.2rem; border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; background: var(--subtle-dark); z-index: 2;
    }
    .modal-head h2 { font-size: 1.1rem; margin: 0; }
    .modal-close {
      background: none; border: none; color: var(--text);
      font-size: 1.4rem; line-height: 1; padding: 0 0.2rem;
    }
    .modal-close:hover { color: var(--danger); }
    .modal-body { padding: 1.2rem; }
    .modal-tabs { display: flex; gap: 0.25rem; padding: 0 1.2rem; border-bottom: 1px solid var(--glass-border); flex-wrap: wrap; }
    .tab-btn {
      background: none; border: none; color: var(--text-muted);
      padding: 0.6rem 0.9rem; border-bottom: 2px solid transparent; transition: all 0.2s ease;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .stat-line { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; padding: 0.3rem 0; }
    .stat-line span.k { color: var(--text-muted); font-size: 0.85rem; }
    .stat-line input { width: 90px; text-align: center; }

    .inv-item {
      border: 1px solid var(--glass-border); border-radius: 6px;
      padding: 0.6rem; margin-bottom: 0.5rem;
    }
    .inv-item .inv-top { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .inv-item .inv-name { font-weight: bold; font-size: 0.9rem; }
    .inv-item .inv-meta { font-size: 0.72rem; color: var(--text-muted); text-transform: capitalize; }
    .inv-item .inv-desc { font-size: 0.78rem; color: var(--text); margin-top: 0.35rem; line-height: 1.4; }

    .ach-entry {
      border: 1px solid var(--glass-border); border-radius: 6px;
      padding: 0.7rem; margin-bottom: 0.6rem;
    }
    .ach-entry .ach-name { font-weight: bold; }
    .ach-entry .ach-cat {
      font-size: 0.66rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--accent); border: 1px solid rgba(187,134,252,0.3);
      border-radius: 10px; padding: 0.05rem 0.5rem; margin-left: 0.5rem;
    }
    .ach-entry .ach-desc { font-size: 0.8rem; color: var(--text-muted); margin: 0.35rem 0; line-height: 1.4; }
    .ach-entry .ach-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .scope-tag { font-size: 0.66rem; color: var(--text-muted); }

    /* ---------- Toasts ---------- */
    #toast-container {
      position: fixed; bottom: 1rem; right: 1rem; z-index: 2000;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      background: var(--subtle-dark); border: 1px solid var(--glass-border);
      border-left: 3px solid var(--accent); color: var(--text);
      padding: 0.7rem 1rem; border-radius: 4px; font-size: 0.85rem;
      animation: slideIn 0.25s ease; max-width: 320px;
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warn { border-left-color: var(--warning); }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ---------- Responsive ---------- */
    @media (max-width: 1024px) {
      .content-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 820px) {
      .dashboard-layout { flex-direction: column; }
      .cards-sidebar {
        width: 100%; position: static; max-height: none;
        flex-direction: row; flex-wrap: wrap;
      }
      .cards-sidebar .player-card { flex: 1 1 160px; }
      .sidebar-title, .sidebar-actions { width: 100%; }
      .sidebar-actions { flex-direction: row; flex-wrap: wrap; }
      .sidebar-actions .btn-ghost { flex: 1 1 auto; }
    }
  </style>
</head>

  <nav class="navbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
      SHOWRUNNER

  <div class="dashboard-layout">

    <!-- ============ PLAYER CARDS SIDEBAR ============ -->
    <aside class="cards-sidebar">
      <div class="sidebar-title">
        <span>PARTY</span>
        <span class="meta" id="party-count"></span>
      </div>
      <div id="cards-list"><!-- player cards rendered here --></div>

      <div class="sidebar-actions">
        <button class="btn-ghost" onclick="openAchievementModal()">&#127942; Achievements</button>
        <button class="btn-ghost" onclick="refreshFromKV()">&#8635; Refresh State</button>
      </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content">

      <div class="content-row">

        <!-- ROOM DESCRIPTION -->
        <section class="section-card" id="room-card">
          <div class="section-head">
            <h2>ROOM</h2>
            <div class="room-picker">
              <select id="room-select" onchange="onRoomChange(this.value)"></select>
            </div>
            <span class="spacer"></span>
            <span class="save-state" id="room-save-state"></span>
            <button class="btn-ghost" id="room-edit-btn" onclick="toggleRoomEdit()">Edit</button>
            <button class="btn-ghost" onclick="toggleCollapse('room-card')" title="Collapse">&#9650;</button>

          <div class="section-body">
            <div class="rendered" id="room-display"></div>
            <div class="editor-area hidden" id="room-editor">
              <textarea id="room-textarea" placeholder="Room name on first line.&#10;&#10;Use ALL-CAPS lines ending in a colon as section headers, e.g.&#10;HAZARDS:&#10;DC 12 CON save or poisoned."></textarea>

                <button class="btn-primary" onclick="saveRoomEdit()">Save</button>

          </div>

            <span class="save-state" id="notes-save-state"></span>
            <button class="btn-ghost" id="notes-edit-btn" onclick="toggleNotesEdit()">Edit</button>
            <button class="btn-ghost" onclick="toggleCollapse('notes-card')" title="Collapse">&#9650;</button>
          </div>
          <div class="section-body">
            <div class="rendered" id="notes-display"></div>
            <div class="editor-area hidden" id="notes-editor">
              <textarea id="notes-textarea" placeholder="Freeform session notes. Timestamps optional.&#10;&#10;ALL-CAPS lines ending in a colon become headers."></textarea>
              <div class="editor-actions">
                <button class="btn-primary" onclick="saveNotesEdit()">Save</button>
                <button class="btn-secondary" onclick="cancelNotesEdit()">Cancel</button>
              </div>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- ============ CHARACTER DETAIL MODAL ============ -->
  <div id="char-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeCharModal()">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="cm-name">Character</h2>
        <button class="modal-close" onclick="closeCharModal()">&times;</button>
      </div>
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="cm-vitals" onclick="switchModalTab('char-modal', this)">Vitals</button>
        <button class="tab-btn" data-tab="cm-spells" onclick="switchModalTab('char-modal', this)">Spells</button>
        <button class="tab-btn" data-tab="cm-inv" onclick="switchModalTab('char-modal', this)">Inventory</button>
        <button class="tab-btn" data-tab="cm-notes" onclick="switchModalTab('char-modal', this)">Notes</button>
      </div>
      <div class="modal-body">

        <div class="tab-panel active" id="cm-vitals">
          <div class="grid-2">

  <div id="toast-container"></div>

  <!-- ============================================================
       APPLICATION LOGIC
       ============================================================ -->
  <script>
  "use strict";

  /* ---------- Constants ---------- */
  const CONDITIONS = [
    "Blinded","Burning","Charmed","Concentrating","Deafened","Frightened",
    "Grappled","Incapacitated","Invisible","Paralyzed","Petrified","Poisoned",
    "Prone","Restrained","Stunned","Unconscious"
  ];
  const DEFAULT_PORTRAIT = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23222a44' width='100' height='100'/%3E%3Ctext x='50' y='54' text-anchor='middle' fill='%23667' font-size='40' font-family='monospace'%3E%3F%3C/text%3E%3C/svg%3E";

  /* ---------- Toast ---------- */
  function toast(msg, kind) {
    const c = document.getElementById("toast-container");
    const t = document.createElement("div");
    t.className = "toast" + (kind ? " " + kind : "");
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(() => t.remove(), 300); }, 3000);
  }

  /* ---------- Heartbeat ---------- */
  function setHeartbeat(mode) {
    const hb = document.getElementById("sync-heartbeat");
    hb.classList.remove("syncing", "error");
    if (mode === "syncing") hb.classList.add("syncing");
    else if (mode === "error") hb.classList.add("error");
  }

  /* ---------- HTML escape ---------- */
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  /* ============================================================
     KV SYNC  (matches worker contract: { base_version, data })
     ============================================================ */
  let _syncInFlight = false;
  let _syncQueued = false;

  async function syncToKV() {
    if (!campaignState) return;
    if (_syncInFlight) { _syncQueued = true; return; }
    _syncInFlight = true;
    setHeartbeat("syncing");

    // Bump version & timestamp; worker rejects base_version < currentVersion.
    const baseVersion = campaignState.version || 0;
    campaignState.version = baseVersion + 1;
    campaignState.lastModified = Date.now();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ base_version: baseVersion, data: campaignState })
      });

      if (res.status === 409) {
        // Version collision: pull latest, re-render, warn.
        const latest = await (await fetch(WORKER_URL)).json();
        campaignState = latest; normalizeState(); renderAll();
        setHeartbeat("error");
        toast("Sync conflict — reloaded latest state.", "warn");
      } else if (res.ok) {
        const data = await res.json();
        if (typeof data.new_version === "number") campaignState.version = data.new_version;
        setHeartbeat("ok");
      } else {
        setHeartbeat("error");
        toast("Save failed (" + res.status + ").", "error");
      }
    } catch (e) {
      setHeartbeat("error");
      toast("Offline — change kept locally, will retry on next save.", "warn");
      console.error("Sync error:", e);
      // Roll version back so the next attempt uses a valid base_version.
      campaignState.version = baseVersion;
    } finally {
      _syncInFlight = false;
      if (_syncQueued) { _syncQueued = false; syncToKV(); }
    }
  }

  // Debounced sync — 1s after the last edit.
  let _debounceTimer = null;
  function scheduleSync(stateEl) {
    if (stateEl) { stateEl.textContent = "unsaved\u2026"; stateEl.className = "save-state saving"; }
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(async () => {
      await syncToKV();
      if (stateEl) { stateEl.textContent = "saved"; stateEl.className = "save-state saved"; }
    }, 1000);
  }

  async function refreshFromKV() {
    setHeartbeat("syncing");
    try {
      const latest = await (await fetch(WORKER_URL)).json();
      campaignState = latest; normalizeState(); renderAll();
      setHeartbeat("ok");
      toast("State refreshed.", "success");
    } catch (e) {
      setHeartbeat("error");
      toast("Refresh failed — still offline.", "error");
    }
  }

  /* ============================================================
     TEXT PARSING  (ALL-CAPS headers -> <h4>, blanks -> paragraphs)
     ============================================================ */
  function isCapsHeader(line) {
    const t = line.trim();
    if (t.length < 2 || t.length > 48) return false;
    if (!/:\s*$/.test(t)) return false;                 // must end with colon
    if (!/[A-Z]/.test(t)) return false;                 // must contain a letter
    if (/[a-z]/.test(t)) return false;                  // no lowercase letters
    return true;
  }

  function renderRichText(raw) {
    if (!raw || !raw.trim()) return '<p class="empty-hint">Nothing here yet. Click Edit to add content.</p>';
    const lines = raw.replace(/\r\n/g, "\n").split("\n");
    let html = "", buf = [];
    const flush = () => { if (buf.length) { html += "<p>" + esc(buf.join("\n")) + "</p>"; buf = []; } };
    for (const line of lines) {
      if (isCapsHeader(line)) { flush(); html += "<h4>" + esc(line.trim()) + "</h4>"; }
      else if (line.trim() === "") { flush(); }
      else { buf.push(line); }
    }
    flush();
    return html || '<p class="empty-hint">Nothing here yet.</p>';
  }

  /* ============================================================
     ROOM <-> editable text blob
     ============================================================ */
  function getCurrentRoom() {
    const rooms = campaignState.campaign.rooms;
    const id = campaignState.campaign.currentRoom;
    return rooms.find(r => r.id === id) || rooms[0] || null;
  }

  // Compose a room object into a single editable text blob.
  function roomToText(room) {
    if (!room) return "";
    const parts = [];
    if (room.name) parts.push(room.name);
    if (room.area) parts.push("AREA: " + room.area);
    if (room.description) parts.push("\n" + room.description);
    if (room.readaloud) parts.push("\nREAD ALOUD:\n" + room.readaloud);
    const m = room.mechanics || {};
    if (m.terrain) parts.push("\nTERRAIN:\n" + m.terrain);
    if (Array.isArray(m.hazards) && m.hazards.length) parts.push("\nHAZARDS:\n" + m.hazards.join("\n"));
    if (Array.isArray(m.interactables) && m.interactables.length) parts.push("\nINTERACTABLES:\n" + m.interactables.join("\n"));
    if (room.notes) parts.push("\nNOTES:\n" + room.notes);
    return parts.join("\n");
  }

  // Parse the editable blob back into structured room fields.
  // Recognized headers map to fields; everything before the first header
  // is name (line 1) + description (rest).
  function textToRoom(text, room) {
    const lines = text.replace(/\r\n/g, "\n").split("\n");
    const out = { name: "", area: room.area || "", description: "", readaloud: "",
                  mechanics: { terrain: "", hazards: [], interactables: [] }, notes: "" };
    let section = "head", bucket = [];
    const known = { "AREA:": "area", "READ ALOUD:": "readaloud", "TERRAIN:": "terrain",
                    "HAZARDS:": "hazards", "INTERACTABLES:": "interactables", "NOTES:": "notes" };

    const commit = () => {
      const txt = bucket.join("\n").trim();
      if (section === "head") {
        const hl = bucket.map(l => l).filter(l => l.trim() !== "");
        out.name = (hl[0] || "").trim();
        out.description = hl.slice(1).join("\n").trim();
      } else if (section === "area") out.area = txt;
      else if (section === "readaloud") out.readaloud = txt;
      else if (section === "terrain") out.mechanics.terrain = txt;
      else if (section === "hazards") out.mechanics.hazards = txt ? txt.split("\n").map(s=>s.trim()).filter(Boolean) : [];
      else if (section === "interactables") out.mechanics.interactables = txt ? txt.split("\n").map(s=>s.trim()).filter(Boolean) : [];
      else if (section === "notes") out.notes = txt;
      bucket = [];
    };

    for (const line of lines) {
      const key = line.trim().toUpperCase();
      if (known[key]) { commit(); section = known[key]; }
      else bucket.push(line);
    }
    commit();
    return Object.assign(room, out);
  }

  /* ============================================================
     RENDER: Player cards sidebar
     ============================================================ */
  function hpClass(cur, max) {
    if (max <= 0) return "";
    const r = cur / max;
    if (r <= 0.25) return "crit";
    if (r <= 0.5) return "warn";
    return "";
  }

  function renderCards() {
    const list = document.getElementById("cards-list");
    const chars = campaignState.characters.filter(c => !c.isArchived);
    document.getElementById("party-count").textContent = chars.length + " active";
    list.innerHTML = "";

    chars.forEach(ch => {
      const hp = (ch.stats && ch.stats.hp) ? ch.stats.hp : { current: 0, max: 1 };
      const ac = (ch.stats && ch.stats.ac != null) ? ch.stats.ac : "-";
      const conds = Array.isArray(ch.conditions) ? ch.conditions : [];
      const card = document.createElement("div");
      card.className = "player-card";
      card.dataset.id = ch.id;

      const condChecks = CONDITIONS.map(name => {
        const key = name.toLowerCase();
        const checked = conds.includes(key) ? "checked" : "";
        return '<label><input type="checkbox" ' + checked +
               ' onchange="toggleCondition(\'' + ch.id + '\',\'' + key + '\',this.checked)">' + name + '</label>';
      }).join("");

      card.innerHTML =
        '<div class="pc-head" onclick="toggleCardExpand(this)">' +
          '<img class="pc-portrait" src="' + esc(ch.profileImage || DEFAULT_PORTRAIT) + '" ' +
            'onerror="this.src=\'' + DEFAULT_PORTRAIT + '\'" alt="">' +
          '<div class="pc-id">' +
            '<div class="pc-name">' + esc(ch.name) + '</div>' +
            '<div class="pc-stats"><span class="hp-pill ' + hpClass(hp.current, hp.max) + '">&#10084; ' +
              hp.current + '/' + hp.max + '</span> &nbsp;&#9876; ' + ac + '</div>' +
          '</div>' +
          '<span class="pc-caret">&#9660;</span>' +
        '</div>' +
        '<div class="pc-body">' +
          '<div class="pc-class">' + esc(ch.class || "") + (ch.level ? ", LV " + ch.level : "") + '</div>' +
          '<div class="pc-hp-row">' +
            '<button class="hp-step" onclick="adjustHP(\'' + ch.id + '\',-1)">&minus;</button>' +
            '<input type="number" value="' + hp.current + '" onchange="setHP(\'' + ch.id + '\',this.value)">' +
            '<span class="pc-stats">/ ' + hp.max + '</span>' +
            '<button class="hp-step" onclick="adjustHP(\'' + ch.id + '\',1)">+</button>' +
          '</div>' +
          '<div class="cond-title">CONDITIONS</div>' +
          '<div class="cond-grid">' + condChecks + '</div>' +
          '<div class="pc-actions">' +
            '<button class="btn-ghost" onclick="openCharModal(\'' + ch.id + '\')">Details</button>' +
          '</div>' +
        '</div>';

      list.appendChild(card);
    });
  }

  function toggleCardExpand(headEl) {
    headEl.parentElement.classList.toggle("expanded");
  }

  function findChar(id) { return campaignState.characters.find(c => c.id === id); }

  function adjustHP(id, delta) {
    const ch = findChar(id); if (!ch || !ch.stats || !ch.stats.hp) return;
    let v = (ch.stats.hp.current || 0) + delta;
    v = Math.max(0, Math.min(v, ch.stats.hp.max || v));
    ch.stats.hp.current = v;
    renderCards(); keepExpanded(id);
    scheduleSync(null);
  }
  function setHP(id, val) {
    const ch = findChar(id); if (!ch || !ch.stats || !ch.stats.hp) return;
    let v = parseInt(val, 10); if (isNaN(v)) v = 0;
    v = Math.max(0, Math.min(v, ch.stats.hp.max || v));
    ch.stats.hp.current = v;
    renderCards(); keepExpanded(id);
    scheduleSync(null);
  }
  function toggleCondition(id, cond, on) {
    const ch = findChar(id); if (!ch) return;
    if (!Array.isArray(ch.conditions)) ch.conditions = [];
    const i = ch.conditions.indexOf(cond);
    if (on && i === -1) ch.conditions.push(cond);
    else if (!on && i !== -1) ch.conditions.splice(i, 1);
    scheduleSync(null);
  }
  // After a re-render, re-open the card the user was working in.
  function keepExpanded(id) {
    const card = document.querySelector('.player-card[data-id="' + id + '"]');
    if (card) card.classList.add("expanded");
  }

  /* ============================================================
     RENDER: Room
     ============================================================ */
  function renderRoomSelect() {
    const sel = document.getElementById("room-select");
    const rooms = campaignState.campaign.rooms;
    sel.innerHTML = "";
    if (!rooms.length) {
      const o = document.createElement("option");
      o.value = ""; o.textContent = "(no rooms)";
      sel.appendChild(o);
      return;
    }
    rooms.forEach(r => {
      const o = document.createElement("option");
      o.value = r.id; o.textContent = r.name || r.id;
      if (r.id === campaignState.campaign.currentRoom) o.selected = true;
      sel.appendChild(o);
    });
  }

  function renderRoom() {
    const room = getCurrentRoom();
    document.getElementById("room-display").innerHTML = renderRichText(roomToText(room));
  }

  function onRoomChange(id) {
    campaignState.campaign.currentRoom = id;
    renderRoom();
    cancelRoomEdit();
    scheduleSync(document.getElementById("room-save-state"));
  }

  function toggleRoomEdit() {
    const ed = document.getElementById("room-editor");
    const disp = document.getElementById("room-display");
    const btn = document.getElementById("room-edit-btn");
    if (ed.classList.contains("hidden")) {
      document.getElementById("room-textarea").value = roomToText(getCurrentRoom());
      ed.classList.remove("hidden"); disp.classList.add("hidden");
      btn.classList.add("active"); btn.textContent = "Editing";
    } else { cancelRoomEdit(); }
  }
  function cancelRoomEdit() {
    document.getElementById("room-editor").classList.add("hidden");
    document.getElementById("room-display").classList.remove("hidden");
    const btn = document.getElementById("room-edit-btn");
    btn.classList.remove("active"); btn.textContent = "Edit";
  }
  function saveRoomEdit() {
    const room = getCurrentRoom();
    if (!room) { toast("No room to save.", "error"); return; }
    textToRoom(document.getElementById("room-textarea").value, room);
    renderRoom(); renderRoomSelect(); cancelRoomEdit();
    scheduleSync(document.getElementById("room-save-state"));
  }

  /* ============================================================
     RENDER: Session notes
     ============================================================ */
  function renderNotes() {
    document.getElementById("session-num-label").textContent = campaignState.campaign.sessionNumber || 1;
    document.getElementById("notes-display").innerHTML = renderRichText(campaignState.campaign.sessionNotes || "");
  }
  function toggleNotesEdit() {
    const ed = document.getElementById("notes-editor");
    const disp = document.getElementById("notes-display");
    const btn = document.getElementById("notes-edit-btn");
    if (ed.classList.contains("hidden")) {
      document.getElementById("notes-textarea").value = campaignState.campaign.sessionNotes || "";
      ed.classList.remove("hidden"); disp.classList.add("hidden");
      btn.classList.add("active"); btn.textContent = "Editing";
    } else { cancelNotesEdit(); }
  }
  function cancelNotesEdit() {
    document.getElementById("notes-editor").classList.add("hidden");
    document.getElementById("notes-display").classList.remove("hidden");
    const btn = document.getElementById("notes-edit-btn");
    btn.classList.remove("active"); btn.textContent = "Edit";
  }
  function saveNotesEdit() {
    campaignState.campaign.sessionNotes = document.getElementById("notes-textarea").value;
    renderNotes(); cancelNotesEdit();
    scheduleSync(document.getElementById("notes-save-state"));
  }

  /* ============================================================
     Collapse helper
     ============================================================ */
  function toggleCollapse(cardId) { document.getElementById(cardId).classList.toggle("collapsed"); }

  /* ============================================================
     CHARACTER DETAIL MODAL
     ============================================================ */
  let _activeCharId = null;

  function openCharModal(id) {
    const ch = findChar(id); if (!ch) return;
    _activeCharId = id;
    document.getElementById("cm-name").textContent = ch.name;

    const st = ch.stats || (ch.stats = { hp: { current: 0, max: 1 } });
    if (!st.hp) st.hp = { current: 0, max: 1 };
    const ds = ch.deathSaves || (ch.deathSaves = { successes: 0, failures: 0 });

    setVal("cm-hp-current", st.hp.current); setVal("cm-hp-max", st.hp.max);
    setVal("cm-ac", st.ac); setVal("cm-speed", st.speed);
    setVal("cm-pp", st.passivePerception); setVal("cm-pi", st.passiveInsight);
    setVal("cm-ds-succ", ds.successes); setVal("cm-ds-fail", ds.failures);
    setVal("cm-race", ch.race); setVal("cm-class", ch.class);
    setVal("cm-level", ch.level); setVal("cm-gold", ch.gold);
    setVal("cm-img", ch.profileImage || "");
    setVal("cm-conditions", (ch.conditions || []).join(", "));

    renderSpellsTab(ch);
    renderInventoryTab(ch);

    // Reset to first tab.
    document.querySelectorAll('#char-modal .tab-btn').forEach((b, i) => b.classList.toggle("active", i === 0));
    document.querySelectorAll('#char-modal .tab-panel').forEach((p, i) => p.classList.toggle("active", i === 0));

    document.getElementById("char-modal").classList.remove("hidden");
  }
  function closeCharModal() {
    document.getElementById("char-modal").classList.add("hidden");
    _activeCharId = null;
  }
  function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = (v == null ? "" : v); }
  function numVal(id) { const v = parseInt(document.getElementById(id).value, 10); return isNaN(v) ? 0 : v; }

  // Commit all modal fields back into state, then debounce-sync.
  function commitCharModal() {
    const ch = findChar(_activeCharId); if (!ch) return;
    const st = ch.stats; const ds = ch.deathSaves;
    st.hp.max = Math.max(1, numVal("cm-hp-max"));
    st.hp.current = Math.max(0, Math.min(numVal("cm-hp-current"), st.hp.max));
    st.ac = numVal("cm-ac"); st.speed = numVal("cm-speed");
    st.passivePerception = numVal("cm-pp"); st.passiveInsight = numVal("cm-pi");
    ds.successes = Math.max(0, Math.min(3, numVal("cm-ds-succ")));
    ds.failures  = Math.max(0, Math.min(3, numVal("cm-ds-fail")));
    ch.race = document.getElementById("cm-race").value;
    ch.class = document.getElementById("cm-class").value;
    ch.level = numVal("cm-level"); ch.gold = numVal("cm-gold");
    const img = document.getElementById("cm-img").value.trim();
    ch.profileImage = img || null;
    ch.conditions = document.getElementById("cm-conditions").value
      .split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
    ch.updatedAt = new Date().toISOString();
    renderCards();
    scheduleSync(null);
  }

  function renderSpellsTab(ch) {
    const body = document.getElementById("cm-spells-body");
    const ss = ch.spellSlots;
    if (!ss) { body.innerHTML = '<p class="empty-hint">This character has no spellcasting.</p>'; return; }
    let html = "";
    for (let lvl = 1; lvl <= 9; lvl++) {
      const slot = ss["level" + lvl];
      if (!slot || (slot.max || 0) === 0) continue;
      html += '<div class="stat-line"><span class="k">Level ' + lvl + '</span>' +
        '<span><input type="number" min="0" max="' + slot.max + '" value="' + (slot.current || 0) +
        '" style="width:60px" onchange="setSpellSlot(' + lvl + ',this.value)"> / ' + slot.max + '</span></div>';
    }
    if (!html) html = '<p class="empty-hint">No spell slots configured.</p>';
    else html += '<div style="margin-top:.8rem"><button class="btn-secondary" onclick="resetSpellSlots()">Reset All Slots</button></div>';
    body.innerHTML = html;
  }
  function setSpellSlot(lvl, val) {
    const ch = findChar(_activeCharId); if (!ch || !ch.spellSlots) return;
    const slot = ch.spellSlots["level" + lvl]; if (!slot) return;
    let v = parseInt(val, 10); if (isNaN(v)) v = 0;
    slot.current = Math.max(0, Math.min(v, slot.max || v));
    scheduleSync(null);
  }
  function resetSpellSlots() {
    const ch = findChar(_activeCharId); if (!ch || !ch.spellSlots) return;
    for (let lvl = 1; lvl <= 9; lvl++) {
      const slot = ch.spellSlots["level" + lvl];
      if (slot) slot.current = slot.max;
    }
    ch.spellSlots.lastLongRest = new Date().toISOString();
    renderSpellsTab(ch); scheduleSync(null);
    toast("Spell slots reset.", "success");
  }

  function renderInventoryTab(ch) {
    const body = document.getElementById("cm-inv-body");
    const inv = (ch.inventory || []).filter(it => !it.isDeleted);
    let html = '<button class="btn-secondary" style="margin-bottom:.7rem" onclick="addItem()">+ Add Item</button>';
    if (!inv.length) { html += '<p class="empty-hint">No items.</p>'; body.innerHTML = html; return; }
    inv.forEach(it => {
      const mech = it.mechanics && it.mechanics.text ? it.mechanics.text : (it.description || "");
      html += '<div class="inv-item"><div class="inv-top">' +
        '<div><span class="inv-name">' + esc(it.name) + '</span> ' +
        '<span class="inv-meta">' + esc(it.type || "") + (it.rarity ? " &middot; " + esc(it.rarity) : "") +
        (it.quantity > 1 ? " &middot; x" + it.quantity : "") + '</span></div>' +
        '<button class="btn-danger" onclick="deleteItem(\'' + esc(it.id) + '\')">Delete</button>' +
        '</div>' + (mech ? '<div class="inv-desc">' + esc(mech) + '</div>' : '') + '</div>';
    });
    body.innerHTML = html;
  }
  function addItem() {
    const ch = findChar(_activeCharId); if (!ch) return;
    const name = prompt("Item name?"); if (!name) return;
    if (!Array.isArray(ch.inventory)) ch.inventory = [];
    ch.inventory.push({
      id: "item_" + Date.now().toString(36),
      name: name, type: "misc", rarity: "common",
      description: "", quantity: 1, mechanics: null, charges: null,
      requiresAttunement: false, isAttuned: false, isDeleted: false
    });
    renderInventoryTab(ch); scheduleSync(null);
  }
  function deleteItem(itemId) {
    const ch = findChar(_activeCharId); if (!ch) return;
    const it = (ch.inventory || []).find(x => x.id === itemId);
    if (it) { it.isDeleted = true; renderInventoryTab(ch); scheduleSync(null); }
  }

  /* ============================================================
     ACHIEVEMENT MODAL
     ============================================================ */
  function openAchievementModal() {
    populateCharSelect("am-filter", true);
    populateCharSelect("am-target", true);
    renderAchievementList();
    document.querySelectorAll('#ach-modal .tab-btn').forEach((b, i) => b.classList.toggle("active", i === 0));
    document.querySelectorAll('#ach-modal .tab-panel').forEach((p, i) => p.classList.toggle("active", i === 0));
    document.getElementById("ach-modal").classList.remove("hidden");
  }
  function closeAchievementModal() { document.getElementById("ach-modal").classList.add("hidden"); }

  function populateCharSelect(selId, includeParty) {
    const sel = document.getElementById(selId);
    const first = includeParty ? '<option value="">' + (selId === "am-filter" ? "All / Party-Wide" : "Party-Wide") + '</option>' : "";
    sel.innerHTML = first + campaignState.characters
      .filter(c => !c.isArchived)
      .map(c => '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>').join("");
  }

  function achScope(a) {
    if (a.earnedBy == null || (typeof a.earnedBy === "object" && Object.keys(a.earnedBy).length === 0)) return "Party-wide";
    const ids = Object.keys(a.earnedBy);
    const names = ids.map(id => { const c = findChar(id); return c ? c.name : id; });
    return names.join(", ");
  }

  function renderAchievementList() {
    const filter = document.getElementById("am-filter").value;
    const list = document.getElementById("am-list");
    let items = campaignState.achievements.filter(a => !a.isArchived);
    if (filter) {
      items = items.filter(a =>
        a.earnedBy == null ||
        (typeof a.earnedBy === "object" && Object.keys(a.earnedBy).length === 0) ||
        (a.earnedBy && a.earnedBy[filter]));
    }
    if (!items.length) { list.innerHTML = '<p class="empty-hint">No achievements match.</p>'; return; }
    list.innerHTML = items.map(a => {
      const gold = (a.rewards && a.rewards.gold) || 0;
      return '<div class="ach-entry">' +
        '<div><span class="ach-name">' + esc(a.name) + '</span>' +
        '<span class="ach-cat">' + esc(a.category || "misc") + '</span></div>' +
        '<div class="ach-desc">' + esc(a.description || "") + '</div>' +
        '<div class="scope-tag">Scope: ' + esc(achScope(a)) + (gold ? ' &middot; ' + gold + ' gp' : '') + '</div>' +
        '<div class="ach-actions" style="margin-top:.5rem">' +
          (gold ? '<button class="btn-ghost" onclick="awardGold(\'' + esc(a.id) + '\')">Pay ' + gold + ' gp</button>' : '') +
          '<button class="btn-danger" onclick="archiveAchievement(\'' + esc(a.id) + '\')">Archive</button>' +
        '</div></div>';
    }).join("");
  }

  function awardGold(achId) {
    const a = campaignState.achievements.find(x => x.id === achId);
    if (!a || !a.rewards || !a.rewards.gold) return;
    const gold = a.rewards.gold;
    let targets;
    if (a.earnedBy == null || (typeof a.earnedBy === "object" && Object.keys(a.earnedBy).length === 0)) {
      targets = campaignState.characters.filter(c => !c.isArchived);
    } else {
      targets = Object.keys(a.earnedBy).map(findChar).filter(Boolean);
    }
    if (!targets.length) { toast("No recipients found.", "warn"); return; }
    targets.forEach(c => { c.gold = (c.gold || 0) + gold; });
    renderCards(); scheduleSync(null);
    toast("Awarded " + gold + " gp to " + targets.length + " character(s).", "success");
  }

  function archiveAchievement(achId) {
    const a = campaignState.achievements.find(x => x.id === achId);
    if (!a) return;
    if (!confirm("Archive \"" + a.name + "\"? It disappears from all player tabs.")) return;
    a.isArchived = true;
    renderAchievementList(); scheduleSync(null);
    toast("Achievement archived.", "success");
  }

  function createAchievement() {
    const name = document.getElementById("am-name").value.trim();
    if (!name) { toast("Name is required.", "error"); return; }
    const target = document.getElementById("am-target").value;
    const now = new Date().toISOString();
    const ach = {
      id: "ach_" + Date.now().toString(36),
      name: name,
      description: document.getElementById("am-desc").value.trim(),
      category: document.getElementById("am-cat").value,
      earnedBy: target ? { [target]: now } : null,
      acknowledgedBy: [],
      rewards: { gold: numVal("am-gold"), lootId: null },
      isArchived: false, glow: false, createdAt: now
    };
    campaignState.achievements.push(ach);
    document.getElementById("am-name").value = "";
    document.getElementById("am-desc").value = "";
    document.getElementById("am-gold").value = "0";
    renderAchievementList(); scheduleSync(null);
    toast("Achievement created" + (target ? " & awarded." : " (party-wide)."), "success");
    // Jump back to view tab.
    document.querySelectorAll('#ach-modal .tab-btn').forEach((b, i) => b.classList.toggle("active", i === 0));
    document.querySelectorAll('#ach-modal .tab-panel').forEach((p, i) => p.classList.toggle("active", i === 0));
  }

  /* ============================================================
     Modal tab switcher (generic)
     ============================================================ */
  function switchModalTab(modalId, btn) {
    const target = btn.dataset.tab;
    const modal = document.getElementById(modalId);
    modal.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b === btn));
    modal.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === target));
  }

  /* ============================================================
     Wire up modal field auto-commit (debounced via scheduleSync)
     ============================================================ */
  function wireCharModalInputs() {
    ["cm-hp-current","cm-hp-max","cm-ac","cm-speed","cm-pp","cm-pi",
     "cm-ds-succ","cm-ds-fail","cm-race","cm-class","cm-level","cm-gold",
     "cm-img","cm-conditions"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener("change", commitCharModal);
    });
  }

  /* ============================================================
     RENDER ALL + INIT
     ============================================================ */
  function renderAll() {
    renderCards();
    renderRoomSelect();
    renderRoom();
    renderNotes();
  }

  document.addEventListener("DOMContentLoaded", () => {
    // campaignState is populated by initAuth before render; guard if not ready.
    if (!campaignState) { normalizeState(); }
    wireCharModalInputs();
    renderAll();
    setHeartbeat("ok");
  });
  </script>

</body>
</html>
