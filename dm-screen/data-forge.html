<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Showrunner // Data Forge V2.0.3</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --glass: rgba(20, 20, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #bb86fc;
      --danger: #ff4757;
      --success: #03dac6;
      --text: #e0e0e0;
      --text-muted: #666;
      --code-bg: #050505;
      --code-text: #a6e22e;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    body, html {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column;
      background-image: 
        radial-gradient(circle at top left, rgba(187,134,252,0.05) 0%, transparent 40%),
        radial-gradient(circle at bottom right, rgba(3,218,198,0.05) 0%, transparent 40%);
    }

    /* --- Navbar (Cupertino 2050) --- */
    .navbar {
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border); z-index: 100; flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 0.15em; font-size: 1.2rem; color: #fff; text-shadow: 0 0 10px rgba(187,134,252,0.5); }
    .nav-links { display: flex; gap: 1rem; }
    .nav-link {
      color: var(--text); text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 6px 12px; border-radius: 20px; border: 1px solid transparent; transition: 0.3s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); color: #fff; }
    .nav-link.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(187,134,252,0.2); }

    /* --- Mode Selector --- */
    .mode-selector-container {
      padding: 1rem 2rem 0 2rem; flex-shrink: 0;
    }
    .mode-selector {
      display: flex; flex-wrap: wrap; gap: 10px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; border: 1px solid var(--glass-border);
    }
    .btn-mode {
      flex: 1; background: transparent; color: var(--text-muted); border: 1px solid transparent; padding: 10px;
      border-radius: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s;
    }
    .btn-mode:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .btn-mode.active { background: rgba(187, 134, 252, 0.15); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(187, 134, 252, 0.2); }

    /* --- Workspace (3-Pane Grid) --- */
    .workspace {
      display: flex; flex: 1; width: 100vw; padding: 1rem 2rem 2rem 2rem; gap: 1rem; min-height: 0;
    }
    
    @media (max-width: 768px) {
      .workspace { flex-direction: column; overflow-y: auto; }
      .pane { min-height: 400px; flex: none; }
      .pane.collapsed { min-height: 45px; flex: 0 0 45px; }
      .pane-title-vertical { writing-mode: horizontal-tb; transform: none; padding: 0 1rem; line-height: 45px; text-align: left; }
    }

    /* Individual Pane styling */
    .pane {
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px;
      display: flex; flex-direction: column; flex: 1; transition: flex 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      backdrop-filter: blur(10px); overflow: hidden; position: relative;
    }
    .pane.wide { flex: 1.5; }
    
    /* Collapsed State */
    .pane.collapsed { flex: 0 0 45px; cursor: pointer; background: rgba(10,10,12,0.9); }
    .pane.collapsed:hover { background: rgba(30,30,35,0.9); }
    .pane.collapsed .pane-content, .pane.collapsed .pane-footer, .pane.collapsed .pane-header-title { display: none; }
    
    .pane-title-vertical {
      display: none; writing-mode: vertical-rl; transform: rotate(180deg);
      text-align: center; width: 100%; padding-top: 1rem; color: var(--text-muted);
      font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase;
    }
    .pane.collapsed .pane-title-vertical { display: block; }

    /* Pane Header */
    .pane-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.3);
    }
    .pane-header-title { font-size: 0.85rem; font-weight: bold; color: #fff; letter-spacing: 0.1em; }
    .btn-min {
      background: transparent; border: 1px solid #444; color: #aaa; width: 24px; height: 24px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .btn-min:hover { color: #fff; border-color: #fff; }

    /* Pane Content & Inputs */
    .pane-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    textarea, pre {
      flex: 1; width: 100%; resize: none; border: none; outline: none; padding: 1rem;
      background: transparent; color: var(--text); font-family: monospace; font-size: 0.9rem;
      line-height: 1.5; overflow-y: auto;
    }
    #tagged-input { border-left: 2px solid var(--accent); background: rgba(187,134,252,0.02); }
    pre { background: var(--code-bg); color: var(--code-text); margin: 0; white-space: pre-wrap; word-wrap: break-word; }
    
    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Pane Footers (Actions) */
    .pane-footer { padding: 1rem; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); }
    .btn-action {
      width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.1em; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
    }
    .btn-primary { background: rgba(187, 134, 252, 0.1); border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: var(--accent); color: #000; }
    .btn-danger { background: rgba(255, 71, 87, 0.1); border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: var(--danger); color: #000; }
    .btn-danger:disabled { border-color: #444; color: #666; cursor: not-allowed; background: transparent; }

    /* Toasts */
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 4000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
    .toast { background: rgba(10,10,12,0.95); color: #fff; padding: 1rem 1.5rem; border-radius: 4px; border-left: 4px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.8); animation: fadein 0.3s, fadeout 0.3s 3.7s forwards; font-size: 0.9rem; font-weight: bold; }
    @keyframes fadein { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }

  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      SHOWRUNNER // DATA FORGE V2.0.3
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="dm-players.html" class="nav-link">DM Players</a>
      <a href="notes.html" class="nav-link">Notes</a>
      <a href="loot.html" class="nav-link">Loot</a>
      <a href="data-forge.html" class="nav-link active">Data Forge</a>
    </div>
  </nav>

  <div class="mode-selector-container">
    <div class="mode-selector">
      <button id="mode-rooms" class="btn-mode active" onclick="switchMode('rooms')">1. Campaign Notes</button>
      <button id="mode-loot" class="btn-mode" onclick="switchMode('loot')">2. Loot Tables</button>
      <button id="mode-roster" class="btn-mode" onclick="switchMode('roster')">3. Roster Injection</button>
    </div>
  </div>

  <div class="workspace">
    
    <div id="pane1" class="pane">
      <div class="pane-title-vertical" onclick="expandPane('pane1')">1. RAW INGEST</div>
      <div class="pane-header">
        <span class="pane-header-title">1. RAW INGEST</span>
        <button class="btn-min" onclick="collapsePane('pane1')" title="Minimize">_</button>
      </div>
      <div class="pane-content">
        <textarea id="raw-input"></textarea>
      </div>
      <div class="pane-footer">
        <button class="btn-action btn-primary" onclick="executeAutoTag()">[ 1. EXECUTE AUTO-TAG ]</button>
      </div>
    </div>

    <div id="pane2" class="pane collapsed">
      <div class="pane-title-vertical" onclick="expandPane('pane2')">2. TAGGED SYNTAX</div>
      <div class="pane-header">
        <span class="pane-header-title">2. TAGGED SYNTAX</span>
        <button class="btn-min" onclick="collapsePane('pane2')" title="Minimize">_</button>
      </div>
      <div class="pane-content">
        <textarea id="tagged-input" placeholder="Awaiting syntax transformation..."></textarea>
      </div>
      <div class="pane-footer">
        <button class="btn-action btn-primary" onclick="compileToJson()">[ 2. COMPILE TO JSON ]</button>
      </div>
    </div>

    <div id="pane3" class="pane wide collapsed">
      <div class="pane-title-vertical" onclick="expandPane('pane3')">3. DATABASE PREVIEW</div>
      <div class="pane-header">
        <span class="pane-header-title">3. DATABASE PREVIEW (JSON)</span>
        <button class="btn-min" onclick="collapsePane('pane3')" title="Minimize">_</button>
      </div>
      <div class="pane-content">
        <pre><code id="json-preview">Awaiting compilation...</code></pre>
      </div>
      <div class="pane-footer">
        <button id="btn-push" class="btn-action btn-danger" onclick="mergeAndPush()" disabled>[ 3. MERGE & PUSH TO SERVER ]</button>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>

  <script>
    const WORKER_URL = 'https://dmscreen.askozicki.workers.dev';
    
    let currentMode = 'rooms';
    let compiledData = null; 

    const placeholders = {
      rooms: `Paste your raw MS Word or Obsidian notes here...\n\nExpected format:\nROOM 17a: THE WAITING AREA\nVISUALS & READ-ALOUD\nDM NOTES & MECHANICS\nNAME: Brenda\nAI TOOLTIP\nNEW ACHIEVEMENT!\nLOOT & REWARDS`,
      loot: `Paste your Loot Tables here...\n\nExpected format for Tiers:\nTABLE: Silver\n[Roll 55-56] ITEM: The Whipping Antenna TYPE: Weapon (Rapier) DESCRIPTION: A flexible spike...\n\nExpected format for Personal:\nPERSONAL: Chuck\nITEM: The Oversized Clown-Boots of Stealth\nType: Armor (Feet)\nDescription: Finally, shoes that fit...`,
      roster: `Paste your Player Data blocks here...\n\nExpected format:\nChuck (Played by: Chuck)\nBuild: Battlemaster Fighter\nVitals: Max HP: 28 | AC: 16 | Passive Perception: 12\nEconomy: 133gp\nInventory & Curses:\n* [NEW] The 'Push, Don't Pull' Sign (Wondrous Item): Once per day...`
    };

    document.getElementById('raw-input').placeholder = placeholders.rooms;

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');
      document.getElementById('raw-input').placeholder = placeholders[mode];
      document.getElementById('raw-input').value = '';
      document.getElementById('tagged-input').value = '';
      document.getElementById('json-preview').innerText = 'Awaiting compilation...';
      document.getElementById('btn-push').disabled = true;

      expandPane('pane1'); collapsePane('pane2'); collapsePane('pane3');
      showToast(`${mode.toUpperCase()} MODE ACTIVATED.`);
    }

    function collapsePane(id) { document.getElementById(id).classList.add('collapsed'); }
    function expandPane(id) { document.getElementById(id).classList.remove('collapsed'); }
    function showToast(msg) {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
      c.appendChild(t); setTimeout(() => t.remove(), 4000);
    }

    // --- Engine 1: Auto-Tagging Regex Pipeline ---
    function executeAutoTag() {
      const rawText = document.getElementById('raw-input').value;
      if (!rawText.trim()) return showToast("Please paste raw notes first.");
      
      let taggedText = '';

      if (currentMode === 'rooms') {
        taggedText = rawText
          .replace(/^ROOM (.*)/gm, '#ROOM $1')
          .replace(/VISUALS & READ-ALOUD/g, '#READALOUD')
          .replace(/DM NOTES & MECHANICS/g, '#MECHANICS')
          .replace(/^NAME: (.*)/gm, '#NPC $1')
          .replace(/AI TOOLTIP/g, '#TOOLTIP')
          .replace(/NEW ACHIEVEMENT!/g, '#ACHIEVEMENT')
          .replace(/LOOT & REWARDS/g, '#LOOT');
      } 
      else if (currentMode === 'loot') {
        const lines = rawText.split('\n');
        let inItemBlock = false;
        let slotCounter = 1;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          
          // Fuzzy Matchers for Headers
          const tableMatch = line.match(/^(?:TABLE:\s*(.*)|(.*)\s+TIER.*)/i);
          if (tableMatch && !line.includes('DESCRIPTION')) {
            taggedText += `\n#TABLE ${tableMatch[1] || tableMatch[2]}\n`;
            slotCounter = 1; continue;
          }
          const personalMatch = line.match(/^PERSONAL:\s*(.*)/i);
          if (personalMatch) {
            taggedText += `\n#PERSONAL_TABLE ${personalMatch[1]}\n`;
            slotCounter = 1; continue;
          }

          // D100 Formatted Item
          if (line.match(/TYPE:/i) && line.match(/DESCRIPTION:|DESC:/i) && line.match(/Roll\s*([0-9]+(?:-[0-9]+)?)/i)) {
            inItemBlock = false;
            const rollMatch = line.match(/Roll\s*([0-9]+(?:-[0-9]+)?)/i);
            const itemMatch = line.match(/ITEM:\s*(.*?)\s+TYPE:/i);
            const typeMatch = line.match(/TYPE:\s*(.*?)\s+(?:DESCRIPTION|DESC):/i);
            const descMatch = line.match(/(?:DESCRIPTION|DESC):\s*(.*)/i);
            taggedText += `\n#SLOT ${rollMatch[1]}\nNAME: ${itemMatch ? itemMatch[1].trim() : ''}\nTYPE: ${typeMatch ? typeMatch[1].trim() : ''}\nDESC: ${descMatch ? descMatch[1].trim() : ''}\n`;
            continue;
          }

          // Personal Table Block Formatted Item
          if (line.match(/^ITEM:\s*(.*)/i)) {
            inItemBlock = true;
            taggedText += `\n#SLOT ${slotCounter++}\nNAME: ${line.replace(/ITEM:/i, '').trim()}\nTYPE: Unknown\nDESC: `;
            continue;
          }

          // Append to Description if inside an Item Block
          if (inItemBlock && line !== '') {
            // Check if this line is declaring a type
            if (line.match(/^(?:Type|Weapon|Armor|Wondrous).*?,/i) || line.match(/^Type:/i)) {
               taggedText = taggedText.replace(/TYPE: Unknown/, `TYPE: ${line.replace(/Type:/i, '').trim()}`);
            } else {
               taggedText += `${line} `; // Append all other text (bullets, mechanics) to the DESC block
            }
          }
        }
      } 
      else if (currentMode === 'roster') {
        taggedText = rawText
          .replace(/^(.*?) \(Played by: (.*?)\)/gm, '#PLAYER $1')
          .replace(/^Build: (.*)/gm, '#LORE Build: $1')
          .replace(/Vitals:.*?Max HP: (\d+).*?AC: (\d+).*?Passive Perception: (\d+)/gm, '#VITALS HP:$1 AC:$2 PP:$3')
          .replace(/^Economy: (\d+).*/gm, '#GOLD $1')
          .replace(/^Inventory & Curses:/gm, '#INVENTORY');
      }

      document.getElementById('tagged-input').value = taggedText.trim();
      collapsePane('pane1');
      expandPane('pane2');
      showToast("Auto-tagging complete. Please review.");
    }

    // --- Engine 2: Block Parser (Text to JSON) ---
    function compileToJson() {
      const text = document.getElementById('tagged-input').value;
      if (!text.trim()) return showToast("No tagged syntax found.");
      
      if (currentMode === 'rooms') {
        compiledData = []; 
        const blocks = text.split('#ROOM ').filter(b => b.trim() !== '');
        blocks.forEach(block => {
          let roomObj = { room_id: "", readaloud: "", mechanics: "", npcs: [], tooltips: [], achievements: [], loot: [] };
          const sections = block.split(/(?=#READALOUD|#MECHANICS|#NPC|#TOOLTIP|#ACHIEVEMENT|#LOOT)/);
          roomObj.room_id = sections[0].trim();

          for (let i = 1; i < sections.length; i++) {
            let sec = sections[i].trim();
            if (sec.startsWith('#READALOUD')) roomObj.readaloud = sec.replace('#READALOUD', '').trim();
            else if (sec.startsWith('#MECHANICS')) roomObj.mechanics = sec.replace('#MECHANICS', '').trim();
            else if (sec.startsWith('#NPC')) roomObj.npcs.push({ raw_text: sec.replace('#NPC', '').trim() });
            else if (sec.startsWith('#TOOLTIP')) roomObj.tooltips.push({ raw_text: sec.replace('#TOOLTIP', '').trim() });
            else if (sec.startsWith('#ACHIEVEMENT')) roomObj.achievements.push({ raw_text: sec.replace('#ACHIEVEMENT', '').trim() });
            else if (sec.startsWith('#LOOT')) roomObj.loot.push({ raw_text: sec.replace('#LOOT', '').trim() });
          }
          compiledData.push(roomObj);
        });
      } 
      else if (currentMode === 'loot') {
        compiledData = { loot_tables: { tiers: {}, personal: {} } };
        
        // Handle both Global Tiers and Personal Tables
        const tables = text.split(/(?=#TABLE|#PERSONAL_TABLE)/).filter(b => b.trim());
        
        tables.forEach(tBlock => {
          const isPersonal = tBlock.startsWith('#PERSONAL_TABLE');
          const slots = tBlock.split('#SLOT ');
          
          let tName = "";
          if (isPersonal) {
             tName = slots[0].replace('#PERSONAL_TABLE', '').trim();
          } else {
             tName = slots[0].replace('#TABLE', '').trim().toLowerCase();
          }
          
          const tRef = isPersonal ? compiledData.loot_tables.personal : compiledData.loot_tables.tiers;
          tRef[tName] = []; 
          
          for(let i=1; i < slots.length; i++) {
             const lines = slots[i].trim().split('\n');
             const rollRange = lines[0].trim(); 
             let name="", type="", desc="";
             
             lines.slice(1).forEach(l => {
                if(l.startsWith('NAME:')) name = l.replace('NAME:','').trim();
                if(l.startsWith('TYPE:')) type = l.replace('TYPE:','').trim();
                if(l.startsWith('DESC:')) desc = l.replace('DESC:','').trim();
             });
             
             let targetSlots = [];
             if(rollRange.includes('-')) {
                const parts = rollRange.split('-');
                for(let r=parseInt(parts[0]); r <= parseInt(parts[1] || parts[0]); r++) targetSlots.push(r - 1);
             } else {
                targetSlots.push(parseInt(rollRange) - 1);
             }
             
             if (name && !isNaN(targetSlots[0])) {
               tRef[tName].push({ targetSlots, item: { name, type, desc } });
             }
          }
        });
      } 
      else if (currentMode === 'roster') {
        compiledData = [];
        const players = text.split('#PLAYER ').filter(b => b.trim());
        
        players.forEach(pBlock => {
          const lines = pBlock.split('\n');
          let pObj = { name: lines[0].trim(), stats: {}, gold: 0, new_inventory: [] };
          let inInventory = false;
          
          lines.slice(1).forEach(l => {
             if(l.startsWith('#VITALS')) {
                 const vMatch = l.match(/HP:(\d+) AC:(\d+) PP:(\d+)/);
                 if(vMatch) {
                    pObj.stats = { hp_max: parseInt(vMatch[1]), hp_current: parseInt(vMatch[1]), ac: parseInt(vMatch[2]), passive_perception: parseInt(vMatch[3]) };
                 }
             }
             else if(l.startsWith('#GOLD')) {
                 const gMatch = l.match(/#GOLD (\d+)/);
                 if(gMatch) pObj.gold = parseInt(gMatch[1]);
             }
             else if(l.startsWith('#INVENTORY')) {
                 inInventory = true;
             }
             else if(inInventory && l.trim() !== '') {
                 // Inventory Parsing Magic
                 let iName = l.trim();
                 let iType = "Item";
                 let iDesc = "";
                 
                 if (iName.startsWith('*')) iName = iName.substring(1).trim();
                 if (iName.startsWith('[NEW]')) iName = iName.substring(5).trim();

                 const parts = iName.split(':');
                 if (parts.length > 1) {
                     iName = parts[0].trim();
                     iDesc = parts.slice(1).join(':').trim();
                 }

                 const typeMatch = iName.match(/(.*?)\s*\((.*?)\)$/);
                 if(typeMatch) {
                     iName = typeMatch[1].trim();
                     iType = typeMatch[2].trim();
                 }

                 pObj.new_inventory.push({ name: iName, flavor_text: iType, mechanics: iDesc, quantity: 1, is_deleted: false });
             }
          });
          compiledData.push(pObj);
        });
      }

      document.getElementById('json-preview').innerText = JSON.stringify(compiledData, null, 2);
      document.getElementById('btn-push').disabled = false;
      collapsePane('pane2');
      expandPane('pane3');
      showToast("JSON Compiled. Ready for upload.");
    }

    // --- Engine 3: Smart Push Router ---
    async function mergeAndPush() {
      const pushBtn = document.getElementById('btn-push');
      pushBtn.disabled = true; 
      pushBtn.innerText = "[ TRANSMITTING... ]";
      pushBtn.style.borderColor = '';
      pushBtn.style.color = '';

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        const fetchRes = await fetch(WORKER_URL, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!fetchRes.ok) throw new Error("Fetch failed");
        let latestState = await fetchRes.json();

        // ROUTER: Merge based on mode
        if (currentMode === 'rooms') {
          if (!latestState.campaign_notes) latestState.campaign_notes = { rooms: [] };
          if (!latestState.campaign_notes.rooms) latestState.campaign_notes.rooms = [];
          
          compiledData.forEach(newRoom => {
            const existingIdx = latestState.campaign_notes.rooms.findIndex(r => r.room_id === newRoom.room_id);
            if (existingIdx >= 0) latestState.campaign_notes.rooms[existingIdx] = { ...latestState.campaign_notes.rooms[existingIdx], ...newRoom, is_deleted: false };
            else latestState.campaign_notes.rooms.push({ ...newRoom, is_deleted: false });
          });
        } 
        else if (currentMode === 'loot') {
          if (!latestState.loot_tables) latestState.loot_tables = { tiers: {}, personal: {} };
          const newTables = compiledData.loot_tables;
          
          ['tiers', 'personal'].forEach(cat => {
            if(newTables[cat]) {
               Object.keys(newTables[cat]).forEach(tName => {
                  if(!latestState.loot_tables[cat][tName]) latestState.loot_tables[cat][tName] = [];
                  const tRef = latestState.loot_tables[cat][tName];
                  
                  const maxSlots = cat === 'tiers' ? 100 : 10;
                  while(tRef.length < maxSlots) tRef.push({ roll: tRef.length + 1, item: null });

                  newTables[cat][tName].forEach(entry => {
                     entry.targetSlots.forEach(sIdx => {
                         if(sIdx >= 0 && sIdx < maxSlots) {
                             tRef[sIdx].item = entry.item;
                         }
                     });
                  });
               });
            }
          });
        }
        else if (currentMode === 'roster') {
          if (!latestState.players) latestState.players = [];
          
          compiledData.forEach(newP => {
             const p = latestState.players.find(x => x.name.toLowerCase() === newP.name.toLowerCase());
             if(p) {
                p.is_deleted = false; 
                if(newP.stats.hp_max) {
                   if(!p.stats) p.stats = {};
                   p.stats.hp_max = newP.stats.hp_max;
                   p.stats.hp_current = newP.stats.hp_max; 
                   p.stats.ac = newP.stats.ac;
                   p.stats.passive_perception = newP.stats.passive_perception;
                }
                if(newP.gold) p.gold = newP.gold;
                
                if(!p.inventory) p.inventory = [];
                newP.new_inventory.forEach(ni => {
                   const exists = p.inventory.some(item => item.name.toLowerCase() === ni.name.toLowerCase());
                   if (!exists) p.inventory.push(ni);
                });
             } else {
                latestState.players.push({
                   name: newP.name, 
                   stats: newP.stats, 
                   gold: newP.gold, 
                   inventory: newP.new_inventory, 
                   is_deleted: false, 
                   status: { conditions: [] }, 
                   achievements: { pending: [] }
                });
             }
          });
        }

        latestState.version = (latestState.version || 0) + 1;
        latestState.last_modified = Date.now();

        const payload = { base_version: latestState.version - 1, last_modified: latestState.last_modified, data: latestState };
        
        const postController = new AbortController();
        const postTimeoutId = setTimeout(() => postController.abort(), 8000);
        
        const postRes = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          signal: postController.signal
        });
        clearTimeout(postTimeoutId);
        
        if (!postRes.ok) throw new Error("Version collision");

        pushBtn.style.borderColor = 'var(--success)';
        pushBtn.style.color = 'var(--success)';
        pushBtn.innerText = "[ UPLOAD COMPLETE ]";
        showToast("Database successfully updated.");

      } catch (e) {
        console.error(e);
        pushBtn.disabled = false;
        pushBtn.innerText = "[ MERGE & PUSH FAILED - RETRY ]";
        showToast("Network collision. Try again.");
      }
    }
  </script>
</body>
