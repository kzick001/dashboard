<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Showrunner // Data Forge V3.0</title>

  <script>
    const SECURE_PIN = "goddammit_doughnut"; 
    let savedPin = localStorage.getItem('showrunner_pin');
    
    if (savedPin !== SECURE_PIN) {
      document.documentElement.style.display = 'none'; 
      let input = prompt("ACCESS RESTRICTED: Enter Showrunner PIN.");
      
      if (input === SECURE_PIN) {
        localStorage.setItem('showrunner_pin', input);
        document.documentElement.style.display = ''; 
      } else {
        window.location.href = "https://kzick001.github.io/dashboard/dm-screen/players/players.html"; 
      }
    }
  </script>

  <style>
    :root {
      --bg: #0a0a0c;
      --glass: rgba(20, 20, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #bb86fc;
      --danger: #ff4757;
      --success: #03dac6;
      --text: #e0e0e0;
      --text-muted: #666;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    body, html {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column;
    }

    .navbar {
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border); z-index: 100; flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 0.15em; font-size: 1.2rem; color: #fff; text-shadow: 0 0 10px rgba(187,134,252,0.5); }

    .nav-links { display: flex; gap: 1rem; }

    .nav-link {
      color: var(--text); text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 6px 12px; border-radius: 20px; border: 1px solid transparent; transition: 0.3s;
    }

    .nav-link:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); color: #fff; }
    .nav-link.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(187,134,252,0.2); }

    /* Tab Navigation */
    .tab-container {
      padding: 1rem 2rem 0 2rem; flex-shrink: 0;
    }

    .tabs {
      display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; border: 1px solid var(--glass-border);
    }

    .tab-btn {
      flex: 1; background: transparent; color: var(--text-muted); border: 1px solid transparent; padding: 10px;
      border-radius: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s;
    }

    .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .tab-btn.active { background: rgba(187, 134, 252, 0.15); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(187, 134, 252, 0.2); }

    /* Main Content */
    .workspace {
      display: flex; flex: 1; gap: 1rem; padding: 1rem 2rem 2rem 2rem; overflow: hidden;
    }

    .pane {
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px;
      display: flex; flex-direction: column; backdrop-filter: blur(10px); overflow: hidden;
    }

    .pane-edit { flex: 1; }
    .pane-preview { flex: 0.8; min-width: 300px; }

    .pane-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.3);
    }

    .pane-header-title { font-size: 0.85rem; font-weight: bold; color: #fff; letter-spacing: 0.1em; }

    .pane-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    textarea, pre {
      flex: 1; width: 100%; resize: none; border: none; outline: none; padding: 1rem;
      background: transparent; color: var(--text); font-family: monospace; font-size: 0.9rem;
      line-height: 1.5; overflow-y: auto;
    }

    pre { background: #050505; color: #a6e22e; margin: 0; white-space: pre-wrap; word-wrap: break-word; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .pane-footer { padding: 1rem; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); }

    .btn-action {
      width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.1em; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
    }

    .btn-primary { background: rgba(187, 134, 252, 0.1); border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: var(--accent); color: #000; }
    .btn-primary:disabled { border-color: #444; color: #666; cursor: not-allowed; background: transparent; }

    .btn-danger { background: rgba(255, 71, 87, 0.1); border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: var(--danger); color: #000; }
    .btn-danger:disabled { border-color: #444; color: #666; cursor: not-allowed; }

    /* Preview List */
    .preview-list { list-style: none; padding: 0; margin: 0; }
    .preview-item { padding: 0.75rem; border-bottom: 1px solid #333; cursor: pointer; transition: 0.2s; }
    .preview-item:hover { background: rgba(187,134,252,0.1); }
    .preview-item-title { font-weight: bold; color: var(--accent); font-size: 0.9rem; }
    .preview-item-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    .preview-item-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .btn-remove {
      flex: 1; padding: 4px 8px; background: rgba(255,71,87,0.15); border: 1px solid var(--danger); color: var(--danger);
      border-radius: 3px; font-size: 0.7rem; cursor: pointer; transition: 0.2s;
    }
    .btn-remove:hover { background: var(--danger); color: #000; }

    /* Toasts */
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 4000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { background: rgba(10,10,12,0.95); color: #fff; padding: 1rem 1.5rem; border-radius: 4px; border-left: 4px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.8); animation: fadein 0.3s, fadeout 0.3s 3.7s forwards; font-size: 0.9rem; font-weight: bold; }
    @keyframes fadein { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }

    /* Tab Content (Hidden by default) */
    .tab-pane { display: none; }
    .tab-pane.active { display: flex; }

    /* Responsive */
    @media (max-width: 1024px) {
      .workspace { flex-direction: column; }
      .pane-preview { flex: none; height: 300px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      SHOWRUNNER // DATA FORGE V3.0
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="loot.html" class="nav-link">Loot</a>
      <a href="data-forge.html" class="nav-link active">Data Forge</a>
    </div>
  </nav>

  <div class="tab-container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('rooms')">📜 Rooms & Notes</button>
      <button class="tab-btn" onclick="switchTab('loot')">💎 Loot Tables</button>
    </div>
  </div>

  <div class="workspace">
    
    <!-- ROOMS & NOTES TAB -->
    <div id="tab-rooms" class="tab-pane active">
      
      <!-- Edit Pane -->
      <div class="pane pane-edit">
        <div class="pane-header">
          <span class="pane-header-title">Paste Raw Content</span>
        </div>
        <div class="pane-content">
          <textarea id="rooms-input" placeholder="Paste room descriptions and session notes here...&#10;&#10;Format:&#10;ROOM: Room Name&#10;Text content...&#10;&#10;Or:&#10;NOTE: Session X&#10;Text content..."></textarea>
        </div>
        <div class="pane-footer">
          <button class="btn-action btn-primary" onclick="parseRoomsAndNotes()">Parse Content</button>
        </div>
      </div>

      <!-- Preview Pane -->
      <div class="pane pane-preview">
        <div class="pane-header">
          <span class="pane-header-title">Preview</span>
        </div>
        <div class="pane-content">
          <ul id="rooms-preview" class="preview-list"></ul>
        </div>
        <div class="pane-footer">
          <button class="btn-action btn-danger" id="btn-sync-rooms" onclick="syncRoomsAndNotes()" disabled>Sync to KV</button>
        </div>
      </div>

    </div>

    <!-- LOOT TABLES TAB -->
    <div id="tab-loot" class="tab-pane">
      
      <!-- Edit Pane -->
      <div class="pane pane-edit">
        <div class="pane-header">
          <span class="pane-header-title">Paste Raw Loot Tables</span>
        </div>
        <div class="pane-content">
          <textarea id="loot-input" placeholder="Paste loot table data here...&#10;&#10;Format:&#10;TIER: Gold (slots: 100)&#10;Roll 1: Item Name | Type: Weapon | Description: ...&#10;Roll 2: Item Name | Type: Armor | Description: ..."></textarea>
        </div>
        <div class="pane-footer">
          <button class="btn-action btn-primary" onclick="parseLootTables()">Parse Loot</button>
        </div>
      </div>

      <!-- Preview Pane -->
      <div class="pane pane-preview">
        <div class="pane-header">
          <span class="pane-header-title">Preview</span>
        </div>
        <div class="pane-content">
          <ul id="loot-preview" class="preview-list"></ul>
        </div>
        <div class="pane-footer">
          <button class="btn-action btn-danger" id="btn-sync-loot" onclick="syncLootTables()" disabled>Sync to KV</button>
        </div>
      </div>

    </div>

  </div>

  <div id="toast-container"></div>

  <script>
    const WORKER_URL = 'https://dmscreen.askozicki.workers.dev';
    
    let parsedRoomsAndNotes = null;
    let parsedLootTables = null;

    // --- Tab Switching ---
    function switchTab(tabName) {
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById(`tab-${tabName}`).classList.add('active');
      event.target.classList.add('active');
      
      showToast(`${tabName.toUpperCase()} tab activated.`);
    }

    // --- Utilities ---
    function showToast(msg) {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div'); 
      t.className = 'toast'; 
      t.innerText = msg;
      c.appendChild(t); 
      setTimeout(() => t.remove(), 4000);
    }

    function debounce(fn, ms) {
      let timer;
      return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), ms);
      };
    }

    // --- PARSER 1: Rooms & Notes ---
    function parseRoomsAndNotes() {
      const rawText = document.getElementById('rooms-input').value.trim();
      if (!rawText) return showToast("Please paste content first.");

      parsedRoomsAndNotes = { rooms: [], notes: [] };

      // Split by "ROOM:" or "NOTE:" headers
      const sections = rawText.split(/^(ROOM:|NOTE:)\s*/m);

      for (let i = 1; i < sections.length; i += 2) {
        const type = sections[i].trim().toLowerCase();
        const content = sections[i + 1];

        if (!content) continue;

        const lines = content.trim().split('\n');
        const firstLine = lines[0].trim();
        const restContent = lines.slice(1).join('\n').trim();

        if (type === 'room:') {
          parsedRoomsAndNotes.rooms.push({
            room_id: firstLine || `room_${Date.now()}`,
            readaloud: restContent,
            mechanics: '',
            npcs: [],
            tooltips: [],
            achievements: [],
            loot: [],
            is_deleted: false
          });
        } else if (type === 'note:') {
          parsedRoomsAndNotes.notes.push({
            note_id: `note_${Date.now()}_${Math.random()}`,
            session: firstLine || 'Untitled',
            content: restContent,
            timestamp: new Date().toISOString(),
            is_deleted: false
          });
        }
      }

      renderRoomsAndNotesPreview();
      document.getElementById('btn-sync-rooms').disabled = false;
      showToast(`Parsed ${parsedRoomsAndNotes.rooms.length} rooms, ${parsedRoomsAndNotes.notes.length} notes.`);
    }

    function renderRoomsAndNotesPreview() {
      const preview = document.getElementById('rooms-preview');
      preview.innerHTML = '';

      parsedRoomsAndNotes.rooms.forEach((room, idx) => {
        const li = document.createElement('li');
        li.className = 'preview-item';
        li.innerHTML = `
          <div class="preview-item-title">🏛 ${room.room_id}</div>
          <div class="preview-item-meta">${room.readaloud.substring(0, 60)}...</div>
          <div class="preview-item-actions">
            <button class="btn-remove" onclick="removeRoomFromPreview(${idx})">Remove</button>
          </div>
        `;
        preview.appendChild(li);
      });

      parsedRoomsAndNotes.notes.forEach((note, idx) => {
        const li = document.createElement('li');
        li.className = 'preview-item';
        li.innerHTML = `
          <div class="preview-item-title">📝 ${note.session}</div>
          <div class="preview-item-meta">${note.content.substring(0, 60)}...</div>
          <div class="preview-item-actions">
            <button class="btn-remove" onclick="removeNoteFromPreview(${idx})">Remove</button>
          </div>
        `;
        preview.appendChild(li);
      });
    }

    function removeRoomFromPreview(idx) {
      parsedRoomsAndNotes.rooms.splice(idx, 1);
      renderRoomsAndNotesPreview();
    }

    function removeNoteFromPreview(idx) {
      parsedRoomsAndNotes.notes.splice(idx, 1);
      renderRoomsAndNotesPreview();
    }

    // --- PARSER 2: Loot Tables ---
    function parseLootTables() {
      const rawText = document.getElementById('loot-input').value.trim();
      if (!rawText) return showToast("Please paste loot content first.");

      parsedLootTables = { tiers: {} };

      // Match "TIER: Name (slots: N)" headers
      const tierBlocks = rawText.split(/^TIER:\s*/m).filter(b => b.trim());

      tierBlocks.forEach(block => {
        const lines = block.split('\n');
        const firstLine = lines[0].trim();
        
        // Extract tier name and slot count
        const tierMatch = firstLine.match(/^([^(]+)(?:\s*\(slots:\s*(\d+)\))?/i);
        const tierName = tierMatch ? tierMatch[1].trim().toLowerCase() : 'unknown';
        const slotCount = tierMatch && tierMatch[2] ? parseInt(tierMatch[2]) : 100;

        // Initialize tier
        parsedLootTables.tiers[tierName] = {
          name: tierName,
          slot_count: slotCount,
          slots: []
        };

        // Parse roll entries
        const rollLines = lines.slice(1).join('\n');
        const rollMatches = rollLines.matchAll(/Roll\s+(\d+(?:-\d+)?)[:\s]+(.*)/gi);

        for (const match of rollMatches) {
          const rollNum = match[1];
          const itemText = match[2];

          // Parse: Name | Type: X | Description: Y
          const nameMatch = itemText.match(/^([^|]+?)\s*\|/);
          const typeMatch = itemText.match(/Type:\s*([^|]+?)(?:\||$)/i);
          const descMatch = itemText.match(/Description:\s*(.+?)$/i);

          const itemName = nameMatch ? nameMatch[1].trim() : 'Unnamed Item';
          const itemType = typeMatch ? typeMatch[1].trim() : 'Wondrous Item';
          const itemDesc = descMatch ? descMatch[1].trim() : '';

          // Handle roll ranges (e.g., "1-5")
          let rollNums = [];
          if (rollNum.includes('-')) {
            const [start, end] = rollNum.split('-').map(Number);
            for (let r = start; r <= end; r++) rollNums.push(r);
          } else {
            rollNums.push(parseInt(rollNum));
          }

          rollNums.forEach(r => {
            parsedLootTables.tiers[tierName].slots[r - 1] = {
              roll: r,
              item: {
                name: itemName,
                type: itemType,
                desc: itemDesc
              }
            };
          });
        }

        // Fill empty slots
        for (let i = 0; i < slotCount; i++) {
          if (!parsedLootTables.tiers[tierName].slots[i]) {
            parsedLootTables.tiers[tierName].slots[i] = {
              roll: i + 1,
              item: null
            };
          }
        }
      });

      renderLootPreview();
      document.getElementById('btn-sync-loot').disabled = false;
      showToast(`Parsed ${Object.keys(parsedLootTables.tiers).length} loot tiers.`);
    }

    function renderLootPreview() {
      const preview = document.getElementById('loot-preview');
      preview.innerHTML = '';

      Object.entries(parsedLootTables.tiers).forEach(([tierName, tierData]) => {
        const filled = tierData.slots.filter(s => s.item).length;
        const li = document.createElement('li');
        li.className = 'preview-item';
        li.innerHTML = `
          <div class="preview-item-title">💎 ${tierName.toUpperCase()}</div>
          <div class="preview-item-meta">${filled}/${tierData.slot_count} slots filled</div>
          <div class="preview-item-actions">
            <button class="btn-remove" onclick="removeTierFromPreview('${tierName}')">Remove</button>
          </div>
        `;
        preview.appendChild(li);
      });
    }

    function removeTierFromPreview(tierName) {
      delete parsedLootTables.tiers[tierName];
      renderLootPreview();
    }

    // --- SYNC FUNCTIONS ---
    async function syncRoomsAndNotes() {
      if (!parsedRoomsAndNotes) return showToast("No parsed data to sync.");

      const syncBtn = document.getElementById('btn-sync-rooms');
      syncBtn.disabled = true;
      syncBtn.innerText = 'Syncing...';

      try {
        const response = await fetch(WORKER_URL);
        if (!response.ok) throw new Error('Fetch failed');
        let latestState = await response.json();

        // Initialize campaign_notes if needed
        if (!latestState.campaign_notes) {
          latestState.campaign_notes = { rooms: [], notes: [] };
        }
        if (!latestState.campaign_notes.rooms) latestState.campaign_notes.rooms = [];
        if (!latestState.campaign_notes.notes) latestState.campaign_notes.notes = [];

        // Merge rooms (update if exists, insert if new)
        parsedRoomsAndNotes.rooms.forEach(newRoom => {
          const existingIdx = latestState.campaign_notes.rooms.findIndex(r => r.room_id === newRoom.room_id);
          if (existingIdx >= 0) {
            latestState.campaign_notes.rooms[existingIdx] = newRoom;
          } else {
            latestState.campaign_notes.rooms.push(newRoom);
          }
        });

        // Merge notes (always append)
        latestState.campaign_notes.notes.push(...parsedRoomsAndNotes.notes);

        // Increment version and timestamp
        latestState.version = (latestState.version || 0) + 1;
        latestState.last_modified = Date.now();

        // Push to KV
        const postRes = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            base_version: latestState.version - 1,
            data: latestState
          })
        });

        if (!postRes.ok) throw new Error('Sync failed');

        syncBtn.style.borderColor = 'var(--success)';
        syncBtn.style.color = 'var(--success)';
        syncBtn.innerText = 'Synced ✓';
        showToast('Rooms & notes successfully synced.');

        // Reset
        setTimeout(() => {
          document.getElementById('rooms-input').value = '';
          parsedRoomsAndNotes = null;
          document.getElementById('rooms-preview').innerHTML = '';
          syncBtn.disabled = true;
          syncBtn.innerText = 'Sync to KV';
          syncBtn.style.borderColor = '';
          syncBtn.style.color = '';
        }, 2000);

      } catch (err) {
        console.error(err);
        syncBtn.disabled = false;
        syncBtn.innerText = 'Sync Failed - Retry';
        showToast('Sync error. Check console.');
      }
    }

    async function syncLootTables() {
      if (!parsedLootTables) return showToast("No parsed data to sync.");

      const syncBtn = document.getElementById('btn-sync-loot');
      syncBtn.disabled = true;
      syncBtn.innerText = 'Syncing...';

      try {
        const response = await fetch(WORKER_URL);
        if (!response.ok) throw new Error('Fetch failed');
        let latestState = await response.json();

        // Initialize loot_tables if needed
        if (!latestState.loot_tables) {
          latestState.loot_tables = { tiers: {}, personal: {} };
        }
        if (!latestState.loot_tables.tiers) latestState.loot_tables.tiers = {};

        // Merge loot tiers (overwrites existing)
        Object.assign(latestState.loot_tables.tiers, parsedLootTables.tiers);

        // Increment version and timestamp
        latestState.version = (latestState.version || 0) + 1;
        latestState.last_modified = Date.now();

        // Push to KV
        const postRes = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            base_version: latestState.version - 1,
            data: latestState
          })
        });

        if (!postRes.ok) throw new Error('Sync failed');

        syncBtn.style.borderColor = 'var(--success)';
        syncBtn.style.color = 'var(--success)';
        syncBtn.innerText = 'Synced ✓';
        showToast('Loot tables successfully synced.');

        // Reset
        setTimeout(() => {
          document.getElementById('loot-input').value = '';
          parsedLootTables = null;
          document.getElementById('loot-preview').innerHTML = '';
          syncBtn.disabled = true;
          syncBtn.innerText = 'Sync to KV';
          syncBtn.style.borderColor = '';
          syncBtn.style.color = '';
        }, 2000);

      } catch (err) {
        console.error(err);
        syncBtn.disabled = false;
        syncBtn.innerText = 'Sync Failed - Retry';
        showToast('Sync error. Check console.');
      }
    }
  </script>
</body>
</html>
