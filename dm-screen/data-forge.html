<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Showrunner // Data Forge</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --glass: rgba(20, 20, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #bb86fc;
      --danger: #ff4757;
      --success: #03dac6;
      --text: #e0e0e0;
      --text-muted: #666;
      --code-bg: #050505;
      --code-text: #a6e22e;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    body, html {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      background-color: var(--bg); color: var(--text); overflow: hidden;
      background-image: 
        radial-gradient(circle at top left, rgba(187,134,252,0.05) 0%, transparent 40%),
        radial-gradient(circle at bottom right, rgba(3,218,198,0.05) 0%, transparent 40%);
    }

    /* --- Navbar (Cupertino 2050) --- */
    .navbar {
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border); z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 0.15em; font-size: 1.2rem; color: #fff; text-shadow: 0 0 10px rgba(187,134,252,0.5); }
    .nav-links { display: flex; gap: 1rem; }
    .nav-link {
      color: var(--text); text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 6px 12px; border-radius: 20px; border: 1px solid transparent; transition: 0.3s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); color: #fff; }
    .nav-link.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(187,134,252,0.2); }

    /* --- Workspace (3-Pane Grid) --- */
    .workspace {
      display: flex; height: calc(100vh - 60px); width: 100vw; padding: 1rem; gap: 1rem;
    }

    /* Individual Pane styling */
    .pane {
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px;
      display: flex; flex-direction: column; flex: 1; transition: flex 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      backdrop-filter: blur(10px); overflow: hidden; position: relative;
    }
    .pane.wide { flex: 1.5; }
    
    /* Collapsed State */
    .pane.collapsed { flex: 0 0 45px; cursor: pointer; background: rgba(10,10,12,0.9); }
    .pane.collapsed:hover { background: rgba(30,30,35,0.9); }
    .pane.collapsed .pane-content, .pane.collapsed .pane-footer, .pane.collapsed .pane-header-title { display: none; }
    
    .pane-title-vertical {
      display: none; writing-mode: vertical-rl; transform: rotate(180deg);
      text-align: center; width: 100%; padding-top: 1rem; color: var(--text-muted);
      font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase;
    }
    .pane.collapsed .pane-title-vertical { display: block; }

    /* Pane Header */
    .pane-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.3);
    }
    .pane-header-title { font-size: 0.85rem; font-weight: bold; color: #fff; letter-spacing: 0.1em; }
    .btn-min {
      background: transparent; border: 1px solid #444; color: #aaa; width: 24px; height: 24px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .btn-min:hover { color: #fff; border-color: #fff; }

    /* Pane Content & Inputs */
    .pane-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    textarea, pre {
      flex: 1; width: 100%; resize: none; border: none; outline: none; padding: 1rem;
      background: transparent; color: var(--text); font-family: monospace; font-size: 0.9rem;
      line-height: 1.5; overflow-y: auto;
    }
    #tagged-input { border-left: 2px solid var(--accent); background: rgba(187,134,252,0.02); }
    pre { background: var(--code-bg); color: var(--code-text); margin: 0; }
    
    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Pane Footers (Actions) */
    .pane-footer { padding: 1rem; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); }
    .btn-action {
      width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.1em; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
    }
    .btn-primary { background: rgba(187, 134, 252, 0.1); border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: var(--accent); color: #000; }
    .btn-danger { background: rgba(255, 71, 87, 0.1); border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: var(--danger); color: #000; }
    .btn-danger:disabled { border-color: #444; color: #666; cursor: not-allowed; background: transparent; }

    /* Toasts */
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 4000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
    .toast { background: rgba(10,10,12,0.95); color: #fff; padding: 1rem 1.5rem; border-radius: 4px; border-left: 4px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.8); animation: fadein 0.3s, fadeout 0.3s 3.7s forwards; font-size: 0.9rem; font-weight: bold; }
    @keyframes fadein { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }

  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      SHOWRUNNER // DATA FORGE
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="dm-players.html" class="nav-link">DM Players</a>
      <a href="notes.html" class="nav-link">Notes</a>
      <a href="loot.html" class="nav-link">Loot</a>
      <a href="data-forge.html" class="nav-link active">Data Forge</a>
      <a href="players/players.html" class="nav-link" target="_blank" style="color:var(--success); border-color:var(--success);">Player HUD ↗</a>
    </div>
  </nav>

  <div class="workspace">
    
    <div id="pane1" class="pane">
      <div class="pane-title-vertical" onclick="expandPane('pane1')">1. RAW INGEST</div>
      <div class="pane-header">
        <span class="pane-header-title">1. RAW INGEST</span>
        <button class="btn-min" onclick="collapsePane('pane1')" title="Minimize">_</button>
      </div>
      <div class="pane-content">
        <textarea id="raw-input" placeholder="Paste your raw MS Word or Obsidian notes here...&#10;&#10;Expected format examples:&#10;ROOM 17a: THE WAITING AREA&#10;VISUALS & READ-ALOUD&#10;DM NOTES & MECHANICS&#10;NAME: Brenda&#10;AI TOOLTIP&#10;NEW ACHIEVEMENT!&#10;LOOT & REWARDS"></textarea>
      </div>
      <div class="pane-footer">
        <button class="btn-action btn-primary" onclick="executeAutoTag()">[ 1. EXECUTE AUTO-TAG ]</button>
      </div>
    </div>

    <div id="pane2" class="pane collapsed">
      <div class="pane-title-vertical" onclick="expandPane('pane2')">2. TAGGED SYNTAX</div>
      <div class="pane-header">
        <span class="pane-header-title">2. TAGGED SYNTAX</span>
        <button class="btn-min" onclick="collapsePane('pane2')" title="Minimize">_</button>
      </div>
      <div class="pane-content">
        <textarea id="tagged-input" placeholder="#ROOM Title...&#10;#READALOUD...&#10;#MECHANICS..."></textarea>
      </div>
      <div class="pane-footer">
        <button class="btn-action btn-primary" onclick="compileToJson()">[ 2. COMPILE TO JSON ]</button>
      </div>
    </div>

    <div id="pane3" class="pane wide collapsed">
      <div class="pane-title-vertical" onclick="expandPane('pane3')">3. DATABASE PREVIEW</div>
      <div class="pane-header">
        <span class="pane-header-title">3. DATABASE PREVIEW (JSON)</span>
        <button class="btn-min" onclick="collapsePane('pane3')" title="Minimize">_</button>
      </div>
      <div class="pane-content">
        <pre><code id="json-preview">Awaiting compilation...</code></pre>
      </div>
      <div class="pane-footer">
        <button id="btn-push" class="btn-action btn-danger" onclick="mergeAndPush()" disabled>[ 3. MERGE & PUSH TO SERVER ]</button>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>

  <script>
    const WORKER_URL = 'https://dmscreen.askozicki.workers.dev';
    let compiledRooms = [];

    // --- UI/UX Collapse Functions ---
    function collapsePane(id) {
      document.getElementById(id).classList.add('collapsed');
    }
    function expandPane(id) {
      // Optional: If you want accordion style (only 2 open max), you can collapse others here.
      // For now, let the user arrange them freely.
      document.getElementById(id).classList.remove('collapsed');
    }
    function showToast(msg) {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
      c.appendChild(t); setTimeout(() => t.remove(), 4000);
    }

    // --- Engine 1: Auto-Tagging Regex ---
    function executeAutoTag() {
      const rawText = document.getElementById('raw-input').value;
      if (!rawText.trim()) return showToast("Please paste raw notes first.");
      
      let taggedText = rawText
        .replace(/^ROOM (.*)/gm, '#ROOM $1')
        .replace(/VISUALS & READ-ALOUD/g, '#READALOUD')
        .replace(/DM NOTES & MECHANICS/g, '#MECHANICS')
        .replace(/^NAME: (.*)/gm, '#NPC $1')
        .replace(/AI TOOLTIP/g, '#TOOLTIP')
        .replace(/NEW ACHIEVEMENT!/g, '#ACHIEVEMENT')
        .replace(/LOOT & REWARDS/g, '#LOOT');

      document.getElementById('tagged-input').value = taggedText;
      
      collapsePane('pane1');
      expandPane('pane2');
      showToast("Auto-tagging complete. Please review.");
    }

    // --- Engine 2: Block Parser (Text to JSON) ---
    function compileToJson() {
      const text = document.getElementById('tagged-input').value;
      if (!text.trim()) return showToast("No tagged syntax found.");
      
      compiledRooms = []; 
      
      // Split by #ROOM, ignore any intro junk before the first room
      const blocks = text.split('#ROOM ').filter(b => b.trim() !== '');
      
      blocks.forEach(block => {
        let roomObj = {
          room_id: "", readaloud: "", mechanics: "",
          npcs: [], tooltips: [], achievements: [], loot: []
        };

        // Sub-split by any hashtag, preserving the tags themselves in the string
        const sections = block.split(/(?=#READALOUD|#MECHANICS|#NPC|#TOOLTIP|#ACHIEVEMENT|#LOOT)/);
        
        // Section 0 is always the Room ID / Title
        roomObj.room_id = sections[0].trim();

        // Route remaining chunks
        for (let i = 1; i < sections.length; i++) {
          let sec = sections[i].trim();
          if (sec.startsWith('#READALOUD')) roomObj.readaloud = sec.replace('#READALOUD', '').trim();
          else if (sec.startsWith('#MECHANICS')) roomObj.mechanics = sec.replace('#MECHANICS', '').trim();
          else if (sec.startsWith('#NPC')) roomObj.npcs.push({ raw_text: sec.replace('#NPC', '').trim() });
          else if (sec.startsWith('#TOOLTIP')) roomObj.tooltips.push({ raw_text: sec.replace('#TOOLTIP', '').trim() });
          else if (sec.startsWith('#ACHIEVEMENT')) roomObj.achievements.push({ raw_text: sec.replace('#ACHIEVEMENT', '').trim() });
          else if (sec.startsWith('#LOOT')) roomObj.loot.push({ raw_text: sec.replace('#LOOT', '').trim() });
        }
        compiledRooms.push(roomObj);
      });

      document.getElementById('json-preview').innerText = JSON.stringify(compiledRooms, null, 2);
      
      document.getElementById('btn-push').disabled = false;
      collapsePane('pane2');
      expandPane('pane3');
      showToast("JSON Compiled. Ready for upload.");
    }

    // --- Engine 3: Pull, Merge, Push ---
    async function mergeAndPush() {
      const pushBtn = document.getElementById('btn-push');
      pushBtn.disabled = true; pushBtn.innerText = "[ TRANSMITTING... ]";

      try {
        // 1. PULL Latest
        const fetchRes = await fetch(WORKER_URL);
        if (!fetchRes.ok) throw new Error("Fetch failed");
        let latestState = await fetchRes.json();

        // 2. MERGE
        if (!latestState.content) latestState.content = {};
        latestState.content.rooms = compiledRooms; 

        // 3. INCREMENT & TIMESTAMP
        latestState.version = (latestState.version || 0) + 1;
        latestState.last_modified = Date.now();

        // 4. PUSH
        const payload = { 
          base_version: latestState.version - 1, 
          last_modified: latestState.last_modified,
          data: latestState 
        };
        
        const postRes = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload) 
        });
        
        if (!postRes.ok) throw new Error("Version collision");

        pushBtn.style.borderColor = 'var(--success)';
        pushBtn.style.color = 'var(--success)';
        pushBtn.innerText = "[ UPLOAD COMPLETE ]";
        showToast("Database successfully updated.");

      } catch (e) {
        console.error(e);
        pushBtn.disabled = false;
        pushBtn.innerText = "[ MERGE & PUSH FAILED - RETRY ]";
        showToast("Network collision. Try again.");
      }
    }
  </script>
</body>
</html>
