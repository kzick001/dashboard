<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUCID Forge | Taxonomy Trainer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'><path d='M32 52 L32 12 M32 52 L12 26 M32 52 L52 26' stroke='%2330d158' stroke-width='6' stroke-linecap='round'/><circle cx='32' cy='52' r='6' fill='%2330d158'/><circle cx='32' cy='12' r='6' fill='%2330d158'/><circle cx='12' cy='26' r='6' fill='%2330d158'/><circle cx='52' cy='26' r='6' fill='%2330d158'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.03); --glass-hover: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.06); --text-main: #f5f5f7; --text-muted: #86868b;
      --accent: #5e5ce6; --success: #30d158;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main);
      margin: 0; padding: 15px; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    
    /* Typography & Header */
    .header { width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; margin: 0; }
    h3 { font-size: 11px; font-weight: 300; letter-spacing: 4px; margin: 5px 0 0 0; color: var(--text-muted); text-transform: uppercase; }
    
    /* Layout */
    .panel {
      background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      width: 100%; max-width: 500px; padding: 20px; margin-bottom: 15px;
    }

    /* Controls */
    select, input, button {
      font-family: 'Inter', sans-serif; font-size: 15px; width: 100%;
      background: rgba(0,0,0,0.4); color: var(--text-main);
      border: 1px solid var(--glass-border); border-radius: 10px;
      padding: 14px; margin-bottom: 10px; outline: none; appearance: none;
    }
    button { background: var(--glass); cursor: pointer; font-weight: 500; transition: 0.2s; }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--accent); color: #fff; border: none; font-size: 16px; padding: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(94, 92, 230, 0.3); }
    button.success { background: var(--success); color: #000; border: none; }
    
    .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
    .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; height: 100%; cursor: pointer; }

    /* Progress Bar */
    .progress-container { width: 100%; max-width: 500px; margin-bottom: 15px; }
    .progress-text { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .progress-bar-bg { width: 100%; height: 6px; background: var(--glass-border); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

    /* The Card */
    .card-title { font-size: 22px; font-weight: 700; margin: 0 0 5px 0; line-height: 1.3; }
    .card-brand { font-size: 14px; color: var(--text-muted); margin: 0 0 15px 0; }
    .guess-badge { display: inline-block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); margin-bottom: 15px; }
    
    .scroll-box {
      background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px;
      padding: 15px; font-size: 13px; color: #aaa; height: 120px; overflow-y: auto; margin-bottom: 20px; line-height: 1.5;
    }

    .form-row { display: flex; gap: 10px; }
    .form-row select { margin-bottom: 0; }
    .label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block; padding-left: 5px; }

    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <h1>LUCID FORGE</h1>
    <h3>Taxonomy Trainer</h3>
  </div>

  <div class="panel" id="loadPanel">
    <p style="font-size: 14px; color: #aaa; margin-top: 0;">Upload a <strong>Cleaned JSON</strong> file from the LUCID Dashboard to begin.</p>
    <div class="file-upload-wrapper">
      <button>Select JSON File...</button>
      <input type="file" id="jsonUpload" accept=".json">
    </div>
  </div>

  <div id="workspace" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    
    <div class="panel" style="padding: 15px;">
      <div class="form-row">
        <select id="filterT1">
          <option value="All">Filter by: All Categories</option>
          <option value="Flower">Flower</option>
          <option value="Vape">Vape</option>
          <option value="Extract">Extract</option>
          <option value="Pre-Roll">Pre-Roll</option>
          <option value="Edible">Edible</option>
          <option value="Gear">Gear</option>
          <option value="Topical">Topical</option>
          <option value="Tincture">Tincture</option>
          <option value="Other">Other</option>
        </select>
        <select id="filterStatus">
          <option value="pending">Pending Only</option>
          <option value="all">Show All</option>
          <option value="completed">Completed Only</option>
        </select>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-text">
        <span id="progressCount">0 / 0</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <div class="panel" id="cardPanel">
      <div class="guess-badge" id="cardGuess">AI Guess: Vape</div>
      <h2 class="card-title" id="cardTitle">Strain Name</h2>
      <p class="card-brand" id="cardBrand">Brand Name</p>
      
      <div class="scroll-box" id="cardDesc">
        Loading description...
      </div>

      <label class="label">Master Category</label>
      <select id="inputT1"></select>

      <label class="label">Sub-Category</label>
      <select id="inputT2"></select>

      <label class="label">Type (Genetics)</label>
      <select id="inputType">
        <option value="Indica">Indica</option>
        <option value="Sativa">Sativa</option>
        <option value="Hybrid">Hybrid</option>
        <option value="N/A">N/A (Merch/Edible)</option>
      </select>

      <button class="primary" id="saveNextBtn">Approve & Next</button>
    </div>

    <button class="success" id="exportBtn" style="max-width: 500px;">Download Master Dictionary</button>
  </div>

  <script>
    // --- STATE ---
    let fullInventory = [];
    let workingList = [];
    let currentIndex = 0;
    
    // Load dictionary from local storage so you never lose progress
    let dictionary = JSON.parse(localStorage.getItem('lucid_dictionary')) || {};

    // --- TAXONOMY MAP ---
    const t2Map = {
      "Flower": ["Premium / Smalls", "Shake / Trim"],
      "Vape": ["Standard Vape", "Distillate Vape", "Resin Vape", "Rosin Vape"],
      "Pre-Roll": ["Standard Pre-Roll", "Infused Pre-Roll"],
      "Extract": ["Standard Extract", "Live Rosin"],
      "Edible": ["Edible"],
      "Topical": ["Topical"],
      "Tincture": ["Tincture"],
      "Gear": ["Apparel", "Papers / Wraps", "Accessories"],
      "Other": ["Other"]
    };

    // --- UTILS ---
    const generateSlug = (brand, strain) => {
      return `${brand}-${strain}`.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
    };

    // --- UI LOGIC ---
    function populateT1() {
      const t1Select = document.getElementById('inputT1');
      t1Select.innerHTML = Object.keys(t2Map).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function populateT2(selectedT1) {
      const t2Select = document.getElementById('inputT2');
      const options = t2Map[selectedT1] || ["Other"];
      t2Select.innerHTML = options.map(o => `<option value="${o}">${o}</option>`).join('');
    }

    // Listener to cascade T1 -> T2
    document.getElementById('inputT1').addEventListener('change', (e) => populateT2(e.target.value));

    function applyFilters() {
      const fT1 = document.getElementById('filterT1').value;
      const fStatus = document.getElementById('filterStatus').value;

      workingList = fullInventory.filter(item => {
        const slug = generateSlug(item.brand, item.strain);
        const isCompleted = !!dictionary[slug];
        
        let passT1 = (fT1 === 'All' || item.t1 === fT1);
        let passStatus = true;
        if (fStatus === 'pending') passStatus = !isCompleted;
        if (fStatus === 'completed') passStatus = isCompleted;

        return passT1 && passStatus;
      });

      currentIndex = 0;
      renderCard();
    }

    function renderCard() {
      // Update Progress
      const completedCount = Object.keys(dictionary).length;
      const totalCount = fullInventory.length;
      const pct = totalCount === 0 ? 0 : Math.round((completedCount / totalCount) * 100);
      
      document.getElementById('progressCount').innerText = `${completedCount} / ${totalCount} Verified`;
      document.getElementById('progressPercent').innerText = `${pct}%`;
      document.getElementById('progressBar').style.width = `${pct}%`;

      if (workingList.length === 0 || currentIndex >= workingList.length) {
        document.getElementById('cardPanel').innerHTML = `<h2 style="text-align:center; padding: 40px 0;">All items in this filter are verified! 🎉</h2>`;
        return;
      }

      const item = workingList[currentIndex];
      const slug = generateSlug(item.brand, item.strain);
      
      document.getElementById('cardTitle').innerText = item.strain;
      document.getElementById('cardBrand').innerText = item.brand;
      document.getElementById('cardGuess').innerText = `AI Guess: ${item.t1} -> ${item.t2}`;
      
      let descText = item.deepData?.desc || "No description provided.";
      if (item.deepData?.terps?.length > 0) descText = `Terps: ${item.deepData.terps.join(', ')}\n\n` + descText;
      document.getElementById('cardDesc').innerText = descText;

      // Check if it exists in dictionary; if so, load user's tags. Otherwise, load script's guess.
      const saved = dictionary[slug];
      const targetT1 = saved ? saved.t1 : (Object.keys(t2Map).includes(item.t1) ? item.t1 : "Other");
      
      document.getElementById('inputT1').value = targetT1;
      populateT2(targetT1); // Refresh T2 dropdown
      
      document.getElementById('inputT2').value = saved ? saved.t2 : item.t2;
      document.getElementById('inputType').value = saved ? saved.type : item.type;
    }

    // --- EVENT LISTENERS ---
    
    // 1. File Upload
    document.getElementById('jsonUpload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          fullInventory = JSON.parse(event.target.result);
          document.getElementById('loadPanel').classList.add('hidden');
          document.getElementById('workspace').classList.remove('hidden');
          populateT1();
          applyFilters();
        } catch (err) {
          alert("Error parsing JSON file. Make sure it's the Cleaned JSON export.");
        }
      };
      reader.readAsText(file);
    });

    // 2. Filter Changes
    document.getElementById('filterT1').addEventListener('change', applyFilters);
    document.getElementById('filterStatus').addEventListener('change', applyFilters);

    // 3. Save & Next
    document.getElementById('saveNextBtn').addEventListener('click', () => {
      const item = workingList[currentIndex];
      const slug = generateSlug(item.brand, item.strain);

      // Save to dictionary
      dictionary[slug] = {
        t1: document.getElementById('inputT1').value,
        t2: document.getElementById('inputT2').value,
        type: document.getElementById('inputType').value
      };

      // Auto-save to Local Storage
      localStorage.setItem('lucid_dictionary', JSON.stringify(dictionary));

      // Advance
      currentIndex++;
      renderCard();
    });

    // 4. Export Dictionary
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(dictionary, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.setAttribute("href", url);
      anchor.setAttribute("download", `lucid_master_dictionary.json`);
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    });

  </script>
</body>
</html>
