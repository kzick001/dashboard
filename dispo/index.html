<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCID Dashboard v2.0</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'><path d='M32 52 L32 12 M32 52 L12 26 M32 52 L52 26' stroke='%2330d158' stroke-width='6' stroke-linecap='round'/><circle cx='32' cy='52' r='6' fill='%2330d158'/><circle cx='32' cy='12' r='6' fill='%2330d158'/><circle cx='12' cy='26' r='6' fill='%2330d158'/><circle cx='52' cy='26' r='6' fill='%2330d158'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.03); --glass-hover: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.06); --text-main: #f5f5f7; --text-muted: #86868b;
      --accent: #5e5ce6; --success: #30d158; --danger: #ff453a;
    }
    
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main);
      margin: 0; padding: 20px; -webkit-font-smoothing: antialiased;
    }

    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
    h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
    h1 span { font-size: 10px; background: var(--accent); color: #fff; padding: 2px 6px; border-radius: 4px; letter-spacing: 2px; }
    
    .controls { display: flex; gap: 10px; }
    button {
      background: var(--glass); color: var(--text-main); border: 1px solid var(--glass-border);
      padding: 10px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: 0.2s; outline: none;
    }
    button:hover { background: var(--glass-hover); }
    button.primary { background: var(--accent); border-color: var(--accent); }
    button.success { background: var(--success); color: #000; border-color: var(--success); font-weight: 600; }
    
    /* Watchlist Manager Panel */
    .watchlist-panel {
      background: rgba(94, 92, 230, 0.05); border: 1px solid rgba(94, 92, 230, 0.2);
      border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
    }
    .watchlist-panel h3 { margin: 0; font-size: 14px; color: var(--accent); display: flex; align-items: center; gap: 8px; min-width: 150px; }
    .watchlist-input-group { display: flex; flex: 1; gap: 8px; min-width: 300px; }
    .watchlist-input-group input, .watchlist-input-group select {
      flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--text-main);
      padding: 10px 15px; border-radius: 8px; font-family: 'Inter'; font-size: 13px; outline: none;
    }
    .watchlist-input-group input:focus, .watchlist-input-group select:focus { border-color: var(--accent); }

    /* Phase 7: Main Filter Bar */
    .main-search-bar { display: flex; gap: 10px; margin-bottom: 10px; }
    input[type="text"].search-bar {
      background: var(--glass); color: var(--text-main); border: 1px solid var(--glass-border);
      padding: 12px 15px; border-radius: 8px; font-family: 'Inter'; font-size: 14px; outline: none; flex: 1;
    }
    input[type="text"].search-bar:focus { border-color: var(--accent); }
    
    /* Phase 7: The Filter Vault Drawer */
    .filter-drawer {
      background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px;
      margin-bottom: 20px; display: none; gap: 15px; flex-wrap: wrap; align-items: center;
    }
    .filter-drawer.active { display: flex; }
    .filter-drawer select, .filter-drawer input[type="number"] {
      background: var(--bg); color: var(--text-main); border: 1px solid var(--glass-border);
      padding: 8px 12px; border-radius: 6px; font-family: 'Inter'; font-size: 12px; outline: none; flex: 1; min-width: 110px;
    }
    option { background-color: var(--bg); color: var(--text-main); }
    
    .toggle-group { display: flex; gap: 15px; align-items: center; margin-left: auto; }
    .toggle-label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    .toggle-label input { accent-color: var(--accent); cursor: pointer; }

    /* Table Styles */
    .table-container { width: 100%; overflow-x: auto; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--glass-border); white-space: nowrap; }
    th { color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; user-select: none; }
    th:hover { color: var(--text-main); }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    
    /* Data Cells */
    .brand { font-weight: 600; color: #fff; }
    .strain { color: #ddd; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }
    .badge.indica { color: #af52de; background: rgba(175, 82, 222, 0.1); border-color: #af52de; }
    .badge.sativa { color: #ff9500; background: rgba(255, 149, 0, 0.1); border-color: #ff9500; }
    .badge.hybrid { color: #30d158; background: rgba(48, 209, 88, 0.1); border-color: #30d158; }
    
    /* Phase 7: Price Drop Styling */
    .price { font-weight: 600; color: var(--text-main); }
    .price.dropped { color: var(--success); }
    .price-old { color: var(--text-muted); text-decoration: line-through; font-size: 11px; margin-right: 6px; font-weight: normal; }
    .metric { color: #aaa; font-family: monospace; font-size: 12px; }
    
    /* Dual-Action Buttons */
    .action-btn { cursor: pointer; font-size: 15px; transition: 0.2s; user-select: none; text-align: center; }
    .action-btn:hover { transform: scale(1.1); }
    
    .fav-btn { color: #444; }
    .fav-btn:hover { color: #888; }
    .fav-btn.active { color: #ffd60a; text-shadow: 0 0 8px rgba(255, 214, 10, 0.4); }
    
    .alert-btn { filter: grayscale(100%) opacity(0.3); }
    .alert-btn:hover { filter: grayscale(50%) opacity(0.8); }
    .alert-btn.active { filter: grayscale(0%) opacity(1); }

    /* Ghost Row (Out of Stock) */
    .ghost-row { background: rgba(255, 69, 58, 0.05) !important; opacity: 0.6; transition: 0.3s; }
    .ghost-row:hover { opacity: 0.9; background: rgba(255, 69, 58, 0.1) !important; }
    .ghost-badge { background: var(--danger); color: #fff; font-size: 9px; padding: 2px 4px; border-radius: 3px; font-weight: bold; margin-left: 8px; letter-spacing: 0.5px; }

    /* Loading Overlay */
    #loader { display: none; text-align: center; padding: 40px; color: var(--accent); font-weight: 500; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1>LUCID <span>v2.0</span></h1>
    <div class="controls">
      <button id="btnRise">Ingest Rise</button>
      <button id="btnGreenGoods">Ingest Green Goods</button>
      <button class="primary" onclick="window.open('forge.html', '_blank')">Open Forge</button>
    </div>
  </div>

  <div class="watchlist-panel">
    <h3>🔔 Alert Watchlist</h3>
    <div class="watchlist-input-group" style="flex-wrap: wrap;">
      <select id="ghostBrand" style="flex: 0.5;"><option value="">-- Brand --</option></select>
      <input type="text" id="ghostStrain" list="ghostStrainList" placeholder="Strain Name (e.g. Animal Face)...">
      <datalist id="ghostStrainList"></datalist>
      <select id="ghostSize" style="flex: 0.3;">
        <option value="">-- Size --</option>
        <option value="0.3g">0.3g</option>
        <option value="0.35g">0.35g</option>
        <option value="0.5g">0.5g</option>
        <option value="1g">1g</option>
        <option value="2g">2g</option>
        <option value="3.5g">3.5g</option>
        <option value="7g">7g</option>
        <option value="14g">14g</option>
        <option value="28g">28g</option>
        <option value="10pk">10pk</option>
        <option value="20pk">20pk</option>
        <option value="30pk">30pk</option>
      </select>
      <button id="addGhostBtn" class="primary">Add Alert</button>
    </div>
    <button id="syncCloudBtn" class="success" style="margin-left: auto;">Sync to Cloud</button>
  </div>

  <div class="main-search-bar">
    <input type="text" id="searchBar" class="search-bar" placeholder="Search Brand, Strain, or Terps...">
    <button id="toggleFiltersBtn" style="white-space: nowrap;">🎛️ Advanced Filters</button>
  </div>

  <div id="filterDrawer" class="filter-drawer">
    <select id="filterT1">
      <option value="All">All Categories</option>
      <option value="Flower">Flower</option>
      <option value="Vape">Vape</option>
      <option value="Extract">Extract</option>
      <option value="Pre-Roll">Pre-Roll</option>
      <option value="Edible">Edible</option>
      <option value="Topical">Topical</option>
      <option value="Tincture">Tincture</option>
      <option value="Gear">Gear</option>
    </select>
    
    <select id="filterType">
      <option value="All">All Genetics</option>
      <option value="Indica">Indica</option>
      <option value="Sativa">Sativa</option>
      <option value="Hybrid">Hybrid</option>
    </select>

    <select id="filterSize">
      <option value="All">All Sizes</option>
      <option value="3.5g">3.5g</option>
      <option value="7g">7g</option>
      <option value="14g">14g</option>
      <option value="28g">28g</option>
      <option value="0.5g">0.5g</option>
      <option value="1g">1g</option>
    </select>

    <input type="number" id="filterMinTHC" placeholder="Min THC %">
    <input type="number" id="filterMaxPrice" placeholder="Max Price $">

    <div class="toggle-group">
      <label class="toggle-label"><input type="checkbox" id="filterDrops"> Show Price Drops</label>
      <label class="toggle-label"><input type="checkbox" id="filterOOS"> Show Out of Stock</label>
    </div>
  </div>

  <div id="loader">Fetching and Normalizing Data...</div>

  <div class="table-container">
    <table id="dataTable">
      <thead>
        <tr>
          <th width="40" title="Save locally">Fav</th>
          <th width="40" title="Cloud email alert">Alert</th>
          <th data-sort="brand">Brand</th>
          <th data-sort="strain">Strain</th>
          <th data-sort="t2">Format</th>
          <th data-sort="type">Genetics</th>
          <th data-sort="size">Size</th>
          <th data-sort="thcNum">THC</th>
          <th data-sort="priceNum">Price</th>
          <th data-sort="ppgNum">Value Metric</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="10" style="text-align: center; color: #888; padding: 40px;">Select a dispensary to begin ingestion.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
