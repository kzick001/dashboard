<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu Scraper Proxy - POST Engine</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    select, button, textarea { 
      font-family: monospace; 
      background: #222; 
      color: #0f0; 
      border: 1px solid #444; 
      padding: 10px; 
      margin-bottom: 10px; 
      width: 100%; 
      box-sizing: border-box; 
    }
    button { cursor: pointer; background: #333; font-weight: bold; }
    button:hover { background: #444; }
    textarea { height: 60vh; resize: vertical; }
    .controls { display: flex; gap: 10px; }
    select { flex-grow: 1; }
  </style>
</head>
<body>
  <h2>Passthrough Scraper - v2</h2>
  <div class="controls">
    <select id="dispensary">
      <option value="" disabled selected>Select Target Dispensary...</option>
      <option value="greengoods">Green Goods (Store 3812 - Flower)</option>
      <option value="rise">Rise (Store 4635 - All Inventory)</option>
    </select>
    <button id="fetchBtn" style="width: 20%;">Fetch Inventory</button>
  </div>
  <button id="copyBtn">Copy Raw JSON</button>
  <textarea id="output" readonly placeholder="Waiting for query..."></textarea>

  <script>
    const WORKER_URL = "https://dispo.askozicki.workers.dev";
    const SECRET = "stoner@4data#7HEIST";

    // Pre-configured targets and their specific POST payloads
    const targets = {
      greengoods: {
        url: "https://dmerch.iheartjane.com/v2/multi?jdm_api_key=ce5f15c9-3d09-441d-9bfd-26e87aff5925",
        payload: {
          "app_mode": "framelessEmbed",
          "num_columns": 1,
          "search_attributes": ["*"],
          "store_id": 3812,
          "placements": [
            {
              "page_size": 100,
              "placement": "menu_inline_table",
              "search_filter": "(kind:\"flower\" OR root_types:\"flower\")",
              "search_sort": "recommendation"
            }
          ],
          "type": "custom"
        }
      },
      rise: {
        url: "https://search.iheartjane.com/1/indexes/*/queries",
        payload: {
          "requests": [
            {
              "indexName": "menu-products-production",
              "params": "filters=store_id = 4635&hitsPerPage=100&page=0"
            }
          ]
        }
      }
    };

    document.getElementById('fetchBtn').addEventListener('click', async () => {
      const selection = document.getElementById('dispensary').value;
      const output = document.getElementById('output');
      
      if (!selection) {
        output.value = "Error: Please select a target dispensary from the dropdown.";
        return;
      }

      const targetConfig = targets[selection];
      output.value = `Executing POST payload to ${selection} via worker...\n\nTarget URL: ${targetConfig.url}\n\nPlease wait...`;
      
      try {
        const res = await fetch(`${WORKER_URL}?target=${encodeURIComponent(targetConfig.url)}`, {
          method: "POST",
          headers: { 
            "X-Proxy-Secret": SECRET,
            "Content-Type": "application/json" 
          },
          body: JSON.stringify(targetConfig.payload)
        });
        
        // NEW ERROR HANDLING LOGIC
        // If the worker returns a 500, we read the exact crash report it sent
        if (!res.ok) {
          const errorPayload = await res.text();
          throw new Error(`Worker returned status ${res.status}:\n\n${errorPayload}`);
        }
        
        const jsonResponse = await res.json();
        output.value = JSON.stringify(jsonResponse, null, 2);
        
      } catch (e) {
        // This prints the detailed crash report to the screen
        output.value = "CRITICAL FAILURE:\n\n" + e.message;
      }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const output = document.getElementById('output');
      output.select();
      navigator.clipboard.writeText(output.value);
    });
  </script>
</body>
</html>
