<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu Scraper Proxy - Phase 3 (Parser)</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    select, button { 
      font-family: monospace; background: #222; color: #0f0; border: 1px solid #444; 
      padding: 10px; margin-bottom: 10px; box-sizing: border-box; 
    }
    button { cursor: pointer; background: #333; font-weight: bold; width: 20%; }
    button:hover { background: #444; }
    .controls { display: flex; gap: 10px; }
    select { flex-grow: 1; }
    
    /* New Table Styles */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { color: #0f0; border-bottom: 2px solid #0f0; text-transform: uppercase; }
    tr:hover { background: #222; }
    .type-sativa { color: #f39c12; }
    .type-indica { color: #9b59b6; }
    .type-hybrid { color: #3498db; }
  </style>
</head>
<body>
  <h2>Passthrough Scraper - v3 (Parser)</h2>
  <div class="controls">
    <select id="dispensary">
      <option value="" disabled selected>Select Target Dispensary...</option>
      <option value="greengoods">Green Goods (Store 3812 - Flower)</option>
      <option value="rise">Rise (Store 4635 - All Inventory)</option>
    </select>
    <button id="fetchBtn">Fetch & Parse</button>
  </div>
  
  <div id="status" style="margin-bottom: 15px; color: #aaa;">Waiting for command...</div>
  
  <table id="resultsTable" style="display: none;">
    <thead>
      <tr>
        <th>Strain</th>
        <th>Type</th>
        <th>Size</th>
        <th>THC %</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const WORKER_URL = "https://dispo.askozicki.workers.dev";
    const SECRET = "stoner@4data#7HEIST";

    const targets = {
      greengoods: {
        url: "https://dmerch.iheartjane.com/v2/multi?jdm_api_key=ce5f15c9-3d09-441d-9bfd-26e87aff5925&jdm_source=monolith&jdm_version=2.16.0",
        payload: {
          "app_mode": "framelessEmbed",
          "jane_device_id": "iYQZXwVq21hz9ZKd3VYgM",
          "num_columns": 1,
          "search_attributes": ["*"],
          "store_id": 3812,
          "placements": [{
            "disable_ads": false, "page_size": 100, "placement": "menu_inline_table",
            "search_filter": "(kind:\"flower\" OR root_types:\"flower\")", "search_sort": "recommendation"
          }],
          "type": "custom"
        }
      },
      rise: {
        url: "https://search.iheartjane.com/1/indexes/*/queries",
        payload: { "requests": [{ "indexName": "menu-products-production", "params": "filters=store_id = 4635&hitsPerPage=100&page=0" }] }
      }
    };

    // Dictionary to translate Jane's text weights into actual grams
    const weightDictionary = {
      "gram": "1g",
      "eighth": "3.5g",
      "quarter": "7g",
      "half": "14g",
      "ounce": "28g"
    };

    function parseInventory(data, source) {
      // 1. Isolate the array based on which API we hit
      let rawArray = [];
      if (source === 'rise' && data.results && data.results[0].hits) {
        rawArray = data.results[0].hits;
      } else if (source === 'greengoods' && data.length > 0 && data[0].hits) {
        // dmerch API structure varies slightly, usually wrapped in an array
        rawArray = data[0].hits;
      }

      // 2. Loop through the heavy data and map it to our lean structure
      return rawArray.map(item => {
        // Fallback string if notes are empty to prevent crashes
        const notes = item.store_notes || item.description || ""; 
        const notesLower = notes.toLowerCase();

        // --- Extract Type ---
        let type = "Hybrid"; // Default
        if (notesLower.includes("sativa") || (item.root_types && item.root_types.includes("sativa"))) type = "Sativa";
        else if (notesLower.includes("indica") || (item.root_types && item.root_types.includes("indica"))) type = "Indica";

        // --- Extract Sizes ---
        let sizes = "N/A";
        if (item.available_weights && item.available_weights.length > 0) {
          sizes = item.available_weights.map(w => weightDictionary[w] || w).join(", ");
        }

        // --- Extract THC (The RegEx Hunter) ---
        // Looks for "THC", an optional colon, spaces, numbers/decimals, and an optional %
        let thc = "N/A";
        const thcMatch = notes.match(/THC\s*:?\s*([\d.]+)/i);
        if (thcMatch && thcMatch[1]) {
          thc = thcMatch[1] + "%";
        }

        return {
          strain: item.strain || item.name || "Unknown Strain",
          type: type,
          sizes: sizes,
          thc: thc
        };
      });
    }

    function renderTable(leanData) {
      const tbody = document.getElementById('tableBody');
      const table = document.getElementById('resultsTable');
      tbody.innerHTML = ''; // Clear old results

      leanData.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${item.strain}</strong></td>
          <td class="type-${item.type.toLowerCase()}">${item.type}</td>
          <td>${item.sizes}</td>
          <td>${item.thc}</td>
        `;
        tbody.appendChild(row);
      });

      table.style.display = 'table'; // Show the table
    }

    document.getElementById('fetchBtn').addEventListener('click', async () => {
      const selection = document.getElementById('dispensary').value;
      const statusDiv = document.getElementById('status');
      
      if (!selection) {
        statusDiv.innerText = "Error: Select a dispensary.";
        return;
      }

      statusDiv.innerText = `Punching through ${selection} API...`;
      document.getElementById('resultsTable').style.display = 'none';
      
      try {
        const res = await fetch(`${WORKER_URL}?target=${encodeURIComponent(targets[selection].url)}`, {
          method: "POST",
          headers: { "X-Proxy-Secret": SECRET, "Content-Type": "application/json" },
          body: JSON.stringify(targets[selection].payload)
        });
        
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Worker Crash ${res.status}: ${errText}`);
        }
        
        const rawJson = await res.json();
        statusDiv.innerText = "Data acquired. Parsing...";
        
        // Feed the raw data to our parser
        const leanInventory = parseInventory(rawJson, selection);
        
        // Render the UI
        renderTable(leanInventory);
        statusDiv.innerText = `Success: Displaying ${leanInventory.length} products.`;
        
      } catch (e) {
        statusDiv.innerText = "CRITICAL FAILURE: " + e.message;
        statusDiv.style.color = "red";
      }
    });
  </script>
</body>
</html>
